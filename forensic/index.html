<style>
:root{--bg:#0b1220;--panel:#131f33;--panel2:#0f1828;--ink:#e7ecf6;--mut:#9fb0c8;--gold:#d8b25a;--good:#3ec79a;--bad:#e4584b;--warn:#e0a93f;--line:#22324c;--mono:ui-monospace,Menlo,Consolas,monospace}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#16233b,#0b1220 60%);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;line-height:1.55;-webkit-text-size-adjust:100%}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 64px}
.hud{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:12px;position:sticky;top:8px;z-index:5;backdrop-filter:blur(4px)}
.hud .lbl{font-size:11px;color:var(--mut);letter-spacing:.04em}
.hud .big{font-size:20px;font-weight:700;font-family:var(--mono)}
.gold{color:var(--gold)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:14px}
.cfo{display:flex;gap:12px;align-items:flex-start}
.ava{flex:0 0 auto;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:#3a2c12;color:var(--gold);border:1px solid #5a4620}
.bubble{background:#1b2942;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:0 12px 12px 12px;padding:10px 12px;color:#eaeefb}
.q{font-weight:600;margin:14px 0 8px}
.in{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:17px;font-family:var(--mono);padding:12px 14px;outline:none}
.in:focus{border-color:var(--gold)}
.btn{appearance:none;cursor:pointer;background:#1a2840;color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;font-weight:600;transition:transform .06s,border-color .15s}
.btn:hover{border-color:var(--gold)}.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(180deg,#caa64f,#a9863a);color:#1a1407;border-color:#caa64f}
.btn.full{display:block;width:100%}
.btn.sel{border-color:var(--gold);color:var(--gold)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.choice{display:block;width:100%;text-align:left;margin:8px 0}
.muted{color:var(--mut);font-size:13px}
.pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.pow-강{color:var(--bad);border-color:#4a2420}.pow-중{color:var(--warn);border-color:#4a3a1a}.pow-약{color:var(--mut)}
.fld{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.fld .in{width:170px}
.cs{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0;cursor:pointer}
.cs:hover{border-color:var(--gold)}
.warn{color:var(--warn);font-size:12px}
.timer{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--mut)}
.pop{animation:pop .3s ease}@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.shake{animation:shk .4s}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.title{font-size:22px;font-weight:800;letter-spacing:-.01em}
.sub{color:var(--mut);font-size:13px}
.tbl{width:100%;font-size:14px;border-collapse:collapse}
.tbl td{padding:4px 0;vertical-align:top}
.tbl td:first-child{color:var(--mut);padding-right:12px;white-space:nowrap}
.good{color:var(--good)}.bad{color:var(--bad)}
.foot{text-align:center;color:#54627a;font-size:11px;margin-top:18px}

function fmtGroup(v,dec){var neg=/^\s*-/.test(v);v=String(v).replace(/,/g,'');if(dec){v=v.replace(/[^0-9.]/g,'');var i=v.indexOf('.');var ip=(i>=0?v.slice(0,i):v).replace(/[^0-9]/g,'');var dp=(i>=0?v.slice(i+1).replace(/[^0-9]/g,''):'');return (neg?'-':'')+ip.replace(/\B(?=(\d{3})+(?!\d))/g,',')+(i>=0?('.'+dp):'')}v=v.replace(/[^0-9]/g,'');return (neg?'-':'')+v.replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function group(el){el.addEventListener('input',function(){var s=el.selectionStart;var before=el.value.slice(0,s).replace(/[^0-9]/g,'').length;var f=fmtGroup(el.value,false);el.value=f;var p=0,seen=0;while(p<f.length&&seen<before){if(/[0-9]/.test(f[p]))seen++;p++;}try{el.setSelectionRange(p,p)}catch(e){}})}
function shields(){var s='';for(var i=0;i<MAXH;i++){s+='<span style="font-size:20px;color:'+(i<S.h?'var(--good)':'#33425e')+'">◆</span>'}return s}
function mood(){return S.h>=3?'침착':(S.h===2?'동요':'궁지')}
function hud(){return '<div class="hud"><div><div class="lbl">신뢰도 · CFO '+ (CASE? mood():'') +'</div><div class="big">'+(CASE?shields():'⚖️')+'</div></div>'
 +(CASE?'<div style="text-align:center"><div class="lbl">적발</div><div class="big gold">'+S.caught+'/4</div></div>':'')
 +'<div style="text-align:right"><div class="lbl">평판</div><div class="big">'+Math.round(SAVE.rep)+'</div></div></div>'}

function level(st){if(!st||!st.plays)return ['미플레이','var(--mut)'];if(st.box>=3)return ['숙달','var(--good)'];if(st.box===0)return ['취약','var(--bad)'];return ['연습','var(--warn)'];}
function priority(c){var st=SAVE.stat[c.id];if(!st||!st.plays)return 1000;var p=(3-(st.box||0))*120;var need=Math.ceil(c.boss.length*0.7);if(st.lastScore<need)p+=80;var iv=[0,6*3600e3,24*3600e3,3*24*3600e3][st.box||0];if(Date.now()-(st.lastTs||0)>iv)p+=60;var mw=st.missW||{},ws=0;c.W.forEach(function(w){ws+=(mw[w.id]||0);});p+=Math.min(120,ws*15);return p;}
function weakTopics(){var agg={};CASES.forEach(function(c){var st=SAVE.stat[c.id];if(!st||!st.missW)return;Object.keys(st.missW).forEach(function(id){var w=c.W.filter(function(x){return x.id===id})[0];if(!w)return;agg[w.title]=(agg[w.title]||0)+st.missW[id];});});return Object.keys(agg).map(function(k){return [k,agg[k]]}).filter(function(x){return x[1]>0}).sort(function(a,b){return b[1]-a[1]}).slice(0,3);}
function recordStat(pass,good){var st=SAVE.stat[CASE.id]||{box:0,plays:0,wins:0,missW:{},over:0,lastTs:0,lastScore:0};st.plays++;st.lastTs=Date.now();st.lastScore=good;Object.keys(S.lost).forEach(function(id){st.missW[id]=(st.missW[id]||0)+1});st.over=(st.over||0)+S.over;if(pass){st.wins++;st.box=Math.min(3,(st.box||0)+1);}else{st.box=0;}SAVE.stat[CASE.id]=st;}
function pickWeakest(){return CASES.map(function(c){return {c:c,pr:priority(c)}}).sort(function(x,y){return y.pr-x.pr})[0].c;}
// ── shared helpers (exam mode) ──
function caseById(id){return CASES.filter(function(c){return c.id===id})[0];}
function fmtClock(s){if(s<0)s=0;var m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}
function freshStat(){return {box:0,plays:0,wins:0,missW:{},over:0,lastTs:0,lastScore:0};}
// ── ① 혼합 콜드 시험 (케이스 가로질러 셔플) · ② missW 가중(가장 자주 틀린 증인 편향) ──
var EXAM_N=12, EXAM_SEC=45;
function buildExam(n){
 var pool=[];
 CASES.forEach(function(c){
  var mw=(SAVE.stat[c.id]&&SAVE.stat[c.id].missW)||{};
  c.W.forEach(function(w){
   var it={cid:c.id,facts:c.facts,wid:w.id,q:w.ask,t:w.type,w:1+(mw[w.id]||0)*2};
   if(w.type==='choice'){it.t='pick';it.options=w.choices.map(function(o){return {t:o.t,ok:o.ok};});}
   else{it.ans=w.ans;}
   pool.push(it);
  });
  c.boss.forEach(function(fd){           // 통합·합성 필드 — 증인과 동일 질문이면 중복 제거. 단 증인이 choice인데 boss가 수치면 별개 질문이라 포함(예: 영업권 금액)
   var dw=c.W.filter(function(x){return x.id===fd.k;})[0];
   if(dw&&(dw.type!=='choice'||fd.type==='yn'))return;
   var it={cid:c.id,facts:c.facts,wid:fd.k,q:fd.label,t:fd.type,ans:fd.ans,w:1.2};
   if(fd.type==='yn'){it.t='pick';it.options=[{t:fd.ynLabels.Y,ok:fd.ans==='Y'},{t:fd.ynLabels.N,ok:fd.ans==='N'}];}
   pool.push(it);
  });
 });
 var out=[];n=Math.min(n,pool.length);
 for(var k=0;k<n;k++){               // 가중 무복원 추출
  var tot=0;pool.forEach(function(p){tot+=p.w;});
  var r=Math.random()*tot,acc=0,pick=0;
  for(var i=0;i<pool.length;i++){acc+=pool[i].w;if(r<=acc){pick=i;break;}}
  out.push(pool[pick]);pool.splice(pick,1);
 }
 return out;
}
function startExam(){ac();CASE=null;EX={items:buildExam(EXAM_N),i:0,answers:[],left:EXAM_N*EXAM_SEC,timer:null,done:false};examScreen();EX.timer=setInterval(examTick,1000);}
function examTick(){if(!EX)return;var e=document.getElementById('extmr');if(!e){clearInterval(EX.timer);return;}EX.left--;e.textContent=fmtClock(EX.left);if(EX.left<=30)e.style.color='var(--bad)';if(EX.left<=0){clearInterval(EX.timer);examGrade();}}
function examSaveCur(){var it=EX.items[EX.i];if(it.t!=='pick'){var el=document.getElementById('exans');if(el)EX.answers[EX.i]=el.value;}}
function examNext(){examSaveCur();if(EX.i>=EX.items.length-1){examGrade();return;}EX.i++;examScreen();}
function examPrev(){examSaveCur();if(EX.i>0){EX.i--;examScreen();}}
function examScreen(){
 var it=EX.items[EX.i];
 var facts=it.facts.map(function(r){return '<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>';}).join('');
 var input;
 if(it.t==='pick'){input=it.options.map(function(o,j){var sel=(EX.answers[EX.i]===j)?' sel':'';return '<button class="btn choice'+sel+'" data-a="expick" data-j="'+j+'">'+esc(o.t)+'</button>';}).join('');}
 else{var pre=(EX.answers[EX.i]!=null)?esc(String(EX.answers[EX.i])):'';input='<input class="in" id="exans" inputmode="decimal" value="'+pre+'" placeholder="숫자 입력" autocomplete="off"/><button class="btn primary full" style="margin-top:10px" data-a="exnext">'+(EX.i>=EX.items.length-1?'제출하고 채점 ⚖️':'다음 →')+'</button>';}
 app.innerHTML=hud()
 +'<div class="card" style="display:flex;align-items:center;justify-content:space-between"><div style="font-weight:700">🧪 혼합 콜드 시험 <span class="muted" style="font-weight:400">· 문항 '+(EX.i+1)+'/'+EX.items.length+'</span></div><div class="timer" id="extmr">'+fmtClock(EX.left)+'</div></div>'
 +'<div class="card"><div class="muted" style="margin-bottom:6px">증거 자료</div><table class="tbl">'+facts+'</table></div>'
 +'<div class="card"><div class="q">'+esc(it.q)+'</div>'+input+'</div>'
 +'<div class="row"><button class="btn" data-a="exprev"'+(EX.i===0?' disabled':'')+'>← 이전</button><button class="btn" style="flex:1" data-a="exfin">제출하고 채점 ⚖️</button></div>';
 var el=document.getElementById('exans');if(el){el.focus();if(it.t==='num')group(el);el.addEventListener('keydown',function(e){if(e.key==='Enter')examNext();});}
}
function examGrade(){
 if(!EX||EX.done)return;EX.done=true;clearInterval(EX.timer);examSaveCur();
 var res=EX.items.map(function(it,idx){
  var a=EX.answers[idx],ok=false,given='';
  if(it.t==='pick'){if(a!=null&&it.options[a]){given=it.options[a].t;ok=it.options[a].ok===true;}}
  else if(it.t==='eps'){given=(a==null?'':String(a));ok=(given!==''&&Math.abs(num(given)-it.ans)<=0.0101);}
  else{given=(a==null?'':String(a));ok=(given!==''&&num(given)===it.ans);}
  return {it:it,ok:ok,given:given};
 });
 res.forEach(function(r){var c=caseById(r.it.cid);if(!c)return;if(!c.W.some(function(w){return w.id===r.it.wid;}))return;var st=SAVE.stat[c.id]||freshStat();st.missW=st.missW||{};if(r.ok){if(st.missW[r.it.wid])st.missW[r.it.wid]=Math.max(0,st.missW[r.it.wid]-1);}else{st.missW[r.it.wid]=(st.missW[r.it.wid]||0)+1;}SAVE.stat[c.id]=st;});
 var good=res.filter(function(r){return r.ok;}).length,pct=Math.round(good/res.length*100),pass=pct>=70;
 SAVE.examBest=Math.max(SAVE.examBest||0,pct);SAVE.rep=Math.max(0,Math.min(100,SAVE.rep+(pass?8:-4)));SAVE.best=Math.max(SAVE.best,SAVE.rep);save();
 examResult(res,good,pct,pass);
}
function examResult(res,good,pct,pass){
 pass?sWin():sLose();
 var rows=res.map(function(r){var it=r.it,c=caseById(it.cid);
  var corr=it.t==='pick'?((it.options.filter(function(o){return o.ok;})[0]||{}).t||''):it.t==='eps'?('$'+it.ans.toFixed(2)):fmtGroup(String(it.ans),false);
  var gv=r.given===''?'—':(it.t==='num'?fmtGroup(String(r.given),false):esc(String(r.given)));
  return '<div class="fld"><div>'+(r.ok?'<span class="good">✓</span>':'<span class="bad">✕</span>')+' '+esc(it.q)+'<div class="muted" style="font-size:11px">'+c.area+' · '+esc(c.title)+'</div></div><div style="text-align:right;font-family:var(--mono);font-size:13px"><span class="'+(r.ok?'good':'bad')+'">'+gv+'</span>'+(r.ok?'':' <span class="muted">→ '+esc(corr)+'</span>')+'</div></div>';
 }).join('');
 var ba={};res.forEach(function(r){var a=caseById(r.it.cid).area;ba[a]=ba[a]||{c:0,n:0};ba[a].n++;if(r.ok)ba[a].c++;});
 var arows=Object.keys(ba).sort().map(function(a){var o=ba[a],p=Math.round(o.c/o.n*100);return '<div class="fld"><div>'+a+'</div><div class="'+(p<70?'bad':'good')+'" style="font-family:var(--mono)">'+o.c+'/'+o.n+' ('+p+'%)</div></div>';}).join('');
 var banner=pass?'<div class="card pop" style="border-color:#1f6e54;background:#10261d"><div style="font-size:19px;font-weight:800" class="good">⚖️ 시험 통과 — '+pct+'%</div><div class="muted" style="margin-top:4px">'+good+'/'+res.length+' 정확 · 평판 +8 (현재 '+Math.round(SAVE.rep)+') · 최고 시험 '+SAVE.examBest+'%</div></div>':'<div class="card shake" style="border-color:#5a2a25;background:#26110f"><div style="font-size:19px;font-weight:800" class="bad">시험 미달 — '+pct+'%</div><div class="muted" style="margin-top:4px">'+good+'/'+res.length+' 정확 (합격 70%) · 평판 −4 · 틀린 증인 약점 가중↑</div></div>';
 app.innerHTML=hud()+banner+'<div class="card"><div class="muted" style="margin-bottom:4px">영역별 정답률</div>'+arows+'</div><div class="card">'+rows+'</div><div class="row"><button class="btn" style="flex:1" data-a="exam">다시 시험</button><button class="btn primary" style="flex:1" data-a="home">목록으로</button></div>';
}

function commit(val){
 var w=CASE.W[S.i],ok,line;
 if(w.type==='choice'){ok=(val===true);line=ok?w.win:w.wrongLine;}
 else{ok=(Math.abs(val-w.ans)<=0.0001); var pk=String(Math.round(val)); line=ok?w.win:((w.pounce&&w.pounce[pk])?w.pounce[pk]:'그 숫자로는 조서를 못 씁니다. 다시 보시죠.');}

 }).join('');
 app.innerHTML=hud()
 +'<div class="card" style="display:flex;align-items:center;justify-content:space-between"><div style="font-weight:700">🔒 보스 — 평결 계산 <span class="muted" style="font-weight:400">(콜드 · 힌트 없음)</span></div><div class="timer" id="tmr">3:00</div></div>'
 +'<div class="card"><div class="muted" style="margin-bottom:6px">증거 자료</div><table class="tbl">'+f+'</table></div>'
 +'<div class="card">'+rows+'</div>'
 +'<button class="btn primary full" data-a="grade">평결 제출 ⚖️</button>';
 CASE.boss.forEach(function(fd){if(fd.type==='num'){var el=document.getElementById('f_'+fd.k);if(el)group(el)}});
 startTimer();
}
function startTimer(){var t=180;S.timer=setInterval(function(){t--;var e=document.getElementById('tmr');if(!e){clearInterval(S.timer);return}var m=Math.floor(t/60),s=t%60;e.textContent=m+':'+(s<10?'0':'')+s;if(t<=30)e.style.color='var(--bad)';if(t<=0){clearInterval(S.timer);grade()}},1000)}
function grade(){
 if(S.settled)return;clearInterval(S.timer);
 var res=CASE.boss.map(function(fd){var el=document.getElementById('f_'+fd.k);var raw=el?el.value:'';var ok;
  if(fd.type==='yn')ok=(raw===fd.ans);else if(fd.type==='eps')ok=Math.abs(num(raw)-fd.ans)<=0.0101;else ok=(num(raw)===fd.ans);
  return {label:fd.label,ans:fd.ans,raw:raw,ok:ok,type:fd.type}});
 var good=res.filter(function(r){return r.ok}).length, need=Math.ceil(CASE.boss.length*0.7), pass=good>=need;
 S.settled=true; SAVE.rep=Math.max(0,Math.min(100,SAVE.rep+(pass?12:-8)));
 if(pass){SAVE.wins++;SAVE.cleared[CASE.id]=true;} SAVE.best=Math.max(SAVE.best,SAVE.rep); recordStat(pass,good); save();
 verdict(res,good,need,pass);
}
function fmt(r){if(r.raw==='')return '—';return r.type==='eps'?'$'+r.raw:esc(r.raw)}
function fmtA(r){if(r.type==='yn')return r.ans;return r.type==='eps'?'$'+r.ans.toFixed(2):fmtGroup(String(r.ans),false)}
function verdict(res,good,need,pass){
 pass?sWin():sLose();
 var rows=res.map(function(r){return '<div class="fld"><div>'+(r.ok?'<span class="good">✓</span>':'<span class="bad">✕</span>')+' '+esc(r.label)+'</div><div style="text-align:right;font-family:var(--mono);font-size:14px"><span class="'+(r.ok?'good':'bad')+'">'+fmt(r)+'</span>'+(r.ok?'':' <span class="muted">→ '+fmtA(r)+'</span>')+'</div></div>'}).join('');
 var banner=pass?'<div class="card pop" style="border-color:#1f6e54;background:#10261d"><div style="font-size:19px;font-weight:800" class="good">⚖️ 분식 적발 — 사건 승소</div><div class="muted" style="margin-top:4px">'+good+'/'+CASE.boss.length+' 정확 · 평판 +12 (현재 '+Math.round(SAVE.rep)+')</div></div>'
  :'<div class="card shake" style="border-color:#5a2a25;background:#26110f"><div style="font-size:19px;font-weight:800" class="bad">CFO가 빠져나갔다 — 사건 패소</div><div class="muted" style="margin-top:4px">'+good+'/'+CASE.boss.length+' 정확 (합격 '+need+') · 평판 −8</div></div>';
 app.innerHTML=hud()+banner
 +'<div class="card">'+rows+'<div class="muted" style="margin-top:10px">보정: 확신하고 틀림 '+S.over+'회'+(S.over>=2?' (과신 경고)':'')+' · 신중하게 맞힘 '+S.care+'회</div></div>'
 +'<div class="row"><button class="btn" style="flex:1" data-a="again">다시</button><button class="btn" style="flex:1" data-a="home">목록</button><button class="btn primary" style="flex:1" data-a="nextweak">🎯 다음 약점 →</button></div>';
}
function over(){
 if(!S.settled){S.settled=true;SAVE.rep=Math.max(0,SAVE.rep-8);recordStat(false,0);save();}sLose();
 app.innerHTML=hud()+'<div class="card shake" style="border-color:#5a2a25;background:#26110f"><div style="font-size:19px;font-weight:800" class="bad">신뢰도 소진 — CFO가 법정을 빠져나갔다</div><div class="muted" style="margin-top:4px">평결까지 가지 못함 · 평판 −8</div></div>'
 +'<div class="row"><button class="btn" style="flex:1" data-a="again">다시</button><button class="btn" style="flex:1" data-a="home">목록</button><button class="btn primary" style="flex:1" data-a="nextweak">🎯 다음 약점 →</button></div>';
}
app.addEventListener('click',function(e){var t=e.target.closest('[data-a]');if(!t)return;var a=t.getAttribute('data-a');
 if(a==='autoweak'||a==='nextweak'){ac();CASE=pickWeakest();reset();S.auto=true;intro();return}
 if(a==='pick'){ac();CASE=CASES[+t.getAttribute('data-i')];reset();intro();return}
 if(a==='home'){if(EX&&EX.timer)clearInterval(EX.timer);EX=null;home();return}
 if(a==='exam'){startExam();return}
 if(a==='expick'){EX.answers[EX.i]=+t.getAttribute('data-j');examNext();return}
 if(a==='exnext'){examNext();return}
 if(a==='exprev'){examPrev();return}
 if(a==='exfin'){examGrade();return}
 if(a==='begin'){reset();witness();return}
 if(a==='conf'){S.conf=t.getAttribute('data-v');witness();return}
 if(a==='ans'){commit(CASE.W[S.i].choices[+t.getAttribute('data-j')].ok);return}
 if(a==='submit'){var el=document.getElementById('ans');var v=num(el?el.value:'');if(isNaN(v)){el.style.borderColor='var(--bad)';return}commit(v);return}
 if(a==='hint'){S.h=Math.max(0,S.h-1);var w=CASE.W[S.i];if(S.h<=0){over();return}var q=app.querySelector('.q');if(q)q.insertAdjacentHTML('afterend','<div class="bubble" style="margin:8px 0;border-left-color:var(--warn)">단서 · '+esc(w.hint)+'</div>');return}
 if(a==='retry'){witness();return}
 if(a==='next'){S.i++;S.conf='보통';S.tries=0;witness();return}
 if(a==='boss'){boss();return}
 if(a==='over'){over();return}
 if(a==='grade'){grade();return}
 if(a==='again'){reset();intro();return}
});
home();
})();
</script>
