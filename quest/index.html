:"서비스요금, 운영보조금, 자본보조금"}},"143":{"ja":{"name":"修正アプローチ（インフラ資産）","kp":"減価償却の代わりに状態評価"},"ko":{"name":"수정접근법(인프라)","kp":"감가상각 대신 상태평가"}},"144":{"ja":{"name":"CANS（基金残高→純資産の調整）","kp":"＋資本的資産、−減価償却累計額、−非流動負債、＋内部サービス基金"},"ko":{"name":"CANS (기금잔액→순자산 조정)","kp":"＋자본자산, −감가상각누계, −비유동부채, ＋내부서비스기금"}},"145":{"ja":{"name":"CPAS RIDES（調整の方向）","kp":"資本的資産（＋）、減価償却（−）（Type B #9）"},"ko":{"name":"CPAS RIDES (조정 방향)","kp":"자본자산(＋), 감가상각(−) (Type B #9)"}},"146":{"ja":{"name":"資本的資産の調整","kp":"基金財務諸表にはなく、政府全体で加算"},"ko":{"name":"자본자산 조정","kp":"기금 재무제표엔 없음, 정부전체에서 가산"}},"147":{"ja":{"name":"長期債務の調整","kp":"基金財務諸表にはなく、政府全体で減算"},"ko":{"name":"장기부채 조정","kp":"기금 재무제표엔 없음, 정부전체에서 차감"}},"148":{"ja":{"name":"繰延流入・流出","kp":"利用不能な収益について調整"},"ko":{"name":"이연유입·유출","kp":"가용 불가능한 수익에 대해 조정"}},"149":{"ja":{"name":"内部サービス基金の調整","kp":"政府活動に加算"},"ko":{"name":"내부서비스기금 조정","kp":"정부활동에 가산"}},"150":{"ja":{"name":"構成単位（コンポーネント・ユニット）","kp":"混合表示 vs 個別表示"},"ko":{"name":"구성단위","kp":"혼합표시 vs 별도표시"}}},"mcqs":{"MCQ-07544":{"ja":{"question":"財務諸表上ののれんの償却について、正しい記述は次のうちどれか。","explanation":"- 選択肢「B」が正しい。のれんは償却しないが、減損テストの対象となる。\n- 選択肢「A」は誤り。U.S. GAAPではのれんは償却しない。15年償却は法人税法上のルール。\n- 選択肢「C」は誤り。耐用年数（40年以内）での償却は古いU.S. GAAPのルールであり、現行ルールではない。\n- 選択肢「D」は誤り。のれんは償却しないが、減損テストの対象となる。","choices":{"A":"15年で償却する。","B":"償却しないが、減損テストの対象となる。","C":"40年を超えない耐用年数で償却する。","D":"償却せず、減損テストの対象にもならない。"}},"ko":{"question":"재무제표 목적상 영업권 상각에 대해 옳은 설명은?","explanation":"- 「B」가 정답. 영업권은 상각하지 않으나 손상검사 대상이다.\n- 「A」는 오답. U.S. GAAP에서 영업권은 상각하지 않는다. 15년 상각은 법인세법상 규정이다.\n- 「C」는 오답. 내용연수(40년 이내) 상각은 과거 U.S. GAAP 규정으로 현행 규정이 아니다.\n- 「D」는 오답. 영업권은 상각하지 않으나 손상검사 대상이다.","choices":{"A":"15년에 걸쳐 상각한다.","B":"상각하지 않으나 손상검사 대상이다.","C":"40년을 초과하지 않는 내용연수에 걸쳐 상각한다.","D":"상각하지 않고 손상검사 대상도 아니다."}}},"MCQ-00588":{"ja":{"question":"Brill社は当年度に次の支出を行った。\n\n- Brillの一般的な経営情報システムで使用するコンピュータソフトウェアの開発費：$100,000\n- 市場調査活動の費用：$75,000\n\nU.S. GAAPの下で、当年度の損益計算書に研究開発費として報告すべき金額はいくらか。","explanation":"- 選択肢「A」が正しい。U.S. GAAPでは、販売・リース・市場提供を目的に開発されるソフトウェアについて、技術的実現可能性に達する前に発生した費用が研究開発費に含まれる。本ソフトウェアは社内利用目的で生産とは無関係であり、研究開発には該当しない。市場調査も、新製品・新サービスを開発するための新知識の発見を目的としないため、研究開発ではない。\n- 選択肢「B」「C」「D」は上記理由により誤り。"},"ko":{"question":"Brill사는 당기 중 다음 지출을 했다.\n\n- Brill의 일반 경영정보시스템에 사용할 컴퓨터 소프트웨어 개발비: $100,000\n- 시장조사 활동 비용: $75,000\n\nU.S. GAAP에 따라 당기 손익계산서에 연구개발비로 보고할 금액은?","explanation":"- 「A」가 정답. U.S. GAAP에서 연구개발비에는 판매·리스·시장 제공 목적으로 개발되는 소프트웨어가 기술적 실현가능성에 도달하기 전에 발생한 원가가 포함된다. 본 소프트웨어는 내부사용 목적이며 생산과 무관하므로 연구개발에 해당하지 않는다. 시장조사 역시 신제품·신서비스 개발을 위한 새로운 지식의 발견을 목적으로 하지 않으므로 연구개발이 아니다.\n- 「B」「C」「D」는 위 사유로 오답."}},"MCQ-00410":{"ja":{"question":"Wall社はFox社に対し、第1年度1月2日開始の5年契約でオフィスを賃貸した。オペレーティング・リースの条件では、1年目の賃料は$8,000、2〜5年目の賃料は年額$12,500である。ただしリース締結の誘因として、Wallは最初の6か月を賃料無料とした。第1年度12月31日の損益計算書で、Wallが賃貸収益として報告すべき金額はいくらか。","explanation":"賃貸収益は現金受領時ではなく、稼得時（発生主義）に計上する。したがって賃貸収益の総額を5年間にわたり均等に認識する。\n\n| 項目 | 金額 |\n|------|--------|\n| 1年目の賃料（$8,000の1/2） | $4,000 |\n| 2〜5年目の賃料（$12,500 × 4） | $50,000 |\n| **賃料合計** | **$54,000** |\n| 1年目の賃料（1/5 × $54,000） | **$10,800** |"},"ko":{"question":"Wall사는 Fox사에 1차연도 1월 2일부터 5년 계약으로 사무실을 임대했다. 운용리스 조건상 1년차 임대료는 $8,000, 2~5년차 임대료는 연 $12,500이다. 다만 리스 체결 유인으로 Wall은 처음 6개월을 무료로 했다. 1차연도 12월 31일 손익계산서에 Wall이 임대수익으로 보고할 금액은?","explanation":"임대수익은 현금 수령 시가 아니라 가득 시(발생주의)에 인식한다. 따라서 임대수익 총액을 5년에 걸쳐 균등하게 인식한다.\n\n| 항목 | 금액 |\n|------|--------|\n| 1년차 임대료($8,000의 1/2) | $4,000 |\n| 2~5년차 임대료($12,500 × 4) | $50,000 |\n| **임대료 합계** | **$54,000** |\n| 1년차 임대료(1/5 × $54,000) | **$10,800** |"}},"MCQ-07443":{"ja":{"question":"第1年度1月1日、Johnson Products社（Johnson）はFairmont Enterprise社（Fairmont）の持分40%を取得した。第2年度3月31日、Johnsonはさらに15%の持分を取得した。第2年度12月31日までにJohnsonがFairmontの新CEOを任命し、現在の取締役12名中9名を任命した場合、JohnsonがFairmontの第2年度の業績を報告するために用いる方法はどれか。","explanation":"- 選択肢「D」が正しい。Johnsonは55%を所有しFairmontを明確に支配しているため、第2年度はFairmontを連結すべきである。\n- 選択肢「A」は誤り。取得が成立した際に資産・負債の公正価値を考慮することはあるが、これは企業結合の会計処理の主たる方法ではない。\n- 選択肢「B」は誤り。原価法は、投資者が子会社に対して重要な影響力を持たず、かつ子会社株式に市場がない場合に用いる。\n- 選択肢「C」は誤り。Johnsonは第1年度（のみ）は持分法でFairmontを会計処理する。40%を取得し重要な影響力を有していたためである。","choices":{"A":"公正価値法","B":"原価法","C":"持分法","D":"連結"}},"ko":{"question":"1차연도 1월 1일, Johnson Products사(Johnson)는 Fairmont Enterprise사(Fairmont)의 지분 40%를 취득했다. 2차연도 3월 31일 추가로 15%를 취득했다. 2차연도 12월 31일까지 Johnson이 Fairmont의 새 CEO를 선임하고 현 이사 12명 중 9명을 임명했다면, Johnson이 Fairmont의 2차연도 실적을 보고하는 데 사용할 방법은?","explanation":"- 「D」가 정답. Johnson은 55%를 소유하여 Fairmont를 명백히 지배하므로 2차연도에는 Fairmont를 연결해야 한다.\n- 「A」는 오답. 취득 성립 시 자산·부채의 공정가치를 고려할 수 있으나, 이는 기업결합 회계처리의 주된 방법이 아니다.\n- 「B」는 오답. 원가법은 투자자가 자회사에 유의적 영향력이 없고 자회사 주식의 시장도 없을 때 사용한다.\n- 「C」는 오답. Johnson은 1차연도(만) 지분법으로 처리한다. 40%를 취득해 유의적 영향력을 가졌기 때문이다.","choices":{"A":"공정가치법","B":"원가법","C":"지분법","D":"연결"}}},"MCQ-10056":{"ja":{"question":"Potter社はSquire社の80%を$600,000で取得した。1月1日時点で、Squireの資産・負債の公正価値はそれぞれ帳簿価額$850,000・$205,000と等しかった。当年度中、Squireは純利益$75,000を計上し、配当$20,000を支払った。12月31日の連結財務諸表において、U.S. GAAPの下での非支配持分はいくらか。","explanation":"取得日におけるSquireの公正価値：\n- Squireの公正価値 × 80% = 取得対価\n- $750,000 × 80% = $600,000\n\n取得日の非支配持分：\n- NCI = Squireの公正価値 × NCI割合 = $750,000 × 20% = $150,000\n\n12月31日の非支配持分：\n| 項目 | 金額 |\n|------|--------|\n| 期首非支配持分 | $150,000 |\n| ＋ 20% × Squireの純利益 | $15,000（= 20% × $75,000） |\n| − 20% × Squireの配当 | ($4,000)（= 20% × $20,000） |\n| **期末非支配持分** | **$161,000** |"},"ko":{"question":"Potter사는 Squire사의 80%를 $600,000에 취득했다. 1월 1일 현재 Squire의 자산·부채 공정가치는 각각 장부가액 $850,000·$205,000과 같았다. 당기 중 Squire는 순이익 $75,000을 계상하고 배당 $20,000을 지급했다. 12월 31일 연결재무제표에서 U.S. GAAP상 비지배지분은?","explanation":"취득일의 Squire 공정가치:\n- Squire 공정가치 × 80% = 취득대가\n- $750,000 × 80% = $600,000\n\n취득일 비지배지분:\n- NCI = Squire 공정가치 × NCI 비율 = $750,000 × 20% = $150,000\n\n12월 31일 비지배지분:\n| 항목 | 금액 |\n|------|--------|\n| 기초 비지배지분 | $150,000 |\n| ＋ 20% × Squire 순이익 | $15,000(= 20% × $75,000) |\n| − 20% × Squire 배당 | ($4,000)(= 20% × $20,000) |\n| **기말 비지배지분** | **$161,000** |"}},"MCQ-05055":{"ja":{"question":"Ajax社は各構成単位（コンポーネント）から次の営業成績を報告した。\n\n| 構成単位 | 単体 | 消去 | 連結 |\n|-----------|-----|--------------|--------------|\n| Astor | $215,000 | ($120,000) | $95,000 |\n| Bejax | $30,000 | $0 | $30,000 |\n| Carter | ($180,000) | $50,000 | ($130,000) |\n| Davis | $80,000 | ($50,000) | $30,000 |\n| Elbow | ($20,000) | $20,000 | $0 |\n| **合計** | **$125,000** | **($100,000)** | **$25,000** |\n\n純粋に営業成績に基づくと、報告すべきセグメントに該当する構成単位はどれか。","explanation":"**ルール：** セグメントは、その報告利益または損失の絶対値が次のいずれか大きい方の10%以上であれば規模テストを満たす：(1) 損失を計上しなかった全営業セグメントの合計報告利益、または (2) 損失を計上した全営業セグメントの合計報告損失。\n\nAjaxは非連結（単体）の財務成績に基づいてセグメントを判定する。利益の絶対値（$325,000）は損失の絶対値（$200,000）より大きい。Ajaxは利益を計上したセグメントの利益合計の10%、すなわち$32,500を報告セグメント判定の基準として用いる。\n\n- Astor：$215,000 > $32,500 ✓\n- Bejax：$30,000 < $32,500 ✗\n- Carter：$180,000 > $32,500 ✓\n- Davis：$80,000 > $32,500 ✓\n- Elbow：$20,000 < $32,500 ✗","choices":{"A":"Astor、Carter、Davis。","B":"Astor、Bejax、Davis。","C":"Astor、Bejax、Carter、Davis、Elbow。","D":"Astor、Bejax、Carter、Davis。"}},"ko":{"question":"Ajax사는 각 구성단위로부터 다음 영업실적을 보고했다.\n\n| 구성단위 | 단독 | 제거 | 연결 |\n|-----------|-----|--------------|--------------|\n| Astor | $215,000 | ($120,000) | $95,000 |\n| Bejax | $30,000 | $0 | $30,000 |\n| Carter | ($180,000) | $50,000 | ($130,000) |\n| Davis | $80,000 | ($50,000) | $30,000 |\n| Elbow | ($20,000) | $20,000 | $0 |\n| **합계** | **$125,000** | **($100,000)** | **$25,000** |\n\n순수하게 영업실적에 근거할 때 보고대상 세그먼트에 해당하는 구성단위는?","explanation":"**규칙:** 세그먼트는 보고이익 또는 손실의 절대값이 다음 중 큰 금액의 10% 이상이면 규모기준을 충족한다: (1) 손실을 보고하지 않은 모든 영업세그먼트의 합산 보고이익, 또는 (2) 손실을 보고한 모든 영업세그먼트의 합산 보고손실.\n\nAjax는 비연결(단독) 재무실적에 근거해 세그먼트를 판단한다. 이익의 절대값($325,000)이 손실의 절대값($200,000)보다 크다. Ajax는 이익을 보고한 세그먼트 이익 합계의 10%, 즉 $32,500을 보고대상 세그먼트 판단 기준으로 사용한다.\n\n- Astor: $215,000 > $32,500 ✓\n- Bejax: $30,000 < $32,500 ✗\n- Carter: $180,000 > $32,500 ✓\n- Davis: $80,000 > $32,500 ✓\n- Elbow: $20,000 < $32,500 ✗","choices":{"A":"Astor, Carter, Davis.","B":"Astor, Bejax, Davis.","C":"Astor, Bejax, Carter, Davis, Elbow.","D":"Astor, Bejax, Carter, Davis."}}},"MCQ-07392":{"ja":{"question":"Benson Construction社は3年プロジェクトの2年目にある。1年目、同社はプロジェクトで売上総利益$1.2百万を報告した。2年目について、プロジェクト会計担当者は当年の収益が$10百万、原価が$10.5百万と計算した。Bensonの会計担当者は2年目の活動をどのように記録すべきか。","explanation":"- 選択肢「A」が正しい。2年合計のBensonの売上総利益は $1.2百万 + ($500,000) = $700,000。2年目に$500,000の損失を計上することで、プロジェクト累計の売上総利益は$700,000となる（1年目の利益$1.2百万から2年目に計上した損失$500,000を差し引く）。\n- 選択肢「B」は誤り。ある年度の損失は、プロジェクトの記録方法を別の方法へ変更することを要求しない。\n- 選択肢「C」は誤り。2年合計の売上総利益は$700,000であり、これは損失ではない。\n- 選択肢「D」は誤り。損失は繰り延べない。","choices":{"A":"2年目に$500,000の損失を計上する。","B":"2年目に会計原則の変更を記録する。","C":"2年目に$700,000の損失を計上する。","D":"2年目に$500,000の繰延損失を計上する。"}},"ko":{"question":"Benson Construction사는 3년 프로젝트의 2년차에 있다. 1년차에 회사는 프로젝트에서 매출총이익 $1.2백만을 보고했다. 2년차에 대해 프로젝트 회계담당자는 당해 수익이 $10백만, 원가가 $10.5백만이라고 계산했다. Benson의 회계담당자는 2년차 활동을 어떻게 기록해야 하는가?","explanation":"- 「A」가 정답. 2년 합산 Benson의 매출총이익은 $1.2백만 + ($500,000) = $700,000이다. 2년차에 $500,000 손실을 계상하면 프로젝트 누적 매출총이익은 $700,000이 된다(1년차 이익 $1.2백만에서 2년차 계상 손실 $500,000 차감).\n- 「B」는 오답. 특정 연도의 손실이 프로젝트 기록방법을 다른 방법으로 변경하도록 요구하지 않는다.\n- 「C」는 오답. 2년 합산 매출총이익은 $700,000이며 손실이 아니다.\n- 「D」는 오답. 손실은 이연하지 않는다.","choices":{"A":"2년차에 $500,000 손실을 계상한다.","B":"2년차에 회계원칙 변경을 기록한다.","C":"2년차에 $700,000 손실을 계상한다.","D":"2년차에 $500,000 이연손실을 계상한다."}}},"MCQ-08611":{"ja":{"question":"第1年度1月1日、ある会社が販売目的のソフトウェアについて$100,000の費用を資産化した。同社はソフトウェア費用を5年間にわたり定額法で償却する。第3年度1月1日のソフトウェア費用の帳簿価額は$60,000であった。第3年度12月31日時点で、ソフトウェアの販売から得られる将来総収益の見積りは$23,000、ソフトウェアの処分に要する将来費用の見積りは$8,000である。第3年度（12月31日終了）にソフトウェア費用に関連して費用計上すべき金額はいくらか。","explanation":"第3年度のソフトウェアに関連する費用には2つの構成要素がある：\n\n1. **償却費：** $20,000（当初原価$100,000を5年定額償却に基づく）\n2. **減損損失：** $25,000（第3年度末の帳簿価額$40,000に対し公正価値$15,000に基づく。公正価値は将来総収益見積り$23,000から処分費用$8,000を差し引いた額）\n\n償却費$20,000と減損損失$25,000の合計で、費用は**$45,000**となる。"},"ko":{"question":"1차연도 1월 1일, 어떤 회사가 판매 목적 소프트웨어에 대해 $100,000의 원가를 자본화했다. 회사는 소프트웨어 원가를 5년에 걸쳐 정액법으로 상각한다. 3차연도 1월 1일 소프트웨어 원가의 장부가액은 $60,000이었다. 3차연도 12월 31일 현재 소프트웨어 판매로 얻을 미래 총수익 추정치는 $23,000, 소프트웨어 처분에 드는 미래 원가 추정치는 $8,000이다. 3차연도(12월 31일 종료)에 소프트웨어 원가와 관련하여 비용으로 인식할 금액은?","explanation":"3차연도 소프트웨어 관련 비용에는 두 구성요소가 있다:\n\n1. **상각비:** $20,000(당초 원가 $100,000을 5년 정액상각)\n2. **손상차손:** $25,000(3차연도 말 장부가액 $40,000 대비 공정가치 $15,000 기준. 공정가치는 미래 총수익 추정치 $23,000에서 처분원가 $8,000을 차감한 금액)\n\n상각비 $20,000과 손상차손 $25,000을 합하여 비용은 **$45,000**이다."}},"MCQ-15705":{"ja":{"question":"Variety Chips社の主要市場は米国とメキシコである。両国間の為替変動を管理するため、同社は第1年度の期首に、第2年度に解消される外貨建キャッシュフロー・ヘッジ取引を締結した。このヘッジが1年目に$33,000の利益を生じたと仮定すると、同社は第1年度末の財務諸表でこのヘッジ活動をどのように報告するか。","explanation":"- 選択肢「B」が正しい。外貨建キャッシュフロー・ヘッジでは、ヘッジの利益（$33,000）は貸借対照表上、その他の包括利益（OCI）の構成要素として報告される。\n- 選択肢「A」「C」「D」は誤り。キャッシュフロー・ヘッジに係る利益・損失は、ヘッジ対象が損益に影響を与えるまで、その他の包括利益の構成要素として報告される。","choices":{"A":"第2年度まで財務諸表に影響なし。","B":"貸借対照表上、その他の包括利益（OCI）に$33,000の利益を報告。","C":"損益計算書に$33,000の利益を報告。","D":"$33,000の繰延利益を負債として計上する。"}},"ko":{"question":"Variety Chips사의 주요 시장은 미국과 멕시코다. 양국 간 환율변동을 관리하기 위해 회사는 1차연도 초에 2차연도에 청산되는 외화 현금흐름 위험회피 거래를 체결했다. 이 위험회피가 1년차에 $33,000 이익을 냈다고 가정하면, 회사는 1차연도 말 재무제표에 이 위험회피 활동을 어떻게 보고하는가?","explanation":"- 「B」가 정답. 외화 현금흐름 위험회피에서 위험회피 이익($33,000)은 재무상태표상 기타포괄손익(OCI)의 구성요소로 보고된다.\n- 「A」「C」「D」는 오답. 현금흐름 위험회피 관련 손익은 위험회피대상이 손익에 영향을 줄 때까지 기타포괄손익의 구성요소로 보고된다.","choices":{"A":"2차연도까지 재무제표에 영향 없음.","B":"재무상태표상 기타포괄손익(OCI)에 $33,000 이익을 보고.","C":"손익계산서에 $33,000 이익을 보고.","D":"$33,000 이연이익을 부채로 계상한다."}}},"MCQ-15710":{"ja":{"question":"ABC社はメキシコで完了した複数の取引によるペソ建てのエクスポージャーをヘッジするため、外貨建公正価値ヘッジを締結した。当年度、同社は外貨建公正価値ヘッジから$17,000の損失を、ヘッジ対象通貨から$12,000の利益を計上した。上記のデリバティブ取引活動はどのように記録されるか。","explanation":"- 選択肢「A」が正しい。外貨建公正価値ヘッジからの$17,000の損失は、ヘッジ対象通貨の$12,000の利益で相殺され、取引からの純損失$5,000がABC社の当期利益に認識される。\n- 外貨建公正価値ヘッジでは、デリバティブの損失と相殺される利益の双方が当期利益の一部として認識される。","choices":{"A":"当期利益に純損失$5,000を計上。","B":"当期利益に$17,000の損失と$12,000の利益。","C":"その他の包括利益に純損失$5,000。","D":"当期利益に$12,000の利益、その他の包括利益に$17,000の損失。"}},"ko":{"question":"ABC사는 멕시코에서 완료된 여러 거래로 인한 페소 익스포저를 회피하기 위해 외화 공정가치 위험회피를 체결했다. 당기에 회사는 외화 공정가치 위험회피에서 $17,000 손실을, 위험회피대상 통화에서 $12,000 이익을 계상했다. 위 파생상품 거래활동은 어떻게 기록되는가?","explanation":"- 「A」가 정답. 외화 공정가치 위험회피의 $17,000 손실은 위험회피대상 통화의 $12,000 이익으로 상쇄되며, 거래에서 발생한 순손실 $5,000이 ABC사의 당기손익에 인식된다.\n- 외화 공정가치 위험회피에서는 파생상품 손실과 이를 상쇄하는 이익이 모두 당기손익의 일부로 인식된다.","choices":{"A":"당기손익에 순손실 $5,000.","B":"당기손익에 $17,000 손실과 $12,000 이익.","C":"기타포괄손익에 순손실 $5,000.","D":"당기손익에 $12,000 이익, 기타포괄손익에 $17,000 손실."}}},"MCQ-10179":{"ja":{"question":"Water Control社はウォーターポンプを製造し、標準原価計算を採用している。ポンプ1台当たりの標準製造間接費は次のとおり：\n\n- 変動製造間接費（4時間 × $8/時間）：$32\n- 固定製造間接費（4時間 × $5/時間）：$20\n- 1台当たり総製造間接費：$52\n\n11月の追加情報：\n- 25,000台が予定されていたが、22,000台が生産された\n- 直接作業時間は94,000時間\n- 1台当たりの標準直接作業時間は4時間\n\n11月の変動製造間接費 能率差異は：","explanation":"| 計算 | 金額 |\n|-------------|--------|\n| 実際DL時間に基づく変動予算：94,000 × $8/時 | $752,000 |\n| 標準DL時間に基づく変動予算：22,000台 × 4時間/台 × $8/時 | $704,000 |\n| **不利差異** | **$48,000** |\n\n予定より多くの時間を要したため、差異は不利となる。","choices":{"A":"$48,000 不利。","B":"$60,000 有利。","C":"$96,000 有利。","D":"$32,000 有利。"}},"ko":{"question":"Water Control사는 워터펌프를 제조하며 표준원가계산을 사용한다. 펌프 1대당 표준제조간접비는 다음과 같다:\n\n- 변동제조간접비(4시간 × $8/시간): $32\n- 고정제조간접비(4시간 × $5/시간): $20\n- 1대당 총제조간접비: $52\n\n11월 추가정보:\n- 25,000대가 예정되었으나 22,000대가 생산됨\n- 직접노동시간 94,000시간 투입\n- 1대당 표준직접노동시간은 4시간\n\n11월 변동제조간접비 능률차이는:","explanation":"| 계산 | 금액 |\n|-------------|--------|\n| 실제 직접노동시간 기준 변동예산: 94,000 × $8/시 | $752,000 |\n| 표준 직접노동시간 기준 변동예산: 22,000대 × 4시간/대 × $8/시 | $704,000 |\n| **불리차이** | **$48,000** |\n\n예상보다 많은 시간을 사용했으므로 차이는 불리하다.","choices":{"A":"$48,000 불리.","B":"$60,000 유리.","C":"$96,000 유리.","D":"$32,000 유리."}}},"MCQ-10124":{"ja":{"question":"Delphi社は次の特性を持つ新製品を開発した：\n- 最大生産能力：年間25,000台\n- 固定費：年間$450,000（減価償却$60,000を含む）\n- 単位当たり変動費：$16\n- 税率：40%\n- 必要な税引後利益：$75,000\n\nこの目標利益を達成するための単位販売価格は、少なくとも：","explanation":"| ステップ | 計算 |\n|------|-------------|\n| 税引後利益 | $75,000 |\n| 税率の補数（100% − 40%） | ÷ 60% |\n| 税引前利益 | $125,000 |\n| 固定費 | $450,000 |\n| 必要な総貢献利益 | $575,000 |\n| 最大数量 | ÷ 25,000 |\n| 単位当たり必要貢献利益 | $23 |\n| 単位当たり変動費 | $16 |\n| **必要販売価格** | **$39** |"},"ko":{"question":"Delphi사는 다음 특성을 가진 신제품을 개발했다:\n- 최대 생산능력: 연간 25,000대\n- 고정비: 연간 $450,000(감가상각 $60,000 포함)\n- 단위당 변동비: $16\n- 세율: 40%\n- 필요한 세후이익: $75,000\n\n이 목표이익을 달성하기 위한 단위 판매가격은 최소:","explanation":"| 단계 | 계산 |\n|------|-------------|\n| 세후이익 | $75,000 |\n| 세율의 보수(100% − 40%) | ÷ 60% |\n| 세전이익 | $125,000 |\n| 고정비 | $450,000 |\n| 필요한 총공헌이익 | $575,000 |\n| 최대 수량 | ÷ 25,000 |\n| 단위당 필요 공헌이익 | $23 |\n| 단위당 변동비 | $16 |\n| **필요 판매가격** | **$39** |"}},"MCQ-10194":{"ja":{"question":"Almo社の前提：\n- 販売価格：1台$400\n- 変動費：1台当たり$200\n- 年間固定費：$100,000\n- 税引後目標利益：$240,000\n- 実効税率：40%\n\nAlmo社が税引後利益目標を達成するために販売すべき数量を求めよ。","explanation":"- 税引後目標利益$240,000 ÷ (1 − 税率) = $240,000 ÷ 0.6 = 税引前利益$400,000\n- (総固定費 + 税引前目標利益) ÷ 単位当たり貢献利益\n- = ($100,000 + $400,000) ÷ $200 = **2,500台**","choices":{"A":"1,700台。","B":"3,500台。","C":"4,500台。","D":"2,500台。"}},"ko":{"question":"Almo사의 가정:\n- 판매가격: 대당 $400\n- 변동비: 단위당 $200\n- 연간 고정비: $100,000\n- 세후 목표이익: $240,000\n- 실효세율: 40%\n\nAlmo사가 세후 이익목표를 달성하기 위해 판매해야 할 수량을 구하라.","explanation":"- 세후 목표이익 $240,000 ÷ (1 − 세율) = $240,000 ÷ 0.6 = 세전이익 $400,000\n- (총고정비 + 세전 목표이익) ÷ 단위당 공헌이익\n- = ($100,000 + $400,000) ÷ $200 = **2,500대**","choices":{"A":"1,700대.","B":"3,500대.","C":"4,500대.","D":"2,500대."}}},"MCQ-10332":{"ja":{"question":"Hardwood Manufacturing社は拡張した工場へ移転しなければならない。経営陣は施設をリースするか購入するかを評価している。次の費用はいずれもこの意思決定に関連するが、例外は：","explanation":"- **ルール：** 関連原価とは、意思決定の結果として変化する原価である。\n- 選択肢「A」が正しい。旧施設に係る処分収入は、リースか購入かの意思決定に関連しない。現施設は手狭になっており、Hardwoodはこの施設を使用しない。旧施設の保有・処分に係る収入や費用は、リースか購入かの意思決定にかかわらず発生する。\n- 選択肢「B」「C」「D」はいずれも意思決定により変化する費用であり、したがって関連原価である。","choices":{"A":"頭金に充てる現施設の売却による見込み収入。","B":"新施設に係る年間賃借料。","C":"購入オプションにおける新施設の見込み処分価額。","D":"リース施設に適用される共用部分の維持管理費。"}},"ko":{"question":"Hardwood Manufacturing사는 확장된 공장으로 이전해야 한다. 경영진은 시설을 리스할지 구매할지 평가하고 있다. 다음 비용은 모두 이 의사결정에 관련되지만, 예외는:","explanation":"- **규칙:** 관련원가란 의사결정의 결과로 변동하는 원가다.\n- 「A」가 정답. 구 시설 관련 처분수입은 리스 vs 구매 의사결정에 관련되지 않는다. 현 시설은 비좁아졌고 Hardwood는 이 시설을 사용하지 않는다. 구 시설의 보유·처분에 따른 수입·비용은 리스/구매 결정과 무관하게 발생한다.\n- 「B」「C」「D」는 모두 의사결정에 따라 변동하는 비용이므로 관련원가다.","choices":{"A":"계약금으로 사용할 현 시설 매각 예상 수입.","B":"신 시설 관련 연간 임차료.","C":"구매 옵션에서 신 시설의 예상 처분가치.","D":"리스 시설에 적용되는 공용부분 유지관리비."}}},"MCQ-10163":{"ja":{"question":"企業が各資産を、その資産の耐用期間とほぼ同じ満期の金融商品で調達する場合、それは何を適用しているか：","explanation":"- 選択肢「C」が正しい。適切な運転資本管理は、各資産の満期（耐用期間）と、その資産の調達に用いる金融商品の期間とを一致させる。\n- 選択肢「A」は誤り。オペレーティング・レバレッジは、生産プロセスで固定費が用いられる程度をいう。\n- 選択肢「B」は誤り。財務レバレッジは、資産の調達に用いる負債の額をいう。\n- 選択肢「D」は誤り。リターンの最大化は、資産の活用によって最適な収益率を得ようとするものである。","choices":{"A":"オペレーティング・レバレッジ。","B":"財務レバレッジ。","C":"運転資本管理。","D":"リターンの最大化。"}},"ko":{"question":"기업이 각 자산을 그 자산의 수명과 거의 같은 만기의 금융상품으로 조달할 때, 이는 무엇을 적용하는 것인가:","explanation":"- 「C」가 정답. 적절한 운전자본관리는 각 자산의 만기(수명)와 그 자산 조달에 사용하는 금융상품의 기간을 일치시킨다.\n- 「A」는 오답. 영업레버리지는 생산과정에서 고정비가 사용되는 정도를 말한다.\n- 「B」는 오답. 재무레버리지는 자산 조달에 사용되는 부채의 크기를 말한다.\n- 「D」는 오답. 수익 극대화는 자산 활용을 통해 최적의 수익률을 얻으려는 것이다.","choices":{"A":"영업레버리지.","B":"재무레버리지.","C":"운전자본관리.","D":"수익 극대화."}}},"MCQ-10199":{"ja":{"question":"ある会社が年利8%で$500,000の短期銀行借入を行った。借入の条件として、当座預金口座に$100,000の補償的預金残高を維持することが求められる。当座預金は年3%の利息を生む。通常、同社は取引目的で$50,000の残高を維持している。この借入の実効金利はいくらか。","explanation":"| ステップ | 計算 |\n|------|-------------|\n| ステップ1：実際の利息（元本 × 利率 × 期間） | $500,000 × 8% = $40,000 |\n| ステップ2：追加の補償的預金残高で得られる利息を控除 | $50,000 × 3% = $1,500 |\n| 正味の利息コスト | $40,000 − $1,500 = $38,500 |\n| ステップ3：会社が利用できる借入金で除す | $500,000 − $50,000（追加残高）= $450,000 |\n| **実効金利** | $38,500 ÷ $450,000 = **8.56%** |"},"ko":{"question":"어떤 회사가 연 8%로 $500,000의 단기 은행차입을 했다. 차입 조건으로 당좌예금 계좌에 $100,000의 보상예금잔액을 유지해야 한다. 당좌예금은 연 3% 이자가 붙는다. 평소 회사는 거래 목적으로 $50,000 잔액을 유지한다. 이 차입의 실효이자율은?","explanation":"| 단계 | 계산 |\n|------|-------------|\n| 1단계: 실제 이자(원금 × 이율 × 기간) | $500,000 × 8% = $40,000 |\n| 2단계: 추가 보상예금잔액에서 얻는 이자 차감 | $50,000 × 3% = $1,500 |\n| 순이자비용 | $40,000 − $1,500 = $38,500 |\n| 3단계: 회사가 실제 사용 가능한 차입금으로 나눔 | $500,000 − $50,000(추가잔액) = $450,000 |\n| **실효이자율** | $38,500 ÷ $450,000 = **8.56%** |"}},"MCQ-10639":{"ja":{"question":"COSOによれば、事業体のエンタープライズ・リスク・マネジメント（ERM）の監督を提供するのは次のうちどれか。","explanation":"- 選択肢「B」が正しい。ERMに関連するガバナンスと文化の主要な構成要素の一つが取締役会による監督であり、これは取締役会が組織全体のトーンを設定し、自らの権限を確立するとともに経営者の説明責任を促進することを求める。\n- 選択肢「A」「C」「D」は誤り。リスク責任者と財務担当役員は経営者の一員であり、経営者は取締役会に報告する。","choices":{"A":"リスク責任者","B":"取締役会","C":"経営者","D":"財務担当役員"}},"ko":{"question":"COSO에 따르면, 기업의 전사적 위험관리(ERM)에 대한 감독을 제공하는 것은?","explanation":"- 「B」가 정답. ERM 관련 거버넌스와 문화의 핵심 구성요소 중 하나가 이사회 감독이며, 이는 이사회가 조직 전체의 기조를 설정하여 자신의 권한을 확립하고 경영진의 책임성을 촉진하도록 요구한다.\n- 「A」「C」「D」는 오답. 위험관리책임자와 재무담당 임원은 경영진의 일원이며, 경영진은 이사회에 보고한다.","choices":{"A":"위험관리책임자","B":"이사회","C":"경영진","D":"재무담당 임원"}}},"MCQ-10397":{"ja":{"question":"COSOによれば、ERMの構成要素のうち、事業体の固有リスクと残余リスクの考慮を扱うのはどれか。","explanation":"- 選択肢「C」が正しい。ERMフレームワークのパフォーマンス構成要素には、固有リスクと残余リスクを含むリスク分析に関連する要素が含まれる。\n- 選択肢「A」は誤り。ガバナンスと文化には、望ましい文化の定義、コアバリューへのコミットメントの表明、従業員の獲得・維持、業務構造の確立が含まれる。\n- 選択肢「B」は誤り。戦略と目標設定は、戦略と事業目標を特定する。\n- 選択肢「D」は誤り。レビューと修正は、ERMの継続的改善を確保する方針・手続に関連する。","choices":{"A":"ガバナンスと文化","B":"戦略と目標設定","C":"パフォーマンス","D":"レビューと修正"}},"ko":{"question":"COSO에 따르면, ERM 구성요소 중 기업의 고유위험과 잔여위험 고려를 다루는 것은?","explanation":"- 「C」가 정답. ERM 프레임워크의 성과 구성요소에는 고유위험과 잔여위험을 포함한 위험분석 관련 요소가 포함된다.\n- 「A」는 오답. 거버넌스와 문화에는 바람직한 문화의 정의, 핵심가치에 대한 헌신 표명, 직원 확보·유지, 운영구조 확립이 포함된다.\n- 「B」는 오답. 전략과 목표설정은 전략과 사업목표를 식별한다.\n- 「D」는 오답. 검토와 수정은 ERM의 지속적 개선을 보장하는 정책·절차와 관련된다.","choices":{"A":"거버넌스와 문화","B":"전략과 목표설정","C":"성과","D":"검토와 수정"}}},"MCQ-10203":{"ja":{"question":"COSOによれば、ERMの構成要素のうち、事象の発生可能性と影響度を設定するプロセスを扱うのはどれか。","explanation":"- 選択肢「A」が正しい。ERMフレームワークのパフォーマンス構成要素には、事象の発生可能性と影響度の設定を含むリスク分析が含まれる。\n- 他の構成要素は、事象の影響度や発生可能性の決定を扱わない。","choices":{"A":"パフォーマンス","B":"レビューと修正","C":"ガバナンスと文化","D":"戦略と目標設定"}},"ko":{"question":"COSO에 따르면, ERM 구성요소 중 사건의 발생가능성과 영향도를 설정하는 절차를 다루는 것은?","explanation":"- 「A」가 정답. ERM 프레임워크의 성과 구성요소에는 사건의 발생가능성과 영향도 설정을 포함한 위험분석이 포함된다.\n- 다른 구성요소는 사건의 영향도나 발생가능성 결정을 다루지 않는다.","choices":{"A":"성과","B":"검토와 수정","C":"거버넌스와 문화","D":"전략과 목표설정"}}},"MCQ-10114":{"ja":{"question":"Dollar Bus社は、公表されたバス時刻表に完全に準拠するという目標を設定した。同社は現在83%の準拠率を達成しており、準拠率が100%へ改善しても収益に大きな変化は見込まないが、バスが20%超の頻度で遅延すると収益が大きく落ち込むとみている。同社の目標設定は論理的に次のように展開する：","explanation":"- 選択肢「D」が正しい。目標はリスク選好と整合し、それがリスク許容度の水準を決定する。\n- 選択肢「A」は誤り。リスク対応（バスの購入）は目標から導かれるものではない。\n- 選択肢「B」は誤り。許容限度を用いて逆算的に目標を定めることはしない。\n- 選択肢「C」は誤り。追加のバスの取得はリスクへの対応であり、目標設定の一部ではない。","choices":{"A":"80%の準拠率が目標となる。","B":"現実的な準拠目標を設定するために、許容される変動水準が定められる。","C":"目標達成のため追加のバスを取得する。","D":"バス時刻表への準拠は、80%超の許容準拠率の範囲内で、利用者喪失リスクとの関係でレビューされる。"}},"ko":{"question":"Dollar Bus사는 공표된 버스 시간표를 완전히 준수한다는 목표를 설정했다. 회사는 현재 83% 준수율을 달성하고 있으며, 준수율이 100%로 개선되어도 수익에 큰 변화는 예상하지 않으나, 버스가 20% 초과 빈도로 지연되면 수익이 크게 감소한다고 본다. 회사의 목표설정은 논리적으로 다음과 같이 전개된다:","explanation":"- 「D」가 정답. 목표는 위험선호와 정합하며, 이것이 위험허용수준을 결정한다.\n- 「A」는 오답. 위험대응(버스 구매)은 목표에서 도출되지 않는다.\n- 「B」는 오답. 허용한도를 사용해 역으로 목표를 정하지 않는다.\n- 「C」는 오답. 추가 버스 취득은 위험대응이며 목표설정의 일부가 아니다.","choices":{"A":"80% 준수율이 목표가 된다.","B":"현실적인 준수목표를 설정하기 위해 허용가능한 변동수준이 정해진다.","C":"목표 달성을 위해 추가 버스를 취득한다.","D":"버스 시간표 준수는 80% 초과의 허용 준수율 범위 내에서 이용객 상실 위험과 관련하여 검토된다."}}},"MCQ-08580":{"ja":{"question":"市の政府全体財務諸表に求められる会計基礎はどれか。","explanation":"- 選択肢「B」が正しい。政府全体財務諸表（純資産計算書および活動計算書）は、経済的資源測定焦点と完全発生主義により報告される。\n- 選択肢「C」は誤り。修正発生主義は政府基金の報告基礎として用いられる。政府全体財務諸表は完全発生主義を用いる。","choices":{"A":"現金主義。","B":"発生主義。","C":"修正発生主義。","D":"修正現金主義。"}},"ko":{"question":"시(市)의 정부전체 재무제표에 요구되는 회계기준은?","explanation":"- 「B」가 정답. 정부전체 재무제표(순자산명세서 및 활동명세서)는 경제적 자원 측정초점과 완전발생주의로 보고된다.\n- 「C」는 오답. 수정발생주의는 정부기금의 보고기준으로 사용된다. 정부전체 재무제표는 완전발생주의를 사용한다.","choices":{"A":"현금주의.","B":"발생주의.","C":"수정발생주의.","D":"수정현금주의."}}},"MCQ-00987":{"ja":{"question":"州の一般基金において、年度末に未消化の予算外債務（encumbrances）は、最も適切には何として報告されるか。","explanation":"- 選択肢「D」が正しい。予算外債務は、財・サービスの未履行契約額を表す基金残高の拘束または割当である。年度末の予算外債務は、支出（expenditures）でも負債でもない。年度末に、予算外債務は基金残高の拘束または割当として振り替えられる。\n- 選択肢「A」は誤り。予算外債務は負債ではない。\n- 選択肢「B」は誤り。予算外債務は基金残高を制限（restriction）の水準まで拘束しない。\n- 選択肢「C」は誤り。予算外債務は債務ではない。また、勘定グループはGASB 34で廃止された。","choices":{"A":"一般基金の負債。","B":"一般基金の基金残高の制限。","C":"一般長期債務勘定グループの負債。","D":"一般基金の基金残高の拘束（コミットメント）。"}},"ko":{"question":"주(州)의 일반기금에서 연도말 미소멸 약정지출(encumbrances)은 가장 적절하게는 무엇으로 보고되는가?","explanation":"- 「D」가 정답. 약정지출은 재화·용역의 미이행 계약액을 나타내는 기금잔액의 확약 또는 배정이다. 연도말 약정지출은 지출(expenditures)도 부채도 아니다. 연도말에 약정지출은 기금잔액의 확약 또는 배정으로 재분류된다.\n- 「A」는 오답. 약정지출은 부채가 아니다.\n- 「B」는 오답. 약정지출은 기금잔액을 제한(restriction) 수준까지 구속하지 않는다.\n- 「C」는 오답. 약정지출은 부채가 아니다. 또한 계정군은 GASB 34로 폐지되었다.","choices":{"A":"일반기금의 부채.","B":"일반기금 기금잔액의 제한.","C":"일반장기부채 계정군의 부채.","D":"일반기금 기금잔액의 확약(commitment)."}}},"MCQ-07944":{"ja":{"question":"次の基金と収益に基づき、主要基金（major fund）の分類について正しい記述はどれか。\n\n| 基金 | 収益 |\n|------|----------|\n| 一般基金 | $125百万 |\n| 資本事業基金 | $50百万 |\n| 永久基金 | $105百万 |\n| 政府基金合計 | $1,050百万 |\n| 空港事業基金 | $175百万 |\n| 公益事業基金 | $180百万 |\n| 事業基金合計 | $1,300百万 |","explanation":"- 選択肢「A」が正しい。資本事業基金は、自らの基金カテゴリー（政府基金合計）の収益の4.76%、関連する全基金（政府基金＋事業基金）の総収益の2.13%を構成する。資本事業基金は主要基金に分類すべきでない。\n- 選択肢「B」は誤り。永久基金は政府基金収益の10%を占めるものの、関連する全基金の総収益の4.5%にすぎない。\n- 選択肢「C」は誤り。一般基金は財務統計にかかわらず常に主要基金に分類される。\n- 選択肢「D」は誤り。空港事業基金は事業基金収益の13.5%、総収益の7.4%を占め、基準を満たす。","choices":{"A":"資本事業基金は主要基金に分類すべきでない。","B":"永久基金は主要基金に分類すべきである。","C":"一般基金は主要基金に分類すべきでない。","D":"空港事業基金は主要基金に分類すべきでない。"}},"ko":{"question":"다음 기금과 수익에 근거할 때, 주요기금(major fund) 분류에 대해 옳은 설명은?\n\n| 기금 | 수익 |\n|------|----------|\n| 일반기금 | $125백만 |\n| 자본사업기금 | $50백만 |\n| 영구기금 | $105백만 |\n| 정부기금 합계 | $1,050백만 |\n| 공항사업기금 | $175백만 |\n| 공익사업기금 | $180백만 |\n| 사업기금 합계 | $1,300백만 |","explanation":"- 「A」가 정답. 자본사업기금은 자기 기금범주(정부기금 합계) 수익의 4.76%, 관련 전체 기금(정부기금＋사업기금) 총수익의 2.13%를 구성한다. 자본사업기금은 주요기금으로 분류하면 안 된다.\n- 「B」는 오답. 영구기금은 정부기금 수익의 10%를 차지하지만, 관련 전체 기금 총수익의 4.5%에 불과하다.\n- 「C」는 오답. 일반기금은 재무통계와 무관하게 항상 주요기금으로 분류된다.\n- 「D」는 오답. 공항사업기금은 사업기금 수익의 13.5%, 총수익의 7.4%를 차지하여 기준을 충족한다.","choices":{"A":"자본사업기금은 주요기금으로 분류하면 안 된다.","B":"영구기금은 주요기금으로 분류해야 한다.","C":"일반기금은 주요기금으로 분류하면 안 된다.","D":"공항사업기금은 주요기금으로 분류하면 안 된다."}}},"MCQ-10496":{"ja":{"question":"Feline郡は、市の固形廃棄物埋立地を運営するため、Calico埋立地を独立した法的主体として設立した。埋立地の運営予算と資本改善事業は郡委員会の承認を要する。Calico埋立地の財務諸表はどう扱われるべきか。","explanation":"- **ルール：** 特別目的政府はSELF：個別に選出（Separately Elected）、法的に独立（Legally separate）、財務的に独立（Financially independent）。\n- 選択肢「C」が正しい。Calico埋立地はSELF基準を満たさず、したがって構成単位である。混合表示の基準（統治機関が実質的に同一、または専ら主たる政府に奉仕）も満たさないため、個別表示の構成単位として報告される。\n- 選択肢「A」は誤り。埋立地は郡に対して財務的に説明責任を負い、独立した特別目的政府ではない。\n- 選択肢「B」は誤り。埋立地は混合表示の基準を満たさない。","choices":{"A":"特別目的政府として表示する。","B":"混合構成単位として表示する。","C":"構成単位として個別表示する。","D":"注記でのみ開示する。"}},"ko":{"question":"Feline 카운티는 시의 고형폐기물 매립지를 운영하기 위해 Calico 매립지를 별도의 법적 실체로 설립했다. 매립지의 운영예산과 자본개선사업은 카운티 위원회의 승인을 요한다. Calico 매립지의 재무제표는 어떻게 처리되어야 하는가?","explanation":"- **규칙:** 특수목적정부는 SELF: 별도 선출(Separately Elected), 법적 독립(Legally separate), 재무적 독립(Financially independent).\n- 「C」가 정답. Calico 매립지는 SELF 기준을 충족하지 못하므로 구성단위다. 혼합표시 기준(지배기구가 실질적으로 동일하거나 오로지 주된 정부에만 봉사)도 충족하지 못하므로 별도 표시 구성단위로 보고된다.\n- 「A」는 오답. 매립지는 카운티에 재무적으로 책임을 지며 독립적인 특수목적정부가 아니다.\n- 「B」는 오답. 매립지는 혼합표시 기준을 충족하지 못한다.","choices":{"A":"특수목적정부로 표시한다.","B":"혼합 구성단위로 표시한다.","C":"구성단위로 별도 표시한다.","D":"주석에만 공시한다."}}},"MCQ-10497":{"ja":{"question":"Point Sparrow市は、政府基金の基金残高合計$1,200,000を報告しており、次の項目がある：\n- 固定資産：$4,000,000\n- 減価償却累計額：$2,750,000\n- 長期債務：$2,000,000\n\n加えて、政府は州が徴収する4%の売上税を課している。10月・11月・12月の売上はそれぞれ$3,000,000、$4,000,000、$5,000,000であった。12月31日時点で、市は政府活動の純資産（Net Position）としていくらを表示するか。","explanation":"政府全体の純資産はCANSの語呂で計算する：\n\n| 項目 | 金額 |\n|------|--------|\n| GRaSPP—基金残高 | $1,200,000 |\n| 資本的資産（非流動） | $4,000,000 |\n| 減価償却累計額 | ($2,750,000) |\n| 非流動負債 | ($2,000,000) |\n| 12月分売上税収益の発生計上（$5,000,000 × 4%） | $200,000 |\n| **政府全体の純資産** | **$650,000** |\n\n注：12月の収益は年度末から75日後に受領され、修正発生主義では発生計上されない（利用可能でない）が、完全発生主義では認識される。"},"ko":{"question":"Point Sparrow시는 정부기금의 기금잔액 합계 $1,200,000을 보고하며 다음 항목이 있다:\n- 고정자산: $4,000,000\n- 감가상각누계액: $2,750,000\n- 장기부채: $2,000,000\n\n추가로 정부는 주(州)가 징수하는 4% 매출세를 부과한다. 10월·11월·12월 매출은 각각 $3,000,000, $4,000,000, $5,000,000이었다. 12월 31일 현재 시는 정부활동 순자산(Net Position)으로 얼마를 표시하는가?","explanation":"정부전체 순자산은 CANS 두문자로 계산한다:\n\n| 항목 | 금액 |\n|------|--------|\n| GRaSPP—기금잔액 | $1,200,000 |\n| 자본자산(비유동) | $4,000,000 |\n| 감가상각누계액 | ($2,750,000) |\n| 비유동부채 | ($2,000,000) |\n| 12월분 매출세수익 발생계상($5,000,000 × 4%) | $200,000 |\n| **정부전체 순자산** | **$650,000** |\n\n주: 12월 수익은 연도말로부터 75일 후 수령되어 수정발생주의에서는 발생계상하지 않으나(가용 불가능), 완전발생주의에서는 인식된다."}},"MCQ-10468":{"ja":{"question":"Sharpton市は警察部門の資本設備購入に$230,000を予算計上した。市は1月1日に1台$40,000の警察車両5台の発注書を発行した。6月30日に4台が$180,000で納入された。6月30日の中間期一般基金財務諸表で、市は何を報告するか。","explanation":"- 選択肢「A」が正しい。Sharpton市は一般基金での資本取得を資本的支出として記録する。金額は$180,000。\n- 選択肢「B」は誤り。有形固定資産は政府基金には表示されない。\n- 選択肢「C」は誤り。予算外債務として残る歳出予算の予算統制は$40,000（残りの発注）に等しい。\n- 選択肢「D」は誤り。利用可能な歳出予算 = $230,000 − $180,000（支出）− $40,000（予算外債務）= $10,000。","choices":{"A":"資本的支出$180,000。","B":"有形固定資産の増加$180,000。","C":"予算統制$20,000。","D":"利用可能な歳出予算$30,000。"}},"ko":{"question":"Sharpton시는 경찰부서 자본설비 구매에 $230,000을 예산계상했다. 시는 1월 1일에 대당 $40,000인 경찰차량 5대의 구매주문서를 발행했다. 6월 30일에 4대가 $180,000에 납품되었다. 6월 30일 중간 일반기금 재무제표에서 시는 무엇을 보고하는가?","explanation":"- 「A」가 정답. Sharpton시는 일반기금에서의 자본취득을 자본적 지출로 기록한다. 금액은 $180,000.\n- 「B」는 오답. 유형자산은 정부기금에 표시되지 않는다.\n- 「C」는 오답. 약정지출로 남는 세출예산의 예산통제는 $40,000(남은 주문)이다.\n- 「D」는 오답. 사용가능 세출예산 = $230,000 − $180,000(지출) − $40,000(약정지출) = $10,000.","choices":{"A":"자본적 지출 $180,000.","B":"유형자산 증가 $180,000.","C":"예산통제 $20,000.","D":"사용가능 세출예산 $30,000."}}},"MCQ-10493":{"ja":{"question":"Alpha Omega社はメキシコに子会社を有し、連結プロセスで換算法（決算日レート法）を用いている。次の記述のうち正しいものはどれか。\n\nI. メキシコ・ペソ建ての売上は、期末為替レートで米ドルに換算される。\nII. 換算差損益はその他の包括利益に報告される。","explanation":"- 選択肢「B」が正しい。換算法を用いる場合、差損益はその他の包括利益に反映される。記述Iは誤りで、換算法ではすべての損益計算書項目は当期の加重平均為替レートで換算される。","choices":{"A":"IとIIの両方。","B":"IIのみ。","C":"Iのみ。","D":"いずれの記述も正しくない。"}},"ko":{"question":"Alpha Omega사는 멕시코에 자회사를 두고 연결과정에서 환산법(현행환율법)을 사용한다. 다음 설명 중 옳은 것은?\n\nI. 멕시코 페소 표시 매출은 기말환율로 미 달러로 환산된다.\nII. 환산손익은 기타포괄손익에 보고된다.","explanation":"- 「B」가 정답. 환산법을 사용할 경우 손익은 기타포괄손익에 반영된다. 설명 I은 틀렸으며, 환산법에서는 모든 손익계산서 항목이 당기 가중평균환율로 환산된다.","choices":{"A":"I과 II 모두.","B":"II만.","C":"I만.","D":"둘 다 옳지 않다."}}},"MCQ-10360":{"ja":{"question":"多国籍企業は外貨取引から様々なリスクにさらされる。為替変動がこれらの企業にもたらすリスクには次のすべてが含まれるが、例外は：","explanation":"- 選択肢「C」が正しい。為替変動は多国籍企業を取引・経済的・換算リスクにさらすが、**金利リスクにはさらさない**。金利リスクは、金利の変動に応じた金融商品の価値変動へのエクスポージャーを表す。\n- **換算リスク：** 為替レートの変動により、報告される資産・負債・資本・利益の金額が変動する可能性へのエクスポージャー。\n- **経済的リスク：** 為替レートの変動によりキャッシュフローの現在価値が減少する可能性。\n- **取引リスク：** 為替レートの変動により、個々の取引の決済時に経済的損失が生じる可能性。","choices":{"A":"換算リスク。","B":"経済的リスク。","C":"金利リスク。","D":"取引リスク。"}},"ko":{"question":"다국적 기업은 외환거래로 다양한 위험에 노출된다. 환율변동이 이들 기업에 노출시키는 위험에는 다음이 모두 포함되지만, 예외는:","explanation":"- 「C」가 정답. 환율변동은 다국적 기업을 거래·경제적·환산위험에 노출시키지만 **금리위험에는 노출시키지 않는다**. 금리위험은 금리변동에 따른 금융상품 가치변동에 대한 노출을 의미한다.\n- **환산위험:** 환율변동으로 보고되는 자산·부채·자본·이익 금액이 변동할 가능성에 대한 노출.\n- **경제적 위험:** 환율변동으로 현금흐름의 현재가치가 감소할 가능성.\n- **거래위험:** 환율변동으로 개별 거래 결제 시 경제적 손실이 발생할 가능성.","choices":{"A":"환산위험.","B":"경제적 위험.","C":"금리위험.","D":"거래위험."}}},"MCQ-10192":{"ja":{"question":"Nadaf Exports社は中東から出荷される高級ペルシャ絨毯を扱い、欧州・北米全域で販売している。同社はUSD・CAD・ユーロでの取引決済に係る取引リスクの軽減を図っている。Nadafが用いると考えられる手法には次が含まれるが、例外は：","explanation":"- 選択肢「A」が正しい。海外市場での販売を増減させることは、通常**経済的リスク**の軽減に関連する再構築手法であり、取引リスクの軽減ではない。\n- 選択肢「B」「C」「D」は、ヘッジを通じて取引リスクを軽減する適切な手法である。","choices":{"A":"為替レートに基づき、北米と欧州の販売構成を戦略的に調整する。","B":"先渡（フォワード）ヘッジ契約を締結する。","C":"先物（フューチャー）ヘッジ契約を締結する。","D":"通貨オプション・ヘッジ契約を締結する。"}},"ko":{"question":"Nadaf Exports사는 중동에서 출하되는 고급 페르시아 양탄자를 취급하며 유럽·북미 전역에서 판매한다. 회사는 USD·CAD·유로 거래결제에 따른 거래위험 완화를 도모한다. Nadaf가 사용할 만한 기법에는 다음이 포함되지만, 예외는:","explanation":"- 「A」가 정답. 해외시장 판매를 늘리거나 줄이는 것은 통상 **경제적 위험** 완화와 관련된 재구조화 기법이며, 거래위험 완화가 아니다.\n- 「B」「C」「D」는 위험회피를 통해 거래위험을 완화하는 적절한 기법이다.","choices":{"A":"환율에 근거해 북미와 유럽의 판매구성을 전략적으로 조정한다.","B":"선도(forward) 위험회피 계약을 체결한다.","C":"선물(futures) 위험회피 계약을 체결한다.","D":"통화옵션 위험회피 계약을 체결한다."}}}},"tbs":{"TBS 7.1":{"ja":{"title":"運転資本と資金調達の分析","body":"**シナリオ：** 各種の資金調達方法と、それらが運転資本残高に与える影響の分析。\n\n### タスク1：運転資本への影響\n\n| 資金調達方法 | 流動資産への影響 | 流動負債への影響 |\n|------------------|----------------------|---------------------------|\n| ターム・ローン（24か月、毎月元本返済） | +$240,000 | +$120,000 |\n| ターム・ローン（満期時バルーン返済） | +$240,000 | 変化なし |\n| 12か月のクレジットライン（50%引出） | +$120,000 | +$120,000 |\n| 売掛金のファクタリング（12%割引） | -$40,000 | 変化なし |\n| 固定資産を$100,000で売却 | +$100,000 | 変化なし |\n\n**説明：**\n- **行2：** 毎月元本返済の24か月ターム・ローンは、半分（$120,000）が12か月以内に返済期限を迎える（流動負債）。\n- **行3：** 満期時バルーン返済は、12か月以内に返済すべき元本がないため、流動負債は生じない。\n- **行4：** クレジットラインは12か月末に返済期限が到来するため、引出額全額が流動負債となる。\n- **行5：** ファクタリングは売掛金を減少させるが、割引分を差し引いた現金を増加させる（$333,333 × 12% = $40,000）。\n- **行6：** トラックの売却は長期資産を現金に転換する。"},"ko":{"title":"운전자본과 자금조달 분석","body":"**시나리오:** 다양한 자금조달 방법과 그것이 운전자본 잔액에 미치는 영향 분석.\n\n### 과제 1: 운전자본에 대한 영향\n\n| 자금조달 방법 | 유동자산 영향 | 유동부채 영향 |\n|------------------|----------------------|---------------------------|\n| 기간대출(24개월, 매월 원금상환) | +$240,000 | +$120,000 |\n| 기간대출(만기 일시상환) | +$240,000 | 변화 없음 |\n| 12개월 신용한도(50% 인출) | +$120,000 | +$120,000 |\n| 매출채권 팩토링(12% 할인) | -$40,000 | 변화 없음 |\n| 고정자산 $100,000에 매각 | +$100,000 | 변화 없음 |\n\n**설명:**\n- **2행:** 매월 원금상환하는 24개월 기간대출은 절반($120,000)이 12개월 이내 상환되므로 유동부채.\n- **3행:** 만기 일시상환은 12개월 이내 상환할 원금이 없어 유동부채가 없음.\n- **4행:** 신용한도는 12개월 말에 상환기일이 도래하므로 인출액 전액이 유동부채.\n- **5행:** 팩토링은 매출채권을 줄이지만 할인액을 차감한 현금을 증가시킴($333,333 × 12% = $40,000).\n- **6행:** 트럭 매각은 장기자산을 현금으로 전환."}},"TBS 7.2":{"ja":{"title":"製品ライン収益性分析（自製か購入か）","body":"### パートI：自製 vs 購入の分析\n\n**BRINK製品ライン—予想販売数 = 50,000台**\n\n| 原価項目 | 総原価 | 単位当たり原価 |\n|----------------|------------|---------------|\n| 直接材料費 | $35,000 | $0.70 |\n| 直接労務費 | $200,000 | $4.00 |\n| 固定間接費（回避可能） | $84,000 | $1.68 |\n| 変動間接費 | $180,000 | $3.60 |\n| **合計** | **$499,000** | **$9.98** |\n\n**分析：**\n- 現在の自製原価：1台$9.98\n- 購入オファー：1台$9.10\n- 損益分岐となる回避可能固定費：($9.98 - $9.10) × 50,000 = $44,000\n\n回避可能固定費を$40,000まで削減できれば、自製か購入かの意思決定は原価中立となる。"},"ko":{"title":"제품라인 수익성 분석(자가제조 vs 구매)","body":"### 파트 I: 자가제조 vs 구매 분석\n\n**BRINK 제품라인—예상 판매량 = 50,000대**\n\n| 원가 항목 | 총원가 | 단위당 원가 |\n|----------------|------------|---------------|\n| 직접재료비 | $35,000 | $0.70 |\n| 직접노무비 | $200,000 | $4.00 |\n| 고정간접비(회피가능) | $84,000 | $1.68 |\n| 변동간접비 | $180,000 | $3.60 |\n| **합계** | **$499,000** | **$9.98** |\n\n**분석:**\n- 현재 자가제조 원가: 대당 $9.98\n- 구매 제안: 대당 $9.10\n- 손익분기 회피가능 고정비: ($9.98 - $9.10) × 50,000 = $44,000\n\n회피가능 고정비를 $40,000까지 줄일 수 있으면 자가제조 vs 구매 결정은 원가중립이 된다."}},"TBS 7.3":{"ja":{"title":"ヘッジの仕訳","body":"### ヘッジの種類と報告\n\n| シナリオ | ヘッジの種類 | 損益への影響 | OCIへの影響 |\n|----------|------------|-------------------|---------------|\n| 変動金利負債 + 金利スワップ | キャッシュフロー・ヘッジ | $0 | ($15,000) |\n| 棚卸資産 + 先物契約 | 公正価値ヘッジ | ($50) | $0 |\n| 在外子会社への純投資 + 先渡契約 | 純投資ヘッジ | $0 | $600 |\n\n**説明：**\n- **キャッシュフロー・ヘッジ：** 未実現損失は、ヘッジ対象が損益に影響を与えるまでOCIに報告される。\n- **公正価値ヘッジ：** デリバティブの利得と、相殺される棚卸資産の損失の双方を損益で認識する。\n- **純投資ヘッジ：** 先渡契約の利得と累積換算調整勘定の双方をOCIに計上する。"},"ko":{"title":"위험회피 분개","body":"### 위험회피 유형과 보고\n\n| 시나리오 | 위험회피 유형 | 손익 영향 | OCI 영향 |\n|----------|------------|-------------------|---------------|\n| 변동금리 부채 + 금리스왑 | 현금흐름 위험회피 | $0 | ($15,000) |\n| 재고자산 + 선물계약 | 공정가치 위험회피 | ($50) | $0 |\n| 해외 자회사 순투자 + 선도계약 | 순투자 위험회피 | $0 | $600 |\n\n**설명:**\n- **현금흐름 위험회피:** 미실현손실은 위험회피대상이 손익에 영향을 줄 때까지 OCI에 보고.\n- **공정가치 위험회피:** 파생상품 이익과 이를 상쇄하는 재고자산 손실을 모두 손익으로 인식.\n- **순투자 위험회피:** 선도계약 이익과 누적환산조정을 모두 OCI에 계상."}},"TBS 7.4":{"ja":{"title":"工事契約の会計処理","body":"### 3年工事プロジェクトの仕訳\n\n**1年目の仕訳：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 未成工事支出金（CIP） | $3,375,000 | |\n| 工事未収金 | $350,000 | |\n| 工事原価 | $2,362,500 | |\n| 現金 | | $512,500 |\n| 工事進行請求 | | $2,200,000 |\n| 工事収益 | | $3,375,000 |\n\n**計算：**\n- 進捗率：$2,362,500 / $5,250,000 = 45%\n- 見込利益：$7,500,000 - $5,250,000 = $2,250,000\n- 認識利益：$2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000"},"ko":{"title":"공사계약 회계","body":"### 3년 공사 프로젝트 분개\n\n**1년차 분개:**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 미성공사(CIP) | $3,375,000 | |\n| 공사미수금 | $350,000 | |\n| 공사원가 | $2,362,500 | |\n| 현금 | | $512,500 |\n| 공사진행청구 | | $2,200,000 |\n| 공사수익 | | $3,375,000 |\n\n**계산:**\n- 진행률: $2,362,500 / $5,250,000 = 45%\n- 예상이익: $7,500,000 - $5,250,000 = $2,250,000\n- 인식이익: $2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000"}},"TBS 7.5":{"ja":{"title":"標準原価差異分析","body":"### 直接材料差異\n\n**最初の仕訳（購入）：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 原材料（45,000 × $15） | $675,000 | |\n| 直接材料購入価格差異 | $90,000 | |\n| 買掛金（45,000 × $17） | | $765,000 |\n\n**価格差異：** 45,000 × ($17 - $15) = $90,000 不利\n\n**2番目の仕訳（消費）：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 仕掛品（42,500 × $15） | $637,500 | |\n| 直接材料数量差異 | $67,500 | |\n| 原材料（47,000 × $15） | | $705,000 |\n\n**数量差異：** $15 × (47,000 - 42,500) = $67,500 不利"},"ko":{"title":"표준원가 차이분석","body":"### 직접재료 차이\n\n**첫 번째 분개(구입):**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 원재료(45,000 × $15) | $675,000 | |\n| 직접재료 구입가격차이 | $90,000 | |\n| 매입채무(45,000 × $17) | | $765,000 |\n\n**가격차이:** 45,000 × ($17 - $15) = $90,000 불리\n\n**두 번째 분개(사용):**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 재공품(42,500 × $15) | $637,500 | |\n| 직접재료 사용차이 | $67,500 | |\n| 원재료(47,000 × $15) | | $705,000 |\n\n**사용차이:** $15 × (47,000 - 42,500) = $67,500 불리"}},"TBS 7.6":{"ja":{"title":"株式報酬","body":"### ストックオプションの仕訳\n\n**2年目・3年目 — 報酬費用の計上：**\n```\n（借）報酬費用    $15,000\n    （貸）払込資本剰余金—ストックオプション   $15,000\n```\n\n**4年目 — オプションの行使：**\n```\n（借）現金（$45 × 5,000）        $225,000\n（借）払込資本剰余金—ストックオプション    $30,000\n    （貸）普通株式（$20 × 5,000）         $100,000\n    （貸）払込資本剰余金—普通株式（差額）    $155,000\n```\n\n**株式評価益受領権（SARs）：**\n- 1年目の報酬費用 = 株式評価益 × SARs数 × 提供済役務\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- 2年目は公正価値の変動に基づき調整"},"ko":{"title":"주식기준보상","body":"### 주식선택권 분개\n\n**2년차·3년차 — 보상비용 계상:**\n```\n(차)보상비용    $15,000\n    (대)주식발행초과금—주식선택권   $15,000\n```\n\n**4년차 — 선택권 행사:**\n```\n(차)현금($45 × 5,000)        $225,000\n(차)주식발행초과금—주식선택권    $30,000\n    (대)보통주($20 × 5,000)         $100,000\n    (대)주식발행초과금—보통주(차액)    $155,000\n```\n\n**주가차액보상권(SARs):**\n- 1년차 보상비용 = 주가상승분 × SARs 수 × 제공된 용역\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- 2년차는 공정가치 변동에 따라 조정"}},"TBS 7.7":{"ja":{"title":"リース会計","body":"### ファイナンス・リースの認識\n\n**借手の当初仕訳：**\n```\n（借）使用権資産            $496,736\n    （貸）リース負債              $496,736\n```\n\n**計算：**\n- リース料の現在価値：$472,061\n- 保証残存価値の現在価値：$24,675\n- 合計：$496,736\n\n**償却スケジュール：**\n\n| 日付 | 支払額 | 利息（6%） | 元本 | 帳簿価額 |\n|------|---------|---------------|-----------|----------------|\n| 1年目 1/1 | | | | $496,736 |\n| 1年目 12/31 | $96,000 | $29,804 | $66,196 | $430,540 |\n| 2年目 12/31 | $96,000 | $25,832 | $70,168 | $360,373 |\n| 3年目 12/31 | $96,000 | $21,622 | $74,378 | $285,995 |\n| 4年目 12/31 | $96,000 | $17,160 | $78,840 | $207,155 |\n| 5年目 12/31 | $96,000 | $12,429 | $83,571 | $123,584 |\n| 6年目 12/31 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**利息収益合計：** $114,264"},"ko":{"title":"리스 회계","body":"### 금융리스 인식\n\n**리스이용자 최초 분개:**\n```\n(차)사용권자산            $496,736\n    (대)리스부채              $496,736\n```\n\n**계산:**\n- 리스료의 현재가치: $472,061\n- 보증잔존가치의 현재가치: $24,675\n- 합계: $496,736\n\n**상각 스케줄:**\n\n| 일자 | 지급액 | 이자(6%) | 원금 | 장부가액 |\n|------|---------|---------------|-----------|----------------|\n| 1년차 1/1 | | | | $496,736 |\n| 1년차 12/31 | $96,000 | $29,804 | $66,196 | $430,540 |\n| 2년차 12/31 | $96,000 | $25,832 | $70,168 | $360,373 |\n| 3년차 12/31 | $96,000 | $21,622 | $74,378 | $285,995 |\n| 4년차 12/31 | $96,000 | $17,160 | $78,840 | $207,155 |\n| 5년차 12/31 | $96,000 | $12,429 | $83,571 | $123,584 |\n| 6년차 12/31 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**이자수익 합계:** $114,264"}},"TBS 7.8":{"ja":{"title":"政府基金の仕訳","body":"### 一般的な政府基金の仕訳\n\n| 取引 | 仕訳 |\n|-------------|-------|\n| 一般財源保証債（GO債）の発行 | （借）現金 / （貸）その他財源 |\n| 発注書の発行 | （借）予算外債務統制 / （貸）予算統制 |\n| 注文した物品の受領 | （借）予算統制 / （貸）予算外債務統制；（借）支出統制 / （貸）未払バウチャー |\n| 給与・賃金の計上 | （借）支出統制 / （貸）未払バウチャー |\n| 補助金収益の稼得 | （借）繰延資源流入 / （貸）補助金収益 |\n| 固定資産税の前受 | （借）現金 / （貸）繰延資源流入 |\n| 予算の採択（黒字） | （借）見積収益 / （貸）歳出予算統制 / （貸）予算統制 |\n| 租税収入前借手形 | （借）現金 / （貸）租税収入前借手形（未払） |"},"ko":{"title":"정부기금 분개","body":"### 일반적인 정부기금 분개\n\n| 거래 | 분개 |\n|-------------|-------|\n| 일반보증채(GO채) 발행 | (차)현금 / (대)기타재원 |\n| 구매주문서 발행 | (차)약정지출통제 / (대)예산통제 |\n| 주문 물품 수령 | (차)예산통제 / (대)약정지출통제; (차)지출통제 / (대)지급전표(미지급) |\n| 급여·임금 계상 | (차)지출통제 / (대)지급전표(미지급) |\n| 보조금수익 가득 | (차)이연자원유입 / (대)보조금수익 |\n| 재산세 선수 | (차)현금 / (대)이연자원유입 |\n| 예산 채택(흑자) | (차)추정수익 / (대)세출예산통제 / (대)예산통제 |\n| 세수예상차입증권 | (차)현금 / (대)세수예상차입금 |"}},"TBS 7.9":{"ja":{"title":"外貨換算法 vs 再測定法","body":"### 方法の比較\n\n| 項目 | 再測定法 | 換算法 |\n|------|---------------------|-------------------|\n| **貸借対照表** | | |\n| 貨幣性項目 | 決算日レート | 決算日レート |\n| 非貨幣性項目 | 取得時レート | 決算日レート |\n| 棚卸資産（均等に購入） | 加重平均 | 決算日レート |\n| 普通株式・優先株式 | 取得時レート | 取得時レート |\n| **損益計算書** | | |\n| 収益・費用 | 加重平均 | 加重平均 |\n| 減価償却費 | 取得時レート | 加重平均 |\n| **差額（プラグ）** | 損益計算書上の損益 | OCIの累積換算調整勘定 |"},"ko":{"title":"외화 환산법 vs 재측정법","body":"### 방법 비교\n\n| 항목 | 재측정법 | 환산법 |\n|------|---------------------|-------------------|\n| **재무상태표** | | |\n| 화폐성 항목 | 현행환율 | 현행환율 |\n| 비화폐성 항목 | 역사적환율 | 현행환율 |\n| 재고자산(균등 매입) | 가중평균 | 현행환율 |\n| 보통주·우선주 | 역사적환율 | 역사적환율 |\n| **손익계산서** | | |\n| 수익·비용 | 가중평균 | 가중평균 |\n| 감가상각비 | 역사적환율 | 가중평균 |\n| **차액(plug)** | 손익계산서상 손익 | OCI의 누적환산조정 |"}},"TBS 7.10":{"ja":{"title":"経済学 — 需要と供給の分析","body":"### 市場均衡への影響\n\n| 事象 | 曲線のシフト | 価格への影響 | 数量への影響 |\n|-------|-------------|--------------|-----------------|\n| 消費者所得の増加 + 法人税の減少 | 需要 → 右、供給 → 右 | 不明 | 増加 |\n| 消費者が将来の値上がりを予想 | 需要 → 右 | 上昇 | 増加 |\n| 買い手の減少 + 生産費の低下 | 需要 → 左、供給 → 右 | 低下 | 不明 |\n| 消費者の富の増加 + 政府補助金 | 需要 → 右、供給 → 右 | 不明 | 増加 |\n| 生産技術の向上 | 供給 → 右 | 低下 | 増加 |\n| 補完財の価格上昇 + 選好の低下 | 需要 → 左 | 低下 | 減少 |\n| 代替財価格の低下 + 労務費の上昇 | 需要 → 左、供給 → 左 | 不明 | 減少 |"},"ko":{"title":"경제학 — 수요·공급 분석","body":"### 시장균형에 대한 영향\n\n| 사건 | 곡선 이동 | 가격 효과 | 수량 효과 |\n|-------|-------------|--------------|-----------------|\n| 소비자 소득 증가 + 법인세 감소 | 수요 → 우, 공급 → 우 | 불분명 | 증가 |\n| 소비자가 향후 가격상승을 예상 | 수요 → 우 | 상승 | 증가 |\n| 구매자 감소 + 생산비 하락 | 수요 → 좌, 공급 → 우 | 하락 | 불분명 |\n| 소비자 부 증가 + 정부 보조금 | 수요 → 우, 공급 → 우 | 불분명 | 증가 |\n| 생산기술 향상 | 공급 → 우 | 하락 | 증가 |\n| 보완재 가격 상승 + 선호 감소 | 수요 → 좌 | 하락 | 감소 |\n| 대체재 가격 하락 + 노무비 상승 | 수요 → 좌, 공급 → 좌 | 불분명 | 감소 |"}}},"traps":{"1":{"ja":{"name":"WACCのウェイト","correct":"時価","wrong":"簿価","mnemonic":"WACC = 時価（マーケット）"},"ko":{"name":"WACC 가중치","correct":"시장가치","wrong":"장부가치"}},"2":{"ja":{"name":"材料差異","correct":"価格→購入量、数量→使用量","wrong":"価格と数量を混同","mnemonic":"購入=価格、使用=数量"},"ko":{"name":"재료차이","correct":"가격→구입량, 수량→사용량","wrong":"가격·수량 혼동"}},"3":{"ja":{"name":"のれんの計算","correct":"子会社の100%","wrong":"取得割合","mnemonic":"全部 公正価値"},"ko":{"name":"영업권 계산","correct":"자회사의 100%","wrong":"취득지분율"}},"4":{"ja":{"name":"リスク対応","correct":"追求（積極的）","wrong":"受容（消極的）"},"ko":{"name":"위험대응","correct":"추구(적극적)","wrong":"수용(소극적)"}},"5":{"ja":{"name":"OWNES const rnd = n=>Math.floor(Math.random()*n);

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}

/* ---------- markdown (small subset) ---------- */
function md(src){
  if(!src) return '';
  const lines = src.replace(/\r/g,'').split('\n');
  let out=[], i=0;
  const inline = t => esc(t)
     .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
     .replace(/`(.+?)`/g,'<code>$1</code>');
  while(i<lines.length){
    let ln=lines[i];
    if(/^```/.test(ln)){ let buf=[]; i++; while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;} i++; out.push('<pre>'+esc(buf.join('\n'))+'</pre>'); continue; }
    let h=/^(#{1,6})\s+(.*)$/.exec(ln);
    if(h){ out.push('<div class="md-h">'+inline(h[2])+'</div>'); i++; continue; }
    if(/^\s*\|.*\|\s*$/.test(ln)){
      let rows=[]; while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){rows.push(lines[i]);i++;}
      rows = rows.filter(r=>!/^\s*\|[\s:|-]+\|\s*$/.test(r));
      let html='<table>';
      rows.forEach((r,ri)=>{
        const cells=r.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
        html+='<tr>'+cells.map(c=> (ri===0?'<th>':'<td>')+inline(c)+(ri===0?'</th>':'</td>')).join('')+'</tr>';
      });
      out.push(html+'</table>'); continue;
    }
    if(/^\s*[-*]\s+/.test(ln)){
      let items=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){items.push(lines[i].replace(/^\s*[-*]\s+/,''));i++;}
      out.push('<ul>'+items.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ul>'); continue;
    }
    if(/^\s*\d+\.\s+/.test(ln)){
      let items=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){items.push(lines[i].replace(/^\s*\d+\.\s+/,''));i++;}
      out.push('<ol>'+items.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ol>'); continue;
    }
    if(ln.trim()===''){i++;continue;}
    let buf=[ln]; i++;
    while(i<lines.length && lines[i].trim()!=='' && !/^\s*\|/.test(lines[i]) && !/^\s*[-*]\s+/.test(lines[i]) && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
    out.push('<p>'+buf.map(inline).join('<br>')+'</p>');
  }
  return out.join('');
}

function drawSprite(canvas, name, scale, flip){
  const sp = SP[name]||SP.slime;
  const g = sp.g, pal = sp.p, S=scale||5, N=16;
  canvas.width=N*S; canvas.height=N*S;
  const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<N;y++){const row=g[y]||''; for(let x=0;x<N;x++){
    let ch=row[x]; if(!ch||ch===' '||ch==='.')continue;
    const ci=parseInt(ch,16); const col=pal[ci]; if(!col||col==='.')continue;
    const dx=flip?(N-1-x):x; ctx.fillStyle=col; ctx.fillRect(dx*S,y*S,S,S);
  }}
  return canvas;
}

/* ---------- mastery & progress ---------- */
function getM(id){ return S.m[id]||(S.m[id]={box:0,seen:0,correct:0,wrong:0,last:0}); }
function bumpM(id,ok,stars){
  const m=getM(id); m.seen++; m.last=Date.now();
  if(ok){ m.correct++; m.box=clamp(m.box+1,0,5); } else { m.wrong++; m.box=clamp(m.box-1,0,5); }
}
function areaItems(aid){
  const t=DATA.topics.filter(x=>x.area===aid).map(x=>'T'+x.num);
  const q=DATA.mcqs.filter(x=>x.area===aid).map(x=>x.id);
  const r=DATA.traps.filter(x=>x.area===aid).map(x=>'TRAP'+x.id);
  return [...t,...q,...r];
}
function areaMastery(aid){
  const ids=areaItems(aid); if(!ids.length)return 0;
  let s=0; ids.forEach(id=>{ s+=getM(id).box/5; }); return s/ids.length;
}
function totalMastery(){ let s=0,n=0; DATA.areas.forEach(a=>{s+=areaMastery(a.id);n++;}); return n?s/n:0; }
function bossUnlocked(aid){ // unlock when >=55% of area items have box>=1
  const ids=areaItems(aid); let c=0; ids.forEach(id=>{if(getM(id).box>=1)c++;}); return c/ids.length>=0.55; }

/* ---------- leveling ---------- */
function xpForLevel(l){ return 40 + (l-1)*28; }
function addXp(n){
  S.xp+=n; let up=0;
  while(S.xp>=xpForLevel(S.lv)){ S.xp-=xpForLevel(S.lv); S.lv++; up++; S.maxHp+=6; S.atk+=2; S.hp=S.maxHp; }
  if(up){ sfx('level'); showModal(levelUpModal(up)); }
  return up;
}
function comboMult(){ return 1 + Math.min(S.combo,10)*0.1; }

   AUDIO (WebAudio synth)
   ========================================================================= */
let AC=null;
function audio(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function tone(freq,dur,type,vol,when){
  if(!S.sound)return; const ac=audio(); if(!ac)return;
  const t0=ac.currentTime+(when||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol||.12,t0+.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(ac.destination); o.start(t0); o.stop(t0+dur+.02);
}
function sfx(name){
  if(!S.sound)return;
  if(name==='ok'){ tone(660,.08,'square',.12,0); tone(880,.1,'square',.12,.08); tone(1175,.12,'square',.1,.16); }
  else if(name==='no'){ tone(220,.16,'sawtooth',.13,0); tone(160,.2,'sawtooth',.12,.12); }
  else if(name==='hit'){ tone(140,.1,'square',.14,0); }
  else if(name==='select'){ tone(520,.05,'square',.09,0); }
  else if(name==='level'){ [523,659,784,1046].forEach((f,i)=>tone(f,.14,'square',.12,i*.1)); }
  else if(name==='win'){ [392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.16,'square',.12,i*.09)); }
  else if(name==='lose'){ [330,294,247,196].forEach((f,i)=>tone(f,.22,'sawtooth',.12,i*.14)); }
  else if(name==='gold'){ tone(988,.06,'square',.1,0); tone(1318,.08,'square',.1,.05); }
}

/* =========================================================================
   SESSION / BATTLE ENGINE
   ========================================================================= */
let SESS=null;
function buildEncounter(kind,refId){
  if(kind==='recall'){ const t=DATA.topics.find(x=>'T'+x.num===refId); return {kind,id:refId,topic:t}; }
  if(kind==='mcq'){ const q=DATA.mcqs.find(x=>x.id===refId); return {kind,id:refId,mcq:q}; }
  if(kind==='trap'){ const tr=DATA.traps.find(x=>'TRAP'+x.id===refId); return {kind,id:refId,trap:tr}; }
  if(kind==='mnemonic'){ const mn=DATA.mnemonics.find(x=>'MN-'+x.code===refId); return {kind,id:refId,mn}; }
}
function weakSort(ids){ return ids.slice().sort((a,b)=>{const ma=getM(a),mb=getM(b); return (ma.box-mb.box)|| (ma.seen-mb.seen)|| (ma.last-mb.last);}); }

function startSession(opt){
  const aid=opt.aid; let queue=[];
  if(opt.mode==='recall'){ let ids=DATA.topics.filter(t=>t.area===aid).map(t=>'T'+t.num); ids=weakSort(ids).slice(0,opt.count); queue=ids.map(id=>buildEncounter('recall',id)); }
  else if(opt.mode==='mcq'){ queue=shuffle(DATA.mcqs.filter(m=>m.area===aid).map(m=>buildEncounter('mcq',m.id))); }
  else if(opt.mode==='trap'){ queue=shuffle(DATA.traps.filter(t=>t.area===aid).map(t=>buildEncounter('trap','TRAP'+t.id))); }
  SESS={queue,i:0,title:opt.title,mode:opt.mode,aid,correct:0,wrong:0,xp:0,gold:0,boss:null,startCombo:S.combo};
  go('battle');
}
function startReview(){
  let all=[];
  DATA.areas.forEach(a=>{ all.push(...DATA.topics.filter(t=>t.area===a.id).map(t=>'T'+t.num)); });
  all.push(...DATA.mcqs.map(m=>m.id)); all.push(...DATA.traps.map(t=>'TRAP'+t.id));
  const seen=all.filter(id=>getM(id).seen>0 && getM(id).box<4);
  const fresh=all.filter(id=>getM(id).seen===0);
  let poolIds=weakSort(seen).slice(0,9); poolIds=poolIds.concat(sample(fresh,Math.max(0,12-poolIds.length)));
  if(!poolIds.length)poolIds=sample(all,12);
  const queue=poolIds.map(id=> id.startsWith('TRAP')?buildEncounter('trap',id): id.startsWith('T')&&!id.startsWith('TRAP')?buildEncounter('recall',id):buildEncounter('mcq',id));
  SESS={queue,i:0,title:'오늘의 복습',mode:'review',aid:null,correct:0,wrong:0,xp:0,gold:0,boss:null};
  go('battle');
}
function startRandom(){
  const kinds=[]; DATA.mcqs.forEach(m=>kinds.push(buildEncounter('mcq',m.id)));
  DATA.traps.forEach(t=>kinds.push(buildEncounter('trap','TRAP'+t.id)));
  DATA.mnemonics.forEach(m=>kinds.push(buildEncounter('mnemonic','MN-'+m.code)));
  SESS={queue:sample(kinds,10),i:0,title:'랜덤 전투',mode:'random',aid:null,correct:0,wrong:0,xp:0,gold:0,boss:null};
  go('battle');
}
function startBoss(aid){
  const a=areaById(aid);
  let pool=[]; DATA.mcqs.filter(m=>m.area===aid).forEach(m=>pool.push(buildEncounter('mcq',m.id)));
  DATA.traps.filter(t=>t.area===aid).forEach(t=>pool.push(buildEncounter('trap','TRAP'+t.id)));
  DATA.mnemonics.forEach(m=>pool.push(buildEncounter('mnemonic','MN-'+m.code)));
  pool=sample(pool,Math.min(10,pool.length));
  const need=Math.max(3,Math.ceil(pool.length*0.7));
  SESS={queue:pool,i:0,title:a.ko+' 보스전',mode:'boss',aid,correct:0,wrong:0,xp:0,gold:0,
        boss:{name:a.ko+' 수호자',sprite:'dragon',hpMax:need,hp:need,color:a.color}};
  go('battle');
}

function enemyFor(enc){
  if(enc.kind==='trap')return 'mimic';
  if(enc.kind==='mnemonic')return 'sage';
  if(enc.kind==='mcq'){ const a=enc.mcq.area; return AREA_MONSTERS[a]?AREA_MONSTERS[a][ (enc.mcq.id.charCodeAt(5)||0)%3 ]:'skeleton'; }
  const a=enc.topic.area; const arr=AREA_MONSTERS[a]||['slime']; return arr[(enc.topic.num)%arr.length];
}
function enemyName(enc){
  if(enc.kind==='trap')return 'TRAP · '+enc.trap.name;
  if(enc.kind==='mnemonic')return '주문술사';
  if(enc.kind==='mcq')return enc.mcq.title;
  return enc.topic.name;
}

function commitResult(enc,ok){
  bumpM(enc.id,ok,enc.topic?enc.topic.stars:2);
  S.stats.answered++;
  const aid=enc.topic?enc.topic.area:(enc.mcq?enc.mcq.area:(enc.trap?enc.trap.area:null));
  if(aid){ S.stats.byArea[aid]=S.stats.byArea[aid]||{a:0,c:0}; S.stats.byArea[aid].a++; }
  if(ok){
    S.combo++; S.bestCombo=Math.max(S.bestCombo,S.combo);
    S.stats.correct++; if(aid)S.stats.byArea[aid].c++;
    const baseXp= enc.kind==='mcq'?14: enc.kind==='trap'?12: enc.kind==='recall'?(8+enc.topic.stars*3):8;
    const xp=Math.round(baseXp*comboMult());
    const gold=Math.round((3+(enc.topic?enc.topic.stars:2))*comboMult());
    SESS.correct++; SESS.xp+=xp; SESS.gold+=gold; S.gold+=gold;
    if(S.combo>=2)comboPop(S.combo);
    sfx('gold');
    floatHud(xp,gold);
    addXp(xp);
    if(SESS.mode==='boss'&&SESS.boss){ SESS.boss.hp=Math.max(0,SESS.boss.hp-1); }
  } else {
    S.combo=0;
    SESS.wrong++;
    const dmg= SESS.mode==='boss'?12: (8+ (enc.topic?enc.topic.stars:1)*2);
    S.hp=Math.max(0,S.hp-dmg);
    floatText($('#heroSprite'),'-'+dmg,'var(--red)');
  }
  checkBadges(); renderHud(); save();
  if(S.hp<=0 && SESS.mode!=='recall'){ setTimeout(()=>defeat(),200); }
}

  const f=el('div','float',txt); f.style.color=color; f.style.left=(r.left-ar.left+r.width/2-10)+'px'; f.style.top=(r.top-ar.top)+'px';
  fx.append(f); setTimeout(()=>f.remove(),1000);
}

   <div class="tiny">Lv.${S.lv} 달성${times>1?' ('+times+'단계)':''}<br>최대 HP +${6*times} · ATK +${2*times} · 완전 회복</div>`;
  const ok=el('button','btn gold lg','계속'); ok.style.marginTop='12px'; ok.onclick=closeModal; b.append(ok); return b;
}

/* ---------- modal/toast ---------- */
function showModal(node){ const m=$('#modal-box'); m.innerHTML=''; m.append(node); $('#modal').classList.add('on'); try{localize(m);}catch(e){} return m; }
function closeModal(){ $('#modal').classList.remove('on'); }
let toastT=null;
function toast(msg){ const t=$('#toast'); t.textContent=msg; try{localize(t);}catch(e){} t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),1900); }

/* ---------- routes ---------- */
const ROUTES={ title:titleScreen, map:mapScreen, region:regionScreen, battle:battleScreen,
  codex:codexScreen, hero:heroScreen, shop:shopScreen, settings:settingsScreen };

load();
try{document.documentElement.lang=S.lang||'ko';}catch(e){}
document.body.classList.toggle('noflicker',!S.crt);
renderHud();
go('title');
try{if(/action=review/.test(location.search)&&typeof startReview==='function')startReview();}catch(e){}
try{history.pushState({scr:'title'},'');}catch(e){}
window.addEventListener('popstate',()=>{ try{history.pushState({scr:CUR},'');}catch(e){}
  if($('#modal').classList.contains('on')){closeModal();return;}
  goBack(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if($('#modal').classList.contains('on'))closeModal(); else if(CUR!=='title')goBack(); } });
