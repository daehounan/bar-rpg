  --wood:#5a3a20; --wood-d:#3a2412; --wood-l:#7a5230;
  /* accents */
  --gold:#e7b94d; --gold-d:#a87a23; --brass:#caa24a;
  --red:#cf4a3c; --red-d:#8e2c22; --green:#5a9e5e; --green-d:#2f6a35; --blue:#3f86b0;
  --line:#1a0f06; --shadow:#06121a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:#04141d;
  color:var(--ink);
  font-family:'Galmuri','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:17px; line-height:1.5;
  display:flex; align-items:center; justify-content:center;
  min-height:100%; padding:10px;
  image-rendering:pixelated; overflow-x:hidden;
}
.press{font-family:'Press',monospace; line-height:1.6; letter-spacing:.5px;}

#app{
  width:100%; max-width:760px; height:min(94vh,920px); height:min(94dvh,920px);
  background:
    radial-gradient(140% 90% at 50% 0%, #15506b 0%, #0e3346 45%, #0a2230 100%);
  border:4px solid var(--line); border-radius:10px;
  box-shadow:0 0 0 4px #2a1c0e, 0 0 0 8px var(--line), 0 18px 0 #02090d, 0 22px 40px rgba(0,0,0,.6);
  display:flex; flex-direction:column; position:relative; overflow:hidden;
}
/* waves bg */
#app::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background:
   repeating-linear-gradient(0deg,transparent 0 26px,rgba(191,230,240,.035) 26px 27px),
   radial-gradient(60% 40% at 80% 90%,rgba(31,115,150,.25),transparent 70%);}

#crt{position:absolute;inset:0;pointer-events:none;z-index:60;mix-blend-mode:overlay;opacity:.35;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.3) 3px,rgba(0,0,0,0) 4px);}
#vig{position:absolute;inset:0;pointer-events:none;z-index:61;
  background:radial-gradient(120% 120% at 50% 40%,transparent 55%,rgba(0,0,0,.5) 100%);}
body.noflicker #crt{opacity:.12}

/* ===== HUD : ship status board (wood) ===== */
#hud{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 10px;position:relative;z-index:20;
  background:linear-gradient(180deg,#6a4526,#462b15);
  border-bottom:4px solid var(--line);box-shadow:inset 0 -3px 0 #2f1c0d;}
#hud .av{width:36px;height:36px;flex:0 0 auto;background:#0e3346;border:3px solid var(--line);border-radius:4px;image-rendering:pixelated;}
#hud .stk{flex:1 1 auto;min-width:0;}
.hud-row{display:flex;align-items:center;gap:6px;font-size:9px;}
.bar{height:9px;background:#0a1c12;border:2px solid var(--line);border-radius:3px;overflow:hidden;position:relative;flex:1 1 auto;}
.bar>i{display:block;height:100%;width:0;transition:width .35s cubic-bezier(.2,.8,.2,1);}
.bar.hull>i{background:linear-gradient(180deg,#caa24a,#7a5230);}
.bar.fame>i{background:linear-gradient(180deg,#86e6f4,#3f86b0);}
.bar.boss>i{background:linear-gradient(180deg,#ff7a82,#cf4a3c);}
.hud-lab{font-family:'Press';font-size:8px;color:#e9d4a6;width:30px;}
.hud-num{font-family:'Press';font-size:8px;min-width:max-content;color:#f4ead2;}
#hud .rank{font-family:'Press';font-size:9px;color:var(--gold);text-shadow:1px 1px 0 var(--line);}
#hud .funds{font-family:'Press';font-size:9px;color:var(--gold);white-space:nowrap;}
#hud .menubtn{margin-left:auto}
.hudnav{margin-left:auto;display:flex;gap:5px;flex:0 0 auto}
.hudnav .btn{padding:8px 9px;font-size:11px}

#screen{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#7a5230 #0e3346;}
#screen::-webkit-scrollbar{width:10px}
#screen::-webkit-scrollbar-thumb{background:#7a5230;border:2px solid #0e3346;border-radius:6px}
.scr{padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));min-height:100%;display:flex;flex-direction:column;}

/* parchment panel */
.panel{background:linear-gradient(180deg,var(--pa0),var(--pa1));color:var(--ink);
  border:3px solid var(--pa-edge);border-radius:3px;padding:12px;
  box-shadow:inset 2px 2px 0 #f6ecd0, inset -3px -3px 0 #c4a86e, 4px 4px 0 var(--shadow);}
.panel.dark{background:linear-gradient(180deg,#123a4e,#0e3346);color:#e9f4f6;border-color:#06202c;
  box-shadow:inset 2px 2px 0 #1c5168, inset -3px -3px 0 #082530, 4px 4px 0 var(--shadow);}
.muted{color:var(--ink-dim)}
.dark .muted{color:#8fb6c4}

.btn{font-family:'Press';font-size:10px;color:#2a1c08;cursor:pointer;user-select:none;
  background:linear-gradient(180deg,#e8cf90,#caa24a);border:3px solid var(--line);
  box-shadow:inset 2px 2px 0 #f7e7b3, inset -2px -2px 0 #9a7322, 3px 3px 0 var(--shadow);
  padding:11px 12px;border-radius:3px;text-align:center;line-height:1.5;display:inline-flex;align-items:center;gap:8px;justify-content:center;
  transition:transform .04s,filter .1s;}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translate(3px,3px);box-shadow:inset 2px 2px 0 #f7e7b3,inset -2px -2px 0 #9a7322,0 0 0 var(--shadow);}
.btn.lg{font-size:12px;padding:14px;width:100%}
.btn.gold{background:linear-gradient(180deg,#ffd866,#d99a2c);color:#2a1d05;box-shadow:inset 2px 2px 0 #ffe9a6,inset -2px -2px 0 #a06f17,3px 3px 0 var(--shadow);}
.btn.wood{background:linear-gradient(180deg,#7a5230,#4f3219);color:#f4ead2;box-shadow:inset 2px 2px 0 #95683f,inset -2px -2px 0 #321f0d,3px 3px 0 var(--shadow);}
.btn.red{background:linear-gradient(180deg,#e0635a,#a3302a);color:#fff;box-shadow:inset 2px 2px 0 #f09a92,inset -2px -2px 0 #79221c,3px 3px 0 var(--shadow);}
.btn.green{background:linear-gradient(180deg,#7ec97f,#3a7e40);color:#06210d;box-shadow:inset 2px 2px 0 #aef0a8,inset -2px -2px 0 #266030,3px 3px 0 var(--shadow);}
.btn.sm{font-size:8px;padding:7px 9px}
.btn[disabled]{opacity:.5;pointer-events:none;filter:grayscale(.4)}
.btn .ic{font-size:13px;line-height:1}

.col{display:flex;flex-direction:column;gap:10px}.row{display:flex;gap:10px}.wrap{flex-wrap:wrap}.grow{flex:1 1 auto}
.center{align-items:center;justify-content:center;text-align:center}.tiny{font-size:13px}
h1,h2,h3{font-family:'Press';line-height:1.4}
.sec-t{font-family:'Press';font-size:11px;color:var(--wood-d);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:"⚓";font-size:11px}
.dark .sec-t{color:var(--gold)}
.tag{font-family:'Press';font-size:7px;padding:3px 5px;border:2px solid var(--pa-edge);border-radius:3px;display:inline-block;background:#f3e6c4;color:#5c4a2a}
.tag.dk{background:#0e3346;border-color:#06202c;color:#bfe6f0}
.stars{color:var(--gold-d);letter-spacing:1px;font-size:12px}

/* compass divider */
.divline{height:14px;margin:10px 0;background:
  radial-gradient(circle at 50% 50%,var(--gold) 0 3px,transparent 4px),
  repeating-linear-gradient(90deg,var(--pa-edge) 0 6px,transparent 6px 12px);
  background-repeat:no-repeat,repeat;background-position:center,0;background-size:auto,100%;}

/* ===== title ===== */
.scr-title{align-items:center;justify-content:center;gap:12px;text-align:center;}
.logo .big{font-family:'Press';font-size:clamp(20px,7vw,40px);color:var(--gold);
  text-shadow:3px 3px 0 #6a3a12,6px 6px 0 var(--line);letter-spacing:2px}
.logo .sub{font-family:'Press';font-size:clamp(8px,2.6vw,12px);color:#cfe6ef;margin-top:6px}
.ship-stage{width:120px;height:120px;image-rendering:pixelated;animation:sail 2.4s ease-in-out infinite}
@keyframes sail{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
.blink{animation:blink 1.1s steps(2) infinite}@keyframes blink{50%{opacity:0}}

/* ===== chart (world map) ===== */
.chart-head{display:flex;align-items:center;gap:10px}
.compass{width:46px;height:46px;flex:0 0 auto;image-rendering:pixelated}
.sea-node{display:flex;gap:12px;align-items:center;cursor:pointer;position:relative}
.sea-node .port{width:60px;height:60px;flex:0 0 auto;border:3px solid var(--pa-edge);border-radius:6px;
  display:flex;align-items:center;justify-content:center;image-rendering:pixelated;background:linear-gradient(180deg,#15506b,#0a2230);overflow:hidden}
.sea-node .meta{flex:1 1 auto;min-width:0}
.sea-node .nm{font-family:'Press';font-size:10px;margin-bottom:3px}
.sea-node .en{font-size:13px;color:var(--ink-dim)}
.mini-bar{height:8px;background:#caa86e;border:2px solid var(--pa-edge);border-radius:3px;overflow:hidden;margin-top:5px}
.mini-bar>i{display:block;height:100%}
.pct{font-family:'Press';font-size:8px;color:var(--ink-dim)}
.rhumb{height:16px;margin-left:30px;border-left:4px dotted #9c7b46}

/* ===== voyage (battle) ===== */
.arena{position:relative;border:3px solid #06202c;border-radius:4px;overflow:hidden;
  background:linear-gradient(180deg,#1a5e7e 0%,#15506b 50%,#0a2230 100%);padding:10px;min-height:150px}
.arena .waves{position:absolute;left:0;right:0;bottom:0;height:46px;
  background:
   repeating-linear-gradient(90deg,#1f7396 0 10px,#15506b 10px 20px);
  border-top:3px solid #0a2230;opacity:.9}
.arena .waves::after{content:"";position:absolute;top:-6px;left:0;right:0;height:8px;
  background:repeating-linear-gradient(90deg,transparent 0 6px,var(--foam) 6px 9px,transparent 9px 16px);opacity:.5}
.fighters{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:2;min-height:120px}
.fighter{display:flex;flex-direction:column;align-items:center;gap:4px}
.fighter canvas{image-rendering:pixelated}
.f-name{font-family:'Press';font-size:7px;color:#cfe6ef;max-width:120px;text-align:center;line-height:1.4}
.ehp{width:112px}
.idleP{animation:sail 2.6s ease-in-out infinite}.idleE{animation:bobE 2.1s ease-in-out infinite}
@keyframes bobE{50%{transform:translateY(-6px)}}
.shake{animation:shake .32s}@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,1px)}80%{transform:translate(4px,-1px)}}
.flash{animation:flash .3s}@keyframes flash{50%{filter:brightness(2.6) saturate(.4)}}
.lunge-p{animation:lungeP .3s}@keyframes lungeP{50%{transform:translateX(34px)}}
.lunge-e{animation:lungeE .3s}@keyframes lungeE{50%{transform:translateX(-34px)}}

.qbox{margin-top:10px}
.qmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.qtext{font-size:16px;line-height:1.55;color:var(--ink)}
.qtext p{margin:6px 0}.qtext ul,.qtext ol{margin:6px 0 6px 20px}.qtext li{margin:3px 0}
.qtext strong{color:var(--red-d)}
.qtext code{font-family:'Press';font-size:11px;background:#e7d3a0;padding:1px 4px;border-radius:3px;color:#5a3a12}
.qtext table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.qtext th,.qtext td{border:2px solid var(--pa-edge);padding:4px 6px;text-align:left}
.qtext th{background:#dcc592;font-family:'Press';font-size:9px}
.qtext pre{background:#e7d3a0;border:2px solid var(--pa-edge);padding:8px;border-radius:3px;font-family:'Press';font-size:10px;overflow-x:auto;white-space:pre;color:#4a2f10}
.qtext .md-h{font-family:'Press';font-size:10px;color:var(--gold-d);margin:10px 0 4px}
.choices{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.choice{display:flex;gap:10px;align-items:flex-start;text-align:left;font-family:'Galmuri';font-size:15px;color:var(--ink);
  background:linear-gradient(180deg,#f0e3c4,#e2d09e);border:3px solid var(--pa-edge);
  box-shadow:inset 2px 2px 0 #f8eece,inset -2px -2px 0 #bfa067,3px 3px 0 var(--shadow);
  padding:10px 11px;border-radius:3px;cursor:pointer;transition:transform .04s,filter .1s;line-height:1.45}
.choice:hover{filter:brightness(1.05)}.choice:active{transform:translate(2px,2px)}
.choice .key{font-family:'Press';font-size:10px;color:var(--gold-d);flex:0 0 auto;width:16px;margin-top:1px}
.choice.correct{background:linear-gradient(180deg,#5a9e5e,#2f6a35);border-color:#173a1b;color:#eafff0}
.choice.correct .key{color:#caffd6}
.choice.wrong{background:linear-gradient(180deg,#cf4a3c,#8e2c22);border-color:#3a0f0b;color:#ffe9e7}
.choice.wrong .key{color:#ffd0cc}
.choice.dim{opacity:.42}.choice[disabled]{pointer-events:none}

.reveal{margin-top:10px}
.verdict{font-family:'Press';font-size:12px;padding:8px;border:3px solid var(--line);border-radius:3px;text-align:center;margin-bottom:8px}
.verdict.ok{background:#2f6a35;color:#caffd6}.verdict.no{background:#8e2c22;color:#ffd0cc}
.expl{font-size:14px;line-height:1.6;background:#f3e7c6;border:2px solid var(--pa-edge);border-left:5px solid var(--gold-d);padding:10px;border-radius:3px;max-height:230px;overflow-y:auto;color:var(--ink)}
.expl strong{color:var(--red-d)}
.flip{background:#f3e7c6;border:2px dashed var(--pa-edge);border-radius:4px;padding:14px;text-align:center;min-height:90px;display:flex;flex-direction:column;justify-content:center;gap:8px}
.kp{font-size:18px;color:var(--green-d);line-height:1.5}
.sub-lab{font-family:'Press';font-size:8px;color:var(--ink-dim)}

#fx{position:absolute;inset:0;pointer-events:none;z-index:55;overflow:hidden}
.float{position:absolute;font-family:'Press';font-size:14px;font-weight:bold;text-shadow:2px 2px 0 var(--line);animation:floatup 1s ease-out forwards}
@keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-46px)}}
.combo-pop{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:'Press';font-size:13px;color:#bfe6f0;text-shadow:2px 2px 0 var(--line);z-index:56;animation:pop .4s}
@keyframes pop{0%{transform:translateX(-50%) scale(.4)}60%{transform:translateX(-50%) scale(1.25)}100%{transform:translateX(-50%) scale(1)}}

#modal{position:absolute;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(4,12,18,.8)}
#modal.on{display:flex}
.modal-box{width:100%;max-width:440px;animation:popm .3s}@keyframes popm{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{font-family:'Press';font-size:8px;padding:8px 9px;cursor:pointer;background:#123a4e;border:3px solid #06202c;border-radius:3px;box-shadow:3px 3px 0 var(--shadow);color:#cfe6ef}
.tab.on{background:linear-gradient(180deg,#ffd866,#d99a2c);color:#2a1d05;border-color:var(--line)}
.list-card{border:3px solid var(--pa-edge);background:linear-gradient(180deg,var(--pa0),var(--pa1));border-radius:3px;padding:10px;box-shadow:3px 3px 0 var(--shadow);color:var(--ink)}
.list-card+.list-card{margin-top:8px}
.lc-h{font-family:'Press';font-size:10px;color:var(--wood-d);margin-bottom:5px}
.mono{font-family:'Press';font-size:11px;color:#3a5a12;word-break:break-word;line-height:1.7}
.kv{display:flex;gap:8px;font-size:14px;margin:3px 0}.kv b{color:var(--green-d);flex:0 0 auto}
.locked{filter:grayscale(.7);opacity:.7}
.undisc{color:var(--ink-dim);font-style:italic}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{background:#f3e7c6;border:2px solid var(--pa-edge);border-radius:3px;padding:9px;text-align:center}
.stat .n{font-family:'Press';font-size:15px;color:var(--gold-d)}.stat .l{font-size:12px;color:var(--ink-dim);margin-top:2px}
.badgewall{display:flex;flex-wrap:wrap;gap:8px}
.medal{width:54px;height:54px;border:3px solid var(--pa-edge);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#e7d3a0;position:relative}
.medal.on{background:radial-gradient(circle at 50% 35%,#ffe9a6,#d99a2c)}.medal.off{filter:grayscale(1);opacity:.4}

.toast{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:80;background:#123a4e;border:3px solid #06202c;
  box-shadow:4px 4px 0 var(--shadow);padding:9px 14px;border-radius:4px;font-family:'Press';font-size:9px;color:var(--gold);opacity:0;transition:opacity .25s,transform .25s}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-4px)}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.field label{font-family:'Press';font-size:9px;color:var(--ink-dim)}
.field input{font-family:var(--read);font-size:16px;background:#f3e7c6;border:3px solid var(--pa-edge);color:var(--ink);padding:9px;border-radius:3px}
.codearea{font-family:'Press';font-size:9px;line-height:1.7;width:100%;height:94px;background:#f6ecd0;border:3px solid var(--pa-edge);color:#4a2f10;padding:8px;border-radius:3px;resize:none;word-break:break-all}
.codearea::placeholder{color:#9c7b46}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px;background:#f3e7c6;border:2px solid var(--pa-edge);border-radius:3px;margin-bottom:8px}
.commission{border:3px solid var(--pa-edge);background:linear-gradient(180deg,#f3e7c6,#e4d2a6);border-radius:3px;padding:11px;box-shadow:3px 3px 0 var(--shadow);position:relative}
.commission+.commission{margin-top:10px}
.seal{position:absolute;top:-8px;right:-8px;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e0635a,#8e2c22);border:2px solid #5a1b15;display:flex;align-items:center;justify-content:center;font-size:13px;transform:rotate(8deg)}
/* sailing cutscene */
#sail{position:absolute;inset:0;z-index:65;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;
  background:radial-gradient(140% 90% at 50% 30%,#1f7396,#0e3346 60%,#06202c);overflow:hidden}
#sail.on{display:flex}
#sail .sw{position:absolute;left:0;right:0;bottom:0;height:120px;background:repeating-linear-gradient(90deg,#1f7396 0 14px,#15506b 14px 28px);opacity:.8;animation:swsc 1s linear infinite}
@keyframes swsc{to{background-position:28px 0}}
#sail .sw2{bottom:40px;height:80px;opacity:.5;animation-duration:.7s}
.sail-ship{position:relative;z-index:2;image-rendering:pixelated;animation:sailcross 1.3s cubic-bezier(.4,0,.6,1) forwards}
@keyframes sailcross{0%{transform:translateX(-150px) rotate(-3deg)}100%{transform:translateX(150px) rotate(3deg)}}
.sail-cap{position:relative;z-index:2;font-family:'Press';font-size:13px;color:#f4ead2;text-shadow:2px 2px 0 var(--line);text-align:center}
.sail-skip{position:absolute;bottom:14px;z-index:3;font-family:'Press';font-size:8px;color:#bfe6f0;opacity:.7}
/* market ticker / hall / generation */
.ticker{background:linear-gradient(180deg,#123a4e,#0e3346);border:3px solid #06202c;border-radius:3px;padding:9px 11px;color:#e9f4f6;
  box-shadow:inset 2px 2px 0 #1c5168,inset -2px -2px 0 #082530,3px 3px 0 var(--shadow)}
.hall-row{border:3px solid var(--pa-edge);background:linear-gradient(180deg,#f3e7c6,#e4d2a6);border-radius:3px;padding:9px 11px;box-shadow:3px 3px 0 var(--shadow);display:flex;gap:10px;align-items:center}
.hall-row+.hall-row{margin-top:8px}
.hall-row .g{font-family:'Press';font-size:13px;color:var(--gold-d);flex:0 0 auto}
.gen-pill{display:inline-block;font-family:'Press';font-size:8px;padding:3px 6px;border:2px solid var(--line);border-radius:10px;background:linear-gradient(180deg,#ffd866,#d99a2c);color:#2a1d05}
.trait-pick{display:flex;flex-direction:column;gap:4px;align-items:flex-start;text-align:left}
@media(max-width:480px){.grid2{grid-template-columns:1fr}.ship-stage{width:96px;height:96px}}

/* ===================================================================
   TYPOGRAPHY UPGRADE — legibility pass (Web Interface Guidelines)
   Reading/UI text -> crisp legible sans + larger; retro identity kept
   via pixel sprites, parchment/ocean panels, palette, CRT, logo.
   Theme-safe: changes only font family/size/weight, never colors.
   =================================================================== */
:root{--read:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,sans-serif;}
body{font-family:var(--read);font-size:18px;line-height:1.6;image-rendering:auto;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}
img,canvas{image-rendering:pixelated;}
.press{font-family:var(--read);font-weight:700;letter-spacing:.2px;line-height:1.5;}
h1,h2,h3{font-family:var(--read);font-weight:800;}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:2px;}
/* buttons — bigger, crisp, >=44px tap target */
.btn{font-family:var(--read);font-weight:800;font-size:15px;letter-spacing:.2px;min-height:44px;padding:12px 14px;}
.btn.lg{font-size:17px;padding:15px;}
.btn.sm{font-size:13px;min-height:36px;padding:9px 11px;}
.btn .ic{font-size:16px;}
.hudnav .btn{font-size:15px;min-height:38px;padding:7px 11px;}
/* HUD */
.hud-row{font-size:11px;}
.hud-lab{font-family:var(--read);font-weight:700;font-size:11px;width:auto;}
.hud-num{font-family:var(--read);font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums;}
#hud .rank{font-family:var(--read);font-weight:800;font-size:13px;}
#hud .funds{font-family:var(--read);font-weight:800;font-size:13px;font-variant-numeric:tabular-nums;}
/* headers / small labels */
.sec-t{font-family:var(--read);font-weight:800;font-size:16px;}
.sec-t::before{font-size:14px;}
.tag{font-family:var(--read);font-weight:700;font-size:12px;padding:3px 7px;}
.lc-h{font-family:var(--read);font-weight:800;font-size:14.5px;}
.pct{font-family:var(--read);font-weight:700;font-size:12px;}
.f-name{font-family:var(--read);font-weight:700;font-size:12px;max-width:130px;}
.sea-node .nm{font-family:var(--read);font-weight:800;font-size:16px;}
.sea-node .en{font-size:14px;}
.stat .n{font-family:var(--read);font-weight:800;font-size:20px;font-variant-numeric:tabular-nums;}
.stat .l{font-size:13.5px;}
.gen-pill{font-family:var(--read);font-weight:800;font-size:11px;}
.ticker{font-size:14.5px;}
.field label{font-family:var(--read);font-weight:700;font-size:12px;}
/* reading content — the stuff you actually read */
.tiny{font-size:15px;}
.qtext{font-size:18.5px;line-height:1.62;}
.qtext code{font-family:ui-monospace,'D2Coding',Consolas,monospace;font-size:15px;}
.qtext table{font-size:15px;}
.qtext th{font-family:var(--read);font-weight:800;font-size:13px;}
.qtext pre{font-family:ui-monospace,'D2Coding',Consolas,monospace;font-size:13px;line-height:1.6;}
.qtext .md-h{font-family:var(--read);font-weight:800;font-size:15px;}
.choice{font-family:var(--read);font-size:18px;line-height:1.5;padding:13px;}
.choice .key{font-family:var(--read);font-weight:800;font-size:15px;width:18px;}
.expl{font-size:16px;line-height:1.7;}
.kp{font-size:22px;line-height:1.5;font-weight:700;}
.sub-lab{font-family:var(--read);font-weight:700;font-size:12px;}
.mono{font-family:ui-monospace,'D2Coding',Consolas,monospace;font-size:14.5px;}
.kv{font-size:15.5px;line-height:1.5;}
.verdict{font-family:var(--read);font-weight:800;font-size:15px;}
.codearea{font-family:ui-monospace,'D2Coding',Consolas,monospace;font-size:11px;}
/* title — clean bold CJK hero, pixel latin tagline */
.logo .big{font-family:var(--read);font-weight:900;letter-spacing:1px;}
/* a touch more breathing room */
.panel{padding:14px;}
@media(max-width:480px){
  body{font-size:17px;}
  .qtext{font-size:17.5px;}
  .choice{font-size:17px;}
  .btn.lg{font-size:16px;}
  .expl{font-size:15.5px;}
}

/* ===================================================================
   PAINTERLY OVERHAUL — UWO-style ornate nautical look (Voyage)
   Gilded frames, brass buttons, atmospheric ocean, porthole sprites.
   =================================================================== */
/* atmospheric ocean backdrop */
#app{background:radial-gradient(130% 95% at 50% -15%, #3f86a6 0%, #1f6486 26%, #0e3d52 58%, #07212e 100%);}
#app::before{opacity:1;background:
  radial-gradient(55% 26% at 72% 6%, rgba(255,240,200,.22), transparent 70%),
  radial-gradient(90% 60% at 50% 120%, rgba(8,20,30,.55), transparent 70%),
  repeating-linear-gradient(0deg, transparent 0 21px, rgba(191,230,240,.05) 21px 22px),
  repeating-linear-gradient(118deg, transparent 0 46px, rgba(255,255,255,.02) 46px 92px);}
#app::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(90deg, transparent 0 34px, rgba(255,255,255,.028) 34px 35px),
            repeating-linear-gradient(90deg, transparent 0 90px, rgba(10,30,40,.05) 90px 91px);
  animation:oceanDrift 16s linear infinite;}
@keyframes oceanDrift{to{background-position:160px 0, -120px 0;}}
#vig{background:radial-gradient(120% 120% at 50% 32%, transparent 50%, rgba(4,16,24,.62) 100%);}

/* paper grain (subtle) */
:root{--grain:none;}

/* gilded parchment frames */
.panel{border:3px solid transparent;border-radius:7px;
  background:
    var(--grain) padding-box,
    linear-gradient(180deg,#f6ead0,#e7d4a6) padding-box,
    linear-gradient(150deg,#ffeaa0 0%,#caa24a 42%,#7e5a1c 72%,#e9c971 100%) border-box;
  background-blend-mode:overlay,normal,normal;
  box-shadow:inset 0 0 0 1px rgba(122,90,30,.55), inset 0 2px 9px rgba(120,90,40,.16), 0 7px 20px rgba(0,0,0,.5);}
.panel.dark{border:3px solid transparent;
  background:
    var(--grain) padding-box,
    linear-gradient(180deg,#16475d,#0e3346) padding-box,
    linear-gradient(150deg,#ffeaa0 0%,#a87a23 45%,#5a3f12 75%,#e9c971 100%) border-box;
  background-blend-mode:soft-light,normal,normal;
  box-shadow:inset 0 0 0 1px rgba(122,90,30,.5), inset 0 2px 10px rgba(0,0,0,.4), 0 7px 20px rgba(0,0,0,.5);}
.list-card,.commission{border:3px solid transparent;border-radius:6px;
  background:linear-gradient(180deg,#f5e8cd,#e7d4a6) padding-box,
            linear-gradient(150deg,#ffe49a,#b88a30 60%,#e9c971) border-box;
  box-shadow:inset 0 1px 0 rgba(255,248,220,.6), 0 5px 14px rgba(0,0,0,.4);}

/* brass embossed buttons */
.btn{border:2px solid #4a3010;border-radius:7px;
  background:linear-gradient(180deg,#f1d690,#cb9f44 52%,#b88a30);
  box-shadow:inset 0 1px 0 #fff3c4, inset 0 -2px 0 rgba(90,60,16,.6), 0 3px 0 #4a3010, 0 5px 9px rgba(0,0,0,.4);
  text-shadow:0 1px 0 rgba(255,246,214,.55);}
.btn:hover{filter:brightness(1.06) saturate(1.05);}
.btn:active{transform:translateY(3px);box-shadow:inset 0 1px 0 #fff3c4, inset 0 -2px 0 rgba(90,60,16,.6), 0 1px 0 #4a3010, 0 2px 5px rgba(0,0,0,.35);}
.btn.gold{background:linear-gradient(180deg,#ffe187,#e0a838 52%,#caa024);color:#3a2406;}
.btn.wood{background:linear-gradient(180deg,#8a6038,#4f3219 60%,#3a2412);color:#f6e6c4;border-color:#241405;
  box-shadow:inset 0 1px 0 rgba(255,220,170,.35), inset 0 -2px 0 rgba(20,10,4,.6), 0 3px 0 #241405, 0 5px 9px rgba(0,0,0,.4);text-shadow:0 1px 0 rgba(0,0,0,.4);}
.btn.red{background:linear-gradient(180deg,#e87a6e,#b5352c 55%,#8e2c22);color:#fff;border-color:#3a0f0b;
  box-shadow:inset 0 1px 0 rgba(255,210,200,.5), inset 0 -2px 0 rgba(70,15,10,.6), 0 3px 0 #3a0f0b, 0 5px 9px rgba(0,0,0,.4);text-shadow:0 1px 0 rgba(0,0,0,.3);}
.btn.green{background:linear-gradient(180deg,#86d488,#3a8245 55%,#2f6a35);color:#06210d;border-color:#143a1b;
  box-shadow:inset 0 1px 0 rgba(220,255,210,.55), inset 0 -2px 0 rgba(15,50,25,.6), 0 3px 0 #143a1b, 0 5px 9px rgba(0,0,0,.4);}

/* carved-wood HUD with brass trim */
#hud{background:linear-gradient(180deg,#7a5230,#4a2c12);
  border-bottom:3px solid #2a1808;
  box-shadow:inset 0 1px 0 rgba(255,220,170,.25), inset 0 -4px 0 #caa24a, inset 0 -6px 0 #2a1808, 0 3px 8px rgba(0,0,0,.4);}
#hud .av{border-radius:50%;border:3px solid #caa24a;background:radial-gradient(circle at 40% 35%, #2a87a8, #0a2230);
  box-shadow:inset 0 0 6px rgba(0,0,0,.6), 0 0 0 1px #4a3010, 0 1px 3px rgba(0,0,0,.5);overflow:hidden;image-rendering:auto;}

/* sea-node ports = framed vignettes */
.sea-node .port{border:3px solid #b88a30;border-radius:8px;
  background:radial-gradient(circle at 50% 25%, #2f8fb0, #0a2230);
  box-shadow:inset 0 0 10px rgba(0,0,0,.55), 0 3px 8px rgba(0,0,0,.45);image-rendering:auto;}
.compass{filter:drop-shadow(0 2px 3px rgba(0,0,0,.45));}

/* painterly battle ocean */
.arena{border:3px solid #08222e;border-radius:8px;
  background:
    radial-gradient(80% 46% at 50% -4%, rgba(255,240,200,.16), transparent 62%),
    linear-gradient(180deg,#2f88aa 0%,#1a5e7e 42%,#0d3a4f 78%,#072430 100%);
  box-shadow:inset 0 0 22px rgba(4,16,24,.5), 0 6px 16px rgba(0,0,0,.45);}
.arena .waves{height:50px;background:repeating-linear-gradient(90deg,#2a87a8 0 11px,#175a76 11px 22px);opacity:.85;}

/* sprite depth */
#app div > svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.42));}
.ship-stage{filter:drop-shadow(0 6px 8px rgba(0,0,0,.5));}

/* ornate title */
.logo .big{text-shadow:0 0 18px rgba(255,210,120,.35), 3px 3px 0 #6a3a12, 5px 5px 0 rgba(0,0,0,.5);}
.scr-title{background:radial-gradient(80% 40% at 50% 18%, rgba(255,225,150,.12), transparent 70%);}

/* prettier compass divider */
.divline{height:16px;background:
  radial-gradient(circle at 50% 50%, #e7b94d 0 3px, #8a6320 3px 4px, transparent 5px),
  repeating-linear-gradient(90deg, #b88a30 0 5px, transparent 5px 11px);
  background-repeat:no-repeat,repeat;background-position:center,0;background-size:auto,100%;}

/* ticker as a brass plate */
.ticker{background:linear-gradient(180deg,#16475d,#0e3346);border:2px solid #b88a30;
  box-shadow:inset 0 1px 0 rgba(255,220,170,.2), 0 3px 8px rgba(0,0,0,.4);}

/* ===================================================================
   LAVISH v2 — gilded outer frame, god rays, sparkles, rosette corners
   =================================================================== */
#app{box-shadow:
  inset 0 0 0 2px rgba(255,242,200,.16),
  0 0 0 3px #241608, 0 0 0 6px #caa24a, 0 0 0 8px #7a5a10, 0 0 0 11px #241608,
  0 16px 0 #02090d, 0 22px 55px rgba(0,0,0,.7);}
#rays{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.6;
  background:repeating-linear-gradient(102deg, transparent 0 26px, rgba(255,240,205,.06) 26px 28px, transparent 28px 64px);
  -webkit-mask:linear-gradient(180deg, rgba(0,0,0,.95), transparent 58%);mask:linear-gradient(180deg, rgba(0,0,0,.95), transparent 58%);
  animation:rayDrift 20s linear infinite;}
@keyframes rayDrift{to{background-position:120px 0;}}
#sparkle{position:absolute;inset:0;z-index:58;pointer-events:none;}
#sparkle::before,#sparkle::after{content:"";position:absolute;inset:0;
  background-repeat:no-repeat;}
#sparkle::before{
  background-image:
   radial-gradient(circle, rgba(255,244,200,.9) 0 1px, transparent 1.6px),
   radial-gradient(circle, rgba(255,244,200,.9) 0 1px, transparent 1.6px),
   radial-gradient(circle, rgba(255,244,200,.9) 0 1px, transparent 1.6px),
   radial-gradient(circle, rgba(255,244,200,.9) 0 1px, transparent 1.6px);
  background-position:18% 22%, 74% 16%, 40% 12%, 88% 40%;
  background-size:3px 3px;animation:twinkleA 3.2s ease-in-out infinite;}
#sparkle::after{
  background-image:
   radial-gradient(circle, rgba(255,236,170,.9) 0 1px, transparent 1.6px),
   radial-gradient(circle, rgba(255,236,170,.9) 0 1px, transparent 1.6px),
   radial-gradient(circle, rgba(255,236,170,.9) 0 1px, transparent 1.6px);
  background-position:28% 32%, 60% 24%, 82% 28%;
  background-size:3px 3px;animation:twinkleB 4.1s ease-in-out infinite;}
@keyframes twinkleA{0%,100%{opacity:.15}50%{opacity:.85}}
@keyframes twinkleB{0%,100%{opacity:.7}50%{opacity:.1}}

/* ===================================================================
   POLISH — finish & depth (reflections, transitions, gold-foil, life)

/* water reflection of the hero galleon on the title sea */
.ship-stage{-webkit-box-reflect:below 1px linear-gradient(rgba(0,0,0,.30), transparent 72%);}

/* gentle screen fade-in */
.scr{animation:scrFade .16s ease-out;}
@keyframes scrFade{from{opacity:0}to{opacity:1}}

/* battle ocean depth — fighters sit IN the sea with foam at the waterline */
.arena::after{content:"";position:absolute;left:0;right:0;bottom:0;height:38px;z-index:3;pointer-events:none;
  background:
    repeating-linear-gradient(90deg, transparent 0 9px, rgba(207,238,250,.55) 9px 15px, transparent 15px 25px) top/100% 5px no-repeat,
    linear-gradient(transparent, rgba(40,135,168,.5) 58%);}

/* gold-foil title with a slow shine sweep */
.logo .big{
  background:linear-gradient(100deg,#a87a23 0%,#ffe39a 26%,#fff7d4 42%,#ffe39a 58%,#caa24a 80%,#a87a23 100%);
  background-size:230% 100%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(2px 3px 0 #6a3a12) drop-shadow(0 0 16px rgba(255,212,120,.45));
  animation:goldFoil 5.5s ease-in-out infinite;}
@keyframes goldFoil{0%,100%{background-position:118% 0}50%{background-position:-18% 0}}

/* interactive life — hover lift */
.btn{transition:transform .08s, filter .12s;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(3px);}
.list-card,.sea-node,.commission{transition:transform .13s ease, filter .13s ease;}
.list-card:hover,.sea-node:hover,.commission:hover{transform:translateY(-2px);filter:brightness(1.03);}

/* deeper, softer sprite shadows for volume */
#app div > svg{filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));}
.ship-stage{filter:drop-shadow(0 8px 11px rgba(0,0,0,.55));}

.en-orig{margin-top:8px;padding-top:6px;border-top:1px dashed rgba(120,90,40,.4);font-size:.84em;color:var(--ink-dim,#6b5a44);opacity:.9}
.en-orig p{margin:.3em 0}
.en-orig table{opacity:.95}
/* respect reduced-motion: neutralize decorative animation loops */
@media (prefers-reduced-motion: reduce){
*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;animation-delay:0ms!important;transition-duration:.001ms!important}
#rays,#sparkle{display:none!important}
#app::before,#app::after,.arena::after{animation:none!important}
}
