  const grid=el('div','grid2');grid.style.marginTop='12px';
  grid.innerHTML=`<div class="stat"><div class="n">${S.stats.logged}</div><div class="l">발견물 등재</div></div>
   <div class="stat"><div class="n">${acc}%</div><div class="l">정답률</div></div>
   <div class="stat"><div class="n">${langN}/${DATA.mnemonics.length}</div><div class="l">항해 언어</div></div>
   <div class="stat"><div class="n">⚜${S.funds}</div><div class="l">자금</div></div>`;
  root.append(grid);
  root.append(el('div','sec-t','해역별 발견율'));
  const ar=el('div','col');
  DATA.areas.forEach(a=>{const m=Math.round(seaDiscovery(a.id)*100);ar.append(el('div','panel',`<div class="row" style="align-items:center;gap:8px"><span class="tag" style="color:${a.color}">${seaName(a.id)}</span><div class="mini-bar grow"><i style="width:${m}%;background:${a.color}"></i></div><span class="pct">${m}%</span></div>`));});
  root.append(ar);
  root.append(el('div','sec-t','훈장 / 칭호'));
  const bw=el('div','badgewall');BADGES.forEach(b=>{const on=!!S.badges[b.id];const m=el('div','medal '+(on?'on':'off'),b.ic);m.title=b.name;bw.append(m);});root.append(bw);
  if(S.hall.length){root.append(el('div','sec-t','명예의 전당 (역대 항해)'));
    S.hall.slice().reverse().forEach(h=>{const t=TRAITS[h.trait];root.append(el('div','hall-row',`<div class="g">${h.gen}대</div><div class="grow"><div class="tiny"><b>${esc(h.captain)}</b> · 명성 ${h.fame} · 발견 ${h.logged}</div><div class="tiny muted">${t?t.ic+' '+t.n+' 계승':''}</div></div>`));});}
}

/* ---------- PORT shop ---------- */
function portScreen(root){
  const back=el('button','btn sm wood','◀ 해도');back.onclick=()=>{sfx('select');go('chart');};root.append(back);
  root.append(el('div','sec-t','항구 상점'));
  root.append(el('div','panel',`<div class="row" style="align-items:center"><div class="grow tiny muted">소지 자금</div><div class="press" style="font-size:14px;color:var(--gold-d)">⚜ ${S.funds}</div></div>`));
  const items=[{k:'repair',ic:'🔧',name:'수리 도구',desc:'내구도 50% 회복',cost:40},{k:'interpreter',ic:'🦜',name:'통역사 고용',desc:'시련 오답 2개 제거',cost:30}];
  const c=el('div','col');c.style.marginTop='12px';
  items.forEach(it=>{const card=el('div','panel');
    card.innerHTML=`<div class="row" style="align-items:center;gap:10px"><div style="font-size:26px">${it.ic}</div><div class="grow"><div class="press" style="font-size:10px">${it.name} <span class="muted">x${S.inv[it.k]||0}</span></div><div class="tiny muted">${it.desc}</div></div></div>`;
    const buy=el('button','btn gold sm',`⚜${it.cost}`);buy.style.marginTop='8px';
    buy.onclick=()=>{if(S.funds<it.cost){toast('자금이 부족해요');return;}S.funds-=it.cost;S.inv[it.k]=(S.inv[it.k]||0)+1;sfx('coin');save();go('port');};
    card.append(buy);c.append(card);});
  const up=el('div','panel');const ucost=60+(S.hullUp||0)*40;
  up.innerHTML=`<div class="row" style="align-items:center;gap:10px"><div style="font-size:26px">🛠️</div><div class="grow"><div class="press" style="font-size:10px">선체 보강 <span class="muted">(${S.hullUp||0}회)</span></div><div class="tiny muted">최대 내구도 영구 +8 · 즉시 완전 수리</div></div></div>`;
  const upb=el('button','btn gold sm',`⚜${ucost}`);upb.style.marginTop='8px';
  upb.onclick=()=>{if(S.funds<ucost){toast('자금이 부족해요');return;}S.funds-=ucost;S.hullUp=(S.hullUp||0)+1;S.maxHull=computeMaxHull();S.hull=S.maxHull;sfx('rankup');save();go('port');};
  up.append(upb);c.append(up);
  root.append(c);
  const use=el('div','panel');use.style.marginTop='12px';use.innerHTML='<div class="lc-h">선박 수리</div>';
  const ub=el('button','btn green lg',`🔧 수리 도구 사용 (보유 ${S.inv.repair||0})`);
  ub.onclick=()=>{if((S.inv.repair||0)<=0){toast('수리 도구가 없어요');return;}if(S.hull>=S.maxHull){toast('이미 내구도 가득');return;}S.inv.repair--;S.hull=Math.min(S.maxHull,S.hull+Math.round(S.maxHull*.5));sfx('ok');renderHud();save();go('port');};
  use.append(ub);root.append(use);
}

  const ef=el('div','field','<label>시험일 (D-day)</label>');const ei=el('input');ei.type='date';ei.value=S.examDate||'';ei.onchange=()=>{S.examDate=ei.value;save();};ef.append(ei);c.append(ef);

  const br=el('div','row');const eb=el('button','btn gold grow','📤 내보내기');eb.onclick=()=>{sfx('select');exportModal();};const ib=el('button','btn grow','📥 불러오기');ib.onclick=()=>{sfx('select');importModal();};br.append(eb,ib);bk.append(br);root.append(bk);

  const rb=el('button','btn red lg','⚠ 항해 기록 초기화');
  rb.onclick=()=>{const m=el('div','panel center');m.innerHTML='<div class="sec-t" style="justify-content:center">정말 초기화?</div><div class="tiny muted" style="margin-bottom:12px">모든 명성·발견물·칭호가 사라집니다.</div>';const r=el('div','row');const y=el('button','btn red grow','초기화');y.onclick=()=>{hardReset();closeModal();go('title');};const n=el('button','btn grow','취소');n.onclick=closeModal;r.append(n,y);m.append(r);showModal(m);};
  d.append(rb);root.append(d);
  root.append(el('div','tiny muted',`<div style="margin-top:14px;text-align:center">BAR 大航海 · Business Analysis and Reporting · 검증 자료 기반<br>오프라인 단일 파일 · ${DATA.mcqs.length} 시련 · ${DATA.topics.length} 발견물 · ${DATA.mnemonics.length} 언어</div>`));
}
function toggle(label,val,fn){const s=el('div','switch');s.innerHTML=`<span class="tiny">${label}</span>`;const b=el('button','btn sm '+(val?'green':'wood'),val?'ON':'OFF');b.onclick=()=>{val=!val;b.textContent=val?'ON':'OFF';b.className='btn sm '+(val?'green':'wood');fn(val);};s.append(b);return s;}

function rankModal(idx,times){const b=el('div','panel center');
  b.innerHTML=`<div style="font-size:34px">⚓</div><div class="press" style="font-size:14px;color:var(--gold-d);margin:6px 0">명성 상승!</div>
   <div class="tiny"><b>${RANKS[idx].t}</b> 승급${times>1?' ('+times+'단계)':''}<br>최대 내구도 +${6*times} · 항해술 +${2*times} · 완전 수리</div>`;
  const ok=el('button','btn gold lg','계속');ok.style.marginTop='12px';ok.onclick=closeModal;b.append(ok);return b;}

function showModal(node){const m=$('#modal-box');m.innerHTML='';m.append(node);$('#modal').classList.add('on');localize(m);return m;}
function closeModal(){$('#modal').classList.remove('on');}
let toastT=null;function toast(msg){const t=$('#toast');t.textContent=msg;localize(t);t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2000);}

const ROUTES={title:titleScreen,chart:chartScreen,harbor:harborScreen,voyage:voyageScreen,patron:patronScreen,trade:tradeScreen,codex:codexScreen,captain:captainScreen,port:portScreen,settings:settingsScreen};

load();try{document.documentElement.lang=S.lang||'ko';}catch(e){}document.body.classList.toggle('noflicker',!S.crt);renderHud();go('title');try{if(/action=review/.test(location.search)&&typeof startReview==='function')startReview();}catch(e){}
try{history.pushState({scr:'title'},'');}catch(e){}
window.addEventListener('popstate',()=>{ try{history.pushState({scr:CUR},'');}catch(e){}
  if($('#modal').classList.contains('on')){closeModal();return;}
  if($('#sail')&&$('#sail').classList.contains('on'))return;
  goBack(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if($('#modal').classList.contains('on'))closeModal(); else if(CUR!=='title')goBack(); } });
</script>
