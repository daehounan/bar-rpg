const DATA = {"meta":{"title":"BAR QUEST","source":"Becker / AICPA verified materials"},"areas":[{"id":"BAR1","name":"Enterprise Risk Management & Financial Risk","ko":"위험관리의 숲","weight":"15-20%","blurb":"COSO ERM, PATRS, DUNS, 환위험이 도사리는 안갯속 숲.","color":"#5fbf6f"},{"id":"BAR2","name":"Capital Structure & Working Capital","ko":"자본의 협곡","weight":"20-25%","blurb":"WACC, CAPM, NPV/IRR, DDM가 흐르는 황금 협곡.","color":"#e0b341"},{"id":"BAR3","name":"Cost Accounting & Performance Management","ko":"원가의 대장간","weight":"25-30%","blurb":"차이분석, CVP, 전부/변동원가가 단련되는 화염 대장간.","color":"#e0623a"},{"id":"BAR4","name":"Advanced Financial Reporting","ko":"연결의 첨탑","weight":"20-25%","blurb":"연결, 외화환산, 리스가 얽힌 높은 마법 첨탑.","color":"#5a8fe0"},{"id":"BAR5","name":"Governmental Accounting","ko":"정부의 성채","weight":"10-15%","blurb":"GRaSPP, 수정발생주의, CANS가 지키는 돌의 성채.","color":"#9b6fd0"}],"mcqs":[{"id":"MCQ-07544","title":"Goodwill Amortization","area":"BAR4","question":"Which of the following statements is correct about goodwill amortization for financial statement purposes?","choices":{"A":"It is amortized over 15 years.","B":"It is not amortized but subject to an impairment test.","C":"It is amortized over its useful life not to exceed 40 years.","D":"It is not amortized and not subject to an impairment test."},"answer":"B","explanation":"- Choice \"B\" is correct. Goodwill is not amortized, but is subject to an impairment test.\n- Choice \"A\" is incorrect. Goodwill is not amortized under U.S. GAAP. The 15-year amortization is the income tax rule.\n- Choice \"C\" is incorrect. The amortization of goodwill over its useful life not to exceed 40 years is an outdated U.S. GAAP rule, not the current rule.\n- Choice \"D\" is incorrect. Goodwill is not amortized, but is subject to an impairment test."},{"id":"MCQ-00588","title":"R&D Expense Classification","area":"BAR4","question":"Brill Co. made the following expenditures during the current year:\n\n- Costs to develop computer software for use in Brill's general management information system: $100,000\n- Costs of market research activities: $75,000\n\nWhat amount of these expenditures should Brill report in its current year income statement as research and development expenses under U.S. GAAP?","choices":{"A":"$0","B":"$175,000","C":"$75,000","D":"$100,000"},"answer":"A","explanation":"- Choice \"A\" is correct. Under U.S. GAAP, Research and development includes costs incurred prior to technological feasibility for developed software that is to be sold, leased, or marketed. This software is for internal use, unrelated to production and is not considered research and development. Market research is also not research and development because it is not aimed at discovery of new knowledge to develop a new product or service.\n- Choices \"B\", \"C\", and \"D\" are incorrect per above reasoning."},{"id":"MCQ-00410","title":"Operating Lease Revenue Recognition","area":"BAR4","question":"Wall Co. leased office premises to Fox Inc. for a five-year term beginning January 2, Year 1. Under the terms of the operating lease, rent for the first year is $8,000 and rent for Years 2 through 5 is $12,500 per annum. However, as an inducement to enter the lease, Wall granted Fox the first six months of the lease rent-free. In its December 31, Year 1, income statement, what amount should Wall report as rental income?","choices":{"A":"$11,600","B":"$8,000","C":"$10,800","D":"$12,000"},"answer":"C","explanation":"Rental income is recorded when it is earned (accrual basis), not when the cash is received. Therefore the total rental income should be recognized ratably over the five years.\n\n| Item | Amount |\n|------|--------|\n| Rent in Year 1 (1/2 of $8,000) | $4,000 |\n| Rent in Years 2−5 ($12,500 × 4) | $50,000 |\n| **Total rent** | **$54,000** |\n| Year 1 rent (1/5 × $54,000) | **$10,800** |"},{"id":"MCQ-07443","title":"Consolidation vs. Equity Method","area":"BAR4","question":"On January 1, Year 1, Johnson Products, Inc. (Johnson) purchased a 40 percent equity interest in Fairmont Enterprise Inc. (Fairmont). On March 31, Year 2, Johnson acquired another 15 percent equity interest in Fairmont. Assuming that by December 31, Year 2, Johnson had hired a new CEO for Fairmont and appointed nine of the twelve current board members, which method would Johnson use to report Fairmont's Year 2 financial results?","choices":{"A":"Fair value method","B":"Cost method","C":"Equity method","D":"Consolidation"},"answer":"D","explanation":"- Choice \"D\" is correct. Johnson should consolidate Fairmont in Year 2 because it has 55 percent ownership and clear control over Fairmont.\n- Choice \"A\" is incorrect. While assets' and liabilities' fair market values can be a consideration when an acquisition is consummated, this is not a primary method used to account for business combinations.\n- Choice \"B\" is incorrect. The cost method is used when an investor has no significant influence over the subsidiary and there is no market for the subsidiary's shares.\n- Choice \"C\" is incorrect. Johnson would use the equity method to account for Fairmont's financial results in Year 1 (only), as it had acquired a 40 percent interest and significant influence."},{"id":"MCQ-10056","title":"Non-Controlling Interest Calculation","area":"BAR4","question":"Potter Corp. acquired 80% of Squire Corp. for $600,000. On January 1, the fair values of Squire's assets and liabilities equaled their carrying values of $850,000 and $205,000 respectively. During the current year, Squire reported net income of $75,000 and paid dividends of $20,000. In the December 31 consolidated financial statements, non-controlling interest under U.S. GAAP should be:","choices":{"A":"$150,000","B":"$161,000","C":"$169,000","D":"$140,000"},"answer":"B","explanation":"The fair value of Squire on the acquisition date:\n- Fair Value of Squire × 80% = Purchase Price\n- $750,000 × 80% = $600,000\n\nNon-controlling interest on the acquisition date:\n- NCI = FV of Squire × NCI Percentage = $750,000 × 20% = $150,000\n\nDecember 31 non-controlling interest:\n| Item | Amount |\n|------|--------|\n| Beginning Non-controlling Interest | $150,000 |\n| + 20% × Squire's Net Income | $15,000 (= 20% × $75,000) |\n| − 20% × Squire's Dividend | ($4,000) (= 20% × $20,000) |\n| **Ending Non-controlling Interest** | **$161,000** |"},{"id":"MCQ-05055","title":"Reportable Segments","area":"BAR4","question":"The Ajax Corporation reported the following operating results from its components:\n\n| Component | Net | Eliminations | Consolidated |\n|-----------|-----|--------------|--------------|\n| Astor | $215,000 | ($120,000) | $95,000 |\n| Bejax | $30,000 | $0 | $30,000 |\n| Carter | ($180,000) | $50,000 | ($130,000) |\n| Davis | $80,000 | ($50,000) | $30,000 |\n| Elbow | ($20,000) | $20,000 | $0 |\n| **Total** | **$125,000** | **($100,000)** | **$25,000** |\n\nBased purely on operating results, which of the components would be deemed reportable segments?","choices":{"A":"Astor, Carter, and Davis.","B":"Astor, Bejax, and Davis.","C":"Astor, Bejax, Carter, Davis, and Elbow.","D":"Astor, Bejax, Carter, and Davis."},"answer":"A","explanation":"**RULE:** A segment meets the size test if the absolute amount of its reported profit or loss is 10% or more of the greater, in absolute amount, of: (1) The combined reported profit of all operating segments that did not report a loss, or (2) The combined reported loss of all operating segments that did report a loss.\n\nAjax determines its segments based on unconsolidated financial results. The absolute amount of income ($325,000) is greater than the absolute amount of loss ($200,000). Ajax uses 10% of total income from segments earning income, or $32,500, as the basis for determining reportable segments.\n\n- Astor: $215,000 > $32,500 ✓\n- Bejax: $30,000 < $32,500 ✗\n- Carter: $180,000 > $32,500 ✓\n- Davis: $80,000 > $32,500 ✓\n- Elbow: $20,000 < $32,500 ✗"},{"id":"MCQ-07392","title":"Construction Contract Loss Recognition","area":"BAR4","question":"Benson Construction is in the second year of a three-year project to build a new office complex. In year 1, Benson reported gross profit on the project of $1.2 million. For year 2, the project accountant calculated that the revenues were $10 million and costs were $10.5 million for the year. How should Benson's accountant record the year 2 activity?","choices":{"A":"Record a loss of $500,000 in year 2.","B":"Record a change in accounting principle in year 2.","C":"Record a loss of $700,000 in year 2.","D":"Record a deferred loss of $500,000 in year 2."},"answer":"A","explanation":"- Choice \"A\" is correct. Benson's total gross profit for the two years combined is $1.2 million + ($500,000) = $700,000. By recording a loss of $500,000 in year 2, the project-to-date gross profit will be $700,000 ($1.2 million profit in year 1 minus the $500,000 loss recorded in year 2).\n- Choice \"B\" is incorrect. A loss in a given year does not require a change to a different method of recording the project.\n- Choice \"C\" is incorrect. The total gross profit for the two years combined is $700,000. This is not a loss.\n- Choice \"D\" is incorrect. Losses are not deferred."},{"id":"MCQ-08611","title":"Software Amortization and Impairment","area":"BAR4","question":"On January 1, Year 1, a company capitalized $100,000 of costs for software that is to be sold. The company amortizes the software costs on a straight-line basis over five years. The carrying value of the software costs on January 1, Year 3, was $60,000. As of December 31, Year 3, the estimated future gross revenue to be generated from the sale of the software is $23,000, and the estimated future cost of disposing of the software is $8,000. What amount should the company expense related to the software costs for the year ended December 31, Year 3?","choices":{"A":"$37,000","B":"$45,000","C":"$20,000","D":"$18,400"},"answer":"B","explanation":"There are two components to expense related to this software in Year 3:\n\n1. **Amortization expense:** $20,000 (based on the original $100,000 in cost amortized straight-line over five years)\n2. **Impairment loss:** $25,000 (based on a carrying value of $40,000 at the end of Year 3 versus a fair value of $15,000. The fair value is the estimated future gross revenue of $23,000 less the disposal cost of $8,000)\n\nThe $20,000 in amortization expense plus the $25,000 in impairment losses total **$45,000** in expense."},{"id":"MCQ-15705","title":"Cash Flow Hedge Accounting","area":"BAR4","question":"Variety Chips Company's primary business markets are in the United States and Mexico. In order to manage the currency fluctuations between the two countries, the company enters into a foreign currency cash flow hedge transaction at the beginning of Year 1 that will unwind in Year 2. Assuming that the hedge results in a $33,000 gain during the first year, how will the company report the hedge activity on its financial statements at the end of Year 1?","choices":{"A":"No impact to the financial statements until Year 2.","B":"$33,000 gain reported in other comprehensive income on the balance sheet.","C":"$33,000 gain reported on the income statement.","D":"The company will record the $33,000 deferred gain as a liability."},"answer":"B","explanation":"- Choice \"B\" is correct. In a foreign currency cash flow hedge, gains ($33,000) of the foreign currency cash flow hedge are reported on the balance sheet as a component of other comprehensive income.\n- Choices \"A\", \"C\", and \"D\" are incorrect. Gains and losses related to cash flow hedges are reported as a component of other comprehensive income until the hedged item affects earnings."},{"id":"MCQ-15710","title":"Fair Value Hedge Accounting","area":"BAR4","question":"ABC Company enters into a foreign currency fair value hedge to hedge its exposure to pesos from several transactions completed in Mexico. During the year, the company had a $17,000 loss from the foreign currency fair value hedge along with a $12,000 gain on the underlying hedged currency. How would the above derivative transaction activity be recorded?","choices":{"A":"$5,000 net loss in current earnings.","B":"$17,000 loss in current earnings and $12,000 gain in current earnings.","C":"$5,000 net loss in other comprehensive income.","D":"$12,000 gain in current earnings and $17,000 loss in other comprehensive income."},"answer":"A","explanation":"- Choice \"A\" is correct. The $17,000 loss from the foreign currency fair value hedge is offset by the $12,000 gain on the hedged currency, with the $5,000 net loss from the transaction recognized in ABC Company's current earnings.\n- Under a foreign currency fair value hedge, both the loss on the derivative instrument and the offsetting gain are recognized as part of the company's current earnings."},{"id":"MCQ-10179","title":"Variable Overhead Efficiency Variance","area":"BAR3","question":"Water Control, Inc. manufactures water pumps and uses a standard cost system. The standard factory overhead costs per water pump are:\n\n- Variable overhead (4 hours at $8/hour): $32\n- Fixed overhead (4 hours at $5/hour): $20\n- Total overhead cost per unit: $52\n\nAdditional information for November:\n- 22,000 pumps were produced although 25,000 had been scheduled\n- 94,000 direct labor hours were worked\n- Standard direct labor time per unit is four hours\n\nThe variable overhead efficiency variance for November was:","choices":{"A":"$48,000 unfavorable.","B":"$60,000 favorable.","C":"$96,000 favorable.","D":"$32,000 favorable."},"answer":"A","explanation":"| Calculation | Amount |\n|-------------|--------|\n| Flexible budget based on actual DL hours: 94,000 × $8/hr | $752,000 |\n| Flexible budget based on standard DL hours: 22,000 units × 4 hrs/unit × $8/hr | $704,000 |\n| **Unfavorable variance** | **$48,000** |\n\nThe variance is unfavorable because more hours were used than expected."},{"id":"MCQ-10124","title":"Target Profit Analysis","area":"BAR3","question":"Delphi Company has developed a new product with:\n- Maximum production capacity: 25,000 units annually\n- Fixed costs: $450,000 for the year (includes $60,000 depreciation)\n- Variable costs per unit: $16\n- Tax rate: 40%\n- Required after-tax profit: $75,000\n\nThe unit selling price to achieve this target profit must be at least:","choices":{"A":"$34.60","B":"$36.60","C":"$41.40","D":"$39.00"},"answer":"D","explanation":"| Step | Calculation |\n|------|-------------|\n| After-tax profit | $75,000 |\n| Reciprocal of tax rate (100% − 40%) | ÷ 60% |\n| Pre-tax profit | $125,000 |\n| Fixed cost | $450,000 |\n| Required total contribution margin | $575,000 |\n| Maximum volume | ÷ 25,000 |\n| Required contribution margin per unit | $23 |\n| Variable cost per unit | $16 |\n| **Required selling price** | **$39** |"},{"id":"MCQ-10194","title":"Breakeven with Tax Considerations","area":"BAR3","question":"Almo Company's assumptions:\n- Selling price: $400 each\n- Variable costs: $200 per unit\n- Annual fixed costs: $100,000\n- After-tax profit objective: $240,000\n- Effective tax rate: 40%\n\nDetermine the number of units Almo Company must sell to achieve its after-tax profit objective.","choices":{"A":"1,700 units.","B":"3,500 units.","C":"4,500 units.","D":"2,500 units."},"answer":"D","explanation":"- Target after-tax profit of $240,000 ÷ (1 - tax rate) = $240,000 ÷ 0.6 = $400,000 pre-tax profit\n- (Total fixed cost + target pre-tax profit) ÷ contribution margin per unit\n- = ($100,000 + $400,000) ÷ $200 = **2,500 units**"},{"id":"MCQ-10332","title":"Relevant Costs in Lease vs. Buy Decision","area":"BAR3","question":"Hardwood Manufacturing must relocate to an expanded plant. Management is evaluating whether to lease or buy the facility. All of the following costs are relevant to this decision, EXCEPT:","choices":{"A":"Anticipated proceeds from the sale of current facilities to be used as a down payment.","B":"Annual rental expense associated with the new facility.","C":"Anticipated disposal value of the new facility in the purchase option.","D":"Common area maintenance charges applicable to the leased facility."},"answer":"A","explanation":"- **RULE:** Relevant costs are those costs that change as a result of a decision.\n- Choice \"A\" is correct. Disposal proceeds associated with the old facility are not relevant to the decision to lease or buy. The current facility has been outgrown. Hardwood will not use the facility and any proceeds or costs associated with keeping or disposing of the old facility will occur regardless of the decision to lease or buy.\n- Choices \"B\", \"C\", and \"D\" are all costs that would change depending on the decision and are therefore relevant."},{"id":"MCQ-10163","title":"Asset-Liability Matching","area":"BAR2","question":"When a firm finances each asset with a financial instrument of the same approximate maturity as the life of the asset, it is applying:","choices":{"A":"Operating leverage.","B":"Financial leverage.","C":"Working capital management.","D":"Return maximization."},"answer":"C","explanation":"- Choice \"C\" is correct. Appropriate working capital management matches the maturity life of each asset with the length of the financial instrument used to finance that asset.\n- Choice \"A\" is incorrect. Operating leverage is the degree that fixed costs are used in the production process.\n- Choice \"B\" is incorrect. Financial leverage is the amount of debt used to finance an asset.\n- Choice \"D\" is incorrect. Return maximization seeks to obtain the optimal return rate by asset utilization."},{"id":"MCQ-10199","title":"Effective Interest Rate with Compensating Balance","area":"BAR2","question":"A company obtained a short-term bank loan of $500,000 at an annual interest rate of 8%. As a condition of the loan, the company is required to maintain a compensating balance of $100,000 in its checking account. The checking account earns interest at 3% annually. Ordinarily, the company maintains a balance of $50,000 for transaction purposes. What is the effective interest rate of the loan?","choices":{"A":"8.50%","B":"7.77%","C":"9.44%","D":"8.56%"},"answer":"D","explanation":"| Step | Calculation |\n|------|-------------|\n| Step 1: Actual interest (P × Rate × Time) | $500,000 × 8% = $40,000 |\n| Step 2: Subtract interest earned on additional compensating balance | $50,000 × 3% = $1,500 |\n| Net interest cost | $40,000 − $1,500 = $38,500 |\n| Step 3: Divide by loan proceeds company has use of | $500,000 − $50,000 (additional balance) = $450,000 |\n| **Effective rate** | $38,500 ÷ $450,000 = **8.56%** |"},{"id":"MCQ-10639","title":"Board Oversight of ERM","area":"BAR1","question":"According to COSO, which of the following provides oversight of an entity's enterprise risk management?","choices":{"A":"The risk officer","B":"The board of directors","C":"Management","D":"Financial executives"},"answer":"B","explanation":"- Choice \"B\" is correct. One of the key components of the governance and culture associated with enterprise risk management (ERM) is board oversight, which requires that the board of directors set an organization-wide tone that not only establishes their authority but also promotes management accountability.\n- Choices \"A\", \"C\", and \"D\" are incorrect. The risk officer and financial executives are members of management, and management reports to the board."},{"id":"MCQ-10397","title":"Inherent and Residual Risk","area":"BAR1","question":"According to COSO, which of the following components of enterprise risk management addresses an entity's consideration of inherent and residual risk?","choices":{"A":"Governance and culture","B":"Strategy and objective-setting","C":"Performance","D":"Review and revision"},"answer":"C","explanation":"- Choice \"C\" is correct. The performance component of the enterprise risk management framework includes elements that relate to risk analysis including inherent and residual risk.\n- Choice \"A\" is incorrect. Governance and culture includes defining the desired culture, demonstrating a commitment to core values, attracting and retaining employees, and establishing an operating structure.\n- Choice \"B\" is incorrect. Strategy and objective-setting identifies the strategy and business objectives.\n- Choice \"D\" is incorrect. Review and revision relates to policies and procedures that ensure continuous improvement in ERM."},{"id":"MCQ-10203","title":"Likelihood and Impact Assessment","area":"BAR1","question":"According to COSO, which of the following components of enterprise risk management addresses an entity's process for establishing the likelihood and impact of events?","choices":{"A":"Performance","B":"Review and revision","C":"Governance and culture","D":"Strategy and objective-setting"},"answer":"A","explanation":"- Choice \"A\" is correct. The performance component of the enterprise risk management framework includes analyzing risk, including the establishment of the events' likelihood and impact.\n- The other components do not address the determination of the impact or likelihood of events."},{"id":"MCQ-10114","title":"Objective Setting and Risk Tolerance","area":"BAR1","question":"Dollar Bus Company has set an objective to fully comply with published bus schedules. The company currently achieves an 83% compliance rate and does not expect significant revenue changes as compliance improves to 100%, but sees revenues fall off significantly when buses are late more than 20% of the time. The company's objective setting would logically develop as follows:","choices":{"A":"Compliance rates of 80% would become the objective.","B":"Tolerable levels of variation are established to set realistic compliance objectives.","C":"Additional busses would be acquired to achieve the objective.","D":"Compliance with the bus schedule would be reviewed in relation to the risk of lost ridership within tolerable compliance percentages above 80%."},"answer":"D","explanation":"- Choice \"D\" is correct. Objectives are aligned with risk appetite, which drives risk tolerance levels.\n- Choice \"A\" is incorrect. Risk responses (purchase of buses) would not be derived from objectives.\n- Choice \"B\" is incorrect. Tolerable limits would not be used to back into objectives.\n- Choice \"C\" is incorrect. Acquisition of additional busses is a response to risks and would not be part of objective setting."},{"id":"MCQ-08580","title":"Government-Wide Financial Statements Basis","area":"BAR5","question":"Which basis of accounting is required for a city's government-wide financial statements?","choices":{"A":"Cash.","B":"Accrual.","C":"Modified accrual.","D":"Modified cash."},"answer":"B","explanation":"- Choice \"B\" is correct. The government-wide financial statements (the statement of net position and the statement of activities) are reported using the economic resources measurement focus and the full accrual basis of accounting.\n- Choice \"C\" is incorrect. Modified accrual is used as the basis of reporting for the governmental funds. Government-wide financial statements use full accrual."},{"id":"MCQ-00987","title":"Encumbrances Classification","area":"BAR5","question":"Encumbrances outstanding at year-end in a state's general fund would most likely be reported as a:","choices":{"A":"Liability in the general fund.","B":"Fund balance restriction in the general fund.","C":"Liability in the general long-term debt account group.","D":"Fund balance commitment in the general fund."},"answer":"D","explanation":"- Choice \"D\" is correct. Encumbrances are commitments or assignments of fund balance representing the amount of unperformed contracts for goods or services. Encumbrances at year-end do not constitute expenditures or liabilities. At year-end, encumbrances are reclassified as a commitment or assignment of fund balance.\n- Choice \"A\" is incorrect. Encumbrances are not liabilities.\n- Choice \"B\" is incorrect. Encumbrances do not constrain fund balance to the level of restrictions.\n- Choice \"C\" is incorrect. Encumbrances are not debts. Also, account groups were eliminated with GASB 34."},{"id":"MCQ-07944","title":"Major Fund Analysis","area":"BAR5","question":"Based on the following funds and revenues, which statement is correct regarding major fund classification?\n\n| Fund | Revenues |\n|------|----------|\n| General fund | $125 million |\n| Capital projects fund | $50 million |\n| Permanent fund | $105 million |\n| Total government funds | $1,050 million |\n| Airport enterprise fund | $175 million |\n| Utility enterprise fund | $180 million |\n| Total enterprise funds | $1,300 million |","choices":{"A":"The capital projects fund should not be classified as a major fund.","B":"The permanent fund should be classified as a major fund.","C":"The general fund should not be classified as a major fund.","D":"The airport enterprise fund should not be classified as a major fund."},"answer":"A","explanation":"- Choice \"A\" is correct. The capital projects fund constitutes 4.76% of the revenues from its fund category (total government revenues) and 2.13% of the total revenue across all relevant funds (government and enterprise funds). The capital project fund should not be classified as a major fund.\n- Choice \"B\" is incorrect. Although the permanent fund represents 10% of the governmental revenues, it only comprises 4.5% of the total revenues across all relevant funds.\n- Choice \"C\" is incorrect. The general fund is always classified as a major fund regardless of financial statistics.\n- Choice \"D\" is incorrect. The airport enterprise fund represents 13.5% of enterprise fund revenues and 7.4% of total revenues—meeting the criteria."},{"id":"MCQ-10496","title":"Component Unit Reporting","area":"BAR5","question":"Feline County established the Calico Landfill as a separate legal entity to operate the city's solid waste landfill. The landfill's operating budget and capital improvement projects are subject to the approval of the county commission. The financial statements of the Calico Landfill should be:","choices":{"A":"Displayed as a special purpose government.","B":"Presented as a blended component unit.","C":"Presented discretely as a component unit.","D":"Only disclosed in the notes."},"answer":"C","explanation":"- **Rule:** A special purpose government is SELF: Separately Elected, Legally separate, Financially independent.\n- Choice \"C\" is correct. The Calico Landfill does not meet the SELF criteria and is therefore a component unit. It does not meet the criteria for blended reporting (governing boards substantially the same or exclusively serves the primary government) and is therefore reported as a discrete component unit.\n- Choice \"A\" is incorrect. The Landfill is financially accountable to the county and is not a stand-alone special purpose government.\n- Choice \"B\" is incorrect. The landfill does not meet criteria for blended reporting."},{"id":"MCQ-10497","title":"Fund Balance to Net Position Reconciliation","area":"BAR5","question":"The City of Point Sparrow reports total fund balances in its governmental funds of $1,200,000 with:\n- Fixed assets: $4,000,000\n- Accumulated depreciation: $2,750,000\n- Long-term debt: $2,000,000\n\nAdditionally, the government has a 4% sales tax levy collected by the State. In October, November, and December, sales were $3,000,000, $4,000,000, and $5,000,000 respectively. What would the City display as its governmental activities Net Position at December 31?","choices":{"A":"$650,000","B":"$450,000","C":"$290,000","D":"$250,000"},"answer":"A","explanation":"Government-wide net position is computed using the CANS mnemonic:\n\n| Item | Amount |\n|------|--------|\n| GRaSPP—Fund Balance | $1,200,000 |\n| Capital assets (non-current) | $4,000,000 |\n| Accumulated depreciation | ($2,750,000) |\n| Non-current liabilities | ($2,000,000) |\n| Accrual of December sales tax revenue ($5,000,000 × 4%) | $200,000 |\n| **Government-wide net position** | **$650,000** |\n\nNote: December revenues are received 75 days after year-end and would not be accrued for modified accrual (not available), but are recognized under full accrual."},{"id":"MCQ-10468","title":"Capital Equipment Purchase Orders","area":"BAR5","question":"The City of Sharpton budgeted $230,000 for capital equipment purchases in its police department. The City issued a purchase order on January 1 for five police cars at $40,000 each. Four vehicles were received on June 30 for $180,000. On its June 30 interim General Fund financial statements, the City would report:","choices":{"A":"Capital outlay expenditures of $180,000.","B":"Property and equipment additions of $180,000.","C":"Budgetary control of $20,000.","D":"Available appropriations of $30,000."},"answer":"A","explanation":"- Choice \"A\" is correct. The City of Sharpton would record capital acquisitions in its General Fund as capital outlay expenditures. The amount is $180,000.\n- Choice \"B\" is incorrect. Property and equipment would not be displayed in the governmental funds.\n- Choice \"C\" is incorrect. Budgetary control for encumbered appropriations would equal $40,000 (remaining order).\n- Choice \"D\" is incorrect. Available appropriations = $230,000 − $180,000 (expenditures) − $40,000 (encumbered) = $10,000."},{"id":"MCQ-10493","title":"Translation Method Reporting","area":"BAR4","question":"Alpha Omega Inc. has a subsidiary located in Mexico, for which it uses the translation/current rate method in its consolidation process. Which of the following statements is(are) true?\n\nI. Sales in Mexican pesos would be translated into U.S. dollars at the year-end exchange rate.  \nII. Any translation gain or loss would be reported in other comprehensive income.","choices":{"A":"Both I and II.","B":"II only.","C":"I only.","D":"Neither statement is true."},"answer":"B","explanation":"- Choice \"B\" is correct. Using the translation method, any gain or loss is reflected in other comprehensive income. Statement I is false since all income statement items are translated at the weighted-average exchange rate for the period under the translation method."},{"id":"MCQ-10360","title":"Types of Exchange Rate Risk","area":"BAR1","question":"Multinational corporations are subject to various risks from dealing in foreign currencies. Exchange rate fluctuations expose these companies to all of the following risks, EXCEPT:","choices":{"A":"Translation risk.","B":"Economic risk.","C":"Interest rate risk.","D":"Transaction risk."},"answer":"C","explanation":"- Choice \"C\" is correct. Exchange rate fluctuations expose multinational companies to transaction, economic, and translation risks, **not interest rate risk**. Interest rate risk represents exposure to fluctuations in the value of financial instruments in response to changes in interest rates.\n- **Translation risk:** Exposure to potential changes in reported asset, liability, equity, or income amounts due to exchange rate changes.\n- **Economic risk:** Potential that present value of cash flows could decrease due to exchange rate changes.\n- **Transaction risk:** Potential for economic loss upon settlement of individual transactions due to exchange rate changes."},{"id":"MCQ-10192","title":"Transaction Risk Mitigation","area":"BAR1","question":"Nadaf Exports trades in luxury Persian rugs shipped from the Middle East and sold throughout Europe and North America. The company is trying to mitigate transaction risks associated with settling transactions in USD, CAD, and euros. Nadaf would likely use any of the following techniques EXCEPT:","choices":{"A":"Strategically adjusting the sales mix between North America and Europe based upon the exchange rate.","B":"Entering into forward hedge contracts.","C":"Entering into futures hedge contracts.","D":"Entering into currency option hedge contracts."},"answer":"A","explanation":"- Choice \"A\" is correct. Increasing or reducing sales in foreign markets represents a restructuring technique normally associated with mitigation of **economic risk**, not transaction risk.\n- Choices \"B\", \"C\", and \"D\" are appropriate techniques to mitigate transaction risk through hedging."},{"id":"AI-BAR1-01","area":"BAR1","title":"COSO ERM Components","question":"According to the COSO ERM (2017) framework, how many interrelated components organize enterprise risk management?","choices":{"A":"Three","B":"Five","C":"Eight","D":"Seventeen"},"answer":"B","explanation":"COSO ERM is organized into five components: Governance & Culture; Strategy & Objective-Setting; Performance; Review & Revision; and Information, Communication & Reporting. (The 17 figure refers to principles, and 8 to the older COSO internal-control thinking.)","ai":true},{"id":"AI-BAR1-02","area":"BAR1","title":"Likelihood and Impact","question":"Which COSO ERM component includes analyzing risk by establishing the likelihood and impact of events and prioritizing risks?","choices":{"A":"Governance and Culture","B":"Strategy and Objective-Setting","C":"Performance","D":"Review and Revision"},"answer":"C","explanation":"The Performance component identifies and assesses risks that may affect achievement of objectives, including their likelihood and impact, and prioritizes them within risk appetite.","ai":true},{"id":"AI-BAR1-03","area":"BAR1","title":"Exchange-Rate Risk Types","question":"Exchange-rate fluctuations expose a multinational company to all of the following risks EXCEPT:","choices":{"A":"Transaction risk","B":"Translation risk","C":"Economic risk","D":"Interest rate risk"},"answer":"D","explanation":"Currency exposure consists of transaction, translation, and economic risk. Interest rate risk arises from changes in interest rates, not exchange rates.","ai":true},{"id":"AI-BAR1-04","area":"BAR1","title":"Cross-Price Elasticity","question":"A positive cross-price elasticity of demand between two goods indicates the goods are:","choices":{"A":"Complements","B":"Substitutes","C":"Inferior goods","D":"Normal goods"},"answer":"B","explanation":"Positive cross elasticity means a price increase in one good raises demand for the other — they are substitutes. A negative value indicates complements.","ai":true},{"id":"AI-BAR1-05","area":"BAR1","title":"Risk Response (Pursue)","question":"Under COSO, the risk response in which an entity accepts increased risk in order to pursue greater value or opportunity is to:","choices":{"A":"Avoid","B":"Reduce","C":"Pursue","D":"Share"},"answer":"C","explanation":"Pursue means taking on more risk to achieve higher performance. The other responses (Accept, Avoid, Reduce, Share/Transfer) maintain or lower the level of risk.","ai":true},{"id":"AI-BAR1-06","area":"BAR1","title":"Income Elasticity","question":"A good whose demand rises when consumer income rises (positive income elasticity) is classified as a:","choices":{"A":"Inferior good","B":"Normal good","C":"Giffen good","D":"Public good"},"answer":"B","explanation":"Positive income elasticity = normal good. A negative income elasticity (demand falls as income rises) characterizes an inferior good.","ai":true},{"id":"AI-BAR2-01","area":"BAR2","title":"WACC Weights","question":"When computing the weighted-average cost of capital (WACC), the weights assigned to debt and equity should be based on their:","choices":{"A":"Book values","B":"Market values","C":"Par values","D":"Original historical cost"},"answer":"B","explanation":"WACC uses market-value weights for the components of the capital structure, because market values reflect current required returns.","ai":true},{"id":"AI-BAR2-02","area":"BAR2","title":"NPV Decision Rule","question":"Using net present value analysis, an independent capital project should be accepted when its NPV is:","choices":{"A":"Less than zero","B":"Equal to zero","C":"Greater than zero","D":"Less than the IRR"},"answer":"C","explanation":"Accept when NPV > 0 — the present value of expected cash inflows exceeds the initial investment, adding value.","ai":true},{"id":"AI-BAR2-03","area":"BAR2","title":"NPV vs. IRR Conflict","question":"When NPV and IRR produce conflicting rankings for two mutually exclusive projects, which method should govern the decision?","choices":{"A":"Internal rate of return","B":"Net present value","C":"Payback period","D":"Accounting rate of return"},"answer":"B","explanation":"NPV is preferred; it measures the absolute dollar value added and assumes reinvestment at the cost of capital rather than the (often unrealistic) IRR.","ai":true},{"id":"AI-BAR2-04","area":"BAR2","title":"After-Tax Cost of Debt","question":"A company's pre-tax cost of debt is 8% and its marginal tax rate is 25%. Its after-tax cost of debt is:","choices":{"A":"8.0%","B":"6.0%","C":"2.0%","D":"10.0%"},"answer":"B","explanation":"After-tax cost of debt = Rd × (1 − T) = 8% × (1 − 0.25) = 6%. Interest is tax-deductible, creating the tax shield.","ai":true},{"id":"AI-BAR2-05","area":"BAR2","title":"EOQ Objective","question":"The economic order quantity (EOQ) model determines the order size that minimizes the sum of:","choices":{"A":"Purchase price and selling price","B":"Ordering costs and carrying costs","C":"Fixed costs and variable costs","D":"Direct materials and direct labor"},"answer":"B","explanation":"EOQ = √(2DS/H) balances and minimizes total annual ordering costs and carrying (holding) costs.","ai":true},{"id":"AI-BAR2-06","area":"BAR2","title":"Cost of Preferred Stock","question":"Compared with debt financing, the cost of preferred stock differs because preferred dividends:","choices":{"A":"Provide a tax shield like interest","B":"Are not tax-deductible to the issuer","C":"Are always lower than the cost of debt","D":"Guarantee a return of principal"},"answer":"B","explanation":"Preferred dividends are paid from after-tax income and are not deductible, so (unlike interest on debt) there is no tax shield. Cost = Dp / net issue price.","ai":true},{"id":"AI-BAR3-01","area":"BAR3","title":"Breakeven in Units","question":"The breakeven point in units is computed as:","choices":{"A":"Fixed costs ÷ contribution margin per unit","B":"Fixed costs ÷ selling price per unit","C":"Contribution margin ÷ fixed costs","D":"Variable costs ÷ contribution margin ratio"},"answer":"A","explanation":"Breakeven units = Fixed costs / Contribution margin per unit (where CM per unit = selling price − variable cost per unit).","ai":true},{"id":"AI-BAR3-02","area":"BAR3","title":"Materials Price Variance","question":"The direct materials price variance, (Actual price − Standard price), is multiplied by the:","choices":{"A":"Standard quantity allowed for output","B":"Actual quantity used in production","C":"Actual quantity purchased","D":"Budgeted production volume"},"answer":"C","explanation":"The price variance is based on the actual quantity PURCHASED; the materials quantity (usage) variance uses the actual quantity USED.","ai":true},{"id":"AI-BAR3-03","area":"BAR3","title":"Favorable Variance","question":"A cost variance is described as 'favorable' when:","choices":{"A":"Actual cost exceeds standard cost","B":"Actual cost is less than standard cost","C":"Actual cost equals standard cost","D":"Actual output is below budget"},"answer":"B","explanation":"Favorable means actual cost is below standard (or actual revenue above expected). When actual cost exceeds standard, the variance is unfavorable.","ai":true},{"id":"AI-BAR3-04","area":"BAR3","title":"Absorption vs. Variable Costing","question":"When units produced exceed units sold (ending inventory increases), net income under absorption costing relative to variable costing is:","choices":{"A":"Lower","B":"Higher","C":"The same","D":"Indeterminable"},"answer":"B","explanation":"Absorption costing capitalizes fixed manufacturing overhead in inventory. When inventory rises, fixed overhead is deferred, so absorption net income is higher than variable-costing net income.","ai":true},{"id":"AI-BAR3-05","area":"BAR3","title":"Contribution Margin","question":"Contribution margin is defined as:","choices":{"A":"Sales minus fixed costs","B":"Sales minus variable costs","C":"Sales minus cost of goods sold","D":"Gross profit minus operating expenses"},"answer":"B","explanation":"Contribution margin = Sales − Variable costs. It is the amount available to cover fixed costs and then contribute to profit.","ai":true},{"id":"AI-BAR3-06","area":"BAR3","title":"Margin of Safety","question":"The margin of safety is computed as:","choices":{"A":"Budgeted sales ÷ breakeven sales","B":"Actual (or budgeted) sales − breakeven sales","C":"Fixed costs ÷ contribution margin ratio","D":"Breakeven sales − fixed costs"},"answer":"B","explanation":"Margin of safety = sales above the breakeven point = Actual (or budgeted) sales − Breakeven sales. It shows how far sales can fall before a loss occurs.","ai":true},{"id":"AI-BAR4-01","area":"BAR4","title":"Goodwill Accounting","question":"Under U.S. GAAP, goodwill recognized in a business combination is:","choices":{"A":"Amortized over 40 years","B":"Amortized over its useful life","C":"Not amortized but tested for impairment","D":"Expensed immediately at acquisition"},"answer":"C","explanation":"Goodwill is not amortized under U.S. GAAP; it is tested for impairment (at least annually) at the reporting-unit level.","ai":true},{"id":"AI-BAR4-02","area":"BAR4","title":"Acquisition-Method Goodwill","question":"Under the acquisition method, goodwill reflects the fair value of:","choices":{"A":"The acquirer's ownership share only","B":"100% of the acquiree, including the noncontrolling interest","C":"The book value of net assets acquired","D":"Only the cash consideration paid"},"answer":"B","explanation":"Goodwill = (consideration transferred + fair value of NCI) − fair value of identifiable net assets. It is measured for 100% of the acquiree, not just the acquirer's percentage.","ai":true},{"id":"AI-BAR4-03","area":"BAR4","title":"Finance Lease Criteria","question":"A lessee classifies a lease as a finance lease when:","choices":{"A":"All five classification criteria are met","B":"Any one of the five criteria is met","C":"The lease term is at least one year","D":"Legal title can never transfer"},"answer":"B","explanation":"Meeting ANY ONE of the criteria (transfer of ownership, a purchase option reasonably certain to be exercised, lease term for the major part of the economic life, present value of payments at substantially all of fair value, or a specialized asset) results in a finance lease.","ai":true},{"id":"AI-BAR4-04","area":"BAR4","title":"Cash Flow Hedge","question":"For a qualifying cash flow hedge, the gain or loss on the hedging derivative is initially reported in:","choices":{"A":"Current earnings","B":"Other comprehensive income","C":"Retained earnings","D":"A deferred tax account"},"answer":"B","explanation":"Cash flow hedge gains and losses are deferred in other comprehensive income (OCI) until the hedged forecasted transaction affects earnings.","ai":true},{"id":"AI-BAR4-05","area":"BAR4","title":"Translation Method","question":"Under the current-rate (translation) method of converting a foreign subsidiary's statements, the translation adjustment is reported in:","choices":{"A":"The income statement","B":"Other comprehensive income","C":"Retained earnings directly","D":"Goodwill"},"answer":"B","explanation":"The current-rate method routes the translation gain/loss to OCI (cumulative translation adjustment). The remeasurement (temporal) method routes it to the income statement.","ai":true},{"id":"AI-BAR4-06","area":"BAR4","title":"Noncontrolling Interest","question":"Under U.S. GAAP's full-goodwill approach, noncontrolling interest at the acquisition date is generally measured at:","choices":{"A":"The NCI's share of the subsidiary's book value","B":"Zero","C":"The NCI percentage multiplied by the subsidiary's fair value","D":"The consideration the acquirer transferred"},"answer":"C","explanation":"NCI is measured at fair value, commonly the NCI percentage × the fair value of the acquiree, which produces full (100%) goodwill on the consolidated balance sheet.","ai":true},{"id":"AI-BAR5-01","area":"BAR5","title":"Governmental Fund Basis","question":"Governmental fund financial statements are prepared using which basis of accounting?","choices":{"A":"Full accrual","B":"Cash","C":"Modified accrual","D":"Modified cash"},"answer":"C","explanation":"Governmental funds use the modified accrual basis and the current financial resources measurement focus. Government-wide statements, in contrast, use full accrual.","ai":true},{"id":"AI-BAR5-02","area":"BAR5","title":"Modified Accrual Revenue","question":"Under modified accrual accounting, revenue is recognized when it is measurable and:","choices":{"A":"Earned","B":"Collected in cash","C":"Available","D":"Billed"},"answer":"C","explanation":"Modified accrual recognizes revenue when 'measurable and available' — available meaning collectible within the period or soon enough afterward (commonly within 60 days) to pay current-period liabilities.","ai":true},{"id":"AI-BAR5-03","area":"BAR5","title":"Government-Wide Basis","question":"The government-wide financial statements are prepared using the:","choices":{"A":"Modified accrual basis and current financial resources focus","B":"Full accrual basis and economic resources focus","C":"Cash basis","D":"Budgetary basis"},"answer":"B","explanation":"Government-wide statements use the full accrual basis and the economic resources measurement focus, capturing long-term assets and liabilities.","ai":true},{"id":"AI-BAR5-04","area":"BAR5","title":"Enterprise Fund Revenue","question":"For an enterprise fund, which of the following is reported as operating revenue?","choices":{"A":"User charges for services provided","B":"General government subsidies","C":"Interest income on investments","D":"Capital grants received"},"answer":"A","explanation":"Operating revenue of an enterprise fund consists of charges to external users (user fees). Subsidies, grants, and investment interest are nonoperating items.","ai":true},{"id":"AI-BAR5-05","area":"BAR5","title":"Governmental Funds (GRaSPP)","question":"The governmental funds are recalled with 'GRaSPP.' Which fund below is NOT a governmental fund?","choices":{"A":"General fund","B":"Special revenue fund","C":"Enterprise fund","D":"Permanent fund"},"answer":"C","explanation":"GRaSPP = General, special Revenue, debt Service, capital Projects, and Permanent funds. The Enterprise fund is a proprietary fund, not a governmental fund.","ai":true},{"id":"AI-BAR5-06","area":"BAR5","title":"Fund Balance Classifications","question":"Which of the following is one of the five fund balance classifications used for governmental funds?","choices":{"A":"Reserved","B":"Designated","C":"Committed","D":"Appropriated"},"answer":"C","explanation":"The five classifications are Nonspendable, Restricted, Committed, Assigned, and Unassigned. 'Reserved' and 'Designated' are pre-GASB 54 terms no longer used.","ai":true},{"id":"AI-BAR1-07","area":"BAR1","title":"Inherent vs. Residual Risk","question":"Inherent risk and residual risk are both analyzed within which COSO ERM component?","choices":{"A":"Governance and Culture","B":"Strategy and Objective-Setting","C":"Performance","D":"Information, Communication & Reporting"},"answer":"C","explanation":"The Performance component assesses risk severity, including inherent risk (before responses) and residual risk (the risk remaining after responses are applied).","ai":true},{"id":"AI-BAR1-08","area":"BAR1","title":"Risk Appetite vs. Tolerance","question":"The broad-based amount of risk an organization is willing to accept in pursuit of value is its:","choices":{"A":"Risk tolerance","B":"Risk appetite","C":"Risk capacity","D":"Residual risk"},"answer":"B","explanation":"Risk appetite is the broad amount of risk an entity is willing to accept. Risk tolerance is the acceptable variation in performance around a specific objective.","ai":true},{"id":"AI-BAR1-09","area":"BAR1","title":"Board Risk Oversight","question":"Board of directors' oversight of enterprise risk management is primarily an element of which COSO ERM component?","choices":{"A":"Governance and Culture","B":"Performance","C":"Review and Revision","D":"Strategy and Objective-Setting"},"answer":"A","explanation":"Board risk oversight falls under Governance and Culture, which establishes the tone, authority, and accountability that underpin ERM.","ai":true},{"id":"AI-BAR1-10","area":"BAR1","title":"Diversifiable Risk","question":"Which type of risk can be reduced or eliminated through portfolio diversification?","choices":{"A":"Systematic (market) risk","B":"Unsystematic (diversifiable) risk","C":"Inflation risk","D":"Purchasing-power risk"},"answer":"B","explanation":"Unsystematic (company-specific, diversifiable) risk can be reduced by diversification. Systematic (market) risk affects all securities and cannot be diversified away.","ai":true},{"id":"AI-BAR1-11","area":"BAR1","title":"Hedging Transaction Risk","question":"Forward contracts, futures, and currency options are primarily used by a company to hedge:","choices":{"A":"Translation risk","B":"Economic risk","C":"Transaction risk","D":"Interest rate risk"},"answer":"C","explanation":"These derivative instruments hedge transaction risk — the potential loss on settling specific foreign-currency-denominated transactions.","ai":true},{"id":"AI-BAR1-12","area":"BAR1","title":"Natural Hedge","question":"A company that matches the currency of its revenues with the currency of its costs is using a:","choices":{"A":"Forward hedge","B":"Natural hedge","C":"Money-market hedge","D":"Fair value hedge"},"answer":"B","explanation":"A natural (operating) hedge offsets exposure by matching the currencies of cash inflows and outflows, without using a derivative.","ai":true},{"id":"AI-BAR2-07","area":"BAR2","title":"IRR Definition","question":"The internal rate of return (IRR) of a project is the discount rate at which the project's:","choices":{"A":"Payback period equals zero","B":"Net present value equals zero","C":"Profitability index equals zero","D":"Accounting income is maximized"},"answer":"B","explanation":"IRR is the rate that makes NPV = 0 — i.e., the present value of inflows equals the initial investment.","ai":true},{"id":"AI-BAR2-08","area":"BAR2","title":"Payback Limitation","question":"A primary weakness of the simple payback period method is that it:","choices":{"A":"Is difficult to compute","B":"Ignores the time value of money","C":"Requires estimating a discount rate","D":"Always rejects profitable projects"},"answer":"B","explanation":"Simple payback ignores the time value of money and disregards cash flows occurring after the payback point.","ai":true},{"id":"AI-BAR2-09","area":"BAR2","title":"Profitability Index","question":"The profitability index is calculated as:","choices":{"A":"Initial investment ÷ PV of future cash flows","B":"PV of future cash flows ÷ initial investment","C":"NPV ÷ IRR","D":"Net income ÷ invested capital"},"answer":"B","explanation":"Profitability index = PV of future cash flows / initial investment. Accept a project when the index exceeds 1.0.","ai":true},{"id":"AI-BAR2-10","area":"BAR2","title":"CAPM Beta","question":"In the capital asset pricing model (CAPM), beta measures a security's:","choices":{"A":"Total risk","B":"Unsystematic risk","C":"Systematic (market) risk","D":"Default risk"},"answer":"C","explanation":"Beta measures systematic (market) risk — the sensitivity of a security's return to overall market movements.","ai":true},{"id":"AI-BAR2-11","area":"BAR2","title":"Just-in-Time Inventory","question":"A just-in-time (JIT) inventory system is primarily designed to:","choices":{"A":"Maximize safety stock","B":"Minimize inventory levels","C":"Increase order quantity","D":"Eliminate the need for suppliers"},"answer":"B","explanation":"JIT minimizes inventory by receiving materials only as needed for production (a pull system), reducing carrying costs.","ai":true},{"id":"AI-BAR2-12","area":"BAR2","title":"Gordon Growth Model","question":"Under the dividend discount (Gordon growth) model, share value equals next year's dividend divided by:","choices":{"A":"The required return plus the growth rate","B":"The required return minus the growth rate","C":"The growth rate minus the required return","D":"The current dividend yield"},"answer":"B","explanation":"P = D1 / (R − G), where R is the required rate of return and G is the constant dividend growth rate.","ai":true},{"id":"AI-BAR3-07","area":"BAR3","title":"Job vs. Process Costing","question":"A custom homebuilder that accumulates costs separately for each unique house is using:","choices":{"A":"Process costing","B":"Job-order costing","C":"Standard costing only","D":"Variable costing"},"answer":"B","explanation":"Job-order costing accumulates costs by individual job or batch. Process costing is used for homogeneous, continuously mass-produced units.","ai":true},{"id":"AI-BAR3-08","area":"BAR3","title":"Equivalent Units","question":"In process costing, equivalent units of production are computed as:","choices":{"A":"Physical units × percentage of completion","B":"Physical units ÷ percentage of completion","C":"Total cost ÷ units started","D":"Units started − units completed"},"answer":"A","explanation":"Equivalent units = physical units × their percentage of completion, restating partially complete work in terms of whole finished units.","ai":true},{"id":"AI-BAR3-09","area":"BAR3","title":"Activity-Based Costing","question":"Activity-based costing (ABC) assigns overhead to products using:","choices":{"A":"A single plant-wide rate","B":"Direct labor hours only","C":"Multiple cost pools and cost drivers","D":"Sales revenue"},"answer":"C","explanation":"ABC uses multiple activity cost pools, each allocated with an appropriate cost driver, producing more accurate overhead assignment than a single rate.","ai":true},{"id":"AI-BAR3-10","area":"BAR3","title":"Sunk Cost","question":"In decision analysis, a cost that has already been incurred and cannot be changed by any future action is a:","choices":{"A":"Relevant cost","B":"Opportunity cost","C":"Sunk cost","D":"Incremental cost"},"answer":"C","explanation":"A sunk cost is irrelevant to a decision because it cannot be altered by choosing one alternative over another.","ai":true},{"id":"AI-BAR3-11","area":"BAR3","title":"Special Order Decision","question":"With idle (excess) capacity, a special order should generally be accepted when its selling price exceeds the:","choices":{"A":"Total absorption cost per unit","B":"Variable cost per unit","C":"Fixed cost per unit","D":"Full cost plus normal markup"},"answer":"B","explanation":"With excess capacity, only incremental (variable) costs are relevant. Accept the order if price per unit exceeds variable cost per unit.","ai":true},{"id":"AI-BAR3-12","area":"BAR3","title":"Labor Efficiency Variance","question":"The direct labor efficiency variance is computed as:","choices":{"A":"(Actual rate − Standard rate) × actual hours","B":"(Actual hours − Standard hours) × standard rate","C":"(Actual hours − Standard hours) × actual rate","D":"(Actual rate − Standard rate) × standard hours"},"answer":"B","explanation":"Labor efficiency variance = (AH − SH) × SR. The labor rate variance, by contrast, is (AR − SR) × AH.","ai":true},{"id":"AI-BAR4-07","area":"BAR4","title":"VIE Consolidation","question":"A variable interest entity (VIE) is consolidated by the:","choices":{"A":"Entity with the largest voting interest","B":"Primary beneficiary","C":"Entity that legally created it","D":"Largest creditor"},"answer":"B","explanation":"The primary beneficiary — the party with power over the VIE's most significant activities and exposure to its variable returns — consolidates the VIE.","ai":true},{"id":"AI-BAR4-08","area":"BAR4","title":"R&D Costs","question":"Under U.S. GAAP, research and development costs are generally:","choices":{"A":"Capitalized and amortized","B":"Expensed as incurred","C":"Recorded as goodwill","D":"Deferred until related revenue is earned"},"answer":"B","explanation":"R&D costs are expensed as incurred under U.S. GAAP, with limited exceptions (e.g., certain software costs or assets having an alternative future use).","ai":true},{"id":"AI-BAR4-09","area":"BAR4","title":"Software to Be Sold","question":"For software that will be sold, costs incurred before establishing technological feasibility are:","choices":{"A":"Capitalized","B":"Expensed as research and development","C":"Recorded as inventory","D":"Added to goodwill"},"answer":"B","explanation":"Costs before technological feasibility are R&D and expensed. Costs incurred after feasibility but before release are capitalized and later amortized.","ai":true},{"id":"AI-BAR4-10","area":"BAR4","title":"Fair Value Hierarchy","question":"Under the fair value hierarchy, quoted prices in active markets for identical assets are classified as:","choices":{"A":"Level 1","B":"Level 2","C":"Level 3","D":"Level 4"},"answer":"A","explanation":"Level 1 = quoted prices in active markets for identical items. Level 2 uses other observable inputs; Level 3 uses unobservable inputs.","ai":true},{"id":"AI-BAR4-11","area":"BAR4","title":"Equity Method Threshold","question":"An investor that can exert significant influence (commonly 20%-50% ownership) but not control accounts for the investment using the:","choices":{"A":"Cost method","B":"Equity method","C":"Consolidation","D":"Fair value through OCI"},"answer":"B","explanation":"Significant influence (often 20-50% of voting stock) calls for the equity method. Control (generally more than 50%) requires consolidation.","ai":true},{"id":"AI-BAR4-12","area":"BAR4","title":"Bargain Purchase","question":"When the fair value of identifiable net assets acquired exceeds the consideration transferred (a bargain purchase), the acquirer:","choices":{"A":"Records goodwill","B":"Recognizes a gain in earnings","C":"Defers the difference as a liability","D":"Writes the assets down to the price paid"},"answer":"B","explanation":"A bargain purchase results in a gain recognized in the acquirer's earnings on the acquisition date, after reassessing the values used.","ai":true},{"id":"AI-BAR5-07","area":"BAR5","title":"Modified Approach (Infrastructure)","question":"Under the modified approach for eligible infrastructure assets, a government may, instead of recording depreciation:","choices":{"A":"Revalue the assets annually","B":"Document condition assessments and preserve the assets at a target condition level","C":"Perform impairment testing only","D":"Amortize them on a straight-line basis"},"answer":"B","explanation":"The modified approach allows a government to forgo depreciation if it makes condition assessments and maintains the infrastructure at or above an established condition level.","ai":true},{"id":"AI-BAR5-08","area":"BAR5","title":"Nonspendable Fund Balance","question":"Inventory and prepaid items in a governmental fund are reported within which fund balance classification?","choices":{"A":"Restricted","B":"Committed","C":"Nonspendable","D":"Unassigned"},"answer":"C","explanation":"Nonspendable fund balance includes amounts not in spendable form (such as inventory and prepaids) or legally/contractually required to remain intact.","ai":true},{"id":"AI-BAR5-09","area":"BAR5","title":"Debt Service Fund","question":"The governmental fund used to accumulate resources for the payment of principal and interest on general long-term debt is the:","choices":{"A":"Capital projects fund","B":"Debt service fund","C":"Enterprise fund","D":"Permanent fund"},"answer":"B","explanation":"The debt service fund accounts for the accumulation of resources to pay principal and interest on a government's general long-term liabilities.","ai":true},{"id":"AI-BAR5-10","area":"BAR5","title":"Permanent Fund","question":"A fund whose principal must remain intact while only its earnings may be spent to benefit the government or its citizens is a:","choices":{"A":"Special revenue fund","B":"Permanent fund","C":"Private-purpose trust fund","D":"Enterprise fund"},"answer":"B","explanation":"A permanent fund reports resources that are legally restricted so that principal is preserved and only the earnings support the government's own programs.","ai":true},{"id":"AI-BAR5-11","area":"BAR5","title":"Internal Service Fund","question":"A fund that provides goods or services primarily to other departments of the same government on a cost-reimbursement basis is a(n):","choices":{"A":"Enterprise fund","B":"Internal service fund","C":"Custodial fund","D":"Special revenue fund"},"answer":"B","explanation":"An internal service fund (a proprietary fund) provides services internally to other units of the same government and uses accrual accounting.","ai":true},{"id":"AI-BAR5-12","area":"BAR5","title":"Statement of Net Position","question":"In the government-wide statement of net position, net position equals:","choices":{"A":"Revenues minus expenses","B":"Assets plus deferred outflows, minus liabilities and deferred inflows","C":"Fund balance plus encumbrances","D":"Cash minus accounts payable"},"answer":"B","explanation":"Net position = (Assets + Deferred outflows of resources) − (Liabilities + Deferred inflows of resources).","ai":true}],"topics":[{"num":1,"area":"BAR1","subtopic":"COSO ERM Framework","name":"COSO ERM 5 Components","keyPoints":"Governance, Strategy, Performance, Review, Information","stars":3,"typeB":false},{"num":2,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Governance and Culture","keyPoints":"Board oversight, core values, operating structure","stars":2,"typeB":false},{"num":3,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Strategy and Objective-Setting","keyPoints":"Alternative strategies, business objectives, risk appetite","stars":3,"typeB":false},{"num":4,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Performance Component","keyPoints":"Portfolio view, risk severity, prioritization","stars":2,"typeB":false},{"num":5,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Review and Revision","keyPoints":"Substantial change assessment, continuous improvement","stars":2,"typeB":false},{"num":6,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Risk Appetite vs Risk Tolerance","keyPoints":"Appetite = broad, Tolerance = specific acceptable range","stars":3,"typeB":false},{"num":7,"area":"BAR1","subtopic":"COSO ERM Framework","name":"20 Principles of ERM","keyPoints":"Supporting principles under 5 components","stars":1,"typeB":false},{"num":8,"area":"BAR1","subtopic":"COSO ERM Framework","name":"ERM vs Traditional RM","keyPoints":"Portfolio approach vs silo approach","stars":2,"typeB":false},{"num":9,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"PATRS (Risk Responses)","keyPoints":"Pursue, Accept, Transfer, Reduce, Self-insure","stars":3,"typeB":false},{"num":10,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Pursue vs Accept","keyPoints":"Pursue = active exploitation, Accept = passive tolerance","stars":3,"typeB":false},{"num":11,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Transfer Methods","keyPoints":"Insurance, hedging, outsourcing","stars":2,"typeB":false},{"num":12,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Risk-Averse Behavior","keyPoints":"Higher return required for higher risk","stars":2,"typeB":false},{"num":13,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Risk-Seeking Behavior","keyPoints":"Accept lower return for chance of higher gain","stars":2,"typeB":false},{"num":14,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Risk-Indifferent","keyPoints":"Required return constant regardless of risk","stars":2,"typeB":false},{"num":15,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Ri "Custodial, Investment, Private, Pension, Other Employee","category":"Fiduciary Funds"},{"code":"SELF","full":"Separately elected, Legal entity, Fiscally independent","category":"Primary Government"},{"code":"BAE-BAE","full":"Budget, Activity, Encumbrances","category":"Fund Accounting"},{"code":"CANS","full":"Capital assets, Accumulated depr, Non-current liab, Internal Service","category":"FB → NP"},{"code":"CPAS RIDES","full":"Capital, Principal, Asset disposal, Sources, Revenue, Interest, Depr, Service","category":"ΔFB → ΔNP"},{"code":"SOC","full":"Services, Operating grants, Capital grants","category":"Program Revenues"}],"formulas":[{"name":"WACC","f":"(E/V x Re) + (D/V x Rd x (1-T))","area":"BAR2"},{"name":"CAPM","f":"R = Rf + B[E(Rm) - Rf]","area":"BAR2"},{"name":"DDM (Gordon)","f":"P = D1 / (R - G)","area":"BAR2"},{"name":"NPV","f":"Sum(CFt / (1+r)^t) - Initial Investment","area":"BAR2"},{"name":"Profitability Index","f":"PV of Future CF / Initial Investment","area":"BAR2"},{"name":"After-tax Cost of Debt","f":"Rd x (1 - T)","area":"BAR2"},{"name":"EOQ","f":"sqrt(2DS / H)","area":"BAR2"},{"name":"Reorder Point","f":"Safety Stock + (Lead Time x Daily Usage)","area":"BAR2"},{"name":"Breakeven Units","f":"Fixed Costs / CM per unit","area":"BAR3"},{"name":"Target Units","f":"(Fixed Costs + Target Profit) / CM per unit","area":"BAR3"},{"name":"Target Units (after-tax)","f":"[FC + (After-tax Profit / (1 - T))] / CM per unit","area":"BAR3"},{"name":"Material Price Variance","f":"(AP - SP) x AQ Purchased","area":"BAR3"},{"name":"Material Qty Variance","f":"(AQ Used - SQ) x SP","area":"BAR3"},{"name":"Labor Rate Variance","f":"(AR - SR) x AH","area":"BAR3"},{"name":"Labor Efficiency Variance","f":"(AH - SH) x SR","area":"BAR3"},{"name":"OH Spending Variance","f":"Actual OH - Budgeted OH","area":"BAR3"},{"name":"OH Volume Variance","f":"Budgeted Fixed OH - Applied Fixed OH","area":"BAR3"},{"name":"Contribution Margin","f":"Sales - Variable Costs","area":"BAR3"},{"name":"Net Working Capital","f":"Current Assets - Current Liabilities","area":"BAR2"},{"name":"Current Ratio","f":"Current Assets / Current Liabilities","area":"BAR2"},{"name":"Quick Ratio","f":"(Cash + Mkt Sec + Receivables) / Current Liab","area":"BAR2"},{"name":"EVA","f":"NOPAT - (WACC x Invested Capital)","area":"BAR2"}],"tbs":[{"id":"TBS 7.1","title":"Working Capital and Financing Analysis","body":"**Scenario:** Analysis of various financing methods and their impact on working capital balances.\n\n### Task 1: Impact on Working Capital\n\n| Financing Method | Current Assets Impact | Current Liabilities Impact |\n|------------------|----------------------|---------------------------|\n| Term loan (24 mo, monthly principal) | +$240,000 | +$120,000 |\n| Term loan (balloon payment at maturity) | +$240,000 | No change |\n| 12-month line of credit (50% drawdown) | +$120,000 | +$120,000 |\n| Factoring receivables (12% discount) | -$40,000 | No change |\n| Sale of fixed assets for $100,000 | +$100,000 | No change |\n\n**Explanation:**\n- **Row 2:** 24-month term loan with monthly principal payments means half ($120,000) is due within 12 months (current liability).\n- **Row 3:** Balloon payment at maturity means no principal due within 12 months, so no current liability.\n- **Row 4:** Line of credit repayment due at end of 12 months makes entire drawdown a current liability.\n- **Row 5:** Factoring reduces receivables but increases cash less the discount ($333,333 × 12% = $40,000).\n- **Row 6:** Sale of trucks converts long-term assets to cash.\n\n---"},{"id":"TBS 7.2","title":"Product Line Profitability Analysis (Make or Buy)","body":"### Part I: Make vs. Buy Analysis\n\n**BRINK PRODUCT LINE—Projected Sales = 50,000 units**\n\n| Cost Line Item | Total Cost | Cost per Unit |\n|----------------|------------|---------------|\n| Direct materials | $35,000 | $0.70 |\n| Direct labor | $200,000 | $4.00 |\n| Fixed overhead (avoidable) | $84,000 | $1.68 |\n| Variable overhead | $180,000 | $3.60 |\n| **Totals** | **$499,000** | **$9.98** |\n\n**Analysis:**\n- Current cost to make: $9.98 per unit\n- Offer to buy: $9.10 per unit\n- Breakeven avoidable fixed costs: ($9.98 - $9.10) × 50,000 = $44,000\n\nIf avoidable fixed costs can be reduced to $40,000, the make-or-buy decision becomes cost neutral.\n\n---"},{"id":"TBS 7.3","title":"Hedging Journal Entries","body":"### Hedge Types and Reporting\n\n| Scenario | Hedge Type | Impact on Earnings | Impact on OCI |\n|----------|------------|-------------------|---------------|\n| Variable-rate debt + interest rate swap | Cash flow hedge | $0 | ($15,000) |\n| Inventory + futures contract | Fair value hedge | ($50) | $0 |\n| Net investment in foreign subsidiary + forward contract | Net investment hedge | $0 | $600 |\n\n**Explanation:**\n- **Cash flow hedge:** Unrealized losses reported in OCI until hedged item affects earnings.\n- **Fair value hedge:** Both gain on derivative and offsetting loss on inventory recognized in earnings.\n- **Net investment hedge:** Forward contract gain and cumulative translation adjustment both in OCI.\n\n---"},{"id":"TBS 7.4","title":"Construction Contract Accounting","body":"### Three-Year Construction Project Journal Entries\n\n**Year 1 Entry:**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| CIP | $3,375,000 | |\n| Contracts Receivable | $350,000 | |\n| Construction Expense | $2,362,500 | |\n| Cash | | $512,500 |\n| Progress Billings | | $2,200,000 |\n| Construction Revenue | | $3,375,000 |\n\n**Calculations:**\n- Percentage complete: $2,362,500 / $5,250,000 = 45%\n- Expected profit: $7,500,000 - $5,250,000 = $2,250,000\n- Recognized profit: $2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000\n\n---"},{"id":"TBS 7.5","title":"Standard Costing Variance Analysis","body":"### Direct Materials Variances\n\n**First Journal Entry (Purchase):**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| Raw materials inventory (45,000 × $15) | $675,000 | |\n| Direct materials purchase price variance | $90,000 | |\n| Accounts payable (45,000 × $17) | | $765,000 |\n\n**Price Variance:** 45,000 × ($17 - $15) = $90,000 Unfavorable\n\n**Second Journal Entry (Usage):**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| Work-in-process inventory (42,500 × $15) | $637,500 | |\n| Direct materials usage variance | $67,500 | |\n| Raw materials inventory (47,000 × $15) | | $705,000 |\n\n**Usage Variance:** $15 × (47,000 - 42,500) = $67,500 Unfavorable\n\n---"},{"id":"TBS 7.6","title":"Stock-Based Compensation","body":"### Stock Options Journal Entries\n\n**Year 2 & Year 3 - Record Compensation Expense:**\n```\nDR Compensation expense    $15,000\n    CR APIC—Stock options         $15,000\n```\n\n**Year 4 - Exercise of Options:**\n```\nDR Cash ($45 × 5,000)           $225,000\nDR APIC—Stock options            $30,000\n    CR Common stock ($20 × 5,000)       $100,000\n    CR APIC—Common stock (plug)         $155,000\n```\n\n**Stock Appreciation Rights (SARs):**\n- Year 1 compensation expense = Stock appreciation × SARs × Service rendered\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- Year 2 adjustment based on fair value changes\n\n---"},{"id":"TBS 7.7","title":"Lease Accounting","body":"### Finance Lease Recognition\n\n**Lessee Initial Entry:**\n```\nDR ROU Asset               $496,736\n    CR Lease Liability              $496,736\n```\n\n**Calculation:**\n- Present value of lease payments: $472,061\n- Present value of guaranteed residual: $24,675\n- Total: $496,736\n\n**Amortization Schedule:**\n\n| Date | Payment | Interest (6%) | Principal | Carrying Value |\n|------|---------|---------------|-----------|----------------|\n| Jan 1, Yr 1 | | | | $496,736 |\n| Dec 31, Yr 1 | $96,000 | $29,804 | $66,196 | $430,540 |\n| Dec 31, Yr 2 | $96,000 | $25,832 | $70,168 | $360,373 |\n| Dec 31, Yr 3 | $96,000 | $21,622 | $74,378 | $285,995 |\n| Dec 31, Yr 4 | $96,000 | $17,160 | $78,840 | $207,155 |\n| Dec 31, Yr 5 | $96,000 | $12,429 | $83,571 | $123,584 |\n| Dec 31, Yr 6 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**Total Interest Revenue:** $114,264\n\n---"},{"id":"TBS 7.8","title":"Government Fund Journal Entries","body":"### Common Governmental Fund Entries\n\n| Transaction | Entry |\n|-------------|-------|\n| Issuance of general obligation bonds | DR Cash / CR Other financing sources |\n| Issue purchase orders | DR Encumbrance control / CR Budgetary control |\n| Receipt of ordered supplies | DR Budgetary control / CR Encumbrance control; DR Expenditures control / CR Vouchers payable |\n| Record salaries and wages | DR Expenditures control / CR Vouchers payable |\n| Grant revenue earned | DR Deferred inflows of resources / CR Grant revenues |\n| Property taxes collected in advance | DR Cash / CR Deferred inflows of resources |\n| Budget adoption (surplus) | DR Estimated revenues / CR Appropriations control / CR Budgetary control |\n| Tax anticipation notes | DR Cash / CR Tax anticipation notes payable |\n\n---"},{"id":"TBS 7.9","title":"Foreign Currency Translation vs. Remeasurement","body":"### Comparison of Methods\n\n| Item | Remeasurement Method | Translation Method |\n|------|---------------------|-------------------|\n| **Balance Sheet** | | |\n| Monetary items | Current rate | Current rate |\n| Nonmonetary items | Historical rate | Current rate |\n| Inventory (purchased evenly) | Weighted average | Current rate |\n| Common/Preferred stock | Historical rate | Historical rate |\n| **Income Statement** | | |\n| Revenue/Expenses | Weighted average | Weighted average |\n| Depreciation | Historical rate | Weighted average |\n| **Plug Figure** | Gain/Loss on I/S | Cumulative Translation Adjustment in OCI |\n\n---"},{"id":"TBS 7.10","title":"Economics - Supply and Demand Analysis","body":"### Market Equilibrium Effects\n\n| Event | Curve Shift | Price Effect | Quantity Effect |\n|-------|-------------|--------------|-----------------|\n| Increase in consumer income +
