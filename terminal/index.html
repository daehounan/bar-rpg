 対価 $480,000(75%); 非支配持分の公正価値 $150,000(25%)。","labels":["ケースA — 被取得企業の総公正価値($)","ケースA — のれん($)","ケースB — 被取得企業の総公正価値($)","ケースB — 結果","ケースB — 認識された利益($)"],"options":{"Goodwill":"のれん","Bargain purchase gain":"割安購入益"}}},"TBS 8.3":{"ko":{"prompt":"**시나리오 — 순정기연금원가(확정급여, US GAAP).** 근무원가 **$120,000**; 이자원가 **$90,000**; 사외적립자산 기대수익 **$80,000**; 과거근무원가 상각 **$15,000**; 순액 정보의 손실 상각 **$5,000**.","labels":["순정기연금원가($)","사외적립자산 기대수익은…"],"options":{"Decreases pension cost":"연금원가를 감소시킨다","Increases pension cost":"연금원가를 증가시킨다"}},"ja":{"prompt":"**シナリオ — 純年金費用(確定給付、US GAAP).** 勤務費用 **$120,000**; 利息費用 **$90,000**; 期待運用収益 **$80,000**; 過去勤務費用償却 **$15,000**; 純額アクチュアリアル損失償却 **$5,000**.","labels":["純年金費用($)","期待運用収益は…"],"options":{"Decreases pension cost":"年金費用を減少させる","Increases pension cost":"年金費用を増加させる"}}},"TBS 8.4":{"ko":{"prompt":"**시나리오 — 기본주당이익 & 희석주당이익.** 순이익 **$500,000**; 누적 우선주배당금 **$50,000**; 가중평균 보통주 **200,000**주. 선택권: 행사가 $20인 30,000주, 평균시장가 $25. 전환사채: $1,000,000의 8%, 20,000주로 전환 가능; 세율 25%.","labels":["기본주당이익($)","자기주식법으로 인한 선택권으로부터의 증분주식(주)","전환사채는…","희석주당이익($)"],"options":{"Antidilutive (exclude)":"반희석(제외)","Dilutive (include)":"희석(포함)"}},"ja":{"prompt":"**シナリオ — 基本EPS & 希薄化後EPS.** 純利益 **$500,000**; 累積優先株配当金 **$50,000**; 加重平均普通株式数 **200,000**株。オプション: 行使価格$20の30,000株、平均市場価格$25。転換社債: $1,000,000の8%、20,000株に転換可能; 税率25%。","labels":["基本EPS($)","自己株式法によるオプションからの増分株式数(株)","転換社債は…","希薄化後EPS($)"],"options":{"Antidilutive (exclude)":"希薄化防止(除外)","Dilutive (include)":"希薄化(含む)"}}},"TBS 8.5":{"ko":{"prompt":"**시나리오 — 이연법인세.** 세전 재무 순이익 **$800,000**. (1) 세무상비과세 시정부채 이자 **$20,000**; (2) 세무상 감가상각액이 장부상을 초과 **$100,000**; (3) 보증 비용을 장부에 적립했으나 **$30,000** 아직 공제불가. 규정세율 **25%**.","labels":["과세소득($)","당기 미지급법인세($)","이연법인세부채($)","이연법인세자산($)","총 법인세비용($)"],"options":{}},"ja":{"prompt":"**シナリオ — 繰延法人税.** 税引前財務利益 **$800,000**。(1) 税務上非課税 市債利息 **$20,000**; (2) 税務減価償却が簿価を超過 **$100,000**; (3) 保証費用を簿価に計上したが **$30,000** 未だ控除不可。規定税率 **25%**。","labels":["課税所得($)","当期未払法人税($)","繰延税金負債($)","繰延税金資産($)","総法人税費用($)"],"options":{}}},"TBS 8.6":{"ko":{"prompt":"**시나리오 — 간접법 영업활동현금흐름.** 당기순이익 **$250,000**; 감가상각비 **$40,000**; 처분이익 **$15,000**; 매출채권 **증가** $20,000; 재고자산 **감소** $10,000; 매입채무 **증가** $8,000; 미지급비용 **감소** $5,000.","labels":["영업활동으로부터 제공된 순현금 ($)","장비 처분이익은…","매출채권 증가는…"],"options":{"Subtracted":"차감","Added":"가산"}},"ja":{"prompt":"**シナリオ — 間接法 営業キャッシュフロー.** 当期純利益 **$250,000**; 減価償却費 **$40,000**; 売却益 **$15,000**; 売掛金 **増加** $20,000; 棚卸資産 **減少** $10,000; 買掛金 **増加** $8,000; 未払費用 **減少** $5,000.","labels":["営業活動から提供された順キャッシュフロー ($)","機械装置の売却益は…","売掛金の増加は…"],"options":{"Subtracted":"減算","Added":"加算"}}},"TBS 8.7":{"ko":{"prompt":"**시나리오 — ASC 606 수익인식 배분.** 번들 가격 **$120,000** (기계장치 + 2년 용역 포함). 개별판매가격: 기계장치 **$100,000**, 용역 **$40,000**. 기계장치는 초기에 납품; 용역은 2년 동안 직선법.","labels":["기계장치에 배분된 가격 ($)","용역에 배분된 가격 ($)","연도 1 총 수익 ($)"],"options":{}},"ja":{"prompt":"**シナリオ — ASC 606 収益認識 配分.** バンドル価格 **$120,000** (機械装置 + 2年サービス). 独立販売価格: 機械装置 **$100,000**, サービス **$40,000**. 機械装置は初期に納品; サービスは2年間直線法.","labels":["機械装置に配分された価格 ($)","サービスに配分された価格 ($)","年度1 総収益 ($)"],"options":{}}},"TBS 8.8":{"ko":{"prompt":"**시나리오 — GASB 54 기금잔액분류 및 조정.** 일반기금 총기금잔액 **$500,000**. 각 항목을 분류한 후, 정부전체순자산으로의 조정 효과를 제시하시오.\n\n항목: 소모품 재고 $30,000; 도로 건설 목적의 주정부 보조금 $200,000; 의회 조례에 의해 확약된 준비금 $150,000; 미지급 구매주문(Encumbrance) $40,000; 잔여액 $80,000.","labels":["소모품 재고 — 분류","도로 건설 목적의 주정부 보조금 — 분류","의회 조례 준비금 — 분류","미지급 구매주문 — 분류","잔여액 — 분류","조정: 자본자산(순액) 효과 ($)","조정: 장기부채 효과 ($)"],"options":{"Nonspendable":"비소비성","Restricted":"제약","Committed":"확약","Assigned":"지정","Unassigned":"미지정"}},"ja":{"prompt":"**シナリオ — GASB 54 基金残高分類及び調整.** 一般基金 総基金残高 **$500,000**. 各項目を分類し、その後、政府全体純資産への調整効果を示してください。\n\n項目: 消耗品在庫 $30,000; 道路建設の目的で制約された州補助金 $200,000; 議会条例により拘束された準備金 $150,000; 未払い発注(Encumbrance) $40,000; 残額 $80,000.","labels":["消耗品在庫 — 分類","道路建設の目的で制約された州補助金 — 分類","議会条例準備金 — 分類","未払い発注 — 分類","残額 — 分類","調整: 資本資産(純額) 効果 ($)","調整: 長期負債 効果 ($)"],"options":{"Nonspendable":"非消費性","Restricted":"制約","Committed":"拘束","Assigned":"指定","Unassigned":"未指定"}}},"TBS 8.9":{"ko":{"prompt":"**시나리오 — 비영리 활동명세서 (ASU 2016-14).** 연중: 기부자제약 없는 기부금 $300,000; 건물 건설 목적의 기부자제약 있는 기부금 $500,000; 다음 연도 목적(시간) 기부자제약 있는 기부금 $100,000; 기부자제약 없는 투자수익 $25,000; 제약으로부터 해제된 순자산 $150,000. 영업비용 $400,000 (모두 기부자제약 없음).","labels":["기부자제약 없는 순자산 변화 ($)","기부자제약 있는 순자산 변화 ($)","건물 기부금은 다음과 같이 분류됩니다…"],"options":{"With donor restrictions":"기부자제약 있음","Without donor restrictions":"기부자제약 없음"}},"ja":{"prompt":"**シナリオ — 非営利 活動計算書 (ASU 2016-14).** 当年度: 寄付者制約なし寄付金 $300,000; 建物建設目的の寄付者制約あり寄付金 $500,000; 翌年度目的(時間)の寄付者制約あり寄付金 $100,000; 寄付者制約なし投資収益 $25,000; 制約からの解放された純資産 $150,000. 営業費用 $400,000 (すべて寄付者制約なし).","labels":["寄付者制約なし純資産の変化 ($)","寄付者制約あり純資産の変化 ($)","建物寄付金は次のように分類されます…"],"options":{"With donor restrictions":"寄付者制約あり","Without donor restrictions":"寄付者制約なし"}}},"TBS 8.10":{"ko":{"prompt":"**시나리오 — 자본예산.** 초기 투자 **$500,000**; 균등한 연간 세후 현금유입 **$150,000** (5년간); 자본비용 **10%**. 현재가치계수(10%, 5년) = **3.7908**. (현재가치계수: 15% = 3.3522, 16% = 3.2743.)","labels":["회수기간 (연)","순현재가치(NPV) ($)","내부수익률(IRR) (%)","의사결정"],"options":{"Accept":"채택","Reject":"기각"}},"ja":{"prompt":"**シナリオ — 資本予算.** 初期投資 **$500,000**; 等しい年間税後キャッシュフロー **$150,000** (5年間); 資本コスト **10%**. 現在価値係数(10%, 5年) = **3.7908**. (現在価値係数: 15% = 3.3522, 16% = 3.2743.)","labels":["回収期間 (年)","正味現在価値(NPV) ($)","内部収益率(IRR) (%)","意思決定"],"options":{"Accept":"採択","Reject":"却下"}}}}};
const NEWS = [{"id":"NW-01","area":"BAR1","en":{"head":"COSO ERM ties risk to strategy","body":"The 2017 COSO ERM framework has 5 components and 20 principles, integrating risk management with strategy-setting and performance."},"ja":{"head":"COSO ERM、リスクを戦略と統合","body":"2017年COSO ERMフレームワークは5構成要素・20原則で、リスク管理を戦略策定と業績に統合する。"},"ko":{"head":"COSO ERM, 리스크를 전략과 통합","body":"2017 COSO ERM 프레임워크는 5개 구성요소·20개 원칙으로 리스크 관리를 전략 수립·성과와 통합한다."}},{"id":"NW-02","area":"BAR1","en":{"head":"Four ways to treat a risk","body":"Risk responses: avoid, reduce (mitigate), share (transfer/insure), or accept — chosen against the entity's risk appetite."},"ja":{"head":"リスク対応は4通り","body":"リスク対応は回避・低減・移転(共有/保険)・受容の4つ。組織のリスク選好に照らして選ぶ。"},"ko":{"head":"리스크 대응은 네 가지","body":"리스크 대응=회피·감소(완화)·이전(공유/보험)·수용. 조직의 리스크 선호(risk appetite)에 비춰 선택한다."}},{"id":"NW-03","area":"BAR1","en":{"head":"VaR caps the downside estimate","body":"Value at Risk estimates the maximum expected loss over a horizon at a confidence level (e.g., 95%) — it ignores tail losses beyond it."},"ja":{"head":"VaRは下振れ損失の上限推計","body":"バリュー・アット・リスクは一定期間・信頼水準(例:95%)での最大予想損失を推計。その先のテールリスクは捉えない。"},"ko":{"head":"VaR, 손실 하방을 추정","body":"VaR(Value at Risk)는 일정 기간·신뢰수준(예: 95%)에서의 최대 예상손실을 추정한다. 그 너머 꼬리손실은 보지 못한다."}},{"id":"NW-04","area":"BAR1","en":{"head":"Cash-flow hedge parks gains in OCI","body":"For a qualifying cash-flow hedge, the effective portion of the derivative's gain/loss goes to OCI until the hedged item hits earnings."},"ja":{"head":"キャッシュフロー・ヘッジはOCIで待機","body":"適格なキャッシュフロー・ヘッジでは、デリバティブ損益の有効部分はヘッジ対象が損益計上されるまでOCIに計上する。"},"ko":{"head":"현금흐름위험회피, 이익은 OCI에 대기","body":"적격 현금흐름위험회피에서 파생상품 손익의 효과적 부분은 위험회피대상이 당기손익에 반영될 때까지 기타포괄손익(OCI)에 둔다."}},{"id":"NW-05","area":"BAR2","en":{"head":"WACC weights cost of capital by market value","body":"WACC = (E/V)·Re + (D/V)·Rd·(1−T). Use market-value weights, not book values."},"ja":{"head":"WACCは時価ウェイトで加重","body":"WACC =(E/V)・Re +(D/V)・Rd・(1−T)。ウェイトは簿価でなく時価を用いる。"},"ko":{"head":"WACC, 자본비용을 시장가치로 가중","body":"WACC =(E/V)·Re +(D/V)·Rd·(1−T). 가중치는 장부가가 아니라 시장가치를 쓴다."}},{"id":"NW-06","area":"BAR2","en":{"head":"Cash conversion cycle squeezes liquidity","body":"Net working capital = current assets − current liabilities; the cash conversion cycle = DIO + DSO − DPO."},"ja":{"head":"現金循環日数が流動性を左右","body":"正味運転資本=流動資産−流動負債。現金循環日数(CCC)= DIO + DSO − DPO。"},"ko":{"head":"현금전환주기가 유동성을 좌우","body":"순운전자본=유동자산−유동부채. 현금전환주기(CCC)= 재고일수(DIO)+ 매출채권일수(DSO)− 매입채무일수(DPO)."}},{"id":"NW-07","area":"BAR2","en":{"head":"CAPM prices risk through beta","body":"Cost of equity = Rf + β·(market risk premium). Beta measures systematic (non-diversifiable) risk."},"ja":{"head":"CAPMはβでリスクを価格付け","body":"株主資本コスト = Rf + β・(マーケット・リスクプレミアム)。βは分散できないシステマティック・リスクを測る。"},"ko":{"head":"CAPM, 베타로 리스크를 가격화","body":"자기자본비용 = Rf + β·(시장위험프리미엄). 베타는 분산 불가능한 체계적 위험을 측정한다."}},{"id":"NW-08","area":"BAR2","en":{"head":"Debt brings a tax shield — and risk","body":"M&M with taxes: debt raises firm value via the interest tax shield, but financial leverage amplifies EPS volatility."},"ja":{"head":"負債は節税効果と引き換えにリスク","body":"MM理論(税あり):負債は支払利息の節税効果で企業価値を高めるが、財務レバレッジはEPSの変動を増幅する。"},"ko":{"head":"부채는 절세효과와 리스크를 동시에","body":"MM이론(법인세 고려): 부채는 이자 절세효과로 기업가치를 높이지만, 재무레버리지는 EPS 변동성을 키운다."}},{"id":"NW-09","area":"BAR3","en":{"head":"Break-even = fixed costs ÷ contribution margin","body":"Contribution margin = price − variable cost; break-even units = fixed costs ÷ CM per unit."},"ja":{"head":"損益分岐点=固定費÷貢献利益","body":"貢献利益(限界利益)= 価格 − 変動費。損益分岐点数量 = 固定費 ÷ 単位当たり貢献利益。"},"ko":{"head":"손익분기점=고정비÷공헌이익","body":"공헌이익 = 가격 − 변동원가. 손익분기 판매량 = 고정비 ÷ 단위당 공헌이익."}},{"id":"NW-10","area":"BAR3","en":{"head":"Favorable variance, unfavorable trap","body":"A favorable variance means actual beat standard — but always split price (rate) from quantity (efficiency) before concluding."},"ja":{"head":"有利差異の落とし穴に注意","body":"有利差異は実績が標準を上回った意味。結論前に必ず価格(賃率)差異と数量(能率)差異を分けて分析する。"},"ko":{"head":"유리한 차이, 함정 주의","body":"유리한 차이는 실제가 표준보다 좋았다는 뜻. 결론 전에 반드시 가격(임률) 차이와 수량(능률) 차이를 분리해 분석한다."}},{"id":"NW-11","area":"BAR3","en":{"head":"Absorption vs. variable costing diverge on inventory","body":"Absorption costing puts fixed manufacturing overhead into product cost; variable costing expenses it — so income differs when inventory changes."},"ja":{"head":"全部原価と直接原価は在庫で分岐","body":"全部原価計算は固定製造間接費を製品原価に算入、直接原価計算は期間費用とする。在庫が増減すると利益が食い違う。"},"ko":{"head":"전부원가 vs 변동원가, 재고에서 갈린다","body":"전부원가계산은 고정제조간접비를 제품원가에 포함, 변동원가계산은 기간비용 처리. 재고가 변하면 이익이 달라진다."}},{"id":"NW-12","area":"BAR3","en":{"head":"Balanced scorecard looks past the P&L","body":"The balanced scorecard tracks four perspectives: financial, customer, internal process, and learning & growth."},"ja":{"head":"BSCはP&Lの先を見る","body":"バランスト・スコアカードは財務・顧客・内部プロセス・学習と成長の4つの視点を追う。"},"ko":{"head":"균형성과표는 손익 너머를 본다","body":"균형성과표(BSC)는 재무·고객·내부프로세스·학습과 성장의 4가지 관점을 추적한다."}},{"id":"NW-13","area":"BAR4","en":{"head":"Goodwill isn't amortized — it's tested","body":"Under US GAAP, goodwill is not amortized but tested for impairment (private companies may elect amortization)."},"ja":{"head":"のれんは償却せず減損テスト","body":"米国基準ではのれんは償却せず減損テストを行う(非公開会社は償却を選択可能)。"},"ko":{"head":"영업권은 상각 않고 손상검사","body":"US GAAP에서 영업권은 상각하지 않고 손상검사를 한다(비상장기업은 상각 선택 가능)."}},{"id":"NW-14","area":"BAR4","en":{"head":"ASC 842 puts leases on the balance sheet","body":"Lessees record a right-of-use asset and lease liability; finance vs. operating classification drives the expense pattern."},"ja":{"head":"ASC 842、リースをB/Sに計上","body":"借手は使用権資産とリース負債を計上。ファイナンス/オペレーティングの区分が費用の認識パターンを決める。"},"ko":{"head":"ASC 842, 리스를 재무상태표에","body":"리스이용자는 사용권자산과 리스부채를 인식한다. 금융리스/운용리스 분류가 비용 인식 패턴을 결정한다."}},{"id":"NW-15","area":"BAR4","en":{"head":"Eliminate intercompany before consolidating","body":"Consolidation removes intercompany transactions and unrealized profit; non-controlling interest sits within equity."},"ja":{"head":"連結前に内部取引を消去","body":"連結では内部取引と未実現利益を消去する。非支配持分は資本の部に表示する。"},"ko":{"head":"연결 전에 내부거래를 제거","body":"연결 시 내부거래와 미실현이익을 제거한다. 비지배지분은 자본 내에 표시한다."}},{"id":"NW-16","area":"BAR4","en":{"head":"Revenue: the five-step model","body":"ASC 606: identify the contract and performance obligations, set the price, allocate it, then recognize as obligations are satisfied."},"ja":{"head":"収益認識は5ステップ","body":"ASC 606:契約と履行義務を識別、取引価格を算定、配分し、義務の充足につれて収益を認識する。"},"ko":{"head":"수익인식은 5단계 모형","body":"ASC 606: 계약·수행의무 식별 → 거래가격 산정 → 배분 → 수행의무 이행에 따라 수익 인식."}},{"id":"NW-17","area":"BAR5","en":{"head":"Modified accrual: measurable and available","body":"Governmental funds recognize revenue when measurable and available (collectible within ~60 days) under modified accrual."},"ja":{"head":"修正発生主義は測定可能かつ利用可能","body":"政府基金は修正発生主義の下、測定可能かつ利用可能(概ね60日以内に回収)となった時点で収益を認識する。"},"ko":{"head":"수정발생주의: 측정가능·이용가능","body":"정부기금은 수정발생주의에서 측정가능하고 이용가능(약 60일 내 회수)할 때 수익을 인식한다."}},{"id":"NW-18","area":"BAR5","en":{"head":"GASB 34: government-wide and fund views","body":"GASB 34 requires both government-wide statements (full accrual) and fund-level statements, reconciled between the two."},"ja":{"head":"GASB 34、政府全体と基金の二本立て","body":"GASB 34は政府全体の財務諸表(完全発生主義)と基金別財務諸表の双方を求め、両者を調整表で連結する。"},"ko":{"head":"GASB 34, 정부전체와 기금 이원 보고","body":"GASB 34는 정부전체 재무제표(완전발생주의)와 기금별 재무제표를 모두 요구하고, 둘 사이를 조정표로 연결한다."}},{"id":"NW-19","area":"BAR5","en":{"head":"Fund balance, five flavors","body":"GASB 54 classifies governmental fund balance as nonspendable, restricted, committed, assigned, and unassigned."},"ja":{"head":"基金残高は5分類","body":"GASB 54は政府基金の基金残高を、非消費可能・制限付・約定済・指定済・未指定の5つに分類する。"},"ko":{"head":"기금잔액은 다섯 갈래","body":"GASB 54는 정부기금의 기금잔액을 비소비성·제약·확약·지정·미지정의 5가지로 분류한다."}},{"id":"NW-20","area":"BAR5","en":{"head":"Encumbrances reserve the budget","body":"Encumbrance accounting commits appropriations for purchase orders — a budgetary control, not an expenditure."},"ja":{"head":"予算拘束(encumbrance)で予算を留保","body":"予算拘束会計は発注に対し歳出予算を確保する手続きで、支出そのものではなく予算統制の仕組み。"},"ko":{"head":"지출약정(encumbrance)으로 예산 유보","body":"지출약정 회계는 발주에 대해 세출예산을 확보하는 절차로, 지출 자체가 아니라 예산통제 장치다."}},{"id":"NW-21","area":"FIN","en":{"head":"Positive NPV creates value","body":"Accept projects with NPV > 0; IRR is the rate where NPV = 0 — watch for conflicts on mutually exclusive projects."},"ja":{"head":"正のNPVが価値を生む","body":"NPV > 0 の案件を採用。IRRはNPV = 0となる割引率。相互排他的な案件では両指標が食い違うことがある。"},"ko":{"head":"양(+)의 NPV가 가치를 만든다","body":"NPV > 0 인 사업을 채택. IRR은 NPV = 0이 되는 할인율 — 상호배타적 사업에선 두 지표가 충돌할 수 있다."}},{"id":"NW-22","area":"FIN","en":{"head":"Current vs. quick ratio","body":"Current ratio = current assets ÷ current liabilities; the quick (acid-test) ratio excludes inventory for a tighter liquidity read."},"ja":{"head":"流動比率と当座比率","body":"流動比率=流動資産÷流動負債。当座比率(酸性試験)は在庫を除き、より厳しく流動性を見る。"},"ko":{"head":"유동비율 vs 당좌비율","body":"유동비율=유동자산÷유동부채. 당좌비율(산성시험)은 재고를 빼고 더 보수적으로 유동성을 본다."}},{"id":"NW-23","area":"FIN","en":{"head":"Bond prices move opposite to yields","body":"When market rates rise, existing bond prices fall; a bond trades at a premium when its coupon exceeds the market yield."},"ja":{"head":"債券価格は利回りと逆相関","body":"市場金利が上がると既発債の価格は下がる。クーポンが市場利回りを上回れば債券はプレミアムで取引される。"},"ko":{"head":"채권가격은 수익률과 반대로","body":"시장금리가 오르면 기존 채권가격은 내린다. 표면이자율이 시장수익률보다 높으면 채권은 할증(프리미엄)으로 거래된다."}},{"id":"NW-24","area":"FIN","en":{"head":"Currency risk cuts both ways","body":"Translation (accounting) exposure differs from transaction (cash) exposure; forwards and options hedge foreign-currency cash flows."},"ja":{"head":"為替リスクは両刃の剣","body":"換算(会計)エクスポージャーと取引(キャッシュ)エクスポージャーは別物。先渡やオプションで外貨キャッシュフローをヘッジする。"},"ko":{"head":"환위험은 양날의 칼","body":"환산(회계) 노출과 거래(현금) 노출은 다르다. 선도·옵션으로 외화 현금흐름을 헤지한다."}}];

const $=(s,r)=>(r||document).querySelector(s);

function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(s){ /* minimal, safe (escaped first) markdown for explanations */
  s=esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  return s.split(/\n+/).map(function(l){l=l.trim();
    if(!l)return''; if(/^[-•]\s+/.test(l))return '<div class="li">'+l.replace(/^[-•]\s+/,'')+'</div>'; return '<div>'+l+'</div>';
  }).join('');
}
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}
let _seed=1234567;function rng(){_seed=(_seed*1103515245+12345)&0x7fffffff;return _seed/0x7fffffff;}
function reseed(){_seed=(Date.now()^(Math.floor(Math.random()*1e9)))>>>0||1;}
function money(n){n=Math.round(n);var s=n<0?'−':'';n=Math.abs(n);
  if(n>=1e6)return s+'$'+(n/1e6).toFixed(2)+'M'; if(n>=1e3)return s+'$'+(n/1e3).toFixed(0)+'K'; return s+'$'+n;}
function pnl(n){var sgn=n>0?'+':(n<0?'−':'');var a=Math.abs(Math.round(n));

const SAVE_KEY='BAR_TERMINAL_V1';
const GAME_ID='BAR_TERMINAL';
function fresh(){return {gid:GAME_ID,v:1,lang:'ko',
  xp:0, book:1000000, bestBook:1000000,
  streak:0, bestStreak:0,
  stats:{answered:0,correct:0,sessions:0},
  m:{},            /* mastery: key -> {n,ok,lastOk} */
  cov:{},          /* coverage: topicNum -> seen(bool) */
  trend:[],        /* recent 1/0 results for sparkline */
  badges:{},

};}
let S=null;
function load(){try{var r=localStorage.getItem(SAVE_KEY);if(r){S=JSON.parse(r);
  var f=fresh();for(var k in f)if(!(k in S))S[k]=f[k];
  if(!S.prefs)S.prefs=f.prefs; if(!S.stats)S.stats=f.stats; return true;}}catch(e){}
  S=fresh();return false;}
let _sv=null;function save(){clearTimeout(_sv);_sv=setTimeout(function(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}},120);}

function mkey(kind,id){return kind+':'+id;}
function bump(key,ok){var m=S.m[key]||(S.m[key]={n:0,ok:0});m.n++;if(ok)m.ok++;m.lastOk=!!ok;
  S.trend.push(ok?1:0);if(S.trend.length>24)S.trend.shift();}
function rOf(key){return S.m[key];}
function areaAcc(area){ /* accuracy across seen items of a desk */
  var n=0,ok=0;(MCQ_BY[area]||[]).forEach(function(q){var r=S.m['mcq:'+q.id];if(r){n+=r.n;ok+=r.ok;}});
  (TOP_BY[area]||[]).forEach(function(tp){var r=S.m['top:'+tp.num];if(r){n+=r.n;ok+=r.ok;}});
  return n?ok/n:-1;}
function coverPct(area){var ts=TOP_BY[area]||[];if(!ts.length)return -1;
  var c=ts.filter(function(tp){return S.cov[tp.num];}).length;return c/ts.length;}
function coverAll(){var c=0,tot=0;COVER_IDS.forEach(function(a){(TOP_BY[a]||[]).forEach(function(tp){tot++;if(S.cov[tp.num])c++;});});
  return tot?c/tot:0;}
function accPct(){return S.stats.answered?S.stats.correct/S.stats.answered:0;}

/* conviction rating from an accuracy ratio (−1 = unseen) */
function rateOf(acc){
  if(acc<0)return {cls:'n',lab:'N/R'};
  if(acc>=0.85)return {cls:'sb',lab:'STR BUY'};
  if(acc>=0.65)return {cls:'b',lab:'BUY'};
  if(acc>=0.45)return {cls:'h',lab:'HOLD'};
  if(acc>0)return {cls:'r',lab:'REDUCE'};
  return {cls:'s',lab:'SELL'};
}

/* due = executed-but-last-wrong, or low accuracy; for the review queue / tape */
function dueMcqs(){
  var out=[];(DATA.mcqs||[]).forEach(function(q){var r=S.m['mcq:'+q.id];
    if(r&&(r.lastOk===false||(r.ok/r.n)<0.5))out.push(q);});
  return out;
}

let _ac=null;
function sfx(kind){try{if(!S||!S.prefs||!S.prefs.sfx)return;
  _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
  var o=_ac.createOscillator(),g=_ac.createGain(),now=_ac.currentTime;
  var f={sel:520,ok:740,no:180,fill:880,promote:990}[kind]||440;
  o.type=(kind==='no')?'sawtooth':'triangle';o.frequency.value=f;
  g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.12,now+.01);
  g.gain.exponentialRampToValueAtTime(.0001,now+.18);
  o.connect(g);g.connect(_ac.destination);o.start(now);o.stop(now+.2);
  if(kind==='ok'||kind==='fill'){var o2=_ac.createOscillator();o2.type='triangle';o2.frequency.setValueAtTime(f,now+.06);o2.frequency.linearRampToValueAtTime(f*1.5,now+.16);o2.connect(g);o2.start(now+.06);o2.stop(now+.2);}
}catch(e){}}

function buildTape(){

  due.forEach(function(q){items.push('<span class="tk"><b>'+symFrom(q.title)+'</b><span class="due">● '+t('복습 권장')+'</span></span>');});
  /* names under coverage, colored by your conviction */
  COVER_IDS.forEach(function(a){
    sample(TOP_BY[a]||[],2).forEach(function(tp){
      var r=S.m['top:'+tp.num];var acc=r?r.ok/r.n:-1;
      var mv=((rng()*4+0.2)).toFixed(2);var up=acc<0?null:acc>=0.6;
      var cls=up==null?'':(up?'up':'down');var arr=up==null?'·':(up?'▲':'▼');
      items.push('<span class="tk"><b>'+symFrom(tp.subtopic||tp.name)+'</b><span class="'+cls+'">'+arr+' '+mv+'%</span></span>');

    items.push('<span class="tk"><b>'+DESK[id].sym+'</b><span class="gold">'+rt.lab+'</span></span>');});

}

function sparkline(arr){
  var w=300,h=54,n=Math.max(arr.length,2);
  var pts=[],run=0;
  for(var i=0;i<arr.length;i++){run+=arr[i]?1:-1;pts.push(run);}
  if(!pts.length)pts=[0,0];
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts);var rng2=(mx-mn)||1;
  var coords=pts.map(function(p,i){var x=(i/(n-1))*w;var y=h-4-((p-mn)/rng2)*(h-12);return x.toFixed(1)+','+y.toFixed(1);});
  var last=arr.length?(arr[arr.length-1]?'var(--up)':'var(--down)'):'var(--muted)';
  var svg='<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'+
    '<polyline points="'+coords.join(' ')+'" fill="none" stroke="'+last+'" stroke-width="2" stroke-linejoin="round"/>'+
    '</svg>';
  var wrap=el('div',null,svg);wrap.style.cssText='background:#070a12;border:1px solid var(--line);border-radius:9px;padding:8px';
  return wrap;
}
/* glowing equity / NAV curve (area chart, animated draw) */
function equityChart(arr){
  var w=320,h=96,pts=[],run=100;
  for(var i=0;i<arr.length;i++){run+=arr[i]?6:-5;pts.push(run);}
  if(pts.length<2)pts=[100,100,100];
  var mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rg=(mx-mn)||1;
  var X=function(i){return (i/(pts.length-1))*w;},Y=function(p){return h-7-((p-mn)/rg)*(h-20);};
  var line='';for(var j=0;j<pts.length;j++)line+=(j?'L':'M')+X(j).toFixed(1)+' '+Y(pts[j]).toFixed(1)+' ';
  var area=line+'L'+w+' '+h+' L0 '+h+' Z';
  var up=arr.length?arr[arr.length-1]:1,stroke=up?'var(--gold2)':'var(--down)',gid='eq'+Math.floor(rng()*1e6);
  var svg='<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" class="eqsvg">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0" stop-color="'+stroke+'" stop-opacity=".32"/><stop offset="1" stop-color="'+stroke+'" stop-opacity="0"/>'+
    '</linearGradient></defs><path d="'+area+'" fill="url(#'+gid+')"/>'+
    '<path d="'+line+'" fill="none" stroke="'+stroke+'" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" class="eqline"/></svg>';
  return el('div','eqwrap',svg);
}
/* deterministic mini candlestick chart per desk (decorative, on-theme) */
function miniCandles(id,up){
  var sym=(DESK[id]&&DESK[id].sym)||'BAR',s=0;for(var k=0;k<sym.length;k++)s=(s*31+sym.charCodeAt(k))>>>0;
  var rnd=function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  var n=13,w=160,h=30,cw=w/n,price=h*0.5,bias=(up==null?0:(up?-1:1)),out='';
  for(var i=0;i<n;i++){var o=price;price=clamp(price+(rnd()-0.5+bias*0.18)*6,4,h-4);var c=price;
    var x=(i+0.5)*cw,col=(c<=o)?'var(--up)':'var(--down)';
    var hi=Math.max(2,Math.min(o,c)-rnd()*3.5),lo=Math.min(h-2,Math.max(o,c)+rnd()*3.5);
    out+='<line x1="'+x.toFixed(1)+'" y1="'+hi.toFixed(1)+'" x2="'+x.toFixed(1)+'" y2="'+lo.toFixed(1)+'" stroke="'+col+'" stroke-width="1"/>';
    out+='<rect x="'+(x-cw*0.3).toFixed(1)+'" y="'+Math.min(o,c).toFixed(1)+'" width="'+(cw*0.6).toFixed(1)+'" height="'+Math.max(1.4,Math.abs(c-o)).toFixed(1)+'" fill="'+col+'"/>';
  }
  return '<svg class="mc" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+out+'</svg>';
}
/* faint living-market candlestick wall for the ambient background (stable seed) */
function buildMktWall(){
  var s=20260613,rnd=function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  var W=1600,H=900,n=84,cw=W/n,price=H*0.46,out='',vol='',grid='';
  for(var g=1;g<6;g++){var gy=(H*g/6).toFixed(0);grid+='<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="#2a3a58" stroke-width="1" opacity=".55"/>';}
  for(var i=0;i<n;i++){var o=price;price=clamp(price+(rnd()-0.5)*78,H*0.10,H*0.74);var c=price;
    var x=(i+0.5)*cw,col=(c<=o)?'#2fd07c':'#ff5d5d';
    var hi=Math.min(o,c)-rnd()*42,lo=Math.max(o,c)+rnd()*42;
    out+='<line x1="'+x.toFixed(0)+'" y1="'+hi.toFixed(0)+'" x2="'+x.toFixed(0)+'" y2="'+lo.toFixed(0)+'" stroke="'+col+'" stroke-width="2.5"/>';
    out+='<rect x="'+(x-cw*0.26).toFixed(0)+'" y="'+Math.min(o,c).toFixed(0)+'" width="'+(cw*0.52).toFixed(0)+'" height="'+Math.max(4,Math.abs(c-o)).toFixed(0)+'" fill="'+col+'"/>';
    var vh=(24+rnd()*150).toFixed(0);vol+='<rect x="'+(x-cw*0.26).toFixed(0)+'" y="'+(H-vh).toFixed(0)+'" width="'+(cw*0.52).toFixed(0)+'" height="'+vh+'" fill="'+col+'" opacity=".38"/>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid slice">'+grid+vol+out+'</svg>';

/* animated count-up for big money figures */
function rollNum(node,to,fmt){
  if(!node)return;
  if(!S||!S.prefs||!S.prefs.motion){node.textContent=fmt(to);return;}
  var from=to*0.6,t0=null,dur=900;
  function fr(ts){if(t0==null)t0=ts;var k=clamp((ts-t0)/dur,0,1),e=1-Math.pow(1-k,3);
    node.textContent=fmt(from+(to-from)*e);if(k<1)requestAnimationFrame(fr);}
  requestAnimationFrame(fr);
}
/* subtle 3D pointer-tilt for desk cards (motion-gated) */
function tiltCard(c){
  if(!S||!S.prefs||!S.prefs.motion)return;
  c.addEventListener('pointermove',function(e){
    var r=c.getBoundingClientRect();if(!r.width)return;
    var px=(e.clientX-r.left)/r.width-0.5,py=(e.clientY-r.top)/r.height-0.5;
    c.style.transform='translateY(-3px) rotateX('+(-py*6).toFixed(2)+'deg) rotateY('+(px*7).toFixed(2)+'deg)';
  });
  c.addEventListener('pointerleave',function(){c.style.transform='';});
}

/* =========================================================================
   SESSION ENGINE — recall (research notes) + MCQ (executions)
   ========================================================================= */
let SESS=null;
function buildQueue(opt){
  reseed();var q=[];
  if(opt.queue){return opt.queue;}
  if(opt.scope==='all'){
    q=sample(DATA.mcqs||[],opt.n).map(function(m){return {kind:'mcq',q:m};});
  }else if(opt.mode==='recall'){
    q=sample(TOP_BY[opt.scope]||[],opt.n).map(function(tp){return {kind:'recall',t:tp};});
  }else if(opt.mode==='mix'){
    var ms=sample(MCQ_BY[opt.scope]||[],Math.ceil(opt.n/2)).map(function(m){return {kind:'mcq',q:m};});
    var ts=sample(TOP_BY[opt.scope]||[],Math.floor(opt.n/2)).map(function(tp){return {kind:'recall',t:tp};});
    q=shuffle(ms.concat(ts));
  }else{
    q=sample(MCQ_BY[opt.scope]||[],opt.n).map(function(m){return {kind:'mcq',q:m};});
  }
  return q;
}
function startSession(opt){
  var queue=buildQueue(opt);
  if(!queue.length){toast(t('이 데스크의 모든 종목을 커버했습니다'));return;}
  SESS={opt:opt,queue:queue,i:0,fills:0,wins:0,pnl0:S.book,newCov:0,rankBefore:rankOf(S.xp).idx};
  go('session');
}
function startReview(){
  var due=dueMcqs();if(!due.length){toast(t('복습할 항목이 없습니다 — 더 체결해 보세요'));return;}
  startSession({queue:sample(due,Math.min(12,due.length)).map(function(m){return {kind:'mcq',q:m};}),scope:'review'});
}

  var qh=md(_q||q.question)+(_q?'<div class="en-orig">EN · '+md(q.question)+'</div>':'');

  var wrap=el('div','choices');var keys=['A','B','C','D'];var _tc=CT('mcqs',q.id,'choices');var hintUsed=false;
  keys.forEach(function(k){
    if(q.choices[k]==null)return;
    var txt=(_tc&&_tc[k])||q.choices[k];
    var c=el('button','choice','<span class="k">'+k+'</span><span>'+esc(txt)+'</span>');
    c.dataset.k=k;
    c.onclick=function(){
      if(c.getAttribute('disabled'))return;
      var ok=(k===q.answer);
      $$('.choice',wrap).forEach(function(x){x.setAttribute('disabled','');
        if(x.dataset.k===q.answer)x.classList.add('correct');else if(x.dataset.k===k)x.classList.add('wrong');});
      gradeMcq(card,q,ok,hintUsed);
    };
    wrap.append(c);
  });
  card.append(wrap);

  /* consensus hint (mnemonic) */
  var hintRow=el('div');hintRow.style.marginTop='12px';
  var hb=el('button','btn ghost sm','◔ '+t('애널리스트 컨센서스'));
  hb.onclick=function(){sfx('sel');hintUsed=true;
    var alt=keys.filter(function(k){return k!==q.answer&&q.choices[k]!=null;});
    sample(alt,Math.min(2,alt.length-0)).forEach(function(k){var c=wrap.querySelector('.choice[data-k="'+k+'"]');if(c&&!c.getAttribute('disabled')){c.classList.add('dim');}});
    hb.remove();};
  hintRow.append(hb);card.append(hintRow);
}
function gradeMcq(card,q,ok,hintUsed){
  card.classList.add(ok?'flash-ok':'flash-no');
  bump('mcq:'+q.id,ok);S.stats.answered++;
  var delta;
  if(ok){S.stats.correct++;S.streak++;S.bestStreak=Math.max(S.bestStreak,S.streak);S.xp++;
    delta=8000+Math.min(S.streak,8)*2500-(hintUsed?6000:0);SESS.wins++;sfx('fill');}
  else{S.streak=0;delta=-12000;sfx('no');}
  SESS.fills++;S.book=Math.max(50000,S.book+delta);S.bestBook=Math.max(S.bestBook,S.book);

  var ban=el('div','fill-banner '+(ok?'ok':'no'));
  ban.innerHTML='<span>'+(ok?'● '+t('체결 완료'):'○ '+t('손실'))+(hintUsed&&ok?' · '+t('힌트 사용됨'):'')+'</span>'+
    '<span class="pl num-pop">'+pnl(delta)+'</span>';
  card.append(ban);

  var _e=CT('mcqs',q.id,'explanation');
  var eh='<strong>'+t('정답')+': '+q.answer+'</strong><br>'+md(_e||q.explanation)+(_e?'<div class="en-orig">EN · '+md(q.explanation)+'</div>':'');
  card.append(el('div','note','<div class="nh">'+t('포스트 트레이드 노트')+'</div><div class="body">'+eh+'</div>'));

  nextButton(card);renderTop();save();
}

function gradeRecall(tp,ok){
  if(!S.cov[tp.num]){S.cov[tp.num]=1;SESS.newCov++;}
  bump('top:'+tp.num,ok);S.stats.answered++;
  if(ok){S.stats.correct++;S.streak++;S.bestStreak=Math.max(S.bestStreak,S.streak);S.xp++;S.book+=4000;sfx('ok');}
  else{S.streak=0;sfx('no');}
  SESS.fills++;if(ok)SESS.wins++;renderTop();save();advance();
}

function applyMotion(){document.documentElement.style.setProperty('scroll-behavior','auto');
  $('#tape-row').style.animationPlayState=S.prefs.motion?'running':'paused';
  var mb=document.querySelector('#mkt-bg svg');if(mb)mb.style.animationPlayState=S.prefs.motion?'running':'paused';}

function modalShell(){var root=$('#modal-root');root.innerHTML='';
  var sc=el('div','scrim');sc.onclick=function(e){if(e.target===sc)closeModal();};
  var m=el('div','modal');sc.append(m);root.append(sc);return m;}
function closeModal(){$('#modal-root').innerHTML='';}
function exportModal(){
  var code=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
  var m=modalShell();
  m.innerHTML='<h3>'+t('기록 내보내기')+'</h3><p class="sub" style="font-size:13px">'+esc(t('아래 코드를 복사하거나 파일로 저장해 백업하세요'))+'</p>';
  var ta=el('textarea','field');ta.value=code;ta.readOnly=true;m.append(ta);
  var row=el('div','actrow');row.style.marginTop='12px';
  var cp=el('button','btn solid',t('복사'));cp.onclick=function(){ta.select();try{document.execCommand('copy');}catch(e){}
    if(navigator.clipboard)navigator.clipboard.writeText(code);toast(t('복사됨'));};
  var sv=el('button','btn ghost',t('파일로 저장'));sv.onclick=function(){
    var blob=new Blob([code],{type:'text/plain'});var a=el('a');a.href=URL.createObjectURL(blob);
    a.download='bar_terminal_backup.txt';a.click();};
  var cl=el('button','btn ghost',t('취소'));cl.onclick=closeModal;
  row.append(cp,sv,cl);m.append(row);
}
function importModal(){
  var m=modalShell();
  m.innerHTML='<h3>'+t('기록 불러오기')+'</h3><p class="sub" style="font-size:13px">'+esc(t('백업 코드를 붙여넣으세요. 현재 진행을 덮어씁니다'))+'</p>';
  var ta=el('textarea','field');ta.placeholder='...';m.append(ta);
  var row=el('div','actrow');row.style.marginTop='12px';
  var go2=el('button','btn solid',t('불러오기'));
  go2.onclick=function(){var d;try{d=JSON.parse(decodeURIComponent(escape(atob(ta.value.trim()))));}catch(e){toast(t('다른 게임 또는 손상된 코드'));return;}
    if(!d||d.gid!==GAME_ID){toast(t('다른 게임 또는 손상된 코드'));return;}
    var f=fresh();for(var k in f)if(!(k in d))d[k]=f[k];S=d;
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}
    closeModal();toast(t('불러왔습니다'));renderTop();buildTape();go('home');};
  var cl=el('button','btn ghost',t('취소'));cl.onclick=closeModal;
  row.append(go2,cl);m.append(row);
}
function resetConfirm(){var m=modalShell();
  m.innerHTML='<h3>'+t('기록 초기화')+'</h3><p class="sub">'+esc(t('초기화하면 되돌릴 수 없어요'))+'</p>';
  var row=el('div','actrow');row.style.marginTop='14px';
  var yes=el('button','btn down',t('기록 초기화'));yes.onclick=function(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    S=fresh();closeModal();renderTop();buildTape();go('home');};
  var no=el('button','btn ghost',t('취소'));no.onclick=closeModal;row.append(yes,no);m.append(row);
}

/* =========================================================================
   Toast
   ========================================================================= */
let _tt=null;
function toast(msg){var t0=$('#toast');t0.textContent=msg;t0.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(function(){t0.classList.remove('on');},2600);}

/* =========================================================================
   Boot sequence
   ========================================================================= */
function boot(){
  var b=$('#boot');
  var lines=[t('보안 연결 수립 중'),t('시장 데이터 피드 동기화'),t('리서치 커버리지 로드')];
  b.innerHTML='<div class="boot-bg" id="bootbg" aria-hidden="true"></div><div class="scanline" aria-hidden="true"></div>'+
    '<div class="boot-crest" aria-hidden="true">'+CREST+'</div>'+
    '<div class="seal shine">BAR <b>CAPITAL</b></div>'+
    '<div class="tag">'+t('애널리스트 터미널')+'</div>'+
    '<div class="lines" id="bootl"></div>'+
    '<div class="bootbar" aria-hidden="true"><i id="bootbar-i"></i></div>'+
    '<div class="enter">'+t('탭하여 입장')+'</div>';
  try{$('#bootbg').innerHTML=MKTWALL;}catch(e){}
  var ll=$('#bootl'),pbar=$('#bootbar-i');var i=0;
  function step(){if(i<lines.length){
      ll.innerHTML+='<div><span class="c">$</span> '+esc(lines[i])+' <span style="color:var(--up)">OK</span></div>';
      i++;if(pbar)pbar.style.width=Math.round(i/lines.length*100)+'%';
      bt=setTimeout(step,500);}}
  var bt=setTimeout(step,360);
  function enter(){clearTimeout(bt);if(pbar)pbar.style.width='100%';
    b.style.transition='opacity .45s';b.style.opacity='0';
    setTimeout(function(){b.style.display='none';},460);
    b.removeEventListener('click',enter);try{sfx('promote');}catch(e){}}
  b.addEventListener('click',enter);
  /* auto-skip if reduced motion */
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){enter();}
}

/* =========================================================================
   Init
   ========================================================================= */
load();
try{document.documentElement.lang=S.lang;}catch(e){}
if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){S.prefs.motion=false;}
var MKTWALL=buildMktWall();
try{$('#mkt-bg').innerHTML=MKTWALL;}catch(e){}
try{$('#wm').innerHTML=CREST;}catch(e){}
buildDust();
renderTop();buildTape();applyMotion();
setInterval(function(){var c=document.getElementById('sesh-clock');if(c)c.textContent=new Date().toLocaleTimeString('en-GB');},1000);
go('home');
try{if(/[?&]action=review/.test(location.search))startReview();}catch(e){}
boot();
</script>

  });
  window.addEventListener('appinstalled',function(){var b=document.getElementById('pwa-ib');if(b)b.remove();});
  try{
    var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
    var standalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
    if(isIOS&&!standalone&&!localStorage.getItem(HKEY)){
      var h=document.createElement('div');

      h.style.cssText='position:fixed;left:10px;right:10px;bottom:calc(12px + env(safe-area-inset-bottom,0px));z-index:2147483600;display:flex;justify-content:center;align-items:center;gap:6px;padding:11px 14px;border-radius:12px;background:rgba(18,22,38,.95);color:#f0e3c2;font:500 13px/1.3 system-ui,-apple-system,sans-serif;box-shadow:0 6px 18px rgba(0,0,0,.5)';
      document.body.appendChild(h);
      h.querySelector('#pwa-x').onclick=function(){h.remove();try{localStorage.setItem(HKEY,'1');}catch(e){}};
    }
  }catch(e){}
})();</script>
