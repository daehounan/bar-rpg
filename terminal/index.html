 문화","B":"전략과 목표설정","C":"성과","D":"정보·소통·보고"},"explanation":"성과(Performance) 구성요소가 목표 달성에 영향을 줄 수 있는 위험을 발생가능성·영향도를 포함해 분석하고 우선순위를 매긴다."}},"AI-BAR1-03":{"ja":{"question":"為替レートの変動が多国籍企業にもたらすリスクには、次のすべてが含まれるが、例外は？","choices":{"A":"取引リスク","B":"換算リスク","C":"経済的リスク","D":"金利リスク"},"explanation":"為替エクスポージャーは取引・換算・経済的リスクから成る。金利リスクは為替ではなく金利の変動から生じる。"},"ko":{"question":"환율 변동이 다국적 기업에 노출시키는 위험에 다음이 모두 포함되지만, 예외는?","choices":{"A":"거래위험","B":"환산위험","C":"경제적 위험","D":"금리위험"},"explanation":"환율 익스포저는 거래·환산·경제적 위험으로 구성된다. 금리위험은 환율이 아니라 금리 변동에서 발생한다."}},"AI-BAR1-04":{"ja":{"question":"2財間の交差価格弾力性が正（＋）であるとき、その2財は？","choices":{"A":"補完財","B":"代替財","C":"劣等財","D":"正常財"},"explanation":"交差弾力性が正なら、一方の価格上昇が他方の需要を増やす＝代替財。負なら補完財。"},"ko":{"question":"두 재화 간 교차가격탄력성이 양(+)이면 두 재화는?","choices":{"A":"보완재","B":"대체재","C":"열등재","D":"정상재"},"explanation":"교차탄력성이 양수면 한 재화의 가격 상승이 다른 재화 수요를 늘림 → 대체재. 음수면 보완재."}},"AI-BAR1-05":{"ja":{"question":"COSOで、より大きな価値・機会を追求するために増加したリスクを受け入れるリスク対応は？","choices":{"A":"回避","B":"低減","C":"追求","D":"共有"},"explanation":"「追求」はより高い成果のために追加のリスクを取る。他の対応（受容・回避・低減・共有）はリスクを維持または低下させる。"},"ko":{"question":"COSO에서 더 큰 가치·기회를 추구하기 위해 증가한 위험을 받아들이는 위험대응은?","choices":{"A":"회피","B":"감소","C":"추구","D":"공유"},"explanation":"'추구(Pursue)'는 더 높은 성과를 위해 위험을 더 떠안는다. 다른 대응(수용·회피·감소·공유)은 위험을 유지하거나 낮춘다."}},"AI-BAR1-06":{"ja":{"question":"所得が増えると需要が増える（所得弾力性が正）財は？","choices":{"A":"劣等財","B":"正常財","C":"ギッフェン財","D":"公共財"},"explanation":"正の所得弾力性＝正常財。負の所得弾力性（所得増で需要減）は劣等財。"},"ko":{"question":"소득이 늘면 수요가 늘어나는(소득탄력성이 양수) 재화는?","choices":{"A":"열등재","B":"정상재","C":"기펜재","D":"공공재"},"explanation":"양의 소득탄력성＝정상재. 음의 소득탄력성(소득 증가 시 수요 감소)은 열등재."}},"AI-BAR1-07":{"ja":{"question":"固有リスクと残余リスクは、COSO ERMのどの構成要素で分析されるか。","choices":{"A":"ガバナンスと文化","B":"戦略と目標設定","C":"パフォーマンス","D":"情報・伝達・報告"},"explanation":"パフォーマンス構成要素がリスクの深刻度を、固有リスク（対応前）と残余リスク（対応後に残るリスク）を含めて評価する。"},"ko":{"question":"고유위험과 잔여위험은 COSO ERM의 어느 구성요소에서 분석되는가?","choices":{"A":"거버넌스와 문화","B":"전략과 목표설정","C":"성과","D":"정보·소통·보고"},"explanation":"성과 구성요소가 위험의 심각도를 고유위험(대응 전)과 잔여위험(대응 후 남는 위험)을 포함해 평가한다."}},"AI-BAR1-08":{"ja":{"question":"価値の追求にあたり組織が受け入れる広範な量のリスクを何というか。","choices":{"A":"リスク許容度","B":"リスク選好","C":"リスク許容量","D":"残余リスク"},"explanation":"リスク選好（risk appetite）は受け入れる広範なリスク量。リスク許容度（tolerance）は特定目標に対する許容される変動幅。"},"ko":{"question":"가치 추구 과정에서 조직이 받아들이는 광범위한 위험의 양을 무엇이라 하는가?","choices":{"A":"위험허용도","B":"위험선호","C":"위험수용능력","D":"잔여위험"},"explanation":"위험선호(risk appetite)는 받아들이는 광범위한 위험량. 위험허용도(tolerance)는 특정 목표 대비 허용되는 변동 범위."}},"AI-BAR1-09":{"ja":{"question":"取締役会による全社的リスク管理の監督は、主にCOSO ERMのどの構成要素の要素か。","choices":{"A":"ガバナンスと文化","B":"パフォーマンス","C":"レビューと修正","D":"戦略と目標設定"},"explanation":"取締役会の監督はガバナンスと文化に属し、ERMを支えるトーン・権限・説明責任を確立する。"},"ko":{"question":"이사회의 전사적 위험관리 감독은 주로 COSO ERM의 어느 구성요소에 속하는가?","choices":{"A":"거버넌스와 문화","B":"성과","C":"검토와 수정","D":"전략과 목표설정"},"explanation":"이사회 감독은 거버넌스와 문화에 속하며, ERM을 뒷받침하는 기조·권한·책임을 확립한다."}},"AI-BAR1-10":{"ja":{"question":"ポートフォリオの分散によって低減・排除できるリスクの種類は？","choices":{"A":"システマティック（市場）リスク","B":"非システマティック（分散可能）リスク","C":"インフレリスク","D":"購買力リスク"},"explanation":"非システマティック（企業固有・分散可能）リスクは分散で低減できる。システマティック（市場）リスクは全証券に影響し分散できない。"},"ko":{"question":"포트폴리오 분산으로 줄이거나 없앨 수 있는 위험 유형은?","choices":{"A":"체계적(시장) 위험","B":"비체계적(분산가능) 위험","C":"인플레이션 위험","D":"구매력 위험"},"explanation":"비체계적(기업 고유·분산가능) 위험은 분산으로 줄일 수 있다. 체계적(시장) 위험은 모든 증권에 영향을 줘 분산 불가."}},"AI-BAR1-11":{"ja":{"question":"先渡・先物・通貨オプションは、企業が主にどのリスクをヘッジするために使うか。","choices":{"A":"換算リスク","B":"経済的リスク","C":"取引リスク","D":"金利リスク"},"explanation":"これらのデリバティブは取引リスク（特定の外貨建取引を決済する際の損失可能性）をヘッジする。"},"ko":{"question":"선도·선물·통화옵션은 기업이 주로 어떤 위험을 회피하기 위해 사용하는가?","choices":{"A":"환산위험","B":"경제적 위험","C":"거래위험","D":"금리위험"},"explanation":"이 파생상품들은 거래위험(특정 외화표시 거래를 결제할 때의 손실 가능성)을 회피한다."}},"AI-BAR1-12":{"ja":{"question":"収益の通貨と費用の通貨を一致させる企業が使っているのは？","choices":{"A":"先渡ヘッジ","B":"自然ヘッジ","C":"短期金融市場ヘッジ","D":"公正価値ヘッジ"},"explanation":"自然（オペレーティング）ヘッジは、デリバティブを使わずに資金の流入・流出の通貨を一致させてエクスポージャーを相殺する。"},"ko":{"question":"수익의 통화와 비용의 통화를 일치시키는 기업이 사용하는 것은?","choices":{"A":"선도 헤지","B":"자연 헤지","C":"단기금융시장 헤지","D":"공정가치 헤지"},"explanation":"자연(영업) 헤지는 파생상품 없이 현금 유입·유출의 통화를 맞춰 익스포저를 상쇄한다."}},"AI-BAR2-01":{"ja":{"question":"加重平均資本コスト（WACC）を計算する際、負債と自己資本に割り当てるウェイトは何に基づくべきか。","choices":{"A":"簿価","B":"時価","C":"額面","D":"取得時の歴史的原価"},"explanation":"WACCは資本構成の各要素に時価ウェイトを用いる。時価は現在の要求利回りを反映するため。"},"ko":{"question":"가중평균자본비용(WACC)을 계산할 때 부채와 자기자본에 부여하는 가중치는 무엇에 기반해야 하는가?","choices":{"A":"장부가치","B":"시장가치","C":"액면가치","D":"취득 시 역사적 원가"},"explanation":"WACC는 자본구조 각 요소에 시장가치 가중치를 사용한다. 시장가치가 현재 요구수익률을 반영하기 때문."}},"AI-BAR2-02":{"ja":{"question":"正味現在価値（NPV）分析で、独立した投資案件はNPVがどうであれば採択すべきか。","choices":{"A":"ゼロ未満","B":"ゼロに等しい","C":"ゼロ超","D":"IRR未満"},"explanation":"NPV > 0 のとき採択。将来流入の現在価値が初期投資を上回り価値を生むため。"},"ko":{"question":"순현재가치(NPV) 분석에서 독립적인 투자안은 NPV가 어떨 때 채택해야 하는가?","choices":{"A":"0보다 작음","B":"0과 같음","C":"0보다 큼","D":"IRR보다 작음"},"explanation":"NPV > 0이면 채택. 미래 유입의 현재가치가 초기투자를 초과해 가치를 창출하기 때문."}},"AI-BAR2-03":{"ja":{"question":"相互排他的な2案件でNPVとIRRのランキングが対立する場合、どちらを優先すべきか。","choices":{"A":"内部収益率（IRR）","B":"正味現在価値（NPV）","C":"回収期間","D":"会計的利益率"},"explanation":"NPVを優先する。NPVは絶対的な価値増加を測り、資本コストでの再投資を仮定する。"},"ko":{"question":"상호배타적인 두 안에서 NPV와 IRR의 순위가 충돌하면 무엇을 우선해야 하는가?","choices":{"A":"내부수익률(IRR)","B":"순현재가치(NPV)","C":"회수기간","D":"회계적이익률"},"explanation":"NPV를 우선한다. NPV는 절대적 가치 증가를 측정하고 자본비용 재투자를 가정한다."}},"AI-BAR2-04":{"ja":{"question":"企業の税引前負債コストが8%、限界税率が25%のとき、税引後負債コストは？","choices":{"A":"8.0%","B":"6.0%","C":"2.0%","D":"10.0%"},"explanation":"税引後負債コスト = Rd × (1 − T) = 8% × (1 − 0.25) = 6%。利息は損金算入され節税効果を生む。"},"ko":{"question":"기업의 세전 부채비용이 8%, 한계세율이 25%일 때 세후 부채비용은?","choices":{"A":"8.0%","B":"6.0%","C":"2.0%","D":"10.0%"},"explanation":"세후 부채비용 = Rd × (1 − T) = 8% × (1 − 0.25) = 6%. 이자는 손금산입되어 절세효과를 만든다."}},"AI-BAR2-05":{"ja":{"question":"経済的発注量（EOQ）モデルは、何の合計を最小化する発注量を決めるか。","choices":{"A":"購入価格と販売価格","B":"発注コストと保管コスト","C":"固定費と変動費","D":"直接材料費と直接労務費"},"explanation":"EOQ = √(2DS/H) は、年間の発注コストと保管（保有）コストの合計を最小化する。"},"ko":{"question":"경제적 주문량(EOQ) 모델은 무엇의 합을 최소화하는 주문량을 결정하는가?","choices":{"A":"구입가격과 판매가격","B":"주문비용과 보관비용","C":"고정비와 변동비","D":"직접재료비와 직접노무비"},"explanation":"EOQ = √(2DS/H)는 연간 주문비용과 보관(유지)비용의 합을 최소화한다."}},"AI-BAR2-06":{"ja":{"question":"負債による調達と比べ、優先株式のコストが異なるのは、優先配当が…","choices":{"A":"利息のように節税効果を持つから","B":"発行体にとって損金算入できないから","C":"常に負債コストより低いから","D":"元本の返還を保証するから"},"explanation":"優先配当は税引後利益から支払われ損金算入できないため、負債の利息と違い節税効果がない。コスト＝Dp / 正味発行価額。"},"ko":{"question":"부채 조달과 비교해 우선주의 비용이 다른 이유는, 우선배당이…","choices":{"A":"이자처럼 절세효과를 갖기 때문","B":"발행자에게 손금산입되지 않기 때문","C":"항상 부채비용보다 낮기 때문","D":"원금 반환을 보장하기 때문"},"explanation":"우선배당은 세후이익에서 지급되어 손금산입되지 않으므로, 부채 이자와 달리 절세효과가 없다. 비용＝Dp / 순발행가액."}},"AI-BAR2-07":{"ja":{"question":"投資案件の内部収益率（IRR）とは、その案件の何がゼロになる割引率か。","choices":{"A":"回収期間","B":"正味現在価値","C":"収益性指数","D":"会計的利益"},"explanation":"IRRはNPV = 0 となる割引率（流入の現在価値が初期投資に等しくなる率）。"},"ko":{"question":"투자안의 내부수익률(IRR)은 그 투자안의 무엇이 0이 되는 할인율인가?","choices":{"A":"회수기간","B":"순현재가치","C":"수익성지수","D":"회계적 이익"},"explanation":"IRR은 NPV = 0이 되는 할인율(유입의 현재가치가 초기투자와 같아지는 율)."}},"AI-BAR2-08":{"ja":{"question":"単純回収期間法の主な弱点は何か。","choices":{"A":"計算が難しい","B":"貨幣の時間価値を無視する","C":"割引率の見積りが必要","D":"常に有益な案件を却下する"},"explanation":"単純回収期間法は貨幣の時間価値を無視し、回収後のキャッシュフローも考慮しない。"},"ko":{"question":"단순 회수기간법의 주요 약점은?","choices":{"A":"계산이 어렵다","B":"화폐의 시간가치를 무시한다","C":"할인율 추정이 필요하다","D":"항상 유익한 안을 기각한다"},"explanation":"단순 회수기간법은 화폐의 시간가치를 무시하고, 회수 이후의 현금흐름도 고려하지 않는다."}},"AI-BAR2-09":{"ja":{"question":"収益性指数は次のうちどれで計算されるか。","choices":{"A":"初期投資 ÷ 将来CFの現在価値","B":"将来CFの現在価値 ÷ 初期投資","C":"NPV ÷ IRR","D":"純利益 ÷ 投下資本"},"explanation":"収益性指数 = 将来CFの現在価値 / 初期投資。指数が1.0を超えれば採択。"},"ko":{"question":"수익성지수는 다음 중 무엇으로 계산되는가?","choices":{"A":"초기투자 ÷ 미래CF의 현재가치","B":"미래CF의 현재가치 ÷ 초기투자","C":"NPV ÷ IRR","D":"순이익 ÷ 투하자본"},"explanation":"수익성지수 = 미래 현금흐름의 현재가치 / 초기투자. 지수가 1.0을 초과하면 채택."}},"AI-BAR2-10":{"ja":{"question":"資本資産評価モデル（CAPM）において、ベータは証券の何を測るか。","choices":{"A":"総リスク","B":"非システマティックリスク","C":"システマティック（市場）リスク","D":"デフォルトリスク"},"explanation":"ベータはシステマティック（市場）リスク、すなわち市場の動きに対する証券リターンの感応度を測る。"},"ko":{"question":"자본자산가격결정모형(CAPM)에서 베타는 증권의 무엇을 측정하는가?","choices":{"A":"총위험","B":"비체계적 위험","C":"체계적(시장) 위험","D":"부도위험"},"explanation":"베타는 체계적(시장) 위험, 즉 시장 움직임에 대한 증권 수익률의 민감도를 측정한다."}},"AI-BAR2-11":{"ja":{"question":"ジャストインタイム（JIT）在庫システムが主に目指すのは？","choices":{"A":"安全在庫の最大化","B":"在庫水準の最小化","C":"発注量の増加","D":"仕入先の排除"},"explanation":"JITは必要なときにだけ材料を受け入れる（プル方式）ことで在庫を最小化し、保管コストを削減する。"},"ko":{"question":"적시생산(JIT) 재고 시스템이 주로 목표하는 것은?","choices":{"A":"안전재고 최대화","B":"재고수준 최소화","C":"주문량 증가","D":"공급업체 제거"},"explanation":"JIT는 필요할 때만 자재를 받는(풀 방식) 방식으로 재고를 최소화하고 보관비용을 줄인다."}},"AI-BAR2-12":{"ja":{"question":"配当割引（ゴードン成長）モデルでは、株式価値は翌年の配当を何で割ったものか。","choices":{"A":"要求収益率＋成長率","B":"要求収益率−成長率","C":"成長率−要求収益率","D":"現在の配当利回り"},"explanation":"P = D1 / (R − G)。Rは要求収益率、Gは一定の配当成長率。"},"ko":{"question":"배당할인(고든 성장) 모형에서 주식가치는 내년 배당을 무엇으로 나눈 값인가?","choices":{"A":"요구수익률＋성장률","B":"요구수익률−성장률","C":"성장률−요구수익률","D":"현재 배당수익률"},"explanation":"P = D1 / (R − G). R은 요구수익률, G는 일정한 배당성장률."}},"AI-BAR3-01":{"ja":{"question":"損益分岐点（数量）は次のうちどれで計算されるか。","choices":{"A":"固定費 ÷ 単位当たり貢献利益","B":"固定費 ÷ 単位当たり販売価格","C":"貢献利益 ÷ 固定費","D":"変動費 ÷ 貢献利益率"},"explanation":"損益分岐点数量 = 固定費 / 単位当たり貢献利益（＝販売価格−単位変動費）。"},"ko":{"question":"손익분기점(수량)은 다음 중 무엇으로 계산되는가?","choices":{"A":"고정비 ÷ 단위당 공헌이익","B":"고정비 ÷ 단위당 판매가격","C":"공헌이익 ÷ 고정비","D":"변동비 ÷ 공헌이익률"},"explanation":"손익분기점 수량 = 고정비 / 단위당 공헌이익(＝판매가격−단위변동비)."}},"AI-BAR3-02":{"ja":{"question":"直接材料価格差異 (実際価格 − 標準価格) に乗じるのは？","choices":{"A":"産出に許容された標準数量","B":"生産で実際に使用した数量","C":"実際に購入した数量","D":"予算生産量"},"explanation":"価格差異は実際の購入量に基づく。材料数量（消費）差異は実際の使用量を用いる。"},"ko":{"question":"직접재료 가격차이 (실제가격 − 표준가격)에 곱하는 것은?","choices":{"A":"산출에 허용된 표준수량","B":"생산에 실제 사용한 수량","C":"실제 구입한 수량","D":"예산 생산량"},"explanation":"가격차이는 실제 구입량에 기반한다. 재료 수량(사용)차이는 실제 사용량을 사용한다."}},"AI-BAR3-03":{"ja":{"question":"原価差異が「有利」と呼ばれるのはどんなときか。","choices":{"A":"実際原価が標準原価を上回る","B":"実際原価が標準原価を下回る","C":"実際原価が標準原価と等しい","D":"実際産出が予算を下回る"},"explanation":"有利＝実際原価が標準を下回る（または実際収益が予想を上回る）。実際原価が標準を上回ると不利差異。"},"ko":{"question":"원가차이가 '유리'라고 불리는 경우는?","choices":{"A":"실제원가가 표준원가를 초과","B":"실제원가가 표준원가보다 작음","C":"실제원가가 표준원가와 같음","D":"실제 산출이 예산보다 낮음"},"explanation":"유리＝실제원가가 표준보다 작음(또는 실제수익이 예상보다 큼). 실제원가가 표준을 초과하면 불리차이."}},"AI-BAR3-04":{"ja":{"question":"生産量が販売量を上回る（期末在庫が増える）とき、全部原価計算の純利益は直接（変動）原価計算と比べて？","choices":{"A":"低い","B":"高い","C":"同じ","D":"判断できない"},"explanation":"全部原価計算は固定製造間接費を在庫に資産化する。在庫が増えると固定費が繰り延べられ、全部原価のNIが高くなる。"},"ko":{"question":"생산량이 판매량을 초과(기말재고 증가)할 때, 전부원가계산의 순이익은 변동원가계산과 비교해?","choices":{"A":"낮다","B":"높다","C":"같다","D":"판단 불가"},"explanation":"전부원가계산은 고정제조간접비를 재고에 자본화한다. 재고가 늘면 고정비가 이연되어 전부원가 순이익이 높아진다."}},"AI-BAR3-05":{"ja":{"question":"貢献利益の定義は？","choices":{"A":"売上高 − 固定費","B":"売上高 − 変動費","C":"売上高 − 売上原価","D":"売上総利益 − 営業費用"},"explanation":"貢献利益 = 売上高 − 変動費。固定費を回収し、その後の利益に貢献する金額。"},"ko":{"question":"공헌이익의 정의는?","choices":{"A":"매출액 − 고정비","B":"매출액 − 변동비","C":"매출액 − 매출원가","D":"매출총이익 − 영업비용"},"explanation":"공헌이익 = 매출액 − 변동비. 고정비를 회수하고 이후 이익에 기여하는 금액."}},"AI-BAR3-06":{"ja":{"question":"安全余裕（安全マージン）の計算は？","choices":{"A":"予算売上高 ÷ 損益分岐点売上高","B":"実際（または予算）売上高 − 損益分岐点売上高","C":"固定費 ÷ 貢献利益率","D":"損益分岐点売上高 − 固定費"},"explanation":"安全余裕 = 損益分岐点を上回る売上 = 実際（予算）売上高 − 損益分岐点売上高。"},"ko":{"question":"안전한계(안전마진)의 계산은?","choices":{"A":"예산매출액 ÷ 손익분기점매출액","B":"실제(또는 예산)매출액 − 손익분기점매출액","C":"고정비 ÷ 공헌이익률","D":"손익분기점매출액 − 고정비"},"explanation":"안전한계 = 손익분기점을 초과하는 매출 = 실제(예산)매출액 − 손익분기점매출액."}},"AI-BAR3-07":{"ja":{"question":"一棟ごとに別々に原価を集計するカスタム住宅建築業者が用いる原価計算は？","choices":{"A":"総合原価計算","B":"個別原価計算","C":"標準原価計算のみ","D":"直接原価計算"},"explanation":"個別原価計算は個々のジョブ・バッチごとに原価を集計する。総合原価計算は同質的に大量生産される製品向け。"},"ko":{"question":"한 채씩 별도로 원가를 집계하는 맞춤형 주택 건설업자가 쓰는 원가계산은?","choices":{"A":"종합원가계산","B":"개별원가계산","C":"표준원가계산만","D":"변동원가계산"},"explanation":"개별원가계산은 개별 작업·배치별로 원가를 집계한다. 종합원가계산은 동질적으로 대량생산되는 제품용."}},"AI-BAR3-08":{"ja":{"question":"総合原価計算で、完成品換算量はどう計算されるか。","choices":{"A":"物量 × 完成度（%）","B":"物量 ÷ 完成度（%）","C":"総原価 ÷ 着手量","D":"着手量 − 完成量"},"explanation":"完成品換算量 = 物量 × 完成度。仕掛中の作業を完成品単位に換算する。"},"ko":{"question":"종합원가계산에서 완성품환산량은 어떻게 계산되는가?","choices":{"A":"물량 × 완성도(%)","B":"물량 ÷ 완성도(%)","C":"총원가 ÷ 착수량","D":"착수량 − 완성량"},"explanation":"완성품환산량 = 물량 × 완성도. 진행 중 작업을 완성품 단위로 환산한다."}},"AI-BAR3-09":{"ja":{"question":"活動基準原価計算（ABC）は、製造間接費を何を用いて製品に配賦するか。","choices":{"A":"単一の工場全体配賦率","B":"直接作業時間のみ","C":"複数のコストプールとコストドライバー","D":"売上高"},"explanation":"ABCは複数の活動コストプールを、それぞれ適切なコストドライバーで配賦し、間接費配賦の精度を高める。"},"ko":{"question":"활동기준원가계산(ABC)은 제조간접비를 무엇을 사용해 제품에 배부하는가?","choices":{"A":"단일 공장전체 배부율","B":"직접노동시간만","C":"복수의 원가집합과 원가동인","D":"매출액"},"explanation":"ABC는 복수의 활동 원가집합을 각각 적절한 원가동인으로 배부해 간접비 배부 정확도를 높인다."}},"AI-BAR3-10":{"ja":{"question":"意思決定分析で、すでに発生し将来の行動で変えられない原価は？","choices":{"A":"関連原価","B":"機会原価","C":"埋没原価","D":"増分原価"},"explanation":"埋没原価は、どの代替案を選んでも変わらないため意思決定に無関連。"},"ko":{"question":"의사결정 분석에서 이미 발생해 미래 행동으로 바꿀 수 없는 원가는?","choices":{"A":"관련원가","B":"기회원가","C":"매몰원가","D":"증분원가"},"explanation":"매몰원가는 어떤 대안을 선택하든 변하지 않으므로 의사결정에 비관련."}},"AI-BAR3-11":{"ja":{"question":"遊休（余剰）能力があるとき、特別注文は販売価格が何を上回れば一般に受注すべきか。","choices":{"A":"単位当たり全部原価","B":"単位当たり変動費","C":"単位当たり固定費","D":"全部原価＋通常のマークアップ"},"explanation":"余剰能力があれば増分（変動）費のみが関連。販売価格が単位変動費を上回れば受注。"},"ko":{"question":"유휴(여유) 능력이 있을 때, 특별주문은 판매가격이 무엇을 초과하면 일반적으로 수락해야 하는가?","choices":{"A":"단위당 전부원가","B":"단위당 변동비","C":"단위당 고정비","D":"전부원가＋정상 마진"},"explanation":"여유 능력이 있으면 증분(변동)비만 관련. 판매가격이 단위변동비를 초과하면 수락."}},"AI-BAR3-12":{"ja":{"question":"直接労務能率差異の計算は？","choices":{"A":"(実際賃率 − 標準賃率) × 実際時間","B":"(実際時間 − 標準時間) × 標準賃率","C":"(実際時間 − 標準時間) × 実際賃率","D":"(実際賃率 − 標準賃率) × 標準時間"},"explanation":"労務能率差異 = (AH − SH) × SR。賃率差異は (AR − SR) × AH。"},"ko":{"question":"직접노무 능률차이의 계산은?","choices":{"A":"(실제임률 − 표준임률) × 실제시간","B":"(실제시간 − 표준시간) × 표준임률","C":"(실제시간 − 표준시간) × 실제임률","D":"(실제임률 − 표준임률) × 표준시간"},"explanation":"노무 능률차이 = (AH − SH) × SR. 임률차이는 (AR − SR) × AH."}},"AI-BAR4-01":{"ja":{"question":"U.S. GAAPの下で、企業結合で認識されたのれんは？","choices":{"A":"40年で償却する","B":"耐用年数で償却する","C":"償却せず減損テストを行う","D":"取得時に即時費用処理する"},"explanation":"のれんはU.S. GAAPでは償却せず、報告単位レベルで（少なくとも年1回）減損テストを行う。"},"ko":{"question":"U.S. GAAP에서 기업결합으로 인식된 영업권은?","choices":{"A":"40년에 걸쳐 상각","B":"내용연수에 걸쳐 상각","C":"상각하지 않고 손상검사","D":"취득 시 즉시 비용처리"},"explanation":"영업권은 U.S. GAAP에서 상각하지 않고, 보고단위 수준에서 (최소 연 1회) 손상검사를 한다."}},"AI-BAR4-02":{"ja":{"question":"取得法の下で、のれんは何の公正価値を反映するか。","choices":{"A":"取得企業の持分のみ","B":"非支配持分を含む被取得企業の100%","C":"取得した純資産の簿価","D":"支払った現金対価のみ"},"explanation":"のれん = (移転対価 + NCIの公正価値) − 識別可能純資産の公正価値。取得割合ではなく被取得企業の100%で測定。"},"ko":{"question":"취득법에서 영업권은 무엇의 공정가치를 반영하는가?","choices":{"A":"취득기업의 지분만","B":"비지배지분을 포함한 피취득기업의 100%","C":"취득한 순자산의 장부가","D":"지급한 현금대가만"},"explanation":"영업권 = (이전대가 + NCI 공정가치) − 식별가능 순자산 공정가치. 취득지분율이 아니라 피취득기업의 100%로 측정."}},"AI-BAR4-03":{"ja":{"question":"借手がリースをファイナンス・リースに分類するのはどんなときか。","choices":{"A":"5つの分類基準すべてを満たすとき","B":"5つの基準のいずれか1つを満たすとき","C":"リース期間が1年以上のとき","D":"法的所有権が決して移転しないとき"},"explanation":"基準（所有権移転、行使がほぼ確実な購入オプション、経済的耐用年数の主要部分、公正価値のほぼ全部のPV、特殊資産）のいずれか1つで該当。"},"ko":{"question":"리스이용자가 리스를 금융리스로 분류하는 경우는?","choices":{"A":"5가지 분류기준 모두 충족","B":"5가지 기준 중 하나라도 충족","C":"리스기간이 1년 이상","D":"법적 소유권이 결코 이전되지 않음"},"explanation":"기준(소유권 이전, 행사가 거의 확실한 매수선택권, 경제적 내용연수의 대부분, 공정가치의 대부분에 해당하는 PV, 특수자산) 중 하나라도 충족 시 금융리스."}},"AI-BAR4-04":{"ja":{"question":"適格なキャッシュフロー・ヘッジでは、ヘッジ手段（デリバティブ）の損益は当初どこに計上されるか。","choices":{"A":"当期利益","B":"その他の包括利益","C":"利益剰余金","D":"繰延税金勘定"},"explanation":"キャッシュフロー・ヘッジの損益は、ヘッジ対象の予定取引が損益に影響するまでOCIに繰り延べられる。"},"ko":{"question":"적격 현금흐름 위험회피에서 위험회피수단(파생상품)의 손익은 최초에 어디에 계상되는가?","choices":{"A":"당기손익","B":"기타포괄손익","C":"이익잉여금","D":"이연법인세 계정"},"explanation":"현금흐름 위험회피 손익은 위험회피대상 예상거래가 손익에 영향을 줄 때까지 OCI에 이연된다."}},"AI-BAR4-05":{"ja":{"question":"在外子会社の財務諸表を換算する決算日レート（換算）法では、換算調整はどこに報告されるか。","choices":{"A":"損益計算書","B":"その他の包括利益","C":"利益剰余金に直接","D":"のれん"},"explanation":"決算日レート法は換算差損益をOCI（累積換算調整勘定）に計上する。再測定（テンポラル）法は損益計算書へ。"},"ko":{"question":"해외 자회사 재무제표를 환산하는 현행환율(환산)법에서 환산조정은 어디에 보고되는가?","choices":{"A":"손익계산서","B":"기타포괄손익","C":"이익잉여금에 직접","D":"영업권"},"explanation":"현행환율법은 환산손익을 OCI(누적환산조정)에 계상한다. 재측정(시제)법은 손익계산서로."}},"AI-BAR4-06":{"ja":{"question":"U.S. GAAPの全部のれん方式の下で、取得日の非支配持分は通常どう測定されるか。","choices":{"A":"子会社簿価に対するNCIの持分","B":"ゼロ","C":"NCI割合 × 子会社の公正価値","D":"取得企業が移転した対価"},"explanation":"NCIは公正価値（通常はNCI割合 × 被取得企業の公正価値）で測定され、連結貸借対照表に全部（100%）のれんを生じさせる。"},"ko":{"question":"U.S. GAAP 전부영업권 방식에서 취득일 비지배지분은 일반적으로 어떻게 측정되는가?","choices":{"A":"자회사 장부가에 대한 NCI 지분","B":"영(0)","C":"NCI 비율 × 자회사 공정가치","D":"취득기업이 이전한 대가"},"explanation":"NCI는 공정가치(보통 NCI 비율 × 피취득기업 공정가치)로 측정되며, 연결재무상태표에 전부(100%) 영업권을 발생시킨다."}},"AI-BAR4-07":{"ja":{"question":"変動持分事業体（VIE）を連結するのは誰か。","choices":{"A":"最大の議決権を持つ事業体","B":"主たる受益者","C":"法的に設立した事業体","D":"最大の債権者"},"explanation":"主たる受益者（VIEの重要な活動を支配し、変動リターンへのエクスポージャーを持つ者）がVIEを連結する。"},"ko":{"question":"변동지분실체(VIE)를 연결하는 자는?","choices":{"A":"최대 의결권을 가진 실체","B":"주된 수익자","C":"법적으로 설립한 실체","D":"최대 채권자"},"explanation":"주된 수익자(VIE의 중요 활동을 지배하고 변동 수익에 노출된 자)가 VIE를 연결한다."}},"AI-BAR4-08":{"ja":{"question":"U.S. GAAPの下で、研究開発費は一般にどう処理されるか。","choices":{"A":"資産化して償却","B":"発生時に費用処理","C":"のれんとして計上","D":"関連収益が稼得されるまで繰延"},"explanation":"R&D費はU.S. GAAPでは発生時に費用処理（一部例外：特定のソフトウェアや代替的将来用途のある資産など）。"},"ko":{"question":"U.S. GAAP에서 연구개발비는 일반적으로 어떻게 처리되는가?","choices":{"A":"자본화 후 상각","B":"발생 시 비용처리","C":"영업권으로 계상","D":"관련 수익이 가득될 때까지 이연"},"explanation":"R&D비는 U.S. GAAP에서 발생 시 비용처리(일부 예외: 특정 소프트웨어나 대체적 미래용도가 있는 자산 등)."}},"AI-BAR4-09":{"ja":{"question":"販売用ソフトウェアについて、技術的実現可能性の確立前に発生した費用は？","choices":{"A":"資産化","B":"研究開発費として費用処理","C":"棚卸資産として計上","D":"のれんに加算"},"explanation":"技術的実現可能性の前の費用はR&D（費用処理）。実現可能性確立後・リリース前の費用は資産化し、後に償却。"},"ko":{"question":"판매용 소프트웨어에서 기술적 실현가능성 확립 전에 발생한 원가는?","choices":{"A":"자본화","B":"연구개발비로 비용처리","C":"재고자산으로 계상","D":"영업권에 가산"},"explanation":"기술적 실현가능성 전의 원가는 R&D(비용처리). 실현가능성 확립 후·출시 전 원가는 자본화하고 이후 상각."}},"AI-BAR4-10":{"ja":{"question":"公正価値ヒエラルキーで、同一資産の活発な市場における相場価格はどのレベルに分類されるか。","choices":{"A":"レベル1","B":"レベル2","C":"レベル3","D":"レベル4"},"explanation":"レベル1＝同一項目の活発な市場の相場価格。レベル2はその他の観察可能なインプット、レベル3は観察不能なインプット。"},"ko":{"question":"공정가치 서열에서 동일 자산의 활성시장 공시가격은 어느 수준으로 분류되는가?","choices":{"A":"레벨 1","B":"레벨 2","C":"레벨 3","D":"레벨 4"},"explanation":"레벨 1＝동일 항목의 활성시장 공시가격. 레벨 2는 기타 관측가능 투입, 레벨 3은 관측불가능 투입."}},"AI-BAR4-11":{"ja":{"question":"重要な影響力（一般に20〜50%の所有）を及ぼせるが支配はしない投資者が用いる会計処理は？","choices":{"A":"原価法","B":"持分法","C":"連結","D":"FVTOCI"},"explanation":"重要な影響力（しばしば議決権の20〜50%）は持分法。支配（一般に50%超）は連結。"},"ko":{"question":"유의적 영향력(일반적으로 20~50% 소유)을 행사할 수 있으나 지배하지 않는 투자자가 쓰는 회계처리는?","choices":{"A":"원가법","B":"지분법","C":"연결","D":"FVOCI"},"explanation":"유의적 영향력(흔히 의결권 20~50%)은 지분법. 지배(일반적으로 50% 초과)는 연결."}},"AI-BAR4-12":{"ja":{"question":"取得した識別可能純資産の公正価値が移転対価を上回る（割安購入）とき、取得企業は？","choices":{"A":"のれんを計上","B":"利益を当期に認識","C":"差額を負債として繰延","D":"資産を支払額まで減額"},"explanation":"割安購入は、用いた価額を再評価した上で、取得日に取得企業の当期利益として利得を認識する。"},"ko":{"question":"취득한 식별가능 순자산의 공정가치가 이전대가를 초과(염가매수)할 때, 취득기업은?","choices":{"A":"영업권을 계상","B":"이익을 당기에 인식","C":"차액을 부채로 이연","D":"자산을 지급액까지 감액"},"explanation":"염가매수는 사용한 가액을 재평가한 후, 취득일에 취득기업의 당기손익으로 이익을 인식한다."}},"AI-BAR5-01":{"ja":{"question":"政府基金（governmental funds）の財務諸表は、どの会計基礎で作成されるか。","choices":{"A":"完全発生主義","B":"現金主義","C":"修正発生主義","D":"修正現金主義"},"explanation":"政府基金は修正発生主義＋流動財務資源測定焦点を用いる。政府全体財務諸表は完全発生主義。"},"ko":{"question":"정부기금(governmental funds) 재무제표는 어느 회계기준으로 작성되는가?","choices":{"A":"완전발생주의","B":"현금주의","C":"수정발생주의","D":"수정현금주의"},"explanation":"정부기금은 수정발생주의＋유동재무자원 측정초점을 사용한다. 정부전체 재무제표는 완전발생주의."}},"AI-BAR5-02":{"ja":{"question":"修正発生主義の下で、収益は測定可能であり、かつ…のときに認識される。","choices":{"A":"稼得された","B":"現金で回収された","C":"利用可能（available）","D":"請求された"},"explanation":"修正発生主義は「測定可能かつ利用可能」なときに収益認識。利用可能とは当期またはその後すぐ（一般に60日以内）に回収できること。"},"ko":{"question":"수정발생주의에서 수익은 측정가능하고, 그리고 …할 때 인식된다.","choices":{"A":"가득된","B":"현금으로 회수된","C":"가용한(available)","D":"청구된"},"explanation":"수정발생주의는 '측정가능하고 가용할' 때 수익인식. 가용이란 당기 또는 그 직후(일반적으로 60일 이내)에 회수 가능함."}},"AI-BAR5-03":{"ja":{"question":"政府全体財務諸表は、どの基礎と測定焦点で作成されるか。","choices":{"A":"修正発生主義・流動財務資源焦点","B":"完全発生主義・経済的資源焦点","C":"現金主義","D":"予算基礎"},"explanation":"政府全体財務諸表は完全発生主義＋経済的資源測定焦点を用い、長期の資産・負債を捉える。"},"ko":{"question":"정부전체 재무제표는 어느 기준과 측정초점으로 작성되는가?","choices":{"A":"수정발생주의·유동재무자원 초점","B":"완전발생주의·경제적자원 초점","C":"현금주의","D":"예산기준"},"explanation":"정부전체 재무제표는 완전발생주의＋경제적 자원 측정초점을 사용해 장기 자산·부채를 포착한다."}},"AI-BAR5-04":{"ja":{"question":"事業基金（enterprise fund）で営業収益として報告されるのは次のうちどれか。","choices":{"A":"提供したサービスの利用料","B":"政府の補助金","C":"投資の受取利息","D":"資本補助金"},"explanation":"事業基金の営業収益は外部利用者への課金（利用料）。補助金・交付金・受取利息は営業外項目。"},"ko":{"question":"사업기금(enterprise fund)에서 영업수익으로 보고되는 것은?","choices":{"A":"제공한 서비스의 사용료","B":"정부 보조금","C":"투자 이자수익","D":"자본 보조금"},"explanation":"사업기금 영업수익은 외부 이용자에 대한 과금(사용료). 보조금·교부금·이자수익은 영업외 항목."}},"AI-BAR5-05":{"ja":{"question":"政府基金は「GRaSPP」で覚える。次のうち政府基金でないものは？","choices":{"A":"一般基金","B":"特別収入基金","C":"事業基金（エンタープライズ）","D":"永久基金"},"explanation":"GRaSPP＝一般・特別収入・債務返済・資本事業・永久。事業基金（エンタープライズ）はプロプライエタリ基金で、政府基金ではない。"},"ko":{"question":"정부기금은 'GRaSPP'로 외운다. 다음 중 정부기금이 아닌 것은?","choices":{"A":"일반기금","B":"특별수입기금","C":"사업기금(엔터프라이즈)","D":"영구기금"},"explanation":"GRaSPP＝일반·특별수입·채무상환·자본사업·영구. 사업기금(엔터프라이즈)은 독점(proprietary) 기금으로 정부기금이 아니다."}},"AI-BAR5-06":{"ja":{"question":"政府基金の基金残高の5分類の1つは次のうちどれか。","choices":{"A":"留保（Reserved）","B":"指定（Designated）","C":"拘束（Committed）","D":"充当（Appropriated）"},"explanation":"5分類は支出不能・制限付・拘束・割当・未割当。「Reserved／Designated」はGASB 54以前の用語で現在は使わない。"},"ko":{"question":"정부기금 기금잔액의 5개 분류 중 하나는 다음 중 무엇인가?","choices":{"A":"유보(Reserved)","B":"지정(Designated)","C":"확약(Committed)","D":"충당(Appropriated)"},"explanation":"5개 분류는 지출불능·제한·확약·배정·미배정. 'Reserved/Designated'는 GASB 54 이전 용어로 현재는 사용하지 않는다."}},"AI-BAR5-07":{"ja":{"question":"適格なインフラ資産の修正アプローチでは、減価償却を計上する代わりに政府は何をするか。","choices":{"A":"資産を毎年再評価する","B":"状態評価を文書化し、資産を目標の状態水準に維持する","C":"減損テストのみ行う","D":"定額法で償却する"},"explanation":"修正アプローチは、状態評価を行いインフラを定められた状態水準以上に維持する場合、減価償却を行わないことを認める。"},"ko":{"question":"적격 인프라 자산의 수정접근법에서 감가상각을 계상하는 대신 정부는 무엇을 하는가?","choices":{"A":"자산을 매년 재평가","B":"상태평가를 문서화하고 자산을 목표 상태수준으로 유지","C":"손상검사만 수행","D":"정액법으로 상각"},"explanation":"수정접근법은 상태평가를 하고 인프라를 정해진 상태수준 이상으로 유지하면 감가상각을 하지 않도록 허용한다."}},"AI-BAR5-08":{"ja":{"question":"政府基金の棚卸資産や前払項目は、どの基金残高分類で報告されるか。","choices":{"A":"制限付","B":"拘束","C":"支出不能（Nonspendable）","D":"未割当"},"explanation":"支出不能（Nonspendable）には、支出可能な形でない金額（棚卸資産・前払）や、法的に元本維持が求められる金額が含まれる。"},"ko":{"question":"정부기금의 재고자산이나 선급항목은 어느 기금잔액 분류로 보고되는가?","choices":{"A":"제한","B":"확약","C":"지출불능(Nonspendable)","D":"미배정"},"explanation":"지출불능(Nonspendable)에는 지출가능한 형태가 아닌 금액(재고·선급)이나 법적으로 원금 유지가 요구되는 금액이 포함된다."}},"AI-BAR5-09":{"ja":{"question":"一般長期債務の元本・利息の支払いに充てる資源を蓄積する政府基金は？","choices":{"A":"資本事業基金","B":"債務返済基金","C":"事業基金","D":"永久基金"},"explanation":"債務返済基金は、政府の一般長期負債の元本・利息を支払う資源を会計処理する。"},"ko":{"question":"일반 장기부채의 원금·이자 지급에 충당할 자원을 축적하는 정부기금은?","choices":{"A":"자본사업기금","B":"채무상환기금","C":"사업기금","D":"영구기금"},"explanation":"채무상환기금은 정부의 일반 장기부채 원금·이자를 지급할 자원을 회계처리한다."}},"AI-BAR5-10":{"ja":{"question":"元本を維持しつつ、その運用益のみを政府や市民の便益のために支出できる基金は？","choices":{"A":"特別収入基金","B":"永久基金","C":"私的目的信託基金","D":"事業基金"},"explanation":"永久基金は、元本を保全し運用益のみが政府自身のプログラムを支えるよう法的に制限された資源を報告する。"},"ko":{"question":"원금을 유지하면서 그 운용수익만 정부나 시민의 편익을 위해 지출할 수 있는 기금은?","choices":{"A":"특별수입기금","B":"영구기금","C":"사적목적신탁기금","D":"사업기금"},"explanation":"영구기금은 원금을 보전하고 운용수익만 정부 자체 프로그램을 지원하도록 법적으로 제한된 자원을 보고한다."}},"AI-BAR5-11":{"ja":{"question":"同一政府の他部門に主としてコスト回収ベースで財・サービスを提供する基金は？","choices":{"A":"事業基金","B":"内部サービス基金","C":"管理（カストディアル）基金","D":"特別収入基金"},"explanation":"内部サービス基金（プロプライエタリ基金）は、同一政府の他の単位に内部的にサービスを提供し、発生主義を用いる。"},"ko":{"question":"동일 정부의 다른 부서에 주로 원가회수 기반으로 재화·용역을 제공하는 기금은?","choices":{"A":"사업기금","B":"내부서비스기금","C":"관리(custodial)기금","D":"특별수입기금"},"explanation":"내부서비스기금(독점 기금)은 동일 정부의 다른 단위에 내부적으로 용역을 제공하며 발생주의를 사용한다."}},"AI-BAR5-12":{"ja":{"question":"政府全体の純資産計算書において、純資産（net position）は何に等しいか。","choices":{"A":"収益 − 費用","B":"資産＋繰延流出 − 負債 − 繰延流入","C":"基金残高＋予算外債務","D":"現金 − 買掛金"},"explanation":"純資産 = (資産 ＋ 繰延資源流出) − (負債 ＋ 繰延資源流入)。"},"ko":{"question":"정부전체 순자산명세서에서 순자산(net position)은 무엇과 같은가?","choices":{"A":"수익 − 비용","B":"자산＋이연유출 − 부채 − 이연유입","C":"기금잔액＋약정지출","D":"현금 − 매입채무"},"explanation":"순자산 = (자산 ＋ 이연자원유출) − (부채 ＋ 이연자원유입)."}},"AI-BAR1-13":{"ja":{"question":"製品の需要が価格弾力的なとき、販売価格の引き下げは総収入を：","choices":{"A":"増加させる","B":"減少させる","C":"変えない","D":"ゼロにする"},"explanation":"需要が弾力的（|Ed|>1）なら、数量が価格下落より比例的に大きく増えるため総収入は増加する。非弾力的なら値下げで収入は減る。"},"ko":{"question":"제품 수요가 가격탄력적일 때, 판매가격 인하는 총수입을:","choices":{"A":"증가시킨다","B":"감소시킨다","C":"변함없다","D":"0으로 만든다"},"explanation":"수요가 탄력적(|Ed|>1)이면 수량이 가격 하락보다 비례적으로 더 늘어 총수입이 증가한다. 비탄력적이면 인하 시 수입이 감소."}},"AI-BAR1-14":{"ja":{"question":"ある財の需要をより価格弾力的にする要因は次のうちどれか。","choices":{"A":"その財が必需品である","B":"近い代替財が多数ある","C":"所得に占める割合がごく小さい","D":"非常に短い時間視野"},"explanation":"近い代替財が多いほど価格変化への反応が大きく（弾力的）なる。必需品・所得比率が小さい・短期は非弾力的にする。"},"ko":{"question":"어떤 재화의 수요를 더 가격탄력적으로 만드는 요인은?","choices":{"A":"그 재화가 필수재이다","B":"가까운 대체재가 많다","C":"소득에서 차지하는 비중이 매우 작다","D":"매우 짧은 기간"},"explanation":"가까운 대체재가 많을수록 가격 변화에 더 민감(탄력적)해진다. 필수재·소득 비중이 작음·짧은 기간은 비탄력적으로 만든다."}},"AI-BAR1-15":{"ja":{"question":"実質GDPが2四半期以上連続で減少する局面は一般に何と呼ばれるか。","choices":{"A":"拡張","B":"谷","C":"景気後退","D":"山"},"explanation":"実質GDPが2四半期連続で減少することが景気後退（リセッション、収縮局面）の一般的な目安の定義。"},"ko":{"question":"실질GDP가 2개 분기 이상 연속 감소하는 국면을 일반적으로 무엇이라 부르는가?","choices":{"A":"확장","B":"저점","C":"경기침체","D":"정점"},"explanation":"실질GDP가 2개 분기 연속 감소하는 것이 경기침체(리세션, 수축국면)의 일반적 통념상 정의."}},"AI-BAR1-16":{"ja":{"question":"マネーサプライを変動させる公開市場操作は、どの政策の手段か。","choices":{"A":"財政政策","B":"貿易政策","C":"規制政策","D":"金融政策"},"explanation":"中央銀行（FRB）は公開市場操作・公定歩合・準備率を通じて金融政策を行う。財政政策は議会が決める歳出・課税。"},"ko":{"question":"통화량을 변동시키는 공개시장조작은 어느 정책의 수단인가?","choices":{"A":"재정정책","B":"무역정책","C":"규제정책","D":"통화정책"},"explanation":"중앙은행(연준)은 공개시장조작·재할인율·지급준비율로 통화정책을 수행한다. 재정정책은 의회가 정하는 지출·과세."}},"AI-BAR1-17":{"ja":{"question":"消費者物価指数（CPI）が主に測定するものは：","choices":{"A":"消費者が一定のバスケットに支払う価格の平均的変化","B":"国民総産出","C":"失業率","D":"マネーサプライ"},"explanation":"CPIは消費者が代表的な財・サービスのバスケットに対して支払う価格の平均的変化を追跡する主要なインフレ指標。"},"ko":{"question":"소비자물가지수(CPI)가 주로 측정하는 것은:","choices":{"A":"소비자가 고정 바스켓에 지불하는 가격의 평균적 변화","B":"국민총생산","C":"실업률","D":"통화량"},"explanation":"CPI는 소비자가 대표적 재화·서비스 바스켓에 지불하는 가격의 평균적 변화를 추적하는 주요 인플레이션 지표."}},"AI-BAR1-18":{"ja":{"question":"バリュー・アット・リスク（VaR）が推定するものは：","choices":{"A":"ポートフォリオの保証収益","B":"所定の信頼水準での期間最大予想損失","C":"企業の資本コスト","D":"会計上の損益分岐点"},"explanation":"VaRは所定の期間・信頼水準（例：95%）で超過しないと見込まれる最大損失を表し、下方の市場リスクを定量化する。"},"ko":{"question":"VaR(Value at Risk)가 추정하는 것은:","choices":{"A":"포트폴리오의 보장 수익","B":"주어진 신뢰수준에서 기간 최대 예상손실","C":"기업의 자본비용","D":"회계상 손익분기점"},"explanation":"VaR는 정해진 기간·신뢰수준(예: 95%)에서 초과하지 않을 것으로 보는 최대 손실을 나타내며, 하방 시장위험을 정량화한다."}},"AI-BAR1-19":{"ja":{"question":"完全競争市場において、個々の企業は：","choices":{"A":"プライスメイカー（価格設定者）","B":"独占企業","C":"プライステイカー（価格受容者）","D":"プライスリーダー"},"explanation":"多数の企業が同質財を売り参入が自由なため、各企業は価格に影響できず市場価格を受け入れる＝プライステイカー。"},"ko":{"question":"완전경쟁시장에서 개별 기업은:","choices":{"A":"가격설정자","B":"독점기업","C":"가격수용자","D":"가격선도자"},"explanation":"다수 기업이 동질재를 팔고 진입이 자유로워 각 기업은 가격에 영향을 못 주고 시장가격을 받아들인다＝가격수용자."}},"AI-BAR1-20":{"ja":{"question":"自然独占が最も生じやすいのは、次のどの場合か。","choices":{"A":"近い代替財が多い","B":"参入障壁が低い","C":"製品が同質で企業が多数","D":"規模の経済で1社が複数社より安く市場全体に供給できる"},"explanation":"規模の経済で平均費用が下がり続ける場合、1社が複数社より安く市場全体に供給できる＝自然独占（例：公益事業）。"},"ko":{"question":"자연독점이 가장 생기기 쉬운 경우는?","choices":{"A":"가까운 대체재가 많다","B":"진입장벽이 낮다","C":"제품이 동질이고 기업이 다수","D":"규모의 경제로 한 기업이 여러 기업보다 싸게 시장 전체에 공급"},"explanation":"규모의 경제로 평균비용이 계속 하락하면 한 기업이 여러 기업보다 싸게 시장 전체에 공급할 수 있다＝자연독점(예: 공익사업)."}},"AI-BAR1-21":{"ja":{"question":"先渡契約と比べて、先物契約は：","choices":{"A":"標準化され取引所で取引される","B":"カスタムのOTC契約","C":"値洗いされない","D":"証拠金なしで満期にのみ決済"},"explanation":"先物は標準化され取引所で取引され日次で値洗いされ証拠金を伴う。先渡はカスタムのOTC契約で満期決済、相手方リスクが大きい。"},"ko":{"question":"선도계약과 비교해 선물계약은:","choices":{"A":"표준화되어 거래소에서 거래된다","B":"맞춤형 장외(OTC) 계약","C":"정산(시가평가)되지 않는다","D":"증거금 없이 만기에만 결제"},"explanation":"선물은 표준화되어 거래소에서 거래되며 매일 정산되고 증거금이 따른다. 선도는 맞춤형 장외계약으로 만기 결제, 거래상대방위험이 크다."}},"AI-BAR1-22":{"ja":{"question":"将来の外貨建て買掛金（ペイアブル）のマネーマーケット・ヘッジは一般に何を伴うか。","choices":{"A":"外貨のプットオプションを買う","B":"自国通貨を借りて外貨に換え運用して買掛金を賄う","C":"何もせず満期に直物で支払う","D":"買掛金を銀行にファクタリングする"},"explanation":"買掛金をヘッジするには、（多くは自国通貨を借りて）今外貨を買い、決済時の支払額まで増えるよう運用し、先物の代わりに金融市場商品でコストを固定する。"},"ko":{"question":"미래 외화 매입채무(payable)의 단기금융시장 헤지는 일반적으로 무엇을 수반하는가?","choices":{"A":"외화 풋옵션을 매입","B":"자국통화를 빌려 외화로 바꿔 운용해 매입채무를 충당","C":"아무것도 안 하고 만기에 현물로 지급","D":"매입채무를 은행에 팩토링"},"explanation":"매입채무를 헤지하려면 (보통 자국통화를 빌려) 지금 외화를 사서 결제 시 지급액까지 늘도록 운용해, 선도 대신 단기금융상품으로 비용을 고정한다."}},"AI-BAR1-23":{"ja":{"question":"変動金利債務を持つ企業が固定金利に固定したい場合、金利スワップで：","choices":{"A":"変動を支払い固定を受け取る","B":"債務を株式に転換する","C":"固定を支払い変動を受け取る","D":"信用リスクを完全に排除する"},"explanation":"変動を受け取れば債務の変動金利支払いと相殺され、ネットで固定支払いになる＝変動金利債務を固定に転換。"},"ko":{"question":"변동금리 부채를 가진 기업이 고정금리로 고정하고 싶을 때, 금리스왑으로:","choices":{"A":"변동을 지급하고 고정을 수취","B":"부채를 주식으로 전환","C":"고정을 지급하고 변동을 수취","D":"신용위험을 완전히 제거"},"explanation":"변동을 받으면 부채의 변동금리 지급과 상쇄되어 순효과로 고정지급이 된다＝변동금리 부채를 고정으로 전환."}},"AI-BAR1-24":{"ja":{"question":"外貨建て買掛金（ペイアブル）をオプションでヘッジするには、企業は何を買うか。","choices":{"A":"外貨のプットオプション","B":"外貨を売る先渡","C":"何もしない（オプションでは買掛金をヘッジ不可）","D":"外貨のコールオプション"},"explanation":"買掛金は後で外貨を買って決済するため、コール（行使価格で買う権利）でコストの上限を固定しつつ有利な変動は享受。売掛金はプットでヘッジ。"},"ko":{"question":"외화 매입채무(payable)를 옵션으로 헤지하려면 기업은 무엇을 매입하는가?","choices":{"A":"외화 풋옵션","B":"외화를 파는 선도","C":"아무것도 안 함(옵션으로 매입채무 헤지 불가)","D":"외화 콜옵션"},"explanation":"매입채무는 나중에 외화를 사서 결제하므로, 콜(행사가에 살 권리)로 비용 상한을 고정하면서 유리한 변동은 누린다. 매출채권은 풋으로 헤지."}},"AI-BAR2-13":{"ja":{"question":"CAPMでは、株式の要求収益率はリスクフリーレートに何を加えたものか。","choices":{"A":"ベータ × 市場リスクプレミアム","B":"配当利回り","C":"インフレ率","D":"ベータ × リスクフリーレート"},"explanation":"CAPM：Re = Rf + β(Rm − Rf)。市場リスクプレミアム（Rm − Rf）に、システマティックリスクであるベータを乗じる。"},"ko":{"question":"CAPM에서 주식의 요구수익률은 무위험이자율에 무엇을 더한 값인가?","choices":{"A":"베타 × 시장위험프리미엄","B":"배당수익률","C":"인플레이션율","D":"베타 × 무위험이자율"},"explanation":"CAPM: Re = Rf + β(Rm − Rf). 시장위험프리미엄(Rm − Rf)에 체계적 위험인 베타를 곱한다."}},"AI-BAR2-14":{"ja":{"question":"キャッシュ・コンバージョン・サイクルは、在庫日数＋売上債権日数から何を引いたものか。","choices":{"A":"営業サイクル","B":"買掛金回転日数（DPO）","C":"手元現金日数","D":"流動比率"},"explanation":"CCC = DIO + DSO − DPO。営業に資金が拘束される期間を測り、買掛日数（DPO）を延ばすと短縮される。"},"ko":{"question":"현금전환주기는 재고일수＋매출채권일수에서 무엇을 뺀 값인가?","choices":{"A":"영업주기","B":"매입채무 회전일수(DPO)","C":"보유현금 일수","D":"유동비율"},"explanation":"CCC = DIO + DSO − DPO. 영업에 자금이 묶이는 기간을 측정하며, 매입채무일수(DPO)를 늘리면 단축된다."}},"AI-BAR2-15":{"ja":{"question":"当座（酸性試験）比率が流動比率と異なるのは、何を除外する点か。","choices":{"A":"現金及び同等物","B":"売掛金","C":"流動資産から棚卸資産（と通常は前払）","D":"買掛金"},"explanation":"当座比率＝(流動資産−棚卸資産−前払)/流動負債。最も流動性の低い流動資産を除いた厳しめの流動性指標。"},"ko":{"question":"당좌(산성시험)비율이 유동비율과 다른 점은 무엇을 제외하는 것인가?","choices":{"A":"현금 및 현금성자산","B":"매출채권","C":"유동자산에서 재고(및 보통 선급)","D":"매입채무"},"explanation":"당좌비율＝(유동자산−재고−선급)/유동부채. 가장 유동성이 낮은 유동자산을 빼서 더 엄격한 유동성 지표."}},"AI-BAR2-16":{"ja":{"question":"営業レバレッジが高いことは、企業が何を持つことを意味するか。","choices":{"A":"ほぼ変動費で固定費が少ない","B":"財務リスクがない","C":"事業リスクが低い","D":"固定費比率が高く営業利益が売上変化に敏感"},"explanation":"固定費の比率が高いと売上変化が営業利益に大きく波及する＝営業レバレッジ（DOL）が高く事業リスクも高い。"},"ko":{"question":"영업레버리지가 높다는 것은 기업이 무엇을 가짐을 의미하는가?","choices":{"A":"대부분 변동비이고 고정비가 적음","B":"재무위험이 없음","C":"사업위험이 낮음","D":"고정비 비율이 높아 영업이익이 매출 변화에 민감"},"explanation":"고정비 비율이 높으면 매출 변화가 영업이익에 크게 파급된다＝영업레버리지(DOL)가 높고 사업위험도 높다."}},"AI-BAR2-17":{"ja":{"question":"「2/10, net 30」の割引を放棄した場合の年率換算コストはおよそいくらか。","choices":{"A":"約37%","B":"約2%","C":"約12%","D":"約24%"},"explanation":"コスト≈(割引/(1−割引))×(365/(支払期間−割引期間))=(2/98)×(365/20)≈37%。割引を放棄して20日遅く払うのは高コスト。"},"ko":{"question":"'2/10, net 30' 할인을 포기할 경우 연율 환산 비용은 대략 얼마인가?","choices":{"A":"약 37%","B":"약 2%","C":"약 12%","D":"약 24%"},"explanation":"비용≈(할인/(1−할인))×(365/(지급기간−할인기간))=(2/98)×(365/20)≈37%. 할인을 포기하고 20일 늦게 내는 것은 비싼 자금조달."}},"AI-BAR2-18":{"ja":{"question":"積極的（アグレッシブ）な運転資本の調達方針は、相対的に何に依存するか。","choices":{"A":"すべてを長期負債と自己資本で","B":"資産を短期負債で賄う（高期待収益・高リスク）","C":"負債を一切使わない","D":"自己資本のみ"},"explanation":"積極策は一部の恒久資産まで安いが риスクの高い短期負債で賄い、借換え・金利リスクを高める代わりに期待収益を上げる。保守策は逆。"},"ko":{"question":"공격적(aggressive) 운전자본 조달 방침은 상대적으로 무엇에 의존하는가?","choices":{"A":"모든 것을 장기부채와 자기자본으로","B":"자산을 단기부채로 조달(기대수익↑·위험↑)","C":"부채를 전혀 안 씀","D":"자기자본만"},"explanation":"공격적 방침은 일부 영구자산까지 싸지만 위험한 단기부채로 조달해, 차환·금리위험을 높이는 대신 기대수익을 올린다. 보수적 방침은 반대."}},"AI-BAR2-19":{"ja":{"question":"税金のないモジリアーニ・ミラー（M&M）の下では、企業価値は：","choices":{"A":"100%負債で最大化","B":"100%自己資本で最大化","C":"資本構成と無関係","D":"純利益に等しい"},"explanation":"税金や摩擦のない世界ではM&M第1命題により資本構成は企業価値に影響しない。価値は調達ではなく資産から生じる。"},"ko":{"question":"세금이 없는 모디글리아니-밀러(M&M)에서 기업가치는:","choices":{"A":"100% 부채에서 최대화","B":"100% 자기자본에서 최대화","C":"자본구조와 무관","D":"순이익과 같음"},"explanation":"세금·마찰이 없는 세계에서는 M&M 제1명제에 따라 자본구조가 기업가치에 영향을 주지 않는다. 가치는 조달이 아니라 자산에서 나온다."}},"AI-BAR2-20":{"ja":{"question":"M&Mに法人税を導入すると、レバレッジの上昇とともに企業価値が増えるのは何のためか。","choices":{"A":"事業リスクの低下","B":"配当の増加","C":"倒産コストの低下","D":"利息の節税効果"},"explanation":"利息は損金算入されるため、レバレッジ上昇とともに節税効果（タックスシールド）が価値を加える。やがて財務的困難・倒産コストで相殺（トレードオフ理論）。"},"ko":{"question":"M&M에 법인세를 도입하면 레버리지 상승과 함께 기업가치가 증가하는 이유는?","choices":{"A":"사업위험 감소","B":"배당 증가","C":"파산비용 감소","D":"이자의 절세효과"},"explanation":"이자는 손금산입되므로 레버리지 상승과 함께 절세효과(택스실드)가 가치를 더한다. 결국 재무곤경·파산비용으로 상쇄(상충이론)."}},"AI-BAR2-21":{"ja":{"question":"企業の最適資本構成とは、債務と自己資本のどのような組合せか。","choices":{"A":"WACCを最小化し企業価値を最大化","B":"リスクに関係なくEPSを最大化","C":"財務リスクをすべて排除","D":"配当性向を最大化"},"explanation":"最適構成はWACCが最も低くなる点。WACCの最小化は企業キャッシュフローの現在価値を最大化する。"},"ko":{"question":"기업의 최적 자본구조는 부채와 자기자본의 어떤 조합인가?","choices":{"A":"WACC를 최소화해 기업가치를 최대화","B":"위험과 무관하게 EPS를 최대화","C":"재무위험을 모두 제거","D":"배당성향을 최대화"},"explanation":"최적 구조는 WACC가 가장 낮아지는 지점. WACC 최소화는 기업 현금흐름의 현재가치를 최대화한다."}},"AI-BAR2-22":{"ja":{"question":"ローンの歩積み（コンペンセイティング・バランス）要件は：","choices":{"A":"実効金利を下げる","B":"使える資金の実効金利を上げる","C":"実効金利に影響しない","D":"利息を完全になくす"},"explanation":"ローンの一部を最低残高として遊ばせるため、使えない資金にも利息を払うことになり、実際に使える資金の実効金利が上がる。"},"ko":{"question":"대출의 양건예금(compensating balance) 요건은:","choices":{"A":"실효금리를 낮춘다","B":"사용 가능 자금의 실효금리를 올린다","C":"실효금리에 영향 없음","D":"이자를 완전히 없앤다"},"explanation":"대출 일부를 최저잔액으로 묶어두므로 쓸 수 없는 자금에도 이자를 내게 되어, 실제 사용 가능한 자금의 실효금리가 올라간다."}},"AI-BAR2-23":{"ja":{"question":"企業が売掛金を「ノンリコース（償還請求なし）」でファクタリングするとき、企業は：","choices":{"A":"担保に差し入れるが回収リスクは保持","B":"貸倒れとして償却","C":"売掛金を売却し回収不能リスクをファクターへ移転","D":"支払手形に振り替える"},"explanation":"ノンリコースのファクタリングは売却であり、ファクターが信用・回収リスクを負う。リコース付きでは売り手がそのリスクを保持。"},"ko":{"question":"기업이 매출채권을 '비소구(상환청구 없음)'로 팩토링할 때, 기업은:","choices":{"A":"담보로 제공하지만 회수위험은 보유","B":"대손으로 상각","C":"매출채권을 매각하고 회수불능 위험을 팩터에 이전","D":"지급어음으로 전환"},"explanation":"비소구 팩토링은 매각이며, 팩터가 신용·회수 위험을 부담한다. 소구 조건이면 판매자가 그 위험을 보유."}},"AI-BAR2-24":{"ja":{"question":"通常の営業から自動的に生じる、短期資金の「自然発生的（スポンテイニアス）」な源泉はどれか。","choices":{"A":"交渉による銀行与信枠","B":"コマーシャルペーパー","C":"期限付ローン","D":"買掛金（企業間信用）と未払費用"},"explanation":"買掛金や未払賃金・税金は事業の運営とともに自動的に増える＝自然発生的資金。与信枠・CP・期限付ローンは交渉による。"},"ko":{"question":"정상 영업에서 자동으로 생기는 단기자금의 '자연발생적(spontaneous)' 원천은?","choices":{"A":"협상한 은행 신용한도","B":"기업어음(CP)","C":"기한부 대출","D":"매입채무(기업신용)와 미지급비용"},"explanation":"매입채무나 미지급임금·세금은 영업과 함께 자동으로 늘어난다＝자연발생적 자금. 신용한도·CP·기한부 대출은 협상에 의한 것."}},"AI-BAR3-13":{"ja":{"question":"売上高ベースの損益分岐点は、固定費を何で割ったものか。","choices":{"A":"貢献利益率","B":"単位当たり貢献利益","C":"売上総利益率","D":"変動費率"},"explanation":"損益分岐点（売上高）＝固定費 / 貢献利益率（＝貢献利益÷売上）。単位当たり貢献利益で割ると数量ベースになる。"},"ko":{"question":"매출액 기준 손익분기점은 고정비를 무엇으로 나눈 값인가?","choices":{"A":"공헌이익률","B":"단위당 공헌이익","C":"매출총이익률","D":"변동비율"},"explanation":"손익분기점(매출액)＝고정비 / 공헌이익률(＝공헌이익÷매출). 단위당 공헌이익으로 나누면 수량 기준이 된다."}},"AI-BAR3-14":{"ja":{"question":"目標原価計算（ターゲット・コスティング）は、許容原価をどう設定するか。","choices":{"A":"全部原価に標準マークアップを加算","B":"市場主導の目標価格から必要利益を差し引く","C":"最も高い競合価格を用いる","D":"市場価格を無視する"},"explanation":"目標原価＝目標価格 − 必要利益。市場が払う価格から出発し、その原価に収まるよう製品を設計する。原価加算法の逆。"},"ko":{"question":"목표원가계산(target costing)은 허용원가를 어떻게 설정하는가?","choices":{"A":"전부원가에 표준 마진을 가산","B":"시장 주도 목표가격에서 필요이익을 차감","C":"가장 높은 경쟁사 가격 사용","D":"시장가격을 무시"},"explanation":"목표원가＝목표가격 − 필요이익. 시장이 지불할 가격에서 출발해 그 원가에 맞도록 제품을 설계한다. 원가가산법의 반대."}},"AI-BAR3-15":{"ja":{"question":"デュポン法では、投下資本利益率（ROI）は何に分解できるか。","choices":{"A":"貢献利益 × 固定費","B":"残余利益 × WACC","C":"売上高利益率 × 資産回転率","D":"売上 − 変動費"},"explanation":"ROI＝(営業利益/売上)×(売上/平均営業資産)＝売上高利益率 × 資産回転率。収益性と効率性を分離。"},"ko":{"question":"듀폰법에서 투자수익률(ROI)은 무엇으로 분해되는가?","choices":{"A":"공헌이익 × 고정비","B":"잔여이익 × WACC","C":"매출이익률 × 자산회전율","D":"매출 − 변동비"},"explanation":"ROI＝(영업이익/매출)×(매출/평균영업자산)＝매출이익률 × 자산회전율. 수익성과 효율성을 분리."}},"AI-BAR3-16":{"ja":{"question":"残余利益（レジデュアル・インカム）は、営業利益から何を差し引いたものか。","choices":{"A":"固定費","B":"売上原価","C":"法人税","D":"営業資産に対する最低要求リターン"},"explanation":"残余利益＝営業利益 −（必要利益率 × 営業資産）。ROIと違い金額指標で、ハードルレートを上回る投資すべてを促す。"},"ko":{"question":"잔여이익(residual income)은 영업이익에서 무엇을 차감한 것인가?","choices":{"A":"고정비","B":"매출원가","C":"법인세","D":"영업자산에 대한 최저 요구수익"},"explanation":"잔여이익＝영업이익 −(요구수익률 × 영업자산). ROI와 달리 금액 지표로, 허들레이트를 넘는 모든 투자를 장려한다."}},"AI-BAR3-17":{"ja":{"question":"EVA（経済的付加価値）が単純な残余利益と主に異なるのは、何を用いる点か。","choices":{"A":"税引後営業利益とWACCベースの資本チャージ","B":"税引前利益と簿価金利","C":"営業キャッシュフローのみ","D":"株式の市場価格"},"explanation":"EVA＝NOPAT −（WACC × 投下資本）。税引後営業利益と、投下資本に対するWACCベースの資本チャージを用いる。"},"ko":{"question":"EVA(경제적 부가가치)가 단순 잔여이익과 주로 다른 점은 무엇을 사용하는가?","choices":{"A":"세후영업이익과 WACC 기반 자본비용","B":"세전이익과 장부 금리","C":"영업현금흐름만","D":"주식의 시장가격"},"explanation":"EVA＝NOPAT −(WACC × 투하자본). 세후영업이익과 투하자본에 대한 WACC 기반 자본비용을 사용한다."}},"AI-BAR3-18":{"ja":{"question":"高低点法（ハイ・ロー法）は、単位当たり変動費を、総原価の変化を何で割って推定するか。","choices":{"A":"データ点の総数","B":"高低2点間の活動量（操業度）の変化","C":"総固定費","D":"単位当たり平均原価"},"explanation":"単位変動費＝(高点原価−低点原価)/(高点活動−低点活動)。固定費はいずれかの点から逆算する。"},"ko":{"question":"고저점법(high-low)은 단위당 변동비를 총원가의 변화를 무엇으로 나눠 추정하는가?","choices":{"A":"데이터 점의 총수","B":"고·저 두 점 사이 활동량(조업도) 변화","C":"총고정비","D":"단위당 평균원가"},"explanation":"단위변동비＝(고점원가−저점원가)/(고점활동−저점활동). 고정비는 어느 한 점에서 역산한다."}},"AI-BAR3-19":{"ja":{"question":"変動予算（フレキシブル・バジェット）が固定予算と異なる点は：","choices":{"A":"年度初めに一度だけ作成される","B":"標準原価のみで実際値を使わない","C":"達成した実際操業度に合わせて調整される","D":"差異分析に使えない"},"explanation":"変動予算は実際の操業度に合わせて予算収益・原価を組み替え、価格・能率差異を純粋な数量効果から分離する。"},"ko":{"question":"변동예산(flexible budget)이 고정예산과 다른 점은:","choices":{"A":"연초에 한 번만 작성된다","B":"표준원가만 쓰고 실제값은 안 씀","C":"달성한 실제 조업도에 맞춰 조정된다","D":"차이분석에 사용 불가"},"explanation":"변동예산은 실제 조업도에 맞춰 예산 수익·원가를 재구성해, 가격·능률차이를 순수 수량효과로부터 분리한다."}},"AI-BAR3-20":{"ja":{"question":"分離点（スプリットオフ）前に発生した連産品原価は：","choices":{"A":"常に副産物にのみ配賦","B":"販売か追加加工かの判断に関連","C":"追加加工に伴い変動","D":"追加加工の意思決定に無関連"},"explanation":"連産品原価は分離点で発生済みの埋没原価。追加加工の可否は、増分収益と増分加工費だけで判断する。"},"ko":{"question":"분리점(split-off) 전에 발생한 연산품 원가는:","choices":{"A":"항상 부산물에만 배부","B":"판매·추가가공 결정에 관련","C":"추가가공에 따라 변동","D":"추가가공 의사결정에 비관련"},"explanation":"연산품 원가는 분리점에서 이미 발생한 매몰원가. 추가가공 여부는 증분수익과 증분가공비만으로 판단한다."}},"AI-BAR3-21":{"ja":{"question":"販売事業部の視点で、最低許容振替価格は増分（支出）原価に何を加えたものか。","choices":{"A":"内部振替の機会原価","B":"一定率のマークアップ","C":"買い手の外部市場価格","D":"常にゼロ"},"explanation":"一般則：最低振替価格＝増分原価 + 機会原価。遊休能力があれば機会原価はゼロ、フル操業なら外部販売で失う貢献利益。"},"ko":{"question":"판매사업부 관점에서 최저 허용 대체가격은 증분(지출)원가에 무엇을 더한 값인가?","choices":{"A":"내부대체의 기회원가","B":"일정 비율 마진","C":"구매자의 외부 시장가격","D":"항상 0"},"explanation":"일반 원칙: 최저 대체가격＝증분원가 + 기회원가. 유휴능력이 있으면 기회원가는 0, 완전조업이면 외부판매에서 잃는 공헌이익."}},"AI-BAR3-22":{"ja":{"question":"固定製造間接費の操業度差異（生産量差異）が生じる理由は：","choices":{"A":"実際の間接費支出が予算と異なる","B":"実際生産量が固定間接費率の基準操業度と異なる","C":"材料価格が変動した","D":"労働が非効率に使われた"},"explanation":"操業度差異は、固定間接費率を計算する際に用いた基準（予算）操業度と実際生産量が異なるために生じる過不足。能率や支出ではなく稼働率を反映。"},"ko":{"question":"고정제조간접비의 조업도차이(생산량차이)가 생기는 이유는:","choices":{"A":"실제 간접비 지출이 예산과 다름","B":"실제 생산량이 고정간접비율 기준조업도와 다름","C":"재료가격이 변동","D":"노동이 비효율적으로 사용됨"},"explanation":"조업도차이는 고정간접비율을 계산할 때 사용한 기준(예산) 조업도와 실제 생산량이 달라 생기는 과부족. 능률·지출이 아니라 가동률을 반영."}},"AI-BAR3-23":{"ja":{"question":"バランスト・スコアカードの4つの視点に含まれないものは：","choices":{"A":"財務","B":"顧客","C":"競合","D":"内部業務プロセス"},"explanation":"BSCの4視点は財務・顧客・内部業務プロセス・学習と成長。「競合」は含まれない。"},"ko":{"question":"균형성과표(BSC)의 4가지 관점에 포함되지 않는 것은:","choices":{"A":"재무","B":"고객","C":"경쟁사","D":"내부 업무프로세스"},"explanation":"BSC의 4관점은 재무·고객·내부 업무프로세스·학습과 성장. '경쟁사'는 포함되지 않는다."}},"AI-BAR3-24":{"ja":{"question":"「関連範囲（レレバント・レンジ）」とは、どの範囲の操業度か。","choices":{"A":"製品が黒字になる範囲","B":"需要が価格弾力的な範囲","C":"すべての差異が有利な範囲","D":"固定費・変動費の挙動の仮定が成り立つ範囲"},"explanation":"関連範囲内では総固定費は一定、単位変動費も一定。この範囲を外れると線形の原価仮定が崩れる。"},"ko":{"question":"'관련범위(relevant range)'는 어느 범위의 조업도인가?","choices":{"A":"제품이 흑자인 범위","B":"수요가 가격탄력적인 범위","C":"모든 차이가 유리한 범위","D":"고정비·변동비 행태 가정이 성립하는 범위"},"explanation":"관련범위 내에서는 총고정비가 일정하고 단위변동비도 일정. 이 범위를 벗어나면 선형 원가 가정이 무너진다."}},"AI-BAR4-13":{"ja":{"question":"連結上、企業集団内取引による期末在庫の未実現利益は：","choices":{"A":"外部へ販売されるまで消去する","B":"連結利益に即時認識する","C":"恒久的に繰り延べる","D":"のれんに加算する"},"explanation":"集団内に残る在庫の利益は未実現のため消去し、外部に販売された時点で初めて認識する。"},"ko":{"question":"연결에서 기업집단 내 거래로 인한 기말재고의 미실현이익은:","choices":{"A":"외부에 판매될 때까지 제거","B":"연결손익에 즉시 인식","C":"영구히 이연","D":"영업권에 가산"},"explanation":"집단 내에 남은 재고의 이익은 미실현이므로 제거하고, 외부에 판매된 시점에 비로소 인식한다."}},"AI-BAR4-14":{"ja":{"question":"「ダウンストリーム」の企業集団内取引とは、どの方向の販売か。","choices":{"A":"子会社から親会社へ","B":"親会社から子会社へ","C":"無関係な外部者同士で","D":"子会社から顧客へ"},"explanation":"ダウンストリーム＝親→子、アップストリーム＝子→親。方向が重要なのは、アップストリームの未実現利益が非支配持分にも配分されるため。"},"ko":{"question":"'하향(downstream)' 기업집단 내 거래는 어느 방향의 판매인가?","choices":{"A":"자회사에서 모회사로","B":"모회사에서 자회사로","C":"관계없는 외부자 간","D":"자회사에서 고객으로"},"explanation":"하향＝모회사→자회사, 상향＝자회사→모회사. 방향이 중요한 이유는 상향 미실현이익이 비지배지분에도 배분되기 때문."}},"AI-BAR4-15":{"ja":{"question":"非支配持分に帰属する連結純利益は、何に基づくか。","choices":{"A":"親会社の単独純利益","B":"連結配当総額","C":"子会社純利益 × NCI割合（公正価値・集団内項目調整後）","D":"子会社の総収益"},"explanation":"NCI帰属分＝子会社の調整後純利益（公正価値償却・アップストリーム利益消去後）× 非支配持分割合。"},"ko":{"question":"비지배지분에 귀속되는 연결순이익은 무엇에 기반하는가?","choices":{"A":"모회사의 별도 순이익","B":"연결 배당 총액","C":"자회사 순이익 × NCI 비율(공정가치·집단내 항목 조정 후)","D":"자회사의 총수익"},"explanation":"NCI 귀속분＝자회사의 조정 후 순이익(공정가치 상각·상향 이익 제거 후) × 비지배지분 비율."}},"AI-BAR4-16":{"ja":{"question":"公正価値ヘッジに指定されたデリバティブの公正価値変動は、どこで認識されるか。","choices":{"A":"決済までOCI","B":"利益剰余金に直接","C":"のれんの調整として","D":"当期利益、ヘッジ対象の変動で相殺"},"explanation":"公正価値ヘッジの損益は当期利益に計上され、ヘッジ対象の反対方向の再測定で概ね相殺される。（キャッシュフロー・ヘッジは有効部分をOCIに繰延。）"},"ko":{"question":"공정가치 위험회피로 지정된 파생상품의 공정가치 변동은 어디서 인식되는가?","choices":{"A":"결제까지 OCI","B":"이익잉여금에 직접","C":"영업권 조정으로","D":"당기손익, 위험회피대상 변동으로 상쇄"},"explanation":"공정가치 위험회피 손익은 당기손익에 계상되어 위험회피대상의 반대 방향 재측정으로 대체로 상쇄된다. (현금흐름 위험회피는 유효부분을 OCI에 이연.)"}},"AI-BAR4-17":{"ja":{"question":"在外子会社の機能通貨が現地通貨の場合、その財務諸表はどの方法で換算されるか。","choices":{"A":"決算日レート（換算）法","B":"テンポラル（再測定）法","C":"歴史的原価のみ","D":"LIFO準拠法"},"explanation":"機能通貨が現地通貨なら決算日レート（換算）法で換算し調整はOCIへ。機能通貨が報告通貨なら再測定（テンポラル）法を用いる。"},"ko":{"question":"해외 자회사의 기능통화가 현지통화인 경우, 그 재무제표는 어느 방법으로 환산되는가?","choices":{"A":"현행환율(환산)법","B":"시제(재측정)법","C":"역사적원가만","D":"LIFO 준거법"},"explanation":"기능통화가 현지통화면 현행환율(환산)법으로 환산하고 조정은 OCI로. 기능통화가 보고통화면 재측정(시제)법을 사용한다."}},"AI-BAR4-18":{"ja":{"question":"テンポラル（再測定）法では、生じた為替差損益はどこに報告されるか。","choices":{"A":"その他の包括利益","B":"当期純利益","C":"利益剰余金に直接","D":"のれん"},"explanation":"再測定の差損益は損益計算書を通す。一方、決算日レート法の換算調整はOCI（累積換算調整）に計上する。"},"ko":{"question":"시제(재측정)법에서 발생한 환차손익은 어디에 보고되는가?","choices":{"A":"기타포괄손익","B":"당기순이익","C":"이익잉여금에 직접","D":"영업권"},"explanation":"재측정 손익은 손익계산서를 통한다. 반면 현행환율법의 환산조정은 OCI(누적환산조정)에 계상한다."}},"AI-BAR4-19":{"ja":{"question":"リース開始時、借手はリース負債を当初いくらで測定するか。","choices":{"A":"割引前リース料総額","B":"原資産の公正価値","C":"リース料の現在価値","D":"保証残存価値のみ"},"explanation":"リース負債は、リースの計算利子率（または追加借入利子率）で割り引いた残存リース料の現在価値。使用権資産はこれに一定の調整を加える。"},"ko":{"question":"리스 개시 시, 리스이용자는 리스부채를 최초에 얼마로 측정하는가?","choices":{"A":"할인 전 리스료 총액","B":"기초자산의 공정가치","C":"리스료의 현재가치","D":"보증잔존가치만"},"explanation":"리스부채는 리스의 내재이자율(또는 증분차입이자율)로 할인한 잔여 리스료의 현재가치. 사용권자산은 여기에 일정 조정을 더한다."}},"AI-BAR4-20":{"ja":{"question":"営業セグメントが報告対象となるのは、収益・絶対額の損益・資産が合算額の何％以上のときか。","choices":{"A":"5%","B":"25%","C":"50%","D":"10%"},"explanation":"10%テスト：収益・損益の絶対額・資産のいずれかが10%以上で報告対象。報告セグメントは外部収益の75%以上をカバーする必要。"},"ko":{"question":"영업부문이 보고대상이 되는 것은 수익·절대금액 손익·자산이 합산액의 몇 % 이상일 때인가?","choices":{"A":"5%","B":"25%","C":"50%","D":"10%"},"explanation":"10% 테스트: 수익·손익 절대금액·자산 중 하나가 10% 이상이면 보고대상. 보고부문은 외부수익의 75% 이상을 포함해야 한다."}},"AI-BAR4-21":{"ja":{"question":"デリバティブは、原資産と想定元本、僅少な当初純投資、そして何によって特徴づけられるか。","choices":{"A":"純額決済","B":"1年超の必須満期","C":"現物決済のみ","D":"保証された利益"},"explanation":"3つの特徴：(1)原資産（underlying）と想定元本、(2)僅少な当初純投資、(3)純額決済（またはそれに準ずる）。"},"ko":{"question":"파생상품은 기초변수와 명목금액, 적은 최초 순투자, 그리고 무엇으로 특징지어지는가?","choices":{"A":"순액결제","B":"1년 초과 필수 만기","C":"현물결제만","D":"보장된 이익"},"explanation":"세 가지 특징: (1)기초변수와 명목금액, (2)적은 최초 순투자, (3)순액결제(또는 그에 준하는 것)."}},"AI-BAR4-22":{"ja":{"question":"企業結合で暫定額を確定するための測定期間は、最長どれだけか。","choices":{"A":"90日","B":"取得日から1年","C":"当期の会計年度末","D":"5年"},"explanation":"取得日の暫定的な公正価値の調整は、情報入手時まで（ただし取得日から1年以内）の測定期間中に行える。"},"ko":{"question":"기업결합에서 잠정금액을 확정하기 위한 측정기간은 최장 얼마인가?","choices":{"A":"90일","B":"취득일로부터 1년","C":"당기 회계연도 말","D":"5년"},"explanation":"취득일 잠정 공정가치의 조정은 정보 입수 시까지(단 취득일로부터 1년 이내)의 측정기간 중에 할 수 있다."}},"AI-BAR4-23":{"ja":{"question":"企業結合で負債に分類された条件付対価（アーンアウト）は、その後どう処理されるか。","choices":{"A":"取得後は再測定しない","B":"毎期のれんに加算","C":"毎期、公正価値で損益を通じて再測定","D":"OCIに報告"},"explanation":"負債に分類された条件付対価は各報告日に公正価値で再測定し、変動は損益に認識。資本に分類されれば再測定しない。"},"ko":{"question":"기업결합에서 부채로 분류된 조건부대가(earnout)는 이후 어떻게 처리되는가?","choices":{"A":"취득 후 재측정 안 함","B":"매기 영업권에 가산","C":"매기 공정가치로 손익을 통해 재측정","D":"OCI에 보고"},"explanation":"부채로 분류된 조건부대가는 각 보고일에 공정가치로 재측정하고 변동은 손익으로 인식. 자본으로 분류되면 재측정하지 않는다."}},"AI-BAR4-24":{"ja":{"question":"U.S. GAAPは一般に、各中間期をどのように扱うか。","choices":{"A":"すべての項目で独立した期間","B":"見積りが免除される","C":"会計年度と同じ長さ","D":"年度の不可分の一部"},"explanation":"U.S. GAAPは統合的アプローチ：各中間期は年度の一部であり、一部の費用は各四半期に見積り・配分される。（IFRSは独立的アプローチ寄り。）"},"ko":{"question":"U.S. GAAP은 일반적으로 각 중간기간을 어떻게 취급하는가?","choices":{"A":"모든 항목에서 독립된 기간","B":"추정이 면제됨","C":"회계연도와 같은 길이","D":"연도의 불가분의 일부"},"explanation":"U.S. GAAP은 통합접근법: 각 중간기간은 연도의 일부이며 일부 비용은 각 분기에 추정·배분된다. (IFRS는 독립접근법에 가깝다.)"}},"AI-BAR5-13":{"ja":{"question":"現行のU.S. GAAPの下で、非営利組織は純資産をいくつの区分で報告するか。","choices":{"A":"2つ（拠出制約あり／なし）","B":"3つ","C":"5つ","D":"4つ"},"explanation":"ASU 2016-14により、従来の3区分が2区分（拠出制約あり／拠出制約なしの純資産）に統合された。"},"ko":{"question":"현행 U.S. GAAP에서 비영리조직은 순자산을 몇 개 구분으로 보고하는가?","choices":{"A":"둘(기부제약 있음/없음)","B":"셋","C":"다섯","D":"넷"},"explanation":"ASU 2016-14로 기존 3개 구분이 2개(기부제약 있음/기부제약 없음 순자산)로 통합되었다."}},"AI-BAR5-14":{"ja":{"question":"条件付きの寄付の約束（コンディショナル）は、非営利組織がいつ収益として認識するか。","choices":{"A":"約束が最初に伝えられたとき","B":"障壁・条件が実質的に克服されたとき","C":"最終的に現金を受領したとき","D":"寄付者の意図が文書化されたとき"},"explanation":"条件付き寄付は、寄付者が課した障壁が克服され返還義務が消滅するまで認識しない。無条件の約束は約束時に認識。"},"ko":{"question":"조건부 기부약정(conditional)은 비영리조직이 언제 수익으로 인식하는가?","choices":{"A":"약정이 처음 전달될 때","B":"장벽·조건이 실질적으로 극복될 때","C":"최종적으로 현금을 받을 때","D":"기부자 의도가 문서화될 때"},"explanation":"조건부 기부는 기부자가 부과한 장벽이 극복되고 반환의무가 소멸할 때까지 인식하지 않는다. 무조건 약정은 약정 시 인식."}},"AI-BAR5-15":{"ja":{"question":"非営利組織が寄贈された役務（サービス）を収益として認識するのは、どのような場合のみか。","choices":{"A":"ボランティアなら誰が行っても","B":"価値が$5,000を超える","C":"非金融資産を創出・増価、または通常購入する専門技能を要する","D":"管理的な性質である"},"explanation":"寄贈役務は、非金融資産を創出・増価する場合、または（それを持つ者が提供し）通常は購入する専門的技能を要する場合にのみ認識する。"},"ko":{"question":"비영리조직이 기증받은 용역(서비스)을 수익으로 인식하는 것은 어떤 경우에 한하는가?","choices":{"A":"어떤 자원봉사자가 수행해도","B":"가치가 $5,000를 초과","C":"비금융자산을 창출·증가, 또는 평소 구입할 전문기술을 요함","D":"관리적 성격이다"},"explanation":"기증용역은 비금융자산을 창출·증가시키거나, (그것을 가진 자가 제공하며) 평소 구입할 전문기술을 요하는 경우에만 인식한다."}},"AI-BAR5-16":{"ja":{"question":"非営利組織は費用をどのように報告することが求められるか。","choices":{"A":"機能別のみ","B":"性質別のみ","C":"どちらも不要（収益と相殺）","D":"機能別と性質別の双方"},"explanation":"NFPは費用を機能別（プログラム対サポート）と性質別（給与・賃借料等）の双方で分析表示する必要があり、しばしば機能別費用計算書を用いる。"},"ko":{"question":"비영리조직은 비용을 어떻게 보고하도록 요구되는가?","choices":{"A":"기능별만","B":"성격별만","C":"둘 다 아님(수익과 상계)","D":"기능별과 성격별 모두"},"explanation":"NFP는 비용을 기능별(프로그램 대 지원)과 성격별(급여·임차료 등) 모두로 분석 표시해야 하며, 흔히 기능별비용표를 사용한다."}},"AI-BAR5-17":{"ja":{"question":"次のうち受託（フィデュシャリー）基金の種類はどれか。","choices":{"A":"管理（カストディアル）基金","B":"事業基金","C":"特別収入基金","D":"資本事業基金"},"explanation":"受託基金は管理（カストディアル）・年金（その他従業員給付）信託・投資信託・私的目的信託。事業基金はプロプライエタリ、特別収入・資本事業は政府基金。"},"ko":{"question":"다음 중 수탁(fiduciary) 기금 유형은?","choices":{"A":"관리(custodial)기금","B":"사업기금","C":"특별수입기금","D":"자본사업기금"},"explanation":"수탁기금은 관리(custodial)·연금(기타 종업원급여)신탁·투자신탁·사적목적신탁. 사업기금은 독점, 특별수입·자본사업은 정부기금."}},"AI-BAR5-18":{"ja":{"question":"資本事業基金（キャピタル・プロジェクツ）が会計処理する資源は何のためのものか。","choices":{"A":"長期債務の元本・利息の支払い","B":"（プロプライエタリ・受託基金以外の）主要な資本施設の取得・建設","C":"他部門へのコスト回収ベースのサービス","D":"基本財産の元本を維持"},"explanation":"資本事業基金は、主要な資本資産の取得・建設に充当する財源を会計処理する。債務返済基金は元利、内部サービス基金は他部門へのサービス。"},"ko":{"question":"자본사업기금(capital projects)이 회계처리하는 자원은 무엇을 위한 것인가?","choices":{"A":"장기부채 원금·이자 지급","B":"(독점·수탁기금 외의) 주요 자본시설의 취득·건설","C":"타 부서에 원가회수 기반 용역","D":"기본재산 원금을 유지"},"explanation":"자본사업기금은 주요 자본자산의 취득·건설에 충당하는 재원을 회계처리한다. 채무상환기금은 원리금, 내부서비스기금은 타 부서 용역."}},"AI-BAR5-19":{"ja":{"question":"政府基金が予算枠（アンカンブランス）を記録するのは何のためか。","choices":{"A":"測定可能時に収益認識","B":"資本資産の減価償却を記録","C":"発注等のコミットメントのため歳出予算を留保","D":"未払給与を見越計上"},"explanation":"アンカンブランス会計は、発注・コミットメント時に歳出予算の一部を留保（予約）し、予算超過を防ぐ。アンカンブランスは支出でも負債でもない。"},"ko":{"question":"정부기금이 예산약정(encumbrance)을 기록하는 이유는?","choices":{"A":"측정가능 시 수익인식","B":"자본자산 감가상각을 기록","C":"발주 등 약정을 위해 세출예산을 유보","D":"미지급급여를 발생계상"},"explanation":"약정(encumbrance) 회계는 발주·약정 시 세출예산의 일부를 유보(예약)해 예산 초과를 막는다. 약정은 지출도 부채도 아니다."}},"AI-BAR5-20":{"ja":{"question":"政府基金の予算仕訳で「歳出予算（アプロプリエーションズ）」が表すものは：","choices":{"A":"見積（予想）歳入","B":"実際の現金収入","C":"未消化の予算枠","D":"支出を行う法的権限"},"explanation":"歳出予算は法的な支出権限。期首予算仕訳は歳入見積りを借方、歳出予算を貸方、差額を予算上の基金残高に計上する。"},"ko":{"question":"정부기금 예산분개에서 '세출예산(appropriations)'이 나타내는 것은:","choices":{"A":"추정(예상) 수입","B":"실제 현금수입","C":"미소진 약정","D":"지출을 행할 법적 권한"},"explanation":"세출예산은 법적 지출권한. 기초 예산분개는 추정수입을 차변, 세출예산을 대변, 차액을 예산상 기금잔액에 계상한다."}},"AI-BAR5-21":{"ja":{"question":"政府が課す固定資産税（プロパティタックス）は、どの取引区分の例か。","choices":{"A":"賦課型非交換収益","B":"交換取引","C":"派生税収","D":"政府義務付け取引"},"explanation":"固定資産税や罰金は賦課型非交換収益（基礎取引から派生しない賦課）。執行可能な法的請求権が生じ、資源が利用可能なときに認識。"},"ko":{"question":"정부가 부과하는 재산세(property tax)는 어느 거래 구분의 예인가?","choices":{"A":"부과형 비교환수익","B":"교환거래","C":"파생세수","D":"정부의무부과 거래"},"explanation":"재산세나 벌금은 부과형 비교환수익(기초거래에서 파생되지 않는 부과). 집행가능한 법적 청구권이 생기고 자원이 가용할 때 인식."}},"AI-BAR5-22":{"ja":{"question":"政府が小売売上に基づいて徴収する売上税は、どう分類されるか。","choices":{"A":"賦課型非交換収益","B":"派生税収","C":"交換取引","D":"自発的非交換取引"},"explanation":"売上税・所得税は派生税収——売上や所得という基礎的な交換から派生（derived）する。"},"ko":{"question":"정부가 소매 매출에 기반해 징수하는 매출세는 어떻게 분류되는가?","choices":{"A":"부과형 비교환수익","B":"파생세수","C":"교환거래","D":"자발적 비교환거래"},"explanation":"매출세·소득세는 파생세수——매출이나 소득이라는 기초적 교환에서 파생(derived)된다."}},"AI-BAR5-23":{"ja":{"question":"政府基金財務諸表と政府全体財務諸表の間で調整が必要なのは、主に両者が何を用いるためか。","choices":{"A":"報告通貨が異なる","B":"会計年度末が異なる","C":"測定焦点と会計基礎が異なる","D":"外部監査人が異なる"},"explanation":"政府基金は流動財務資源焦点＋修正発生主義、政府全体は経済的資源焦点＋完全発生主義を用いるため、資本資産・長期債務等を調整する。"},"ko":{"question":"정부기금 재무제표와 정부전체 재무제표 간 조정이 필요한 것은 주로 둘이 무엇을 사용하기 때문인가?","choices":{"A":"보고통화가 다름","B":"회계연도 말이 다름","C":"측정초점과 회계기준이 다름","D":"외부감사인이 다름"},"explanation":"정부기금은 유동재무자원 초점＋수정발생주의, 정부전체는 경제적자원 초점＋완전발생주의를 사용하므로 자본자산·장기부채 등을 조정한다."}},"AI-BAR5-24":{"ja":{"question":"政府の年次報告書におけるMD&A（経営者による討議と分析）は、どう分類されるか。","choices":{"A":"財務諸表注記の一部","B":"完全に任意","C":"受託基金の計算書","D":"基本財務諸表の前に置く必須補足情報"},"explanation":"MD&Aは基本財務諸表の前に置かれる必須補足情報（RSI）で、政府の財務活動を客観的かつ読みやすく分析する。"},"ko":{"question":"정부 연차보고서의 MD&A(경영진의 논의와 분석)는 어떻게 분류되는가?","choices":{"A":"재무제표 주석의 일부","B":"전적으로 선택사항","C":"수탁기금 명세서","D":"기본재무제표 앞에 두는 필수보충정보"},"explanation":"MD&A는 기본재무제표 앞에 위치하는 필수보충정보(RSI)로, 정부의 재무활동을 객관적이고 읽기 쉽게 분석한다."}},"AI-BAR1-25":{"ja":{"question":"支出アプローチでGDPは、消費＋投資＋政府支出に何を加えたものか。","choices":{"A":"純輸出（輸出−輸入）","B":"純所得","C":"減価償却","D":"純貯蓄"},"explanation":"GDP = C + I + G + (X − M)。純輸出（輸出−輸入）が支出アプローチの第4の構成要素。"},"ko":{"question":"지출접근법에서 GDP는 소비＋투자＋정부지출에 무엇을 더한 값인가?","choices":{"A":"순수출(수출−수입)","B":"순소득","C":"감가상각","D":"순저축"},"explanation":"GDP = C + I + G + (X − M). 순수출(수출−수입)이 지출접근법의 네 번째 구성요소."}},"AI-BAR1-26":{"ja":{"question":"実質GDPが名目GDPと異なる点は、実質GDPが何である点か。","choices":{"A":"現在の市場価格で測定","B":"物価水準の変化（インフレ）を調整","C":"常に名目GDPより大きい","D":"政府支出を除いて計算"},"explanation":"実質GDPはインフレ調整済み（不変価格）で、価格変動ではなく実際の産出変化を反映する。名目GDPは現在価格。"},"ko":{"question":"실질GDP가 명목GDP와 다른 점은, 실질GDP가 무엇인 점인가?","choices":{"A":"현재 시장가격으로 측정","B":"물가수준 변화(인플레이션) 조정","C":"항상 명목GDP보다 크다","D":"정부지출을 제외하고 계산"},"explanation":"실질GDP는 인플레이션 조정(불변가격)으로, 가격변동이 아닌 실제 산출 변화를 반영한다. 명목GDP는 현재가격."}},"AI-BAR1-27":{"ja":{"question":"労働者の技能と求人のミスマッチによる失業は何と呼ばれるか。","choices":{"A":"摩擦的失業","B":"循環的失業","C":"構造的失業","D":"季節的失業"},"explanation":"構造的失業は技能・地域のミスマッチから生じる。摩擦的は短期の求職、循環的は景気循環に伴う。"},"ko":{"question":"노동자 기술과 일자리의 불일치로 인한 실업은 무엇이라 불리는가?","choices":{"A":"마찰적 실업","B":"순환적 실업","C":"구조적 실업","D":"계절적 실업"},"explanation":"구조적 실업은 기술·지역 불일치에서 발생. 마찰적은 단기 구직, 순환적은 경기순환에 따른 것."}},"AI-BAR1-28":{"ja":{"question":"次のうち拡張的財政政策の例はどれか。","choices":{"A":"公定歩合の引き上げ","B":"国債の売却","C":"準備率の引き上げ","D":"政府支出の増加"},"explanation":"財政政策は政府支出と課税。支出増（または減税）は拡張的。他の3つは緊縮的な金融政策手段。"},"ko":{"question":"다음 중 확장적 재정정책의 예는?","choices":{"A":"재할인율 인상","B":"국채 매각","C":"지급준비율 인상","D":"정부지출 증가"},"explanation":"재정정책은 정부지출과 과세. 지출 증가(또는 감세)는 확장적. 나머지 셋은 긴축적 통화정책 수단."}},"AI-BAR1-29":{"ja":{"question":"正常財の場合、消費者所得の増加は需要曲線をどう動かすか。","choices":{"A":"右へ（需要増加）","B":"左へ（需要減少）","C":"既存の曲線上のみ","D":"動かない"},"explanation":"所得増は正常財の需要を増やし需要曲線を右にシフト。価格変化だけなら曲線上の移動でシフトではない。"},"ko":{"question":"정상재의 경우, 소비자 소득 증가는 수요곡선을 어떻게 이동시키는가?","choices":{"A":"오른쪽(수요 증가)","B":"왼쪽(수요 감소)","C":"기존 곡선 위에서만","D":"이동 안 함"},"explanation":"소득 증가는 정상재 수요를 늘려 수요곡선을 오른쪽으로 이동. 가격 변화만이면 곡선 위 이동이고 시프트 아님."}},"AI-BAR1-30":{"ja":{"question":"均衡価格より低く設定された有効な価格上限は何を引き起こすか。","choices":{"A":"余剰","B":"不足","C":"均衡","D":"市場価格の上昇"},"explanation":"拘束的な価格上限（均衡未満）は需要量が供給量を上回り不足を生む。価格下限（均衡超）は余剰を生む。"},"ko":{"question":"균형가격보다 낮게 설정된 효과적 가격상한은 무엇을 야기하는가?","choices":{"A":"잉여","B":"부족","C":"균형","D":"시장가격 상승"},"explanation":"구속적 가격상한(균형 미만)은 수요량이 공급량을 초과해 부족을 만든다. 가격하한(균형 초과)은 잉여를 만든다."}},"AI-BAR1-31":{"ja":{"question":"消費者余剰とは何の差か。","choices":{"A":"価格と限界費用","B":"総収入と総費用","C":"支払意思額と実際支払額","D":"供給と需要"},"explanation":"消費者余剰は支払ってもよい最大額と実際に支払う価格の差で、需要曲線の下・価格の上の面積。"},"ko":{"question":"소비자잉여는 무엇의 차이인가?","choices":{"A":"가격과 한계비용","B":"총수입과 총비용","C":"지불의향액과 실제 지불액","D":"공급과 수요"},"explanation":"소비자잉여는 지불할 의향이 있는 최대액과 실제 지불 가격의 차이로, 수요곡선 아래·가격 위의 면적."}},"AI-BAR1-32":{"ja":{"question":"供給が価格弾力的だといえるのはどんなときか。","choices":{"A":"価格で供給量がほぼ変わらない（|Es|<1）","B":"供給量が固定（|Es|=0）","C":"価格＝限界費用","D":"供給量が価格に大きく反応（|Es|>1）"},"explanation":"弾力的供給は|Es|>1：供給量が価格変化より比例的に大きく反応。非弾力的（|Es|<1）は反応が小さい。"},"ko":{"question":"공급이 가격탄력적이라고 하는 경우는?","choices":{"A":"가격에 공급량이 거의 안 변함(|Es|<1)","B":"공급량이 고정(|Es|=0)","C":"가격＝한계비용","D":"공급량이 가격에 크게 반응(|Es|>1)"},"explanation":"탄력적 공급은 |Es|>1: 공급량이 가격변화보다 비례적으로 크게 반응. 비탄력적(|Es|<1)은 반응이 작다."}},"AI-BAR1-33":{"ja":{"question":"比較優位の理論によれば、国はどのような財に特化すべきか。","choices":{"A":"より低い機会費用","B":"より高い絶対費用","C":"最大の人口","D":"既存の貿易黒字"},"explanation":"比較優位は機会費用の低い財の生産・輸出を説く。絶対優位がなくても貿易から利益を得られる。"},"ko":{"question":"비교우위 이론에 따르면 국가는 어떤 재화에 특화해야 하는가?","choices":{"A":"더 낮은 기회비용","B":"더 높은 절대비용","C":"최대 인구","D":"기존 무역흑자"},"explanation":"비교우위는 기회비용이 낮은 재화의 생산·수출을 말한다. 절대우위가 없어도 무역에서 이익을 얻는다."}},"AI-BAR1-34":{"ja":{"question":"自国通貨が他通貨に対して減価すると、輸出は一般にどうなるか。","choices":{"A":"外国の買い手に高くなる","B":"外国の買い手に安くなる（競争力↑）","C":"影響なし","D":"関税の対象"},"explanation":"通貨安（減価）は自国財を外国の買い手にとって安くし、輸出を増やし輸入を減らす傾向。"},"ko":{"question":"자국 통화가 다른 통화 대비 절하되면, 수출은 일반적으로 어떻게 되는가?","choices":{"A":"외국 구매자에게 비싸짐","B":"외국 구매자에게 싸짐(경쟁력↑)","C":"영향 없음","D":"관세 대상"},"explanation":"통화 약세(절하)는 자국 재화를 외국 구매자에게 싸게 만들어 수출을 늘리고 수입을 줄이는 경향."}},"AI-BAR1-35":{"ja":{"question":"少数の大きく相互依存的な企業が支配する市場は何か。","choices":{"A":"独占","B":"完全競争","C":"寡占","D":"独占的競争"},"explanation":"寡占は少数の大企業が価格決定で相互依存する。独占的競争は多数の企業が差別化された製品を売る。"},"ko":{"question":"소수의 크고 상호의존적인 기업이 지배하는 시장은?","choices":{"A":"독점","B":"완전경쟁","C":"과점","D":"독점적 경쟁"},"explanation":"과점은 소수 대기업이 가격 결정에서 상호의존한다. 독점적 경쟁은 다수 기업이 차별화된 제품을 판다."}},"AI-BAR1-36":{"ja":{"question":"COSO ERMで、リスク決定を形づくる中核的価値・態度・行動は何を反映するか。","choices":{"A":"リスク選好","B":"リスク許容量","C":"残余リスク","D":"リスク文化"},"explanation":"リスク文化（ガバナンスと文化の一部）は、組織がリスクをどう考えるかを特徴づける共有された態度・価値・行動。"},"ko":{"question":"COSO ERM에서 위험 결정을 형성하는 핵심 가치·태도·행동은 무엇을 반영하는가?","choices":{"A":"위험선호","B":"위험수용능력","C":"잔여위험","D":"위험문화"},"explanation":"위험문화(거버넌스와 문화의 일부)는 조직이 위험을 어떻게 고려하는지를 특징짓는 공유된 태도·가치·행동."}},"AI-BAR2-25":{"ja":{"question":"新規普通株式の発行コストが内部留保より一般に高い理由は何か。","choices":{"A":"発行費用","B":"法人税","C":"より高い配当","D":"支払利息"},"explanation":"新株発行は発行費用（引受・法務・登録）を伴い、手取りが減るため実効コストが内部留保より高い。"},"ko":{"question":"신규 보통주 발행비용이 유보이익보다 일반적으로 높은 이유는?","choices":{"A":"발행비용","B":"법인세","C":"더 높은 배당","D":"이자비용"},"explanation":"신주 발행은 발행비용(인수·법무·등록)을 수반해 순수취액이 줄어 실효비용이 유보이익보다 높다."}},"AI-BAR2-26":{"ja":{"question":"配当性向は配当を何で割ったものか。","choices":{"A":"総資産","B":"当期純利益","C":"市場価格","D":"利益剰余金"},"explanation":"配当性向＝配当 / 当期純利益。その補数（1−性向）が内部留保率（再投資率）。"},"ko":{"question":"배당성향은 배당을 무엇으로 나눈 값인가?","choices":{"A":"총자산","B":"순이익","C":"시장가격","D":"이익잉여금"},"explanation":"배당성향＝배당 / 순이익. 그 보수(1−성향)가 유보율(재투자율)."}},"AI-BAR2-27":{"ja":{"question":"修正内部収益率（MIRR）はIRRを改善し、中間CFをどの率で再投資すると仮定するか。","choices":{"A":"内部収益率","B":"リスクフリーレート","C":"資本コスト","D":"インフレ率"},"explanation":"MIRRは資本コストでの再投資（より現実的）を仮定し、IRRの楽観的な再投資仮定を補正する。"},"ko":{"question":"수정내부수익률(MIRR)은 IRR을 개선해 중간 현금흐름을 어느 율로 재투자한다고 가정하는가?","choices":{"A":"내부수익률","B":"무위험이자율","C":"자본비용","D":"인플레이션율"},"explanation":"MIRR은 자본비용 재투자(더 현실적)를 가정해 IRR의 낙관적 재투자 가정을 보정한다."}},"AI-BAR2-28":{"ja":{"question":"財務レバレッジ度（DFL）は、営業利益（EBIT）の変化に対する何の感応度を測るか。","choices":{"A":"売上","B":"貢献利益","C":"固定費","D":"1株当たり利益（純利益）"},"explanation":"DFL＝EPS変化率/EBIT変化率。固定的な金融費用（利息）がEBIT変化のEPS/純利益への波及を増幅する。"},"ko":{"question":"재무레버리지도(DFL)는 영업이익(EBIT) 변화에 대한 무엇의 민감도를 측정하는가?","choices":{"A":"매출","B":"공헌이익","C":"고정비","D":"주당순이익(순이익)"},"explanation":"DFL＝EPS 변화율/EBIT 변화율. 고정 금융비용(이자)이 EBIT 변화의 EPS/순이익 파급을 증폭한다."}},"AI-BAR2-29":{"ja":{"question":"プロジェクトに必要な正味運転資本の増加は、NPV分析でどう扱われるか。","choices":{"A":"当初の流出で終了時に回収","B":"無視する埋没原価","C":"財務キャッシュフロー","D":"減価償却"},"explanation":"運転資本増は当初の流出（売掛・在庫に拘束）で、プロジェクト終了時に終末流入として回収される。"},"ko":{"question":"프로젝트에 필요한 순운전자본 증가는 NPV 분석에서 어떻게 다뤄지는가?","choices":{"A":"초기 유출이며 종료 시 회수","B":"무시하는 매몰원가","C":"재무현금흐름","D":"감가상각"},"explanation":"운전자본 증가는 초기 유출(매출채권·재고에 묶임)이고, 프로젝트 종료 시 종말 유입으로 회수된다."}},"AI-BAR2-30":{"ja":{"question":"在庫回転率はどう計算されるか。","choices":{"A":"売上 ÷ 平均在庫","B":"売上原価 ÷ 平均在庫","C":"平均在庫 ÷ 売上原価","D":"仕入 ÷ 期末在庫"},"explanation":"在庫回転率＝売上原価/平均在庫。在庫が何回販売・補充されたかを示す。高いほど効率的。"},"ko":{"question":"재고회전율은 어떻게 계산되는가?","choices":{"A":"매출 ÷ 평균재고","B":"매출원가 ÷ 평균재고","C":"평균재고 ÷ 매출원가","D":"매입 ÷ 기말재고"},"explanation":"재고회전율＝매출원가/평균재고. 재고가 몇 번 판매·보충되었는지 나타냄. 높을수록 효율적."}},"AI-BAR2-31":{"ja":{"question":"売上債権回転日数（DSO）は何にかかる平均日数を測るか。","choices":{"A":"在庫を売る","B":"仕入先に支払う","C":"売掛金を回収する","D":"原材料を変換する"},"explanation":"DSO（平均回収期間）＝平均売掛金/信用売上×365。信用顧客から現金を回収するのにかかる期間。"},"ko":{"question":"매출채권회수일수(DSO)는 무엇에 걸리는 평균 일수를 측정하는가?","choices":{"A":"재고를 판다","B":"공급업체에 지급","C":"매출채권을 회수","D":"원자재를 전환"},"explanation":"DSO(평균회수기간)＝평균 매출채권/신용매출×365. 신용 고객으로부터 현금을 회수하는 데 걸리는 기간."}},"AI-BAR2-32":{"ja":{"question":"ロックボックス・システムは主に何のために使われるか。","choices":{"A":"仕入先への支払を遅らせる","B":"余剰現金を翌日物で運用","C":"法人税を減らす","D":"顧客回収を早める（フロート削減）"},"explanation":"ロックボックスは顧客が銀行運営の私書箱に送金し小切手を早く入金、回収フロートを減らし現金化を早める。"},"ko":{"question":"록박스 시스템은 주로 무엇을 위해 사용되는가?","choices":{"A":"공급업체 지급을 늦춘다","B":"여유현금을 익일물로 운용","C":"법인세를 줄임","D":"고객 회수를 앞당김(플로트 감소)"},"explanation":"록박스는 고객이 은행 운영 사서함에 송금해 수표를 빨리 입금, 회수 플로트를 줄이고 현금화를 앞당긴다."}},"AI-BAR2-33":{"ja":{"question":"リース対購入の分析で、比較的確実な税引後CFを割り引く適切な率は何か。","choices":{"A":"税引後負債コスト","B":"WACC","C":"自己資本コスト","D":"内部収益率"},"explanation":"リース対購入は低リスクの契約的CFを伴う実質的な資金調達決定なので、税引後負債コストが標準的割引率。"},"ko":{"question":"리스 대 구매 분석에서, 비교적 확실한 세후 현금흐름을 할인하는 적절한 율은?","choices":{"A":"세후 부채비용","B":"WACC","C":"자기자본비용","D":"내부수익률"},"explanation":"리스 대 구매는 저위험 계약적 현금흐름을 수반하는 실질적 자금조달 결정이라 세후 부채비용이 표준 할인율."}},"AI-BAR2-34":{"ja":{"question":"予期せぬ必要に備えて現金・市場性証券を保有するのは、どの動機を反映するか。","choices":{"A":"取引動機","B":"予備的動機","C":"投機的動機","D":"税務動機"},"explanation":"予備的動機は不測の需要への安全クッションとして流動性を保有。取引動機は通常の支払、投機的動機は機会狙い。"},"ko":{"question":"예기치 못한 필요에 대비해 현금·시장성증권을 보유하는 것은 어느 동기를 반영하는가?","choices":{"A":"거래동기","B":"예비적 동기","C":"투기적 동기","D":"세무동기"},"explanation":"예비적 동기는 불측의 수요에 대한 안전쿠션으로 유동성을 보유. 거래동기는 일상 지급, 투기적 동기는 기회 노림."}},"AI-BAR2-35":{"ja":{"question":"割引回収期間法は通常の回収期間法とどう異なるか。","choices":{"A":"残存価値を無視","B":"CFの代わりに純利益を使う","C":"貨幣の時間価値で割り引く","D":"流出に利息を加える"},"explanation":"割引回収期間は各CFの現在価値を用い、貨幣の時間価値を無視する通常法の欠点を補正。両者とも回収後CFは無視。"},"ko":{"question":"할인회수기간법은 일반 회수기간법과 어떻게 다른가?","choices":{"A":"잔존가치를 무시","B":"현금흐름 대신 순이익을 사용","C":"화폐의 시간가치로 할인","D":"유출에 이자를 더함"},"explanation":"할인회수기간은 각 현금흐름의 현재가치를 사용해 화폐의 시간가치를 무시하는 일반법의 결함을 보정. 둘 다 회수 후 현금흐름은 무시."}},"AI-BAR2-36":{"ja":{"question":"資本割当（キャピタル・レーショニング）が起こるのは、企業がどうするときか。","choices":{"A":"正NPVの全案件を採択","B":"無制限の資本を持つ","C":"自己資本のみで調達","D":"投資総額を制限し受入可能案件から選ぶ"},"explanation":"資本割当では予算制約により、利用可能資金内で総NPVを最大化する受入可能案件の組合せを選ばざるを得ない。"},"ko":{"question":"자본할당(capital rationing)이 일어나는 것은 기업이 어떻게 할 때인가?","choices":{"A":"양(+)NPV 모든 안을 채택","B":"무제한 자본을 가짐","C":"자기자본만으로 조달","D":"투자 총액을 제한하고 채택가능 안 중에서 선택"},"explanation":"자본할당에서는 예산제약으로 가용자금 내에서 총NPV를 최대화하는 채택가능 안의 조합을 선택해야 한다."}},"AI-BAR3-25":{"ja":{"question":"直接材料数量（消費）差異はどう計算されるか。","choices":{"A":"(実際使用量−許容標準量)×標準価格","B":"(実際価格−標準価格)×実際数量","C":"(実際時間−標準時間)×標準賃率","D":"(実際量−標準量)×実際価格"},"explanation":"材料数量差異＝(実際使用量−許容標準量)×標準価格。価格差異は(実際価格−標準価格)×実際購入量。"},"ko":{"question":"직접재료 수량(사용)차이는 어떻게 계산되는가?","choices":{"A":"(실제사용량−허용표준량)×표준가격","B":"(실제가격−표준가격)×실제수량","C":"(실제시간−표준시간)×표준임률","D":"(실제량−표준량)×실제가격"},"explanation":"재료 수량차이＝(실제사용량−허용표준량)×표준가격. 가격차이는 (실제가격−표준가격)×실제구입량."}},"AI-BAR3-26":{"ja":{"question":"直接労務賃率差異はどう計算されるか。","choices":{"A":"(実際時間−標準時間)×標準賃率","B":"(実際賃率−標準賃率)×実際時間","C":"(実際賃率−標準賃率)×標準時間","D":"(実際時間−標準時間)×実際賃率"},"explanation":"労務賃率（価格）差異＝(実際賃率−標準賃率)×実際時間。能率差異は(実際時間−標準時間)×標準賃率。"},"ko":{"question":"직접노무 임률차이는 어떻게 계산되는가?","choices":{"A":"(실제시간−표준시간)×표준임률","B":"(실제임률−표준임률)×실제시간","C":"(실제임률−표준임률)×표준시간","D":"(실제시간−표준시간)×실제임률"},"explanation":"노무 임률(가격)차이＝(실제임률−표준임률)×실제시간. 능률차이는 (실제시간−표준시간)×표준임률."}},"AI-BAR3-27":{"ja":{"question":"売上数量差異は、変動予算額と何との差か。","choices":{"A":"実際結果","B":"現金予算","C":"固定（マスター）予算額","D":"前年実績"},"explanation":"売上数量差異は変動予算（実際操業度）と固定/マスター予算（計画操業度）を比較し、数量差の影響を切り分ける。"},"ko":{"question":"매출수량차이는 변동예산액과 무엇의 차이인가?","choices":{"A":"실제결과","B":"현금예산","C":"고정(마스터)예산액","D":"전년실적"},"explanation":"매출수량차이는 변동예산(실제 조업도)과 고정/마스터예산(계획 조업도)을 비교해 수량 차이 영향을 분리한다."}},"AI-BAR3-28":{"ja":{"question":"生産資源が希少なとき、どの製品を優先すべきか。","choices":{"A":"総貢献利益","B":"販売価格","C":"売上総利益率","D":"制約資源1単位当たり貢献利益"},"explanation":"制約があるときは希少資源1単位当たり貢献利益（例：機械時間当たり）で順位付けすると総貢献利益が最大化。"},"ko":{"question":"생산자원이 희소할 때 어떤 제품을 우선해야 하는가?","choices":{"A":"총공헌이익","B":"판매가격","C":"매출총이익률","D":"제약자원 1단위당 공헌이익"},"explanation":"제약이 있을 때는 희소자원 1단위당 공헌이익(예: 기계시간당)으로 순위를 매기면 총공헌이익이 최대화."}},"AI-BAR3-29":{"ja":{"question":"販売か追加加工かの意思決定で、無関連な原価はどれか。","choices":{"A":"分離点前に発生済の連産品原価","B":"増分加工原価","C":"追加加工の増分収益","D":"加工後の追加販売費"},"explanation":"分離点前に発生した連産品原価は埋没で無関連。重要なのは追加加工の増分収益と増分原価のみ。"},"ko":{"question":"판매·추가가공 의사결정에서 비관련 원가는 무엇인가?","choices":{"A":"분리점 전 발생한 연산품 원가","B":"증분가공비","C":"추가가공의 증분수익","D":"가공 후 추가 판매비"},"explanation":"분리점 전에 발생한 연산품 원가는 매몰이라 비관련. 중요한 것은 추가가공의 증분수익과 증분원가뿐."}},"AI-BAR3-30":{"ja":{"question":"異常仕損（アブノーマル・スポイレッジ）はどう処理されるか。","choices":{"A":"良品の原価に含める","B":"期間の損失として費用化","C":"在庫として資産化","D":"完全に無視"},"explanation":"異常仕損（正常を超える分）は発生期間の損失勘定に計上し、製品原価に含めない。正常仕損は製品原価。"},"ko":{"question":"비정상 공손(abnormal spoilage)은 어떻게 처리되는가?","choices":{"A":"양품 원가에 포함","B":"기간 손실로 비용화","C":"재고로 자본화","D":"완전히 무시"},"explanation":"비정상 공손(정상 초과분)은 발생 기간의 손실계정에 계상하고 제품원가에 포함하지 않는다. 정상 공손은 제품원가."}},"AI-BAR3-31":{"ja":{"question":"受入材料の検査や完成品の試験は、どの品質原価の例か。","choices":{"A":"予防原価","B":"内部失敗原価","C":"評価原価","D":"外部失敗原価"},"explanation":"評価（検査）原価は欠陥検出のための原価。予防原価は事前に欠陥を防ぎ、内部/外部失敗原価は欠陥発生後（出荷前/後）。"},"ko":{"question":"입고 자재 검사나 완성품 시험은 어느 품질원가의 예인가?","choices":{"A":"예방원가","B":"내부실패원가","C":"평가원가","D":"외부실패원가"},"explanation":"평가(검사)원가는 결함 검출을 위한 원가. 예방원가는 사전에 결함을 막고, 내부/외부 실패원가는 결함 발생 후(출하 전/후)."}},"AI-BAR3-32":{"ja":{"question":"製品が顧客に届いた後の保証修理やリコールは、どの品質原価の例か。","choices":{"A":"予防原価","B":"評価原価","C":"内部失敗原価","D":"外部失敗原価"},"explanation":"外部失敗原価は顧客への引渡し後に発生（保証・リコール・信用失墜）。内部失敗原価（スクラップ・手直し）は引渡し前。"},"ko":{"question":"제품이 고객에게 전달된 후의 보증수리·리콜은 어느 품질원가의 예인가?","choices":{"A":"예방원가","B":"평가원가","C":"내부실패원가","D":"외부실패원가"},"explanation":"외부실패원가는 고객 인도 후 발생(보증·리콜·신용손실). 내부실패원가(스크랩·재작업)는 인도 전."}},"AI-BAR3-33":{"ja":{"question":"加重平均法と比べて、FIFO総合原価計算は何をするか。","choices":{"A":"当期原価を期首仕掛原価と分離","B":"期首仕掛を完全に無視","C":"常に適用が簡単","D":"常に単価が高くなる"},"explanation":"FIFOは期首仕掛の完成原価を当期作業から分離するので、完成品換算単価は当期原価のみを反映。加重平均は混合する。"},"ko":{"question":"가중평균법과 비교해 FIFO 종합원가계산은 무엇을 하는가?","choices":{"A":"당기원가를 기초재공품 원가와 분리","B":"기초재공품을 완전히 무시","C":"항상 적용이 간단","D":"항상 단가가 높아짐"},"explanation":"FIFO는 기초재공품의 완성원가를 당기작업과 분리하므로 완성품환산 단가는 당기원가만 반영. 가중평균은 혼합한다."}},"AI-BAR3-34":{"ja":{"question":"ゼロベース予算では、各期の予算はどうなるか。","choices":{"A":"前年＋増分から始める","B":"ゼロから始め全支出を正当化","C":"固定で変わらない","D":"前期実績に等しい"},"explanation":"ゼロベース予算は毎期ゼロから組み立て、各支出を新たに正当化する。前年予算を基準に持ち越さない。"},"ko":{"question":"영기준예산(ZBB)에서 각 기간의 예산은 어떻게 되는가?","choices":{"A":"전년＋증분에서 시작","B":"0에서 시작해 모든 지출을 정당화","C":"고정되어 변하지 않음","D":"전기 실적과 같음"},"explanation":"영기준예산은 매 기간 0에서 구성하고 각 지출을 새로 정당화한다. 전년 예산을 기준으로 이월하지 않는다."}},"AI-BAR3-35":{"ja":{"question":"制約理論（TOC）では、何を管理してスループットを最大化するか。","choices":{"A":"最大の部門","B":"総固定費","C":"ボトルネック（制約）資源","D":"期末在庫水準"},"explanation":"制約理論はボトルネックに焦点。システム産出（スループット）は制約に律速されるため、制約を緩めると全体産出が増える。"},"ko":{"question":"제약이론(TOC)에서는 무엇을 관리해 처리량(throughput)을 최대화하는가?","choices":{"A":"가장 큰 부서","B":"총고정비","C":"병목(제약) 자원","D":"기말재고 수준"},"explanation":"제약이론은 병목에 초점. 시스템 산출(처리량)은 제약에 의해 결정되므로 제약을 완화하면 전체 산출이 늘어난다."}},"AI-BAR3-36":{"ja":{"question":"マスター予算を作成する出発点であり起点となるのは何か。","choices":{"A":"生産予算","B":"現金予算","C":"資本予算","D":"売上予算（予測）"},"explanation":"売上予算/予測がマスター予算を駆動する。生産・材料・労務・現金予算はすべて予想売上高から導かれる。"},"ko":{"question":"마스터예산을 작성하는 출발점이자 기점이 되는 것은?","choices":{"A":"생산예산","B":"현금예산","C":"자본예산","D":"매출예산(예측)"},"explanation":"매출예산/예측이 마스터예산을 구동한다. 생산·재료·노무·현금예산은 모두 예상매출에서 도출된다."}},"AI-BAR4-25":{"ja":{"question":"連結で、親会社の集団内売掛金と子会社の対応する買掛金はどうなるか。","choices":{"A":"全額消去","B":"連結貸借対照表に残す","C":"非支配割合のみ消去","D":"資本に振り替え"},"explanation":"相互の集団内残高は連結で全額消去される。連結体は自分自身に負債を負えないため。"},"ko":{"question":"연결에서 모회사의 집단내 매출채권과 자회사의 대응 매입채무는 어떻게 되는가?","choices":{"A":"전액 제거","B":"연결재무상태표에 남김","C":"비지배 비율만 제거","D":"자본으로 재분류"},"explanation":"상호 집단내 잔액은 연결에서 전액 제거된다. 연결실체는 자기 자신에게 부채를 질 수 없기 때문."}},"AI-BAR4-26":{"ja":{"question":"段階取得で支配を獲得したとき、従前保有していた持分はどうなるか。","choices":{"A":"当初原価のまま","B":"取得日の公正価値に再測定し損益は当期利益","C":"利益剰余金へ償却","D":"簿価でのれんに加算"},"explanation":"段階的に達成された企業結合では、取得企業は従前持分を取得日の公正価値に再測定し、生じた損益を利益に認識。"},"ko":{"question":"단계적 취득으로 지배를 획득했을 때, 종전 보유 지분은 어떻게 되는가?","choices":{"A":"최초 원가 그대로","B":"취득일 공정가치로 재측정, 손익은 당기손익","C":"이익잉여금으로 상각","D":"장부가로 영업권에 가산"},"explanation":"단계적으로 달성된 기업결합에서 취득기업은 종전 지분을 취득일 공정가치로 재측정하고 발생한 손익을 손익으로 인식."}},"AI-BAR4-27":{"ja":{"question":"在外営業活動体への純投資のヘッジに係る損益はどこに報告されるか。","choices":{"A":"当期純利益","B":"利益剰余金","C":"その他の包括利益（累積換算調整）","D":"のれん"},"explanation":"純投資ヘッジの有効部分は、ヘッジ対象の累積換算調整と並んでOCIに記録し、在外営業の処分時に振り替える。"},"ko":{"question":"해외영업에 대한 순투자 위험회피 손익은 어디에 보고되는가?","choices":{"A":"당기순이익","B":"이익잉여금","C":"기타포괄손익(누적환산조정)","D":"영업권"},"explanation":"순투자 위험회피의 유효부분은 위험회피대상의 누적환산조정과 함께 OCI에 기록하고, 해외영업 처분 시 대체한다."}},"AI-BAR4-28":{"ja":{"question":"外貨建売掛金の決済による損益（外貨建取引）はどこに報告されるか。","choices":{"A":"その他の包括利益","B":"資本に直接","C":"繰延勘定","D":"当期純利益"},"explanation":"外貨建『取引』損益（貨幣性項目のレート変動）は当期利益へ。決算日レート法の『換算』調整がOCIへ行くのと対照的。"},"ko":{"question":"외화 매출채권 결제로 인한 손익(외화거래)은 어디에 보고되는가?","choices":{"A":"기타포괄손익","B":"자본에 직접","C":"이연계정","D":"당기순이익"},"explanation":"외화 '거래' 손익(화폐성 항목의 환율 변동)은 당기손익으로. 현행환율법의 '환산' 조정이 OCI로 가는 것과 대조적."}},"AI-BAR4-29":{"ja":{"question":"セール・アンド・リースバックが売却に該当しない場合、売り手＝借手はどう会計処理するか。","choices":{"A":"資金調達取引（売却を認識しない）","B":"売却と別個のリース","C":"オペレーティングリースのみ","D":"資本への拠出"},"explanation":"支配が移転しない（適格売却でない）場合は資金調達：売り手＝借手は資産を保持し、受取額を金融負債として記録。"},"ko":{"question":"판매후리스(sale-leaseback)가 판매에 해당하지 않을 경우, 판매자=리스이용자는 어떻게 회계처리하는가?","choices":{"A":"자금조달 거래(판매 미인식)","B":"판매와 별도 리스","C":"운용리스만","D":"자본 출자"},"explanation":"지배가 이전되지 않으면(적격 판매 아님) 자금조달: 판매자=리스이용자는 자산을 보유하고 수취액을 금융부채로 기록."}},"AI-BAR4-30":{"ja":{"question":"貸手がリースを販売型リースに分類するのはどんなときか。","choices":{"A":"リース期間が1年未満","B":"原資産の支配が借手に移転","C":"貸手が資産のリスクと便益を保持","D":"リース料が全額変動"},"explanation":"販売型リースはファイナンスリース基準を満たし支配が実質的に借手へ移転する場合に生じ、貸手は資産を認識中止し販売利益を計上しうる。"},"ko":{"question":"리스제공자가 리스를 판매형 리스로 분류하는 경우는?","choices":{"A":"리스기간이 1년 미만","B":"기초자산 지배가 리스이용자에게 이전","C":"리스제공자가 자산의 위험과 보상을 보유","D":"리스료가 전액 변동"},"explanation":"판매형 리스는 금융리스 기준을 충족해 지배가 실질적으로 리스이용자에게 이전될 때 발생하며, 리스제공자는 자산을 제거하고 판매이익을 계상할 수 있다."}},"AI-BAR4-31":{"ja":{"question":"現行U.S. GAAPで、のれん減損損失は報告単位の帳簿価額が何を上回る額に等しいか。","choices":{"A":"識別可能純資産の簿価","B":"再調達原価","C":"公正価値（のれん残高を上限）","D":"額面"},"explanation":"1ステップ法（ASU 2017-04）では、減損＝報告単位の帳簿価額−公正価値（当該単位に配分されたのれんを上限）。"},"ko":{"question":"현행 U.S. GAAP에서 영업권 손상차손은 보고단위 장부금액이 무엇을 초과하는 금액과 같은가?","choices":{"A":"식별가능 순자산 장부가","B":"재조달원가","C":"공정가치(영업권 잔액 한도)","D":"액면"},"explanation":"1단계 법(ASU 2017-04)에서는 손상＝보고단위 장부금액−공정가치(해당 단위에 배부된 영업권 한도)."}},"AI-BAR4-32":{"ja":{"question":"非継続事業の業績は損益計算書でどう報告されるか。","choices":{"A":"継続事業の利益内","B":"その他の包括利益に","C":"資本に直接","D":"継続事業の後に税引後で区分"},"explanation":"非継続事業（戦略的転換となる処分構成要素）は、継続事業からの利益の後に、税引後で区分表示する。"},"ko":{"question":"중단영업의 실적은 손익계산서에서 어떻게 보고되는가?","choices":{"A":"계속영업이익 내","B":"기타포괄손익에","C":"자본에 직접","D":"계속영업 이후 세후로 구분"},"explanation":"중단영업(전략적 전환에 해당하는 처분 구성요소)은 계속영업이익 이후에 세후로 구분표시한다."}},"AI-BAR4-33":{"ja":{"question":"活発な市場における類似資産の相場価格（または非活発市場の同一資産の相場価格）はどう分類されるか。","choices":{"A":"レベル2インプット","B":"レベル1インプット","C":"レベル3インプット","D":"ヒエラルキー外"},"explanation":"レベル2は観察可能だがレベル1ではないインプット（類似項目の相場、または非活発市場の同一項目の相場）。レベル3は観察不能。"},"ko":{"question":"활성시장의 유사 자산 공시가격(또는 비활성시장의 동일 자산 공시가격)은 어떻게 분류되는가?","choices":{"A":"레벨 2 투입","B":"레벨 1 투입","C":"레벨 3 투입","D":"서열에 미포함"},"explanation":"레벨 2는 관측가능하나 레벨 1은 아닌 투입(유사 항목 시세, 또는 비활성시장의 동일 항목 시세). 레벨 3은 관측불가능."}},"AI-BAR4-34":{"ja":{"question":"IFRSとU.S. GAAPの重要な違いの一つは、IFRSが何をする点か。","choices":{"A":"R&Dを全額費用処理","B":"基準を満たす開発費を資産化","C":"のれん償却を要求","D":"資産再評価を禁止"},"explanation":"IFRSは研究費は費用処理するが、技術的・商業的実現可能性基準を満たした開発費は資産化。U.S. GAAPは原則R&Dを費用処理。"},"ko":{"question":"IFRS와 U.S. GAAP의 중요한 차이 하나는 IFRS가 무엇을 하는 점인가?","choices":{"A":"R&D를 전액 비용처리","B":"기준을 충족한 개발비를 자본화","C":"영업권 상각을 요구","D":"자산 재평가를 금지"},"explanation":"IFRS는 연구비는 비용처리하나 기술적·상업적 실현가능성 기준을 충족한 개발비는 자본화. U.S. GAAP은 원칙적으로 R&D를 비용처리."}},"AI-BAR4-35":{"ja":{"question":"連結財務諸表で非支配持分はどう表示されるか。","choices":{"A":"負債として","B":"メザニン（一時的）資本として","C":"資本の中に親会社持分と区分","D":"のれんと相殺"},"explanation":"非支配持分は連結資本の中に、支配（親会社）株主持分と区分して表示する。"},"ko":{"question":"연결재무제표에서 비지배지분은 어떻게 표시되는가?","choices":{"A":"부채로","B":"메자닌(임시)자본으로","C":"자본 내에 모회사 지분과 구분","D":"영업권과 상계"},"explanation":"비지배지분은 연결자본 내에 지배(모회사) 주주지분과 구분하여 표시한다."}},"AI-BAR4-36":{"ja":{"question":"プッシュダウン会計とは何か。","choices":{"A":"集団内取引の消去","B":"のれんを40年で償却","C":"子会社から上向きに連結","D":"取得企業の新公正価値基礎を子会社の帳簿に記録"},"explanation":"プッシュダウン会計は取得日の公正価値調整（新基礎）を被取得子会社の個別財務諸表に記録し、取得企業の基礎を『押し下げる』。"},"ko":{"question":"푸시다운 회계란 무엇인가?","choices":{"A":"집단내 거래 제거","B":"영업권을 40년에 상각","C":"자회사에서 위로 연결","D":"취득기업의 새 공정가치 기준을 자회사 장부에 기록"},"explanation":"푸시다운 회계는 취득일 공정가치 조정(새 기준)을 피취득 자회사의 별도재무제표에 기록해 취득기업의 기준을 '내려민다'."}},"AI-BAR5-25":{"ja":{"question":"他の基金で会計処理する必要のないすべての財源を会計処理する基金はどれか。","choices":{"A":"一般基金","B":"特別収入基金","C":"事業基金","D":"永久基金"},"explanation":"一般基金は主要な運営基金で、特定の他基金に割り当てられない資源を会計処理する。一般目的政府は一般基金を1つだけ持つ。"},"ko":{"question":"다른 기금에서 회계처리할 필요가 없는 모든 재원을 회계처리하는 기금은?","choices":{"A":"일반기금","B":"특별수입기금","C":"사업기금","D":"영구기금"},"explanation":"일반기금은 주요 운영기금으로 특정 다른 기금에 배정되지 않는 자원을 회계처리한다. 일반목적 정부는 일반기금을 하나만 가진다."}},"AI-BAR5-26":{"ja":{"question":"特別収入基金は、どのような収入を会計処理するか。","choices":{"A":"無制限・一般目的","B":"特定目的に制限/拘束（債務返済・資本事業を除く）","C":"事業型活動から生じる","D":"個人のために信託保有"},"explanation":"特別収入基金は、特定目的に制限・拘束された特定収入源（債務返済・資本事業向けを除く）を会計処理する。"},"ko":{"question":"특별수입기금은 어떤 수입을 회계처리하는가?","choices":{"A":"무제한·일반목적","B":"특정 목적에 제한/확약(채무상환·자본사업 제외)","C":"사업형 활동에서 발생","D":"개인을 위해 신탁 보유"},"explanation":"특별수입기금은 특정 목적에 제한·확약된 특정 수입원(채무상환·자본사업용 제외)을 회계처리한다."}},"AI-BAR5-27":{"ja":{"question":"政府全体財務諸表で、純資産は資本資産投資純額・制限付に加え、どの3番目の構成要素で表示されるか。","choices":{"A":"拘束","B":"割当","C":"無制限","D":"支出不能"},"explanation":"政府全体の純資産＝資本資産投資純額＋制限付＋無制限。（拘束・割当・支出不能は政府『基金』残高の分類で、純資産構成要素ではない。）"},"ko":{"question":"정부전체 재무제표에서 순자산은 자본자산 순투자·제한에 더해 어느 세 번째 구성요소로 표시되는가?","choices":{"A":"확약","B":"배정","C":"비제한","D":"지출불능"},"explanation":"정부전체 순자산＝자본자산 순투자＋제한＋비제한. (확약·배정·지출불능은 정부 '기금'잔액 분류이고 순자산 구성요소가 아님.)"}},"AI-BAR5-28":{"ja":{"question":"政府のキャッシュフロー計算書（事業基金）は、キャッシュフローをいくつの区分に分類するか。","choices":{"A":"3つ","B":"2つ","C":"5つ","D":"4つ"},"explanation":"GASBは4区分を要求：営業、非資本財務、資本及び関連財務、投資活動。（FASBの企業計算書は3区分。）"},"ko":{"question":"정부의 현금흐름표(사업기금)는 현금흐름을 몇 개 구분으로 분류하는가?","choices":{"A":"셋","B":"둘","C":"다섯","D":"넷"},"explanation":"GASB는 4개 구분을 요구: 영업, 비자본 재무, 자본 및 관련 재무, 투자 활동. (FASB 기업 현금흐름표는 3개 구분.)"}},"AI-BAR5-29":{"ja":{"question":"修正発生主義の下で、支出（expenditures）は一般にいつ認識されるか。","choices":{"A":"関連する基金負債が発生したとき","B":"現金を支払ったとき","C":"発注したとき","D":"予算が採択されたとき"},"explanation":"政府基金は関連する基金負債が発生したときに支出を認識する（長期債務利息等は例外）。単に現金を支払ったときではない。"},"ko":{"question":"수정발생주의에서 지출(expenditures)은 일반적으로 언제 인식되는가?","choices":{"A":"관련 기금부채가 발생할 때","B":"현금을 지급할 때","C":"발주할 때","D":"예산이 채택될 때"},"explanation":"정부기금은 관련 기금부채가 발생했을 때 지출을 인식한다(장기부채 이자 등은 예외). 단순히 현금을 지급했을 때가 아니다."}},"AI-BAR5-30":{"ja":{"question":"返済の予定なく、ある基金から別の基金へ資源が流れるものは何か。","choices":{"A":"基金間貸付","B":"基金間振替","C":"準外部取引","D":"立替精算"},"explanation":"基金間振替（interfund transfer）は返済要求なく基金間で資源を移す（基金間貸付と異なる）。政府基金ではその他財源/支出として報告。"},"ko":{"question":"상환 예정 없이 한 기금에서 다른 기금으로 자원이 흐르는 것은?","choices":{"A":"기금간 대여","B":"기금간 이전","C":"준외부거래","D":"변상"},"explanation":"기금간 이전(interfund transfer)은 상환 요구 없이 기금 간 자원을 옮긴다(기금간 대여와 다름). 정부기금에서는 기타재원/지출로 보고."}},"AI-BAR5-31":{"ja":{"question":"構成単位（コンポーネント・ユニット）が（区分表示でなく）混合表示されるのはどんなときか。","choices":{"A":"市民に直接サービス","B":"非営利として組織","C":"実質的に主たる政府の一部として機能","D":"独自の経営陣を持つ"},"explanation":"混合（ブレンディング）は構成単位が実質的に主たる政府の一部であるとき（政府にほぼ専属、または統治機関を共有）に用いる。それ以外は区分表示。"},"ko":{"question":"구성단위(component unit)가 (구분표시가 아니라) 혼합표시되는 경우는?","choices":{"A":"시민에게 직접 서비스","B":"비영리로 조직","C":"실질적으로 주된 정부의 일부로 기능","D":"독자적 경영진을 가짐"},"explanation":"혼합(blending)은 구성단위가 실질적으로 주된 정부의 일부일 때(정부에 거의 전속, 또는 지배기구 공유) 사용. 그 외에는 구분표시."}},"AI-BAR5-32":{"ja":{"question":"期限付寄付基金（ターム・エンダウメント）とはどのようなものか。","choices":{"A":"元本を永久に維持","B":"寄付者制約がない","C":"収益のみ永久に制限","D":"時間・事象の経過で制約消滅後、元本を支出可"},"explanation":"期限付寄付基金は所定の時間または事象の経過で元本の制約が消滅し、その後は資源を支出できる。永久（真正）寄付基金は無期限に元本維持。"},"ko":{"question":"기한부 기부기금(term endowment)이란 어떤 것인가?","choices":{"A":"원금을 영구히 유지","B":"기부자 제약이 없음","C":"수익만 영구히 제한","D":"시간·사건 경과로 제약 소멸 후 원금 지출 가능"},"explanation":"기한부 기부기금은 정해진 시간 또는 사건의 경과로 원금 제약이 소멸하며 이후 자원을 지출할 수 있다. 영구(진정) 기부기금은 무기한 원금을 유지."}},"AI-BAR5-33":{"ja":{"question":"非営利組織は投資収益（関連費用控除後）を活動計算書でどう報告するか。","choices":{"A":"該当する純資産区分の増加（制約有無に応じ）","B":"制約なしの収益のみ","C":"その他の包括利益","D":"負債"},"explanation":"投資収益は投資費用控除後で報告し、寄付者制約に応じた区分（例：寄付者が制約すれば制約付）で純資産を増加させる。"},"ko":{"question":"비영리조직은 투자수익(관련 비용 차감 후)을 활동표에서 어떻게 보고하는가?","choices":{"A":"해당 순자산 구분의 증가(제약 유무에 따라)","B":"제약 없는 수익만","C":"기타포괄손익","D":"부채"},"explanation":"투자수익은 투자비용 차감 후 보고하고, 기부자 제약에 따른 구분(예: 기부자가 제약하면 제약 있음)으로 순자산을 증가시킨다."}},"AI-BAR5-34":{"ja":{"question":"政府は一般基金と主要な特別収入基金（法定予算あり）について予算実績対比表をどう表示するか。","choices":{"A":"注記のみ","B":"必須補足情報（または任意で基本計算書）","C":"完全に任意の表","D":"受託基金計算書"},"explanation":"予算対比（当初予算・最終予算・実績）は必須補足情報。ただし政府は基本的な政府基金計算書として表示することも選べる。"},"ko":{"question":"정부는 일반기금과 주요 특별수입기금(법정예산 있음)에 대해 예산실적대비표를 어떻게 표시하는가?","choices":{"A":"주석만","B":"필수보충정보(또는 선택적으로 기본명세서)","C":"전적으로 선택적 표","D":"수탁기금 명세서"},"explanation":"예산대비(당초예산·최종예산·실적)는 필수보충정보. 다만 정부는 기본 정부기금 명세서로 표시할 수도 있다."}},"AI-BAR5-35":{"ja":{"question":"GASBの下で、政府の純年金負債は総年金負債から何を差し引いたものか。","choices":{"A":"年間必要拠出額","B":"勤務費用","C":"年金制度の受託純資産（制度資産）","D":"割引率"},"explanation":"純年金負債＝総年金負債−制度の受託純資産（給付に充当できる制度資産）。政府全体の純資産計算書に報告。"},"ko":{"question":"GASB에서 정부의 순연금부채는 총연금부채에서 무엇을 차감한 것인가?","choices":{"A":"연간 필요 기여액","B":"근무원가","C":"연금제도의 수탁순자산(제도자산)","D":"할인율"},"explanation":"순연금부채＝총연금부채−제도의 수탁순자산(급여에 충당 가능한 제도자산). 정부전체 순자산명세서에 보고."}},"AI-BAR5-36":{"ja":{"question":"政府全体の活動計算書で、サービス料金や営業/資本補助金はどう報告されるか。","choices":{"A":"一般収益","B":"その他財源","C":"基金残高","D":"関連機能の費用を相殺するプログラム収益"},"explanation":"プログラム収益（サービス料金、プログラム固有の営業・資本補助/拠出）は関連機能の費用と相殺し純コストを示す。税は一般収益。"},"ko":{"question":"정부전체 활동표에서 서비스 요금이나 운영/자본 보조금은 어떻게 보고되는가?","choices":{"A":"일반수익","B":"기타재원","C":"기금잔액","D":"관련 기능 비용을 상계하는 프로그램 수익"},"explanation":"프로그램 수익(서비스 요금, 프로그램 특정 운영·자본 보조/출연)은 관련 기능의 비용과 상계해 순원가를 보여준다. 세금은 일반수익."}},"AI-FIN-CF-01":{"ja":{"question":"企業フリーキャッシュフロー（FCFF）が株主FCF（FCFE）と異なる点は、FCFFが何である点か。","choices":{"A":"財務フロー前（全資本提供者が利用可能）","B":"利息・債務返済後","C":"常にFCFEより小さい","D":"当期純利益に等しい"},"explanation":"FCFFは財務フロー前の、全資本提供者（負債+株主）が利用可能なCFでWACCで割引く。FCFEは利息・純借入後で自己資本コストで割引く。"},"ko":{"question":"기업잉여현금흐름(FCFF)이 주주잉여현금흐름(FCFE)과 다른 점은, FCFF가 무엇인 점인가?","choices":{"A":"재무흐름 이전(모든 자본제공자가 이용 가능)","B":"이자·부채상환 후","C":"항상 FCFE보다 작음","D":"순이익과 같음"},"explanation":"FCFF는 재무흐름 이전의, 모든 자본제공자(부채+주주)가 이용 가능한 현금흐름으로 WACC로 할인. FCFE는 이자·순차입 후로 자기자본비용으로 할인."}},"AI-FIN-CF-02":{"ja":{"question":"企業の株式ベータから財務レバレッジの影響を除くと得られるのは何か。","choices":{"A":"レバードベータ","B":"資産（アンレバード）ベータ","C":"マーケットベータ","D":"会計ベータ"},"explanation":"アンレバー（Hamada）で資本構成効果を除くと資産（アンレバード）ベータ＝事業リスクのみが得られ、目標資本構成で再レバーできる。"},"ko":{"question":"기업의 주식 베타에서 재무레버리지 효과를 제거하면 얻는 것은?","choices":{"A":"레버드 베타","B":"자산(언레버드) 베타","C":"마켓 베타","D":"회계 베타"},"explanation":"언레버(Hamada)로 자본구조 효과를 제거하면 자산(언레버드) 베타＝사업위험만 얻고, 목표 자본구조로 재레버할 수 있다."}},"AI-FIN-CF-03":{"ja":{"question":"WACCで、負債と自己資本のウェイトは何に基づくべきか。","choices":{"A":"簿価","B":"歴史的原価","C":"資本の目標/時価","D":"額面"},"explanation":"WACCは時価（または目標）資本構成ウェイトを用いる。時価が各資本源の現在の要求利回りを反映するため。"},"ko":{"question":"WACC에서 부채와 자기자본의 가중치는 무엇에 기반해야 하는가?","choices":{"A":"장부가치","B":"역사적원가","C":"자본의 목표/시장가치","D":"액면가치"},"explanation":"WACC는 시장(또는 목표) 자본구조 가중치를 쓴다. 시장가치가 각 자본원의 현재 요구수익률을 반영하기 때문."}},"AI-FIN-CF-04":{"ja":{"question":"資本構成のペッキングオーダー理論が予測する資金調達の優先順位は？","choices":{"A":"新株を最優先","B":"負債のみ","C":"固定50/50","D":"内部資金→負債→株式の順"},"explanation":"ペッキングオーダー（情報の非対称性）は内部資金→負債→最後に株式を選好する。株式発行は過大評価のシグナルになるため。"},"ko":{"question":"자본구조의 자본조달순서(pecking order) 이론이 예측하는 조달 우선순위는?","choices":{"A":"신주를 최우선","B":"부채만","C":"고정 50/50","D":"내부자금→부채→주식 순"},"explanation":"자본조달순서(정보 비대칭)는 내부자금→부채→마지막에 주식을 선호한다. 주식발행은 과대평가 신호가 되기 때문."}},"AI-FIN-CF-05":{"ja":{"question":"資本構成のトレードオフ理論は、利息の節税効果を何と比較衡量するか。","choices":{"A":"財務的困難（倒産）コスト","B":"配当支払","C":"発行費用のみ","D":"インフレ"},"explanation":"トレードオフ理論の最適レバレッジは、負債の限界的な節税便益と財務的困難/倒産の限界的期待コストが等しくなる点。"},"ko":{"question":"자본구조의 상충(trade-off)이론은 이자 절세효과를 무엇과 비교형량하는가?","choices":{"A":"재무곤경(파산) 비용","B":"배당 지급","C":"발행비용만","D":"인플레이션"},"explanation":"상충이론의 최적 레버리지는 부채의 한계 절세효익과 재무곤경/파산의 한계 기대비용이 같아지는 지점."}},"AI-FIN-CF-06":{"ja":{"question":"CAPMを用いると、企業の自己資本コストはどんなとき上がるか。","choices":{"A":"リスクフリーレートが下がる","B":"ベータが上がる","C":"市場リスクプレミアムが下がる","D":"配当を増やす"},"explanation":"Re = Rf + β(Rm − Rf)。ベータ（システマティックリスク）が高いほど要求自己資本利回りは上がる。"},"ko":{"question":"CAPM을 쓰면 기업의 자기자본비용은 언제 올라가는가?","choices":{"A":"무위험이자율이 하락","B":"베타가 상승","C":"시장위험프리미엄 하락","D":"배당을 늘림"},"explanation":"Re = Rf + β(Rm − Rf). 베타(체계적 위험)가 높을수록 요구 자기자본 수익률이 올라간다."}},"AI-FIN-CF-07":{"ja":{"question":"税引後負債コストが税引前より低いのはなぜか。","choices":{"A":"負債は無リスク","B":"貸し手が利息を一部還付","C":"利息は損金算入で節税効果","D":"元本が損金算入"},"explanation":"税引後負債コスト＝Rd×(1−T)。利息は損金算入され節税効果（タックスシールド）を生むため、配当が損金不算入の自己資本より安い。"},"ko":{"question":"세후 부채비용이 세전보다 낮은 이유는?","choices":{"A":"부채는 무위험","B":"대출자가 이자를 일부 환급","C":"이자는 손금산입으로 절세효과","D":"원금이 손금산입"},"explanation":"세후 부채비용＝Rd×(1−T). 이자는 손금산입되어 절세효과(택스실드)를 만들기에, 배당이 손금불산입인 자기자본보다 싸다."}},"AI-FIN-CF-08":{"ja":{"question":"総レバレッジ度（DTL）は何に等しいか。","choices":{"A":"DOL + DFL","B":"DOL ÷ DFL","C":"DFL − DOL","D":"DOL × DFL"},"explanation":"DTL＝DOL×DFL。売上変化に対するEPSの総合感応度を測り、営業・財務レバレッジ双方を捉える。"},"ko":{"question":"총레버리지도(DTL)는 무엇과 같은가?","choices":{"A":"DOL + DFL","B":"DOL ÷ DFL","C":"DFL − DOL","D":"DOL × DFL"},"explanation":"DTL＝DOL×DFL. 매출 변화에 대한 EPS의 총 민감도를 측정하며 영업·재무 레버리지 둘 다 포착."}},"AI-FIN-CF-09":{"ja":{"question":"企業が経済的価値（正のEVA）を生むのはどんなときか。","choices":{"A":"ROICがWACCを上回る","B":"当期純利益が黒字","C":"売上が伸びる","D":"配当を支払う"},"explanation":"EVA＝(ROIC − WACC)×投下資本。会計利益が正なだけでなく、投下資本利益率が資本コストを上回るときにのみ価値が生まれる。"},"ko":{"question":"기업이 경제적 가치(양(+)의 EVA)를 창출하는 것은 언제인가?","choices":{"A":"ROIC가 WACC를 초과","B":"순이익이 흑자","C":"매출이 성장","D":"배당을 지급"},"explanation":"EVA＝(ROIC − WACC)×투하자본. 회계이익이 양수인 것만이 아니라 투하자본수익률이 자본비용을 초과할 때만 가치가 창출된다."}},"AI-FIN-CF-10":{"ja":{"question":"DCFで、ゴードン成長のターミナルバリューは最終年度FCFを1期成長させ、何で割ったものか。","choices":{"A":"WACC","B":"WACC − g（長期成長率）","C":"g − WACC","D":"リスクフリーレート"},"explanation":"TV＝FCF×(1+g)/(WACC − g)。明示予測期間を超えるCFを一定永久成長率g(<WACC)で捉える。"},"ko":{"question":"DCF에서 고든성장 터미널밸류는 최종연도 FCF를 1기 성장시켜 무엇으로 나눈 값인가?","choices":{"A":"WACC","B":"WACC − g(장기성장률)","C":"g − WACC","D":"무위험이자율"},"explanation":"TV＝FCF×(1+g)/(WACC − g). 명시적 예측기간을 넘는 현금흐름을 일정 영구성장률 g(<WACC)로 포착."}},"AI-FIN-VAL-01":{"ja":{"question":"アンレバードDCFで、企業価値はFCFFを何で割引いた現在価値か。","choices":{"A":"自己資本コスト","B":"リスクフリーレート","C":"WACC","D":"負債コスト"},"explanation":"FCFF（全資本提供者が利用可能）をWACCで割引くと企業価値。FCFEを自
