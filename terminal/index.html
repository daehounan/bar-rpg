-earnings (P/E) ratio, all else equal, generally signals that the market expects:","choices":{"A":"Lower future growth","B":"Imminent bankruptcy","C":"A dividend cut","D":"Higher future earnings growth (or lower risk)"},"answer":"D","explanation":"P/E reflects price per dollar of earnings; a higher multiple usually embeds expectations of stronger earnings growth and/or lower risk (lower required return).","ai":true},{"id":"AI-FIN-VAL-07","area":"FIN","sub":"VAL","title":"Dividend Discount Model","question":"The Gordon growth (constant-growth DDM) values a share as next year's dividend divided by:","choices":{"A":"Required return − growth rate","B":"Required return + growth rate","C":"Growth − required return","D":"The dividend yield"},"answer":"A","explanation":"P0 = D1 / (r − g), valid when the dividend grows at a constant rate g that is less than the required return r.","ai":true},{"id":"AI-FIN-VAL-08","area":"FIN","sub":"VAL","title":"DCF Sensitivity","question":"A DCF valuation is MOST sensitive to:","choices":{"A":"Year-1 working capital","B":"The discount rate (WACC) and the terminal growth rate","C":"The company name","D":"The audit fee"},"answer":"B","explanation":"Small changes in WACC or terminal growth move the large terminal value substantially, so DCF outputs are presented as a sensitivity range over those two inputs.","ai":true},{"id":"AI-FIN-VAL-09","area":"FIN","sub":"VAL","title":"Comparable Companies","question":"A comparable companies analysis values a target by applying:","choices":{"A":"The target's own historical cost","B":"A fixed 10x to revenue","C":"Trading multiples of similar public peers to the target's metrics","D":"Replacement cost"},"answer":"C","explanation":"Trading comps apply valuation multiples (EV/EBITDA, P/E, etc.) derived from similar public companies to the target's financial metrics to imply a market value.","ai":true},{"id":"AI-FIN-VAL-10","area":"FIN","sub":"VAL","title":"Net Operating Losses","question":"In valuation, a target's usable net operating loss (NOL) carryforwards are typically treated as:","choices":{"A":"A liability","B":"Irrelevant","C":"Part of goodwill only","D":"A separate asset (PV of future tax savings) added to value"},"answer":"D","explanation":"Usable NOLs shelter future taxable income, so their present-value tax savings are often added as a separate non-operating asset in the valuation (subject to usage limitations).","ai":true},{"id":"AI-FIN-DEAL-01","area":"FIN","sub":"DEAL","title":"Types of Synergies","question":"Cost synergies in an acquisition typically come from:","choices":{"A":"Eliminating duplicate functions and economies of scale","B":"Cross-selling more products","C":"Raising prices","D":"New market entry"},"answer":"A","explanation":"Cost synergies arise from removing redundant overhead/facilities and scale economies. Revenue synergies (harder to realize) come from cross-selling and expanded reach.","ai":true},{"id":"AI-FIN-DEAL-02","area":"FIN","sub":"DEAL","title":"Accretion / Dilution","question":"An acquisition is EPS-accretive to the acquirer when:","choices":{"A":"Goodwill is created","B":"The acquirer's pro forma EPS rises versus standalone","C":"The target is larger","D":"It is all-stock"},"answer":"B","explanation":"Accretion/dilution compares pro forma combined EPS to the acquirer's standalone EPS; a deal is accretive if EPS increases (often when the acquirer's P/E exceeds the target's effective acquisition multiple).","ai":true},{"id":"AI-FIN-DEAL-03","area":"FIN","sub":"DEAL","title":"Due Diligence","question":"The primary purpose of financial due diligence in M&A is to:","choices":{"A":"Market the deal to the public","B":"Set the management bonus","C":"Validate the target's reported results and identify risks/quality-of-earnings issues","D":"Register securities"},"answer":"C","explanation":"Due diligence verifies the quality and sustainability of earnings, working capital, debt-like items, and contingent risks before the buyer commits to price and terms.","ai":true},{"id":"AI-FIN-DEAL-04","area":"FIN","sub":"DEAL","title":"LBO Value Drivers","question":"Returns in a leveraged buyout (LBO) are primarily driven by debt paydown, EBITDA growth, and:","choices":{"A":"Dividend recaps only","B":"Issuing more equity","C":"Higher taxes","D":"Multiple expansion at exit"},"answer":"D","explanation":"LBO equity returns come from (1) deleveraging (using cash flow to pay down debt), (2) operational EBITDA growth, and (3) selling at a higher exit multiple than entry (multiple expansion).","ai":true},{"id":"AI-FIN-DEAL-05","area":"FIN","sub":"DEAL","title":"MOIC vs IRR","question":"Compared with IRR, the multiple of invested capital (MOIC) does NOT account for:","choices":{"A":"The time over which returns are earned","B":"The amount invested","C":"Total proceeds","D":"Leverage"},"answer":"A","explanation":"MOIC = total value / invested capital ignores timing; IRR is time-weighted. A high MOIC over a long hold can still be a modest IRR, so PE firms report both.","ai":true},{"id":"AI-FIN-DEAL-06","area":"FIN","sub":"DEAL","title":"Earnout","question":"An earnout in an acquisition is:","choices":{"A":"A fixed upfront cash payment","B":"Contingent consideration paid if the target hits future performance targets","C":"A type of debt covenant","D":"A tax on the seller"},"answer":"B","explanation":"An earnout bridges valuation gaps by paying additional consideration later, contingent on the target achieving agreed post-close performance milestones.","ai":true},{"id":"AI-FIN-DEAL-07","area":"FIN","sub":"DEAL","title":"Carried Interest","question":"In a private equity fund, carried interest is:","choices":{"A":"The management fee on committed capital","B":"Interest paid to lenders","C":"The GP's share of profits above a hurdle (typically ~20%)","D":"The LP's guaranteed return"},"answer":"C","explanation":"Carried interest is the general partner's performance share of fund profits (commonly 20%), usually earned only after limited partners receive their capital back plus a preferred return (hurdle).","ai":true},{"id":"AI-FIN-DEAL-08","area":"FIN","sub":"DEAL","title":"Vertical Integration","question":"A merger between a company and its supplier is an example of:","choices":{"A":"Horizontal merger","B":"Conglomerate merger","C":"A spin-off","D":"Vertical merger"},"answer":"D","explanation":"A vertical merger combines firms at different stages of the same supply chain (e.g., manufacturer + supplier). A horizontal merger is between competitors; a conglomerate is unrelated businesses.","ai":true},{"id":"AI-FIN-DEAL-09","area":"FIN","sub":"DEAL","title":"Hostile Takeover Defense","question":"A 'poison pill' is a defense that:","choices":{"A":"Lets existing shareholders buy shares cheaply to dilute a hostile acquirer","B":"Pays a special dividend","C":"Files for bankruptcy","D":"Buys back all debt"},"answer":"A","explanation":"A poison pill (shareholder rights plan) lets non-acquirer shareholders purchase additional shares at a discount once a hostile bidder crosses an ownership threshold, diluting the bidder and raising deal cost.","ai":true},{"id":"AI-FIN-DEAL-10","area":"FIN","sub":"DEAL","title":"Goodwill in Acquisition","question":"Goodwill recorded in an acquisition equals the purchase price minus the:","choices":{"A":"Book value of equity","B":"Fair value of identifiable net assets acquired","C":"Target's revenue","D":"Acquirer's market cap"},"answer":"B","explanation":"Goodwill = consideration transferred (plus any NCI/previously held interest at fair value) − fair value of identifiable net assets acquired. It captures synergies and intangibles not separately recognized.","ai":true},{"id":"AI-FIN-DERIV-01","area":"FIN","sub":"DERIV","title":"Call Option Payoff","question":"The holder of a call option profits when the underlying price:","choices":{"A":"Falls below the strike","B":"Stays exactly at the strike","C":"Rises above the strike (plus premium paid)","D":"Never moves"},"answer":"C","explanation":"A call gives the right to BUY at the strike; it pays off as the underlying rises above the strike. Net profit requires the gain to exceed the premium paid.","ai":true},{"id":"AI-FIN-DERIV-02","area":"FIN","sub":"DERIV","title":"Protective Put","question":"Buying a put option on an asset you own acts as:","choices":{"A":"Leverage to amplify gains","B":"A way to receive dividends","C":"A short sale","D":"Insurance that limits downside loss"},"answer":"D","explanation":"A protective put gives the right to SELL at the strike, setting a floor on losses — like insurance — while the premium is the cost of that protection.","ai":true},{"id":"AI-FIN-DERIV-03","area":"FIN","sub":"DERIV","title":"Intrinsic vs Time Value","question":"An option's premium equals its intrinsic value plus its:","choices":{"A":"Time value","B":"Strike price","C":"Notional amount","D":"Dividend"},"answer":"A","explanation":"Option premium = intrinsic value (in-the-money amount, floored at zero) + time value (the chance of further favorable moves before expiry). Time value decays toward zero at expiration.","ai":true},{"id":"AI-FIN-DERIV-04","area":"FIN","sub":"DERIV","title":"Option Delta","question":"An option's delta measures the sensitivity of the option's price to:","choices":{"A":"Time decay","B":"A change in the underlying asset's price","C":"A change in volatility","D":"Interest rates"},"answer":"B","explanation":"Delta is the rate of change of the option price per unit change in the underlying price. (Theta measures time decay, vega volatility, rho interest rates.)","ai":true},{"id":"AI-FIN-DERIV-05","area":"FIN","sub":"DERIV","title":"Plain-Vanilla Swap","question":"In a plain-vanilla interest-rate swap, the two parties exchange:","choices":{"A":"Principal amounts","B":"Equity for debt","C":"Fixed-rate for floating-rate interest payments on a notional","D":"Currencies"},"answer":"C","explanation":"A plain-vanilla interest-rate swap exchanges fixed-rate for floating-rate interest cash flows on a notional principal (principal is not exchanged). It is used to convert exposure between fixed and floating.","ai":true},{"id":"AI-FIN-DERIV-06","area":"FIN","sub":"DERIV","title":"Value at Risk","question":"A 1-day 99% Value at Risk (VaR) of $1 million means:","choices":{"A":"The portfolio will lose exactly $1M","B":"The guaranteed maximum loss is $1M","C":"Daily profit is $1M","D":"Losses should exceed $1M on only about 1% of days"},"answer":"D","explanation":"VaR is a statistical threshold: at 99% confidence, daily losses are expected to exceed $1M roughly 1 day in 100. It does not cap losses (tail losses can be larger).","ai":true},{"id":"AI-FIN-DERIV-07","area":"FIN","sub":"DERIV","title":"Short Hedge with Futures","question":"A wheat farmer worried about falling prices before harvest would hedge by:","choices":{"A":"Selling wheat futures (short hedge)","B":"Buying wheat futures (long hedge)","C":"Buying call options on wheat","D":"Doing nothing"},"answer":"A","explanation":"A producer who will SELL the commodity later takes a SHORT futures position; gains on the short offset a price decline, locking in a selling price (a short hedge).","ai":true},{"id":"AI-FIN-DERIV-08","area":"FIN","sub":"DERIV","title":"Credit Default Swap","question":"A credit default swap (CDS) primarily transfers:","choices":{"A":"Interest-rate risk","B":"The credit (default) risk of a reference entity","C":"Currency risk","D":"Equity risk"},"answer":"B","explanation":"A CDS is insurance against default: the protection buyer pays a periodic premium and is compensated by the seller if the reference entity experiences a credit event.","ai":true},{"id":"AI-FIN-DERIV-09","area":"FIN","sub":"DERIV","title":"Notional vs Market Value","question":"The notional amount of a derivative is:","choices":{"A":"Its current fair (market) value","B":"The premium paid","C":"The reference amount used to calculate payments, not the amount at risk","D":"The margin posted"},"answer":"C","explanation":"Notional is the contractual reference quantity used to compute cash flows; the actual exposure/market value is typically far smaller than the notional.","ai":true},{"id":"AI-FIN-DERIV-10","area":"FIN","sub":"DERIV","title":"Put-Call Parity (intuition)","question":"Put-call parity links the prices of European calls and puts with the same strike and expiry to the underlying and:","choices":{"A":"The dividend yield only","B":"The option's delta","C":"Trading volume","D":"The present value of the strike price"},"answer":"D","explanation":"Put-call parity: Call − Put = Spot − PV(strike). It enforces a no-arbitrage relationship; a mispricing implies a riskless arbitrage between the options, stock, and a bond.","ai":true},{"id":"AI-FIN-STRAT-01","area":"FIN","sub":"STRAT","title":"Porter's Five Forces","question":"Which is one of Porter's Five Forces shaping industry competition?","choices":{"A":"Threat of new entrants","B":"Employee morale","C":"Tax policy","D":"Brand color"},"answer":"A","explanation":"Porter's Five Forces: threat of new entrants, bargaining power of suppliers, bargaining power of buyers, threat of substitutes, and rivalry among existing competitors.","ai":true},{"id":"AI-FIN-STRAT-02","area":"FIN","sub":"STRAT","title":"SWOT Analysis","question":"In a SWOT analysis, 'Opportunities' and 'Threats' refer to:","choices":{"A":"Internal factors","B":"External (environmental) factors","C":"Financial ratios","D":"Past results only"},"answer":"B","explanation":"SWOT splits internal factors (Strengths, Weaknesses) from external ones (Opportunities, Threats arising from the market/environment).","ai":true},{"id":"AI-FIN-STRAT-03","area":"FIN","sub":"STRAT","title":"BCG Matrix","question":"In the BCG growth-share matrix, a high-market-share business in a low-growth market is a:","choices":{"A":"Star","B":"Question mark","C":"Cash cow","D":"Dog"},"answer":"C","explanation":"A cash cow (high share, low growth) generates steady cash with little reinvestment. Stars are high/high, question marks low share/high growth, dogs low/low.","ai":true},{"id":"AI-FIN-STRAT-04","area":"FIN","sub":"STRAT","title":"Generic Strategies","question":"Porter's two basic sources of competitive advantage are cost leadership and:","choices":{"A":"Diversification","B":"Outsourcing","C":"Vertical integration","D":"Differentiation"},"answer":"D","explanation":"Porter's generic strategies are cost leadership and differentiation (each pursued broadly or with a focus/niche). A firm should commit to one to avoid being 'stuck in the middle'.","ai":true},{"id":"AI-FIN-STRAT-05","area":"FIN","sub":"STRAT","title":"Value Chain","question":"Porter's value chain distinguishes primary activities from:","choices":{"A":"Support activities (e.g., HR, technology, procurement)","B":"Illegal activities","C":"Foreign activities","D":"Cash activities"},"answer":"A","explanation":"The value chain separates primary activities (inbound logistics, operations, outbound logistics, marketing/sales, service) from support activities (firm infrastructure, HR, technology, procurement).","ai":true},{"id":"AI-FIN-STRAT-06","area":"FIN","sub":"STRAT","title":"Economies of Scale","question":"Economies of scale occur when:","choices":{"A":"Total cost is zero","B":"Average cost per unit falls as output rises","C":"Prices always rise","D":"Demand is inelastic"},"answer":"B","explanation":"Economies of scale lower the average (per-unit) cost as production volume increases, often via fixed-cost spreading and operational efficiency — a basis for cost leadership.","ai":true},{"id":"AI-FIN-STRAT-07","area":"FIN","sub":"STRAT","title":"MECE Principle","question":"The MECE principle (used in consulting problem-solving) means a breakdown should be:","choices":{"A":"Maximally efficient","B":"Made entirely by computers","C":"Mutually exclusive and collectively exhaustive","D":"Measured every quarter"},"answer":"C","explanation":"MECE structures issues into buckets that do not overlap (mutually exclusive) and together cover everything (collectively exhaustive), avoiding double-counting and gaps.","ai":true},{"id":"AI-FIN-STRAT-08","area":"FIN","sub":"STRAT","title":"Blue Ocean Strategy","question":"Blue Ocean strategy advises companies to:","choices":{"A":"Compete head-to-head on price","B":"Always follow the market leader","C":"Avoid innovation","D":"Create uncontested new market space rather than fight in crowded markets"},"answer":"D","explanation":"Blue Ocean strategy seeks to make competition irrelevant by creating new demand in uncontested 'blue ocean' market space, rather than battling rivals in a bloody 'red ocean'.","ai":true},{"id":"AI-FIN-STRAT-09","area":"FIN","sub":"STRAT","title":"Core Competence","question":"A 'core competence' (Prahalad & Hamel) is a capability that is:","choices":{"A":"Valuable, hard to imitate, and provides access to many markets","B":"Easily copied by rivals","C":"Only about cost","D":"A single product"},"answer":"A","explanation":"A core competence is a hard-to-imitate bundle of skills/technologies that delivers customer value and opens access to a variety of markets — a durable source of competitive advantage.","ai":true},{"id":"AI-FIN-STRAT-10","area":"FIN","sub":"STRAT","title":"First-Mover Advantage","question":"A potential DISADVANTAGE of being a first mover is:","choices":{"A":"Brand recognition","B":"Bearing the cost of educating the market that later 'fast followers' exploit","C":"Network effects","D":"Learning-curve benefits"},"answer":"B","explanation":"First movers can gain brand, scale, and learning advantages, but they also bear R&D and market-education costs and technology risk that fast followers can free-ride on.","ai":true},{"id":"AI-PAT-01","area":"BAR2","question":"A company's capital structure at market value is $4,000,000 of equity (cost of equity 12%) and $6,000,000 of debt (pretax cost 8%, tax rate 25%). What is the weighted-average cost of capital (WACC)?","choices":{"A":"8.4%","B":"9.6%","C":"10.0%","D":"6.0%"},"answer":"A","explanation":"**A** is correct. WACC uses MARKET-value weights and the AFTER-TAX cost of debt: (0.4 x 12%) + (0.6 x 8% x (1 - 0.25)) = 4.8% + 3.6% = **8.4%**.\n- **B (9.6%)** is the trap: it uses the pretax 8% and forgets the tax shield.\n- **C** uses equal (50/50) weights; **D** ignores equity entirely.","ai":true},{"id":"AI-PAT-02","area":"BAR3","question":"Standard price is $5.00 per pound. During the period a company purchased 10,000 pounds at $5.50 and used 9,000 pounds (standard quantity allowed was 8,500). What is the direct materials PRICE variance?","choices":{"A":"$4,500 Unfavorable","B":"$5,000 Unfavorable","C":"$2,500 Unfavorable","D":"$5,000 Favorable"},"answer":"B","explanation":"**B** is correct. The materials PRICE variance uses the actual quantity PURCHASED: (AP - SP) x AQ purchased = ($5.50 - $5.00) x 10,000 = **$5,000 U**.\n- **A** is the trap: it uses quantity USED (9,000) — that base belongs to the QUANTITY variance, not the price variance.\n- **D** has the wrong sign (actual price exceeded standard = unfavorable).","ai":true},{"id":"AI-PAT-03","area":"BAR4","question":"A parent acquires 80% of a subsidiary for $500,000. The fair value of the noncontrolling interest is $120,000 and the fair value of identifiable net assets is $560,000. Under the full (acquisition) method, goodwill is:","choices":{"A":"$0 (bargain purchase)","B":"$52,000","C":"$60,000","D":"$40,000"},"answer":"C","explanation":"**C** is correct. Full goodwill = (consideration $500,000 + FV of NCI $120,000) - FV of identifiable net assets $560,000 = **$60,000**.\n- **B ($52,000)** is the trap: it uses the proportionate method ($500,000 - 80% x $560,000), which is NOT the U.S. GAAP default.\n- **A** wrongly nets only the consideration against full net assets.","ai":true},{"id":"AI-PAT-04","area":"BAR4","question":"At year-end, tax depreciation has exceeded book depreciation by $80,000; the difference will reverse in future years. The enacted future tax rate is 21%. This gives rise to a:","choices":{"A":"deferred tax asset of $16,800","B":"deferred tax asset of $80,000","C":"deferred tax liability of $80,000","D":"deferred tax liability of $16,800"},"answer":"D","explanation":"**D** is correct. Excess tax depreciation is a TAXABLE temporary difference (future taxable amounts) -> a deferred tax LIABILITY = $80,000 x 21% = **$16,800**, measured at the ENACTED future rate.\n- **A** has the wrong direction (it is a liability, not an asset).\n- **C** applies no tax rate to the difference.","ai":true},{"id":"AI-PAT-05","area":"BAR4","question":"A bond with a $1,000,000 face amount and a 6% annual coupon was issued at a discount; its carrying amount at the start of the year is $940,000. The market (effective) rate is 8%. Interest EXPENSE for the year under the effective-interest method is:","choices":{"A":"$75,200","B":"$60,000","C":"$80,000","D":"$56,400"},"answer":"A","explanation":"**A** is correct. Effective-interest expense = CARRYING amount x market rate = $940,000 x 8% = **$75,200**.\n- **B ($60,000)** is the trap: it is the cash coupon (face x stated rate) = interest PAID, not expense.\n- **C** uses face x market rate; **D** uses carrying x coupon.","ai":true},{"id":"AI-PAT-06","area":"BAR4","question":"Equipment is purchased on January 1, installed and ready for its intended use on March 1, and first used in production on April 1. Depreciation should begin on:","choices":{"A":"January 1 (purchase date)","B":"March 1 (available for use)","C":"April 1 (first actual use)","D":"the first day of the next fiscal year"},"answer":"B","explanation":"**B** is correct. Depreciation begins when the asset is PLACED IN SERVICE — available for its intended use (March 1) — regardless of purchase date or first actual use.\n- **C** is the trap: it waits for actual production use (April 1).\n- **A** starts at purchase, before the asset is ready.","ai":true},{"id":"AI-PAT-07","area":"BAR4","question":"Aging of receivables indicates a required allowance for doubtful accounts of $20,000. Before adjustment, the allowance has a $6,000 CREDIT balance. Bad debt expense for the period is:","choices":{"A":"$20,000","B":"$26,000","C":"$14,000","D":"$6,000"},"answer":"C","explanation":"**C** is correct. The aging method estimates the ENDING allowance BALANCE, so bad debt expense = required balance - existing credit balance = $20,000 - $6,000 = **$14,000**.\n- **A ($20,000)** is the trap: recording the full target as expense reflects the percentage-of-SALES method, not aging.\n- **B** wrongly adds the existing balance.","ai":true},{"id":"AI-PAT-08","area":"BAR3","question":"A company produced 10,000 units and sold 8,000. Fixed manufacturing overhead was $50,000. Comparing absorption costing to variable costing for the period:","choices":{"A":"income is the same under both methods","B":"variable-costing income is $10,000 higher","C":"absorption-costing income is $40,000 higher","D":"absorption-costing income is $10,000 higher"},"answer":"D","explanation":"**D** is correct. When production (10,000) exceeds sales (8,000), 2,000 units of fixed overhead ($50,000 / 10,000 = $5/unit) are deferred in ending inventory under absorption costing -> absorption income is 2,000 x $5 = **$10,000 higher**.\n- **B** is the trap (right amount, wrong direction).\n- **C** applies all fixed overhead instead of only the units in inventory.","ai":true},{"id":"AI-PAT-09","area":"BAR5","question":"When reconciling total governmental FUND balances to the government-wide statement of net position, which adjustment is made?","choices":{"A":"Add capital assets (net) and subtract long-term liabilities","B":"Subtract capital assets and add long-term liabilities","C":"No adjustment is needed","D":"Add both capital assets and long-term liabilities"},"answer":"A","explanation":"**A** is correct. Governmental funds use the current financial resources focus (modified accrual) and omit capital assets and long-term debt. To reach government-wide net position you ADD capital assets net of depreciation (Capital +) and SUBTRACT long-term liabilities (the 'CPAS RIDES' direction).\n- **B** reverses the signs (the classic trap).","ai":true},{"id":"AI-PAT-10","area":"BAR2","question":"The cross-price elasticity of demand between Good X and Good Y is +1.8. Goods X and Y are:","choices":{"A":"complements","B":"substitutes","C":"unrelated goods","D":"inferior goods"},"answer":"B","explanation":"**B** is correct. A POSITIVE cross-price elasticity means a rise in one good's price raises demand for the other -> the goods are SUBSTITUTES.\n- **A** is the trap: complements have a NEGATIVE cross elasticity.\n- **D** confuses cross elasticity with INCOME elasticity.","ai":true},{"id":"AI-PAT-11","area":"BAR2","question":"The income elasticity of demand for a product is -0.5. The product is best described as:","choices":{"A":"a normal good","B":"a luxury good","C":"an inferior good","D":"a perfectly elastic good"},"answer":"C","explanation":"**C** is correct. A NEGATIVE income elasticity means demand FALLS as income rises -> an INFERIOR good.\n- **A** is the trap: a normal good has a POSITIVE income elasticity (a luxury is > 1).","ai":true},{"id":"AI-PAT-12","area":"BAR3","question":"Using the high-low method: at 10,000 units total cost is $50,000; at 4,000 units total cost is $26,000. The variable cost per unit is:","choices":{"A":"$5.00","B":"$6.50","C":"$3.00","D":"$4.00"},"answer":"D","explanation":"**D** is correct. Variable cost per unit = (cost at HIGHEST activity - cost at LOWEST activity) / (highest units - lowest units) = ($50,000 - $26,000) / (10,000 - 4,000) = **$4.00**.\n- The trap selects the high and low points by COST rather than by ACTIVITY level.","ai":true},{"id":"AI-PAT-13","area":"BAR4","question":"An operating segment has revenue equal to 8% of the combined total, identifiable assets equal to 12% of the total, and profit equal to 5% of the total. Is it a reportable segment?","choices":{"A":"Yes — it meets the 10% assets test","B":"No — its revenue is below 10%","C":"No — a segment must meet all three 10% tests","D":"Yes — but only because of the profit test"},"answer":"A","explanation":"**A** is correct. A segment is reportable if it meets ANY ONE of the three 10% thresholds (revenue, absolute profit or loss, OR assets). Assets are 12% >= 10%, so it qualifies.\n- **C** is the trap: it requires meeting ALL three tests.\n- **B** looks only at revenue.","ai":true},{"id":"AI-PAT-14","area":"BAR4","question":"A parent acquires 75% of a subsidiary on October 1. The subsidiary earns $200,000 of net income evenly during the year. The noncontrolling interest in consolidated net income for the year is:","choices":{"A":"$50,000","B":"$12,500","C":"$37,500","D":"$150,000"},"answer":"B","explanation":"**B** is correct. Only POST-acquisition income is consolidated. NCI share = 25% x ($200,000 x 3/12) = 25% x $50,000 = **$12,500**.\n- **A ($50,000)** is the trap: it applies 25% to the FULL year, ignoring the mid-year (period-end) acquisition date.\n- **D** uses the parent's 75% share.","ai":true},{"id":"AI-PAT-15","area":"BAR4","question":"A lessor classifies a lease as an OPERATING lease. How does the lessor recognize lease income?","choices":{"A":"Recognize selling profit at commencement plus interest income over the term","B":"Recognize interest income only, using the effective-interest method","C":"Recognize lease income on a straight-line basis over the lease term","D":"Recognize all income at the end of the lease term"},"answer":"C","explanation":"**C** is correct. For an OPERATING lease the lessor keeps the asset on its books and recognizes lease income STRAIGHT-LINE over the term.\n- **A** is the trap: selling profit at commencement plus interest is the SALES-TYPE (finance) lease treatment.","ai":true},{"id":"AI-PAT-16","area":"BAR4","question":"For software a company is developing to be SOLD to customers, costs incurred AFTER technological feasibility is established are:","choices":{"A":"expensed as research and development","B":"expensed as incurred in all cases","C":"capitalized from the start of the project","D":"capitalized"},"answer":"D","explanation":"**D** is correct. For software to be sold, costs BEFORE technological feasibility are expensed as R&D; costs AFTER feasibility are CAPITALIZED (then amortized, carried at the lower of unamortized cost or net realizable value).\n- **A** is the trap: it expenses post-feasibility costs as R&D.\n- **C** wrongly capitalizes from project inception.","ai":true},{"id":"AI-PAT-17","area":"BAR3","question":"Fixed costs are $100,000 and the contribution margin is $20 per unit. The company wants an AFTER-TAX target profit of $30,000; the tax rate is 25%. The number of units that must be sold is:","choices":{"A":"7,000","B":"6,500","C":"5,000","D":"8,000"},"answer":"A","explanation":"**A** is correct. Gross up the after-tax target to a PRETAX target: $30,000 / (1 - 0.25) = $40,000. Units = (Fixed $100,000 + pretax target $40,000) / $20 = **7,000**.\n- **B (6,500)** is the trap: it plugs the after-tax $30,000 in directly without grossing up.","ai":true},{"id":"AI-PAT-18","area":"BAR1","question":"A model that recommends the specific action a manager should take to maximize profit is an example of which type of data analytics?","choices":{"A":"Predictive analytics","B":"Prescriptive analytics","C":"Diagnostic analytics","D":"Descriptive analytics"},"answer":"B","explanation":"**B** is correct. PRESCRIPTIVE analytics recommends what to DO (the optimal action).\n- **A** is the trap: predictive analytics only forecasts what WILL happen. Descriptive reports what happened; diagnostic explains why.","ai":true},{"id":"AI-PAT-19","area":"BAR4","question":"In a qualifying FAIR VALUE hedge, the periodic change in the fair value of the hedging derivative is reported in:","choices":{"A":"other comprehensive income (OCI)","B":"a separate component of equity until settlement","C":"current earnings (profit or loss)","D":"a deferred account on the balance sheet"},"answer":"C","explanation":"**C** is correct. In a FAIR VALUE hedge, the gain or loss on the derivative AND the offsetting change in the hedged item both flow to CURRENT EARNINGS.\n- **A** is the trap: OCI is where the effective portion of a CASH FLOW hedge is reported.","ai":true},{"id":"AI-PAT-20","area":"BAR4","question":"A parent purchases its subsidiary's outstanding bonds from outside investors at a price different from the bonds' carrying amount. On the consolidated statements, the difference is:","choices":{"A":"added to goodwill","B":"deferred and amortized to maturity","C":"ignored until the bonds mature","D":"recognized immediately as a gain or loss on constructive retirement"},"answer":"D","explanation":"**D** is correct. Acquiring affiliated debt is a CONSTRUCTIVE RETIREMENT; the difference between purchase price and carrying amount is recognized IMMEDIATELY as a consolidated gain or loss.\n- **B** is the trap: deferral/amortization is the treatment for unrealized intercompany INVENTORY profit, not intercompany bonds.","ai":true},{"id":"AI-PAT-21","area":"BAR5","question":"Under GASB, where are 'deferred outflows of resources' reported?","choices":{"A":"In a separate section of the statement of net position, after assets","B":"On the statement of activities as an expense","C":"As a liability on the statement of net position","D":"As a direct reduction of net position with no separate line"},"answer":"A","explanation":"**A** is correct. Deferred outflows of resources are reported in their OWN section of the statement of NET POSITION (balance sheet), immediately after assets.\n- **B** is the trap: it places them on the operating statement (statement of activities).\n- **C** misclassifies them as a liability.","ai":true},{"id":"AI-PAT-22","area":"BAR5","question":"For a government, property taxes are an example of which revenue type, and when is the revenue recognized under modified accrual?","choices":{"A":"Exchange revenue, recognized when cash is received","B":"Imposed nonexchange revenue, recognized in the period for which the taxes are levied (when measurable and available)","C":"Derived tax revenue, recognized when the underlying sale occurs","D":"Voluntary nonexchange revenue, recognized when eligibility requirements are met"},"answer":"B","explanation":"**B** is correct. Property taxes are IMPOSED NONEXCHANGE revenues; under modified accrual they are recognized in the period for which LEVIED, to the extent measurable and AVAILABLE.\n- **A** is the trap: treating them as an exchange tied to cash receipt.\n- **C** describes sales taxes (DERIVED tax revenue).","ai":true},{"id":"AI-PAT-23","area":"BAR4","question":"A company settles part of its pension obligation by purchasing annuities that irrevocably transfer the obligation to an insurer. The accounting effect is:","choices":{"A":"no gain or loss is recognized","B":"the difference is amortized over employees' remaining service period","C":"a proportionate share of the unrecognized net gain or loss is recognized immediately","D":"the amount is reclassified into other comprehensive income"},"answer":"C","explanation":"**C** is correct. A pension SETTLEMENT triggers IMMEDIATE recognition of a pro-rata portion of the previously unrecognized net gain or loss.\n- **B** is the trap: amortization over future service is the ROUTINE treatment, not the settlement treatment.","ai":true},{"id":"AI-PAT-24","area":"BAR3","question":"Actual direct labor was 5,200 hours at $14.00 per hour; the standard rate is $15.00 per hour. The direct labor RATE variance is:","choices":{"A":"$3,000 Unfavorable","B":"$5,200 Unfavorable","C":"$200 Favorable","D":"$5,200 Favorable"},"answer":"D","explanation":"**D** is correct. Labor rate variance = (AR - SR) x AH = ($14.00 - $15.00) x 5,200 = -$5,200 -> **$5,200 Favorable** (the actual rate was BELOW standard).\n- **B** is the trap: same amount, wrong sign.\n- **A ($3,000 U)** is the separate efficiency variance.","ai":true},{"id":"AI-PAT-25","area":"BAR5","question":"In a state or local government's financial report, Management's Discussion and Analysis (MD&A) is:","choices":{"A":"required supplementary information presented BEFORE the basic financial statements","B":"required supplementary information presented AFTER the notes","C":"part of the basic financial statements","D":"optional information presented at management's discretion"},"answer":"A","explanation":"**A** is correct. MD&A is REQUIRED SUPPLEMENTARY INFORMATION (RSI) that PRECEDES the basic financial statements.\n- **B** is the trap: most other RSI follows the statements, but MD&A specifically comes FIRST.\n- **D** wrongly treats it as optional.","ai":true},{"id":"AI-PAT-26","area":"BAR1","question":"Controls over logical access and program changes that apply pervasively across all of an entity's applications are classified as:","choices":{"A":"application controls","B":"IT general controls","C":"manual compensating controls","D":"purely detective controls"},"answer":"B","explanation":"**B** is correct. IT GENERAL CONTROLS (ITGCs) operate across the whole IT environment — access security, change management, and operations.\n- **A** is the trap: application controls are embedded in a SPECIFIC application to control individual transactions (input, processing, output).","ai":true},{"id":"AI-PAT-27","area":"BAR5","question":"A governmental fund adopts its annual budget with estimated revenues of $1,000,000 and appropriations of $950,000. The budgetary journal entry includes:","choices":{"A":"a credit to Estimated Revenues and a debit to Appropriations","B":"a debit to Appropriations and a credit to Budgetary Fund Balance","C":"a debit to Estimated Revenues and a credit to Appropriations","D":"no entry — the budget is recorded only as a memorandum"},"answer":"C","explanation":"**C** is correct. Recording the budget reverses the 'normal' balances: DEBIT Estimated Revenues $1,000,000, CREDIT Appropriations $950,000, with the $50,000 surplus credited to Budgetary Fund Balance.\n- **A** is the trap: it reverses the debit/credit direction.\n- **D** wrongly treats the budget as memo-only.","ai":true}],"topics":[{"num":1,"area":"BAR1","subtopic":"COSO ERM Framework","name":"COSO ERM 5 Components","keyPoints":"Governance, Strategy, Performance, Review, Information","stars":3,"typeB":false},{"num":2,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Governance and Culture","keyPoints":"Board oversight, core values, operating structure","stars":2,"typeB":false},{"num":3,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Strategy and Objective-Setting","keyPoints":"Alternative strategies, business objectives, risk appetite","stars":3,"typeB":false},{"num":4,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Performance Component","keyPoints":"Portfolio view, risk severity, prioritization","stars":2,"typeB":false},{"num":5,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Review and Revision","keyPoints":"Substantial change assessment, continuous improvement","stars":2,"typeB":false},{"num":6,"area":"BAR1","subtopic":"COSO ERM Framework","name":"Risk Appetite vs Risk Tolerance","keyPoints":"Appetite = broad, Tolerance = specific acceptable range","stars":3,"typeB":false},{"num":7,"area":"BAR1","subtopic":"COSO ERM Framework","name":"20 Principles of ERM","keyPoints":"Supporting principles under 5 components","stars":1,"typeB":false},{"num":8,"area":"BAR1","subtopic":"COSO ERM Framework","name":"ERM vs Traditional RM","keyPoints":"Portfolio approach vs silo approach","stars":2,"typeB":false},{"num":9,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"PATRS (Risk Responses)","keyPoints":"Pursue, Accept, Transfer, Reduce, Self-insure","stars":3,"typeB":false},{"num":10,"area":"BAR1","subtopic":"Risk Responses & Preferences","name":"Pursue vs Accept","keyPoints":"Pursue = active exploitation, Accept = passive tolerance","sta
