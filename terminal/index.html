"JIT minimizes inventory by receiving materials only as needed for production (a pull system), reducing carrying costs.","ai":true},{"id":"AI-BAR2-12","area":"BAR2","title":"Gordon Growth Model","question":"Under the dividend discount (Gordon growth) model, share value equals next year's dividend divided by:","choices":{"A":"The required return plus the growth rate","B":"The required return minus the growth rate","C":"The growth rate minus the required return","D":"The current dividend yield"},"answer":"B","explanation":"P = D1 / (R − G), where R is the required rate of return and G is the constant dividend growth rate.","ai":true},{"id":"AI-BAR3-07","area":"BAR3","title":"Job vs. Process Costing","question":"A custom homebuilder that accumulates costs separately for each unique house is using:","choices":{"A":"Process costing","B":"Job-order costing","C":"Standard costing only","D":"Variable costing"},"answer":"B","explanation":"Job-order costing accumulates costs by individual job or batch. Process costing is used for homogeneous, continuously mass-produced units.","ai":true},{"id":"AI-BAR3-08","area":"BAR3","title":"Equivalent Units","question":"In process costing, equivalent units of production are computed as:","choices":{"A":"Physical units × percentage of completion","B":"Physical units ÷ percentage of completion","C":"Total cost ÷ units started","D":"Units started − units completed"},"answer":"A","explanation":"Equivalent units = physical units × their percentage of completion, restating partially complete work in terms of whole finished units.","ai":true},{"id":"AI-BAR3-09","area":"BAR3","title":"Activity-Based Costing","question":"Activity-based costing (ABC) assigns overhead to products using:","choices":{"A":"A single plant-wide rate","B":"Direct labor hours only","C":"Multiple cost pools and cost drivers","D":"Sales revenue"},"answer":"C","explanation":"ABC uses multiple activity cost pools, each allocated with an appropriate cost driver, producing more accurate overhead assignment than a single rate.","ai":true},{"id":"AI-BAR3-10","area":"BAR3","title":"Sunk Cost","question":"In decision analysis, a cost that has already been incurred and cannot be changed by any future action is a:","choices":{"A":"Relevant cost","B":"Opportunity cost","C":"Sunk cost","D":"Incremental cost"},"answer":"C","explanation":"A sunk cost is irrelevant to a decision because it cannot be altered by choosing one alternative over another.","ai":true},{"id":"AI-BAR3-11","area":"BAR3","title":"Special Order Decision","question":"With idle (excess) capacity, a special order should generally be accepted when its selling price exceeds the:","choices":{"A":"Total absorption cost per unit","B":"Variable cost per unit","C":"Fixed cost per unit","D":"Full cost plus normal markup"},"answer":"B","explanation":"With excess capacity, only incremental (variable) costs are relevant. Accept the order if price per unit exceeds variable cost per unit.","ai":true},{"id":"AI-BAR3-12","area":"BAR3","title":"Labor Efficiency Variance","question":"The direct labor efficiency variance is computed as:","choices":{"A":"(Actual rate − Standard rate) × actual hours","B":"(Actual hours − Standard hours) × standard rate","C":"(Actual hours − Standard hours) × actual rate","D":"(Actual rate − Standard rate) × standard hours"},"answer":"B","explanation":"Labor efficiency variance = (AH − SH) × SR. The labor rate variance, by contrast, is (AR − SR) × AH.","ai":true},{"id":"AI-BAR4-07","area":"BAR4","title":"VIE Consolidation","question":"A variable interest entity (VIE) is consolidated by the:","choices":{"A":"Entity with the largest voting interest","B":"Primary beneficiary","C":"Entity that legally created it","D":"Largest creditor"},"answer":"B","explanation":"The primary beneficiary — the party with power over the VIE's most significant activities and exposure to its variable returns — consolidates the VIE.","ai":true},{"id":"AI-BAR4-08","area":"BAR4","title":"R&D Costs","question":"Under U.S. GAAP, research and development costs are generally:","choices":{"A":"Capitalized and amortized","B":"Expensed as incurred","C":"Recorded as goodwill","D":"Deferred until related revenue is earned"},"answer":"B","explanation":"R&D costs are expensed as incurred under U.S. GAAP, with limited exceptions (e.g., certain software costs or assets having an alternative future use).","ai":true},{"id":"AI-BAR4-09","area":"BAR4","title":"Software to Be Sold","question":"For software that will be sold, costs incurred before establishing technological feasibility are:","choices":{"A":"Capitalized","B":"Expensed as research and development","C":"Recorded as inventory","D":"Added to goodwill"},"answer":"B","explanation":"Costs before technological feasibility are R&D and expensed. Costs incurred after feasibility but before release are capitalized and later amortized.","ai":true},{"id":"AI-BAR4-10","area":"BAR4","title":"Fair Value Hierarchy","question":"Under the fair value hierarchy, quoted prices in active markets for identical assets are classified as:","choices":{"A":"Level 1","B":"Level 2","C":"Level 3","D":"Level 4"},"answer":"A","explanation":"Level 1 = quoted prices in active markets for identical items. Level 2 uses other observable inputs; Level 3 uses unobservable inputs.","ai":true},{"id":"AI-BAR4-11","area":"BAR4","title":"Equity Method Threshold","question":"An investor that can exert significant influence (commonly 20%-50% ownership) but not control accounts for the investment using the:","choices":{"A":"Cost method","B":"Equity method","C":"Consolidation","D":"Fair value through OCI"},"answer":"B","explanation":"Significant influence (often 20-50% of voting stock) calls for the equity method. Control (generally more than 50%) requires consolidation.","ai":true},{"id":"AI-BAR4-12","area":"BAR4","title":"Bargain Purchase","question":"When the fair value of identifiable net assets acquired exceeds the consideration transferred (a bargain purchase), the acquirer:","choices":{"A":"Records goodwill","B":"Recognizes a gain in earnings","C":"Defers the difference as a liability","D":"Writes the assets down to the price paid"},"answer":"B","explanation":"A bargain purchase results in a gain recognized in the acquirer's earnings on the acquisition date, after reassessing the values used.","ai":true},{"id":"AI-BAR5-07","area":"BAR5","title":"Modified Approach (Infrastructure)","question":"Under the modified approach for eligible infrastructure assets, a government may, instead of recording depreciation:","choices":{"A":"Revalue the assets annually","B":"Document condition assessments and preserve the assets at a target condition level","C":"Perform impairment testing only","D":"Amortize them on a straight-line basis"},"answer":"B","explanation":"The modified approach allows a government to forgo depreciation if it makes condition assessments and maintains the infrastructure at or above an established condition level.","ai":true},{"id":"AI-BAR5-08","area":"BAR5","title":"Nonspendable Fund Balance","question":"Inventory and prepaid items in a governmental fund are reported within which fund balance classification?","choices":{"A":"Restricted","B":"Committed","C":"Nonspendable","D":"Unassigned"},"answer":"C","explanation":"Nonspendable fund balance includes amounts not in spendable form (such as inventory and prepaids) or legally/contractually required to remain intact.","ai":true},{"id":"AI-BAR5-09","area":"BAR5","title":"Debt Service Fund","question":"The governmental fund used to accumulate resources for the payment of principal and interest on general long-term debt is the:","choices":{"A":"Capital projects fund","B":"Debt service fund","C":"Enterprise fund","D":"Permanent fund"},"answer":"B","explanation":"The debt service fund accounts for the accumulation of resources to pay principal and interest on a government's general long-term liabilities.","ai":true},{"id":"AI-BAR5-10","area":"BAR5","title":"Permanent Fund","question":"A fund whose principal must remain intact while only its earnings may be spent to benefit the government or its citizens is a:","choices":{"A":"Special revenue fund","B":"Permanent fund","C":"Private-purpose trust fund","D":"Enterprise fund"},"answer":"B","explanation":"A permanent fund reports resources that are legally restricted so that principal is preserved and only the earnings support the government's own programs.","ai":true},{"id":"AI-BAR5-11","area":"BAR5","title":"Internal Service Fund","question":"A fund that provides goods or services primarily to other departments of the same government on a cost-reimbursement basis is a(n):","choices":{"A":"Enterprise fund","B":"Internal service fund","C":"Custodial fund","D":"Special revenue fund"},"answer":"B","explanation":"An internal service fund (a proprietary fund) provides services internally to other units of the same government and uses accrual accounting.","ai":true},{"id":"AI-BAR5-12","area":"BAR5","title":"Statement of Net Position","question":"In the government-wide statement of net position, net position equals:","choices":{"A":"Revenues minus expenses","B":"Assets plus deferred outflows, minus liabilities and deferred inflows","C":"Fund balance plus encumbrances","D":"Cash minus accounts payable"},"answer":"B","explanation":"Net position = (Assets + Deferred outflows of resources) − (Liabilities + Deferred inflows of resources).","ai":true},{"id":"AI-BAR1-13","area":"BAR1","title":"Elastic Demand & Revenue","question":"If demand for a product is price elastic, a decrease in the selling price will cause total revenue to:","choices":{"A":"Increase","B":"Decrease","C":"Stay the same","D":"Fall to zero"},"answer":"A","explanation":"When demand is elastic (|Ed| > 1), quantity demanded rises proportionally more than price falls, so total revenue increases. For inelastic demand a price cut lowers revenue.","ai":true},{"id":"AI-BAR1-14","area":"BAR1","title":"Determinants of Elasticity","question":"Which factor tends to make demand for a good MORE price elastic?","choices":{"A":"The good is a necessity","B":"Many close substitutes are available","C":"The good takes only a tiny share of income","D":"A very short time horizon"},"answer":"B","explanation":"More close substitutes make buyers more responsive to price changes (more elastic). Necessities, small budget shares, and short horizons make demand more inelastic.","ai":true},{"id":"AI-BAR1-15","area":"BAR1","title":"Recession Defined","question":"A period of two or more consecutive quarters of declining real GDP is commonly called a:","choices":{"A":"Expansion","B":"Trough","C":"Recession","D":"Peak"},"answer":"C","explanation":"Two consecutive quarters of falling real GDP is the common rule-of-thumb definition of a recession (a contraction phase of the business cycle).","ai":true},{"id":"AI-BAR1-16","area":"BAR1","title":"Monetary Policy Tool","question":"Open-market operations that change the money supply are a tool of:","choices":{"A":"Fiscal policy","B":"Trade policy","C":"Regulatory policy","D":"Monetary policy"},"answer":"D","explanation":"The central bank (the Fed) conducts monetary policy through open-market operations, the discount rate, and reserve requirements. Fiscal policy is government spending and taxation set by the legislature.","ai":true},{"id":"AI-BAR1-17","area":"BAR1","title":"What the CPI Measures","question":"The Consumer Price Index (CPI) primarily measures:","choices":{"A":"The average change in prices paid by consumers for a fixed basket of goods","B":"Total national output","C":"The unemployment rate","D":"The money supply"},"answer":"A","explanation":"The CPI tracks the average change over time in prices paid by urban consumers for a representative basket of goods and services; it is a key inflation gauge.","ai":true},{"id":"AI-BAR1-18","area":"BAR1","title":"Value at Risk","question":"Value at Risk (VaR) estimates:","choices":{"A":"The guaranteed return on a portfolio","B":"The maximum expected loss over a period at a given confidence level","C":"A firm's cost of capital","D":"The accounting breakeven point"},"answer":"B","explanation":"VaR expresses the largest loss not expected to be exceeded over a stated horizon at a stated confidence level (e.g., 95%). It quantifies downside market risk.","ai":true},{"id":"AI-BAR1-19","area":"BAR1","title":"Perfect Competition","question":"In a perfectly competitive market, an individual firm is a:","choices":{"A":"Price maker","B":"Monopolist","C":"Price taker","D":"Price leader"},"answer":"C","explanation":"With many firms selling a homogeneous product and free entry, each firm is too small to affect price and must accept the market price — a price taker.","ai":true},{"id":"AI-BAR1-20","area":"BAR1","title":"Natural Monopoly","question":"A natural monopoly is most likely to arise when:","choices":{"A":"There are many close substitutes","B":"Barriers to entry are low","C":"Products are homogeneous and firms are numerous","D":"Economies of scale let one firm supply the whole market at lower cost than several firms"},"answer":"D","explanation":"When large economies of scale mean average cost keeps falling over the relevant range, a single firm can serve the market more cheaply than several — a natural monopoly (e.g., utilities).","ai":true},{"id":"AI-BAR1-21","area":"BAR1","title":"Futures vs Forwards","question":"Compared with a forward contract, a futures contract is:","choices":{"A":"Standardized and traded on an organized exchange","B":"A customized over-the-counter agreement","C":"Never marked to market","D":"Settled only at maturity with no margin"},"answer":"A","explanation":"Futures are standardized, exchange-traded, and marked to market daily with margin. Forwards are customized OTC contracts settled at maturity, carrying more counterparty risk.","ai":true},{"id":"AI-BAR1-22","area":"BAR1","title":"Money-Market Hedge","question":"A money-market hedge of a future foreign-currency PAYABLE generally involves:","choices":{"A":"Buying a put option on the foreign currency","B":"Borrowing domestic currency now, converting to the foreign currency, and investing it to fund the payable","C":"Taking no action and paying spot at maturity","D":"Factoring the payable to a bank"},"answer":"B","explanation":"To hedge a payable, the firm buys the foreign currency now (often with borrowed home-currency funds) and invests it so it grows to the amount owed at settlement, locking in the cost using money-market instruments instead of a forward.","ai":true},{"id":"AI-BAR1-23","area":"BAR1","title":"Interest-Rate Swap","question":"A company with floating-rate debt that wants to lock in a fixed rate can enter an interest-rate swap to:","choices":{"A":"Pay floating and receive fixed","B":"Convert its debt into equity","C":"Pay fixed and receive floating","D":"Eliminate credit risk entirely"},"answer":"C","explanation":"Receiving floating offsets the floating interest it owes on its debt, leaving it with a net fixed payment — effectively converting floating-rate debt to fixed.","ai":true},{"id":"AI-BAR1-24","area":"BAR1","title":"Options to Hedge a Payable","question":"To hedge a foreign-currency PAYABLE using options, a firm would buy a:","choices":{"A":"Put option on the foreign currency","B":"Forward to sell the foreign currency","C":"Nothing — options cannot hedge payables","D":"Call option on the foreign currency"},"answer":"D","explanation":"A payable must be settled by buying foreign currency later, so a call (the right to buy at a strike) caps the cost while preserving upside. A receivable would be hedged with a put.","ai":true},{"id":"AI-BAR2-13","area":"BAR2","title":"CAPM Required Return","question":"Under the Capital Asset Pricing Model (CAPM), a stock's required return equals the risk-free rate plus:","choices":{"A":"Beta × the market risk premium","B":"The dividend yield","C":"The inflation rate","D":"Beta × the risk-free rate"},"answer":"A","explanation":"CAPM: Re = Rf + β(Rm − Rf). The market risk premium (Rm − Rf) is scaled by beta, the stock's systematic risk.","ai":true},{"id":"AI-BAR2-14","area":"BAR2","title":"Cash Conversion Cycle","question":"The cash conversion cycle equals days inventory outstanding plus days sales outstanding minus:","choices":{"A":"The operating cycle","B":"Days payable outstanding","C":"Days cash on hand","D":"The current ratio"},"answer":"B","explanation":"CCC = DIO + DSO − DPO. It measures how long cash is tied up in operations; stretching payables (higher DPO) shortens the cycle.","ai":true},{"id":"AI-BAR2-15","area":"BAR2","title":"Quick Ratio","question":"The quick (acid-test) ratio differs from the current ratio in that it excludes:","choices":{"A":"Cash and equivalents","B":"Accounts receivable","C":"Inventory (and usually prepaids) from current assets","D":"Accounts payable"},"answer":"C","explanation":"The quick ratio = (current assets − inventory − prepaids) / current liabilities, removing the least-liquid current assets to give a stricter liquidity test.","ai":true},{"id":"AI-BAR2-16","area":"BAR2","title":"Operating Leverage","question":"A high degree of operating leverage means a firm has:","choices":{"A":"Mostly variable costs and little fixed cost","B":"No financial risk","C":"Low business risk","D":"A high proportion of fixed costs, making operating income very sensitive to sales changes"},"answer":"D","explanation":"High fixed costs magnify the effect of a change in sales on operating income — higher operating leverage means higher business risk and a higher DOL.","ai":true},{"id":"AI-BAR2-17","area":"BAR2","title":"Cost of Trade Credit","question":"Approximately what is the annualized cost of forgoing the discount on credit terms of 2/10, net 30?","choices":{"A":"About 37%","B":"About 2%","C":"About 12%","D":"About 24%"},"answer":"A","explanation":"Cost ≈ (discount / (1 − discount)) × (365 / (net period − discount period)) = (2/98) × (365/20) ≈ 37%. Forgoing the discount to pay 20 days later is expensive financing.","ai":true},{"id":"AI-BAR2-18","area":"BAR2","title":"Aggressive Financing Policy","question":"An aggressive working-capital financing policy relies relatively more on:","choices":{"A":"Long-term debt and equity for everything","B":"Short-term debt to finance assets (higher expected return, higher risk)","C":"No debt at all","D":"Equity only"},"answer":"B","explanation":"An aggressive policy funds even some permanent assets with cheaper but riskier short-term debt, raising refinancing/interest-rate risk in exchange for higher expected return. A conservative policy does the opposite.","ai":true},{"id":"AI-BAR2-19","area":"BAR2","title":"Modigliani-Miller (No Tax)","question":"Under Modigliani–Miller without taxes, a firm's value is:","choices":{"A":"Maximized with 100% debt","B":"Maximized with 100% equity","C":"Independent of its capital structure","D":"Equal to its net income"},"answer":"C","explanation":"In a world with no taxes or frictions, M&M Proposition I holds that capital structure does not affect firm value — value comes from the assets, not the financing mix.","ai":true},{"id":"AI-BAR2-20","area":"BAR2","title":"M&M With Taxes","question":"When corporate taxes are introduced into M&M, the value of a levered firm rises with leverage because of:","choices":{"A":"Lower business risk","B":"Higher dividends","C":"Reduced bankruptcy cost","D":"The interest tax shield"},"answer":"D","explanation":"Interest is tax-deductible, so debt creates a tax shield that adds value as leverage rises — until offset by rising financial-distress/bankruptcy costs (the trade-off theory).","ai":true},{"id":"AI-BAR2-21","area":"BAR2","title":"Optimal Capital Structure","question":"A firm's optimal capital structure is the mix of debt and equity that:","choices":{"A":"Minimizes WACC and thereby maximizes firm value","B":"Maximizes EPS regardless of risk","C":"Eliminates all financial risk","D":"Maximizes the dividend payout"},"answer":"A","explanation":"The optimal structure is where the weighted-average cost of capital is lowest; minimizing WACC maximizes the present value of the firm's cash flows.","ai":true},{"id":"AI-BAR2-22","area":"BAR2","title":"Compensating Balance","question":"A compensating-balance requirement on a bank loan:","choices":{"A":"Lowers the effective interest rate","B":"Raises the effective interest rate on the usable funds","C":"Has no effect on the effective rate","D":"Eliminates interest entirely"},"answer":"B","explanation":"Because part of the loan must sit idle as a minimum balance, the borrower pays interest on funds it cannot use, raising the effective rate on the funds actually available.","ai":true},{"id":"AI-BAR2-23","area":"BAR2","title":"Factoring Receivables","question":"When a company factors its accounts receivable WITHOUT recourse, it:","choices":{"A":"Pledges them as collateral but keeps the collection risk","B":"Writes them off as bad debt","C":"Sells the receivables and transfers the risk of uncollectibility to the factor","D":"Converts them into notes payable"},"answer":"C","explanation":"A without-recourse factoring is a sale: the factor buys the receivables and bears the credit/collection risk. With recourse, the seller retains that risk.","ai":true},{"id":"AI-BAR2-24","area":"BAR2","title":"Spontaneous Financing","question":"Which is a SPONTANEOUS source of short-term financing that arises automatically from normal operations?","choices":{"A":"A negotiated bank line of credit","B":"Commercial paper","C":"A term loan","D":"Accounts payable (trade credit) and accruals"},"answer":"D","explanation":"Trade payables and accrued wages/taxes grow automatically as the business operates, without a formal financing arrangement — spontaneous financing. Lines of credit, commercial paper, and term loans are negotiated.","ai":true},{"id":"AI-BAR3-13","area":"BAR3","title":"Breakeven in Dollars","question":"Breakeven in sales dollars equals fixed costs divided by the:","choices":{"A":"Contribution margin ratio","B":"Contribution margin per unit","C":"Gross margin percentage","D":"Variable cost ratio"},"answer":"A","explanation":"Breakeven $ = Fixed costs / CM ratio (where CM ratio = contribution margin ÷ sales). Dividing by CM per unit gives breakeven in units, not dollars.","ai":true},{"id":"AI-BAR3-14","area":"BAR3","title":"Target Costing","question":"Target costing sets the allowable product cost by:","choices":{"A":"Adding a standard markup to full cost","B":"Subtracting a desired profit from a market-driven target price","C":"Using the highest competitor's price","D":"Ignoring the market price"},"answer":"B","explanation":"Target cost = target price − required profit. The firm starts from what the market will pay and engineers the product to meet that cost, the reverse of cost-plus pricing.","ai":true},{"id":"AI-BAR3-15","area":"BAR3","title":"DuPont ROI","question":"Under the DuPont method, return on investment (ROI) can be decomposed into:","choices":{"A":"Contribution margin × fixed costs","B":"Residual income × WACC","C":"Profit margin × investment (asset) turnover","D":"Sales − variable cost"},"answer":"C","explanation":"ROI = (Operating income / Sales) × (Sales / Average operating assets) = profit margin × asset turnover, separating profitability from efficiency.","ai":true},{"id":"AI-BAR3-16","area":"BAR3","title":"Residual Income","question":"Residual income is operating income minus:","choices":{"A":"Fixed costs","B":"Cost of goods sold","C":"Income taxes","D":"A minimum required return on operating assets"},"answer":"D","explanation":"Residual income = operating income − (required rate × operating assets). Unlike ROI, it is a dollar measure that rewards investing in any project earning above the hurdle rate.","ai":true},{"id":"AI-BAR3-17","area":"BAR3","title":"Economic Value Added","question":"Economic value added (EVA) differs from simple residual income mainly by using:","choices":{"A":"After-tax operating profit and a WACC-based capital charge (on invested capital)","B":"Pretax income and book interest rates","C":"Only operating cash flows","D":"The market price of the stock"},"answer":"A","explanation":"EVA = NOPAT − (WACC × invested capital). It uses after-tax operating profit and the firm's weighted-average cost of capital as the charge for capital employed.","ai":true},{"id":"AI-BAR3-18","area":"BAR3","title":"High-Low Method","question":"The high-low method estimates variable cost per unit by dividing the change in total cost by the:","choices":{"A":"Total number of data points","B":"Change in activity (volume) between the high and low points","C":"Total fixed cost","D":"Average cost per unit"},"answer":"B","explanation":"Variable cost per unit = (Cost at high − Cost at low) / (Activity at high − Activity at low). Fixed cost is then backed out from either point.","ai":true},{"id":"AI-BAR3-19","area":"BAR3","title":"Flexible Budget","question":"A flexible budget differs from a static budget in that it:","choices":{"A":"Is prepared only once at the start of the year","B":"Uses standard costs but never actuals","C":"Is adjusted to the actual level of activity achieved","D":"Cannot be used for variance analysis"},"answer":"C","explanation":"A flexible budget restates budgeted revenues and costs at the actual activity level, isolating price/efficiency variances from pure volume effects.","ai":true},{"id":"AI-BAR3-20","area":"BAR3","title":"Joint Costs at Split-Off","question":"Joint costs incurred before the split-off point are:","choices":{"A":"Always allocated only to by-products","B":"Relevant to the sell-or-process-further decision","C":"Variable with further processing","D":"Not relevant to the decision to process a product further"},"answer":"D","explanation":"Joint costs are sunk once incurred at split-off. The sell-or-process-further decision depends only on incremental revenue versus incremental further-processing cost.","ai":true},{"id":"AI-BAR3-21","area":"BAR3","title":"Minimum Transfer Price","question":"From the selling division's viewpoint, the minimum acceptable transfer price equals its incremental (outlay) cost plus:","choices":{"A":"The opportunity cost of the internal transfer","B":"A fixed percentage markup","C":"The buyer's external market price","D":"Zero in all cases"},"answer":"A","explanation":"General rule: minimum transfer price = incremental cost + opportunity cost. With idle capacity opportunity cost is zero; at full capacity it is the lost contribution margin on outside sales.","ai":true},{"id":"AI-BAR3-22","area":"BAR3","title":"Production-Volume Variance","question":"The fixed-overhead production-volume variance arises because:","choices":{"A":"Actual overhead spending differs from the budget","B":"Actual production differs from the denominator (budgeted) activity used to set the fixed-overhead rate","C":"Material prices changed","D":"Labor was used inefficiently"},"answer":"B","explanation":"The volume variance measures over- or under-applied fixed overhead due to operating above or below the normal capacity assumed when computing the predetermined fixed-OH rate. It reflects capacity utilization, not spending.","ai":true},{"id":"AI-BAR3-23","area":"BAR3","title":"Balanced Scorecard","question":"Which is NOT one of the four perspectives of the balanced scorecard?","choices":{"A":"Financial","B":"Customer","C":"Competitor","D":"Internal business process"},"answer":"C","explanation":"The four balanced-scorecard perspectives are financial, customer, internal business process, and learning & growth. 'Competitor' is not one of them.","ai":true},{"id":"AI-BAR3-24","area":"BAR3","title":"Relevant Range","question":"The 'relevant range' is the range of activity over which:","choices":{"A":"A product is profitable","B":"Demand is price elastic","C":"All variances are favorable","D":"Assumptions about fixed and variable cost behavior remain valid"},"answer":"D","explanation":"Within the relevant range, total fixed costs stay constant and variable cost per unit stays constant; outside it, those linear cost assumptions break down.","ai":true},{"id":"AI-BAR4-13","area":"BAR4","title":"Intercompany Inventory Profit","question":"In consolidation, unrealized profit in ending inventory from an intercompany sale must be:","choices":{"A":"Eliminated until the inventory is sold to outside parties","B":"Recognized immediately in consolidated income","C":"Deferred permanently","D":"Added to goodwill"},"answer":"A","explanation":"Profit on goods still held within the consolidated group is unrealized and must be eliminated; it is recognized only when the inventory is sold to an outside party.","ai":true},{"id":"AI-BAR4-14","area":"BAR4","title":"Downstream Sale","question":"A 'downstream' intercompany sale is one made:","choices":{"A":"From the subsidiary to the parent","B":"From the parent to the subsidiary","C":"Between two unrelated outsiders","D":"From the subsidiary to a customer"},"answer":"B","explanation":"Downstream = parent → subsidiary; upstream = subsidiary → parent. The direction matters because upstream unrealized profit is allocated partly to the noncontrolling interest.","ai":true},{"id":"AI-BAR4-15","area":"BAR4","title":"NCI Share of Income","question":"Consolidated net income attributable to the noncontrolling interest is based on the:","choices":{"A":"Parent's separate net income","B":"Total consolidated dividends","C":"Subsidiary's net income × the NCI ownership %, adjusted for fair-value and intercompany items","D":"Subsidiary's total revenue"},"answer":"C","explanation":"NCI share = the subsidiary's adjusted net income (after fair-value depreciation and upstream profit eliminations) multiplied by the noncontrolling ownership percentage.","ai":true},{"id":"AI-BAR4-16","area":"BAR4","title":"Fair-Value Hedge","question":"Changes in the fair value of a derivative designated as a FAIR-VALUE hedge are recognized:","choices":{"A":"In other comprehensive income until settlement","B":"Directly in retained earnings","C":"As an adjustment to goodwill","D":"In current earnings, offset by the change in the hedged item"},"answer":"D","explanation":"Fair-value hedge gains/losses go through current earnings, where they are largely offset by the opposite remeasurement of the hedged item. (Cash-flow hedges defer the effective portion in OCI.)","ai":true},{"id":"AI-BAR4-17","area":"BAR4","title":"Current-Rate Method","question":"When a foreign subsidiary's functional currency is its LOCAL currency, its financial statements are converted using the:","choices":{"A":"Current-rate (translation) method","B":"Temporal (remeasurement) method","C":"Historical cost only","D":"LIFO conformity method"},"answer":"A","explanation":"If the functional currency is the local currency, statements are translated at current rates with the adjustment going to OCI. If the functional currency is the reporting currency, the temporal method is used.","ai":true},{"id":"AI-BAR4-18","area":"BAR4","title":"Remeasurement Gain/Loss","question":"Under the temporal (remeasurement) method, the resulting exchange gain or loss is reported in:","choices":{"A":"Other comprehensive income","B":"Net income (current earnings)","C":"Retained earnings directly","D":"Goodwill"},"answer":"B","explanation":"Remeasurement gains/losses flow through the income statement, whereas translation adjustments under the current-rate method are reported in OCI (cumulative translation adjustment).","ai":true},{"id":"AI-BAR4-19","area":"BAR4","title":"Lease Liability Measurement","question":"At commencement, a lessee initially measures the lease liability at the:","choices":{"A":"Total undiscounted lease payments","B":"Fair value of the underlying asset","C":"Present value of the lease payments","D":"Guaranteed residual value only"},"answer":"C","explanation":"The lease liability is the present value of the remaining lease payments discounted at the rate implicit in the lease (or the incremental borrowing rate). The right-of-use asset is based on that liability plus certain adjustments.","ai":true},{"id":"AI-BAR4-20","area":"BAR4","title":"Reportable Segment Threshold","question":"An operating segment is separately reportable if its revenue, absolute profit/loss, or assets are at least what percentage of the combined totals?","choices":{"A":"5%","B":"25%","C":"50%","D":"10%"},"answer":"D","explanation":"The 10% size test: a segment is reportable if it meets the 10% threshold for revenue, the absolute amount of profit or loss, or assets. Reported segments must also total at least 75% of external revenue.","ai":true},{"id":"AI-BAR4-21","area":"BAR4","title":"Definition of a Derivative","question":"A derivative is characterized by an underlying and a notional amount, little or no initial net investment, and:","choices":{"A":"Net settlement","B":"A required maturity over one year","C":"Physical delivery only","D":"A guaranteed profit"},"answer":"A","explanation":"The three defining features are: (1) one or more underlyings and notional amounts, (2) little or no initial net investment, and (3) net settlement (or equivalent).","ai":true},{"id":"AI-BAR4-22","area":"BAR4","title":"Measurement Period","question":"The measurement period for finalizing provisional amounts in a business combination cannot exceed:","choices":{"A":"90 days","B":"One year from the acquisition date","C":"The current fiscal year-end","D":"Five years"},"answer":"B","explanation":"Adjustments to provisional acquisition-date fair values may be made during a measurement period that ends when information is obtained, but no later than one year after the acquisition date.","ai":true},{"id":"AI-BAR4-23","area":"BAR4","title":"Contingent Consideration","question":"Contingent consideration (an earnout) classified as a LIABILITY in a business combination is subsequently:","choices":{"A":"Never remeasured after acquisition","B":"Added to goodwill each period","C":"Remeasured to fair value through earnings each period","D":"Reported in OCI"},"answer":"C","explanation":"Contingent consideration classified as a liability is remeasured to fair value at each reporting date with changes recognized in earnings. If classified as equity, it is not remeasured.","ai":true},{"id":"AI-BAR4-24","area":"BAR4","title":"Interim Reporting View","question":"U.S. GAAP generally treats each interim period as:","choices":{"A":"A discrete, standalone period for all items","B":"Exempt from estimates","C":"Identical in length to a fiscal year","D":"An integral part of the annual period"},"answer":"D","explanation":"U.S. GAAP follows the integral view: each interim period is part of the annual period, so certain costs are estimated and allocated across quarters. (IFRS leans toward the discrete view.)","ai":true},{"id":"AI-BAR5-13","area":"BAR5","title":"NFP Net Asset Classes","question":"Under current U.S. GAAP, a not-for-profit reports net assets in how many classes?","choices":{"A":"Two — with donor restrictions and without donor restrictions","B":"Three","C":"Five","D":"Four"},"answer":"A","explanation":"ASU 2016-14 collapsed the old three-class model into two: net assets with donor restrictions and net assets without donor restrictions.","ai":true},{"id":"AI-BAR5-14","area":"BAR5","title":"Conditional Contribution","question":"A conditional promise to give is recognized as contribution revenue by an NFP when:","choices":{"A":"The promise is first communicated","B":"The barrier/condition is substantially met (overcome)","C":"Cash is eventually received","D":"The donor's intent is documented"},"answer":"B","explanation":"A conditional contribution is not recognized until the donor-imposed barrier is overcome and any right of return lapses. Unconditional promises are recognized when made.","ai":true},{"id":"AI-BAR5-15","area":"BAR5","title":"Donated Services","question":"An NFP recognizes contributed (donated) services as revenue only if they:","choices":{"A":"Are performed by any volunteer","B":"Exceed $5,000 in value","C":"Create or enhance a nonfinancial asset, OR require specialized skills the NFP would otherwise have to buy","D":"Are administrative in nature"},"answer":"C","explanation":"Contributed services are recognized only when they create/enhance a nonfinancial asset or require specialized skills (provided by someone possessing them) that would otherwise be purchased.","ai":true},{"id":"AI-BAR5-16","area":"BAR5","title":"NFP Expense Reporting","question":"Not-for-profits are required to report their expenses by:","choices":{"A":"Functional classification only","B":"Natural classification only","C":"Neither — expenses are netted against revenue","D":"Both functional and natural classification"},"answer":"D","explanation":"NFPs must present an analysis of expenses by both function (program vs support) and natural classification (salaries, rent, etc.), commonly in a statement of functional expenses.","ai":true},{"id":"AI-BAR5-17","area":"BAR5","title":"Fiduciary Fund Type","question":"Which of the following is a FIDUCIARY fund type?","choices":{"A":"Custodial fund","B":"Enterprise fund","C":"Special revenue fund","D":"Capital projects fund"},"answer":"A","explanation":"Fiduciary funds are custodial, pension (and other employee benefit) trust, investment trust, and private-purpose trust funds. Enterprise is proprietary; special revenue and capital projects are governmental.","ai":true},{"id":"AI-BAR5-18","area":"BAR5","title":"Capital Projects Fund","question":"A capital projects fund accounts for resources used to:","choices":{"A":"Pay principal and interest on long-term debt","B":"Acquire or construct major capital facilities (other than those of proprietary or fiduciary funds)","C":"Provide services to other departments on a cost-reimbursement basis","D":"Hold endowment principal intact"},"answer":"B","explanation":"Capital projects funds account for financial resources restricted/committed/assigned to acquiring or building major capital assets. Debt service funds handle principal/interest; internal service funds serve other departments.","ai":true},{"id":"AI-BAR5-19","area":"BAR5","title":"Encumbrance Accounting","question":"A governmental fund records encumbrances in order to:","choices":{"A":"Recognize revenue when measurable","B":"Record depreciation on capital assets","C":"Reserve appropriations for purchase orders and other commitments","D":"Accrue salaries payable"},"answer":"C","explanation":"Encumbrance accounting sets aside (reserves) part of an appropriation when a purchase order/commitment is made, helping prevent overspending the budget. Encumbrances are not expenditures or liabilities.","ai":true},{"id":"AI-BAR5-20","area":"BAR5","title":"Budgetary Appropriations","question":"In a governmental fund's budgetary journal entry, 'Appropriations' represent:","choices":{"A":"Expected (estimated) revenues","B":"Actual cash collected","C":"Outstanding encumbrances","D":"The legal authorization to incur expenditures"},"answer":"D","explanation":"Appropriations are the legal spending authority. The opening budgetary entry debits Estimated Revenues, credits Appropriations, with the difference to Budgetary Fund Balance.","ai":true},{"id":"AI-BAR5-21","area":"BAR5","title":"Imposed Nonexchange Revenue","question":"Property taxes levied by a government are an example of which class of transaction?","choices":{"A":"Imposed nonexchange revenue","B":"An exchange transaction","C":"Derived tax revenue","D":"A government-mandated transaction"},"answer":"A","explanation":"Property taxes and fines are imposed nonexchange revenues (assessments not derived from an underlying transaction). Recognize when there is an enforceable legal claim and the resources are available.","ai":true},{"id":"AI-BAR5-22","area":"BAR5","title":"Derived Tax Revenue","question":"A sales tax that a government collects based on retail sales is classified as:","choices":{"A":"Imposed nonexchange revenue","B":"Derived tax revenue","C":"An exchange transaction","D":"A voluntary nonexchange transaction"},"answer":"B","explanation":"Sales and income taxes are derived tax revenues — they result from (are derived from) an underlying exchange such as a sale or earning of income.","ai":true},{"id":"AI-BAR5-23","area":"BAR5","title":"Fund-to-Government-Wide Reconciliation","question":"A reconciliation is required between the governmental fund statements and the government-wide statements primarily because they use:","choices":{"A":"Different reporting currencies","B":"Different fiscal year-ends","C":"Different measurement focuses and bases of accounting","D":"Different external auditors"},"answer":"C","explanation":"Governmental funds use the current financial resources focus and modified accrual; government-wide statements use the economic resources focus and full accrual — so capital assets, long-term debt, etc. must be reconciled.","ai":true},{"id":"AI-BAR5-24","area":"BAR5","title":"MD&A Classification","question":"Management's Discussion and Analysis (MD&A) in a government's annual report is classified as:","choices":{"A":"Part of the notes to the financial statements","B":"Entirely optional","C":"A fiduciary fund statement","D":"Required supplementary information presented before the basic financial statements"},"answer":"D","explanation":"MD&A is required supplementary information (RSI) that precedes the basic financial statements, giving an objective, easily readable analysis of the government's financial activities.","ai":true},{"id":"AI-BAR1-25","area":"BAR1","title":"GDP Components","question":"Under the expenditure approach, GDP equals consumption + investment + government spending plus:","choices":{"A":"Net exports (exports − imports)","B":"Net income","C":"Depreciation","D":"Net savings"},"answer":"A","explanation":"GDP = C + I + G + (X − M). Net exports (exports minus imports) is the fourth component of the expenditure approach.","ai":true},{"id":"AI-BAR1-26","area":"BAR1","title":"Real vs Nominal GDP","question":"Real GDP differs from nominal GDP in that real GDP is:","choices":{"A":"Measured at current market prices","B":"Adjusted for changes in the price level (inflation)","C":"Always larger than nominal GDP","D":"Calculated excluding government spending"},"answer":"B","explanation":"Real GDP is adjusted for inflation (measured in constant prices), so it reflects changes in actual output rather than price changes. Nominal GDP uses current prices.","ai":true},{"id":"AI-BAR1-27","area":"BAR1","title":"Types of Unemployment","question":"Unemployment caused by a mismatch between workers' skills and the jobs available is called:","choices":{"A":"Frictional unemployment","B":"Cyclical unemployment","C":"Structural unemployment","D":"Seasonal unemployment"},"answer":"C","explanation":"Structural unemployment results from a mismatch of skills/location between workers and jobs. Frictional is short-term job search; cyclical follows the business cycle.","ai":true},{"id":"AI-BAR1-28","area":"BAR1","title":"Expansionary Fiscal Policy","question":"Which of the following is an example of EXPANSIONARY fiscal policy?","choices":{"A":"Raising the discount rate","B":"Selling government bonds","C":"Increasing reserve requirements","D":"Increasing government spending"},"answer":"D","explanation":"Fiscal policy is government spending and taxation. Increasing spending (or cutting taxes) is expansionary. The other three are contractionary monetary-policy tools.","ai":true},{"id":"AI-BAR1-29","area":"BAR1","title":"Demand Curve Shift","question":"For a normal good, an increase in consumer income shifts the demand curve:","choices":{"A":"Rightward (demand increases)","B":"Leftward (demand decreases)","C":"Only along the existing curve","D":"Not at all"},"answer":"A","explanation":"Higher income raises demand for a normal good, shifting the whole demand curve to the right. A price change alone causes movement ALONG the curve, not a shift.","ai":true},{"id":"AI-BAR1-30","area":"BAR1","title":"Price Ceiling","question":"An effective price ceiling set below the equilibrium price causes:","choices":{"A":"A surplus","B":"A shortage","C":"Equilibrium","D":"A higher market price"},"answer":"B","explanation":"A binding price ceiling (below equilibrium) makes quantity demanded exceed quantity supplied, creating a shortage. A binding price floor (above equilibrium) creates a surplus.","ai":true},{"id":"AI-BAR1-31","area":"BAR1","title":"Consumer Surplus","question":"Consumer surplus is the difference between:","choices":{"A":"Price and marginal cost","B":"Total revenue and total cost","C":"What consumers are willing to pay and what they actually pay","D":"Supply and demand"},"answer":"C","explanation":"Consumer surplus is the gap between the maximum buyers are willing to pay and the price they actually pay — the area below the demand curve and above the price.","ai":true},{"id":"AI-BAR1-32","area":"BAR1","title":"Elasticity of Supply","question":"Supply is said to be price ELASTIC when:","choices":{"A":"Quantity supplied barely changes with price (|Es| < 1)","B":"Quantity supplied is fixed (|Es| = 0)","C":"Price equals marginal cost","D":"Quantity supplied is highly responsive to price (|Es| > 1)"},"answer":"D","explanation":"Elastic supply means |Es| > 1: quantity supplied responds proportionally more than the price change. Inelastic supply (|Es| < 1) is relatively unresponsive.","ai":true},{"id":"AI-BAR1-33","area":"BAR1","title":"Comparative Advantage","question":"Under the theory of comparative advantage, a nation should specialize in producing goods for which it has the:","choices":{"A":"Lower opportunity cost","B":"Higher absolute cost","C":"Largest population","D":"Existing trade surplus"},"answer":"A","explanation":"Comparative advantage says a country should produce and export goods it can make at a lower opportunity cost, gaining from trade even without an absolute advantage.","ai":true},{"id":"AI-BAR1-34","area":"BAR1","title":"Currency Depreciation","question":"When a country's currency depreciates relative to others, its exports generally become:","choices":{"A":"More expensive to foreign buyers","B":"Cheaper to foreign buyers (more competitive)","C":"Unaffected","D":"Subject to tariffs"},"answer":"B","explanation":"A weaker (depreciated) home currency makes the country's goods cheaper for foreign buyers, tending to increase exports and decrease imports.","ai":true},{"id":"AI-BAR1-35","area":"BAR1","title":"Oligopoly","question":"A market dominated by a few large, interdependent firms is a(n):","choices":{"A":"Monopoly","B":"Perfect competition","C":"Oligopoly","D":"Monopolistic competition"},"answer":"C","explanation":"An oligopoly has a few large firms whose pricing decisions are interdependent. Monopolistic competition has many firms with differentiated products.","ai":true},{"id":"AI-BAR1-36","area":"BAR1","title":"Risk Culture","question":"In COSO ERM, the entity's core values and the attitudes and behaviors that shape risk decisions reflect its:","choices":{"A":"Risk appetite","B":"Risk capacity","C":"Residual risk","D":"Risk culture"},"answer":"D","explanation":"Risk culture — part of the Governance & Culture component — is the set of shared attitudes, values, and behaviors that characterize how an entity considers risk.","ai":true},{"id":"AI-BAR2-25","area":"BAR2","title":"Cost of New Equity","question":"The cost of issuing NEW common stock is generally higher than the cost of retained earnings because of:","choices":{"A":"Flotation (issuance) costs","B":"Income taxes","C":"Higher dividends","D":"Interest expense"},"answer":"A","explanation":"Issuing new equity incurs flotation costs (underwriting, legal, registration), so the net proceeds are lower and the effective cost is higher than using retained earnings.","ai":true},{"id":"AI-BAR2-26","area":"BAR2","title":"Dividend Payout Ratio","question":"The dividend payout ratio equals dividends divided by:","choices":{"A":"Total assets","B":"Net income (earnings)","C":"Market price","D":"Retained earnings"},"answer":"B","explanation":"Dividend payout ratio = dividends / net income. The complement (1 − payout) is the retention ratio (plowback).","ai":true},{"id":"AI-BAR2-27","area":"BAR2","title":"MIRR","question":"The modified internal rate of return (MIRR) improves on the IRR by assuming interim cash flows are reinvested at the:","choices":{"A":"Internal rate of return","B":"Risk-free rate","C":"Cost of capital","D":"Inflation rate"},"answer":"C","explanation":"MIRR assumes reinvestment at the firm's cost of capital (a more realistic rate) rather than at the project's own IRR, fixing IRR's optimistic reinvestment assumption.","ai":true},{"id":"AI-BAR2-28","area":"BAR2","title":"Degree of Financial Leverage","question":"The degree of financial leverage (DFL) measures the sensitivity of ___ to a change in operating income (EBIT):","choices":{"A":"Sales","B":"Contribution margin","C":"Fixed costs","D":"Earnings per share (net income)"},"answer":"D","explanation":"DFL = % change in EPS / % change in EBIT. Fixed financing costs (interest) magnify how a change in EBIT affects EPS/net income.","ai":true},{"id":"AI-BAR2-29","area":"BAR2","title":"Working Capital in NPV","question":"An increase in net working capital required to support a project is treated in NPV analysis as:","choices":{"A":"An initial cash outflow that is recovered at the end of the project","B":"A sunk cost to ignore","C":"A financing cash flow","D":"Depreciation"},"answer":"A","explanation":"Added working capital is an initial outflow (cash tied up in receivables/inventory) and is recovered as a terminal inflow when the project ends.","ai":true},{"id":"AI-BAR2-30","area":"BAR2","title":"Inventory Turnover","question":"Inventory turnover is computed as:","choices":{"A":"Sales ÷ average inventory","B":"Cost of goods sold ÷ average inventory","C":"Average inventory ÷ COGS","D":"Purchases ÷ ending inventory"},"answer":"B","explanation":"Inventory turnover = COGS / average inventory; it measures how many times inventory is sold and replaced in a period. Higher turnover generally signals efficient inventory use.","ai":true},{"id":"AI-BAR2-31","area":"BAR2","title":"Days Sales Outstanding","question":"Days sales outstanding (DSO) measures the average number of days to:","choices":{"A":"Sell inventory","B":"Pay suppliers","C":"Collect accounts receivable","D":"Convert raw materials"},"answer":"C","explanation":"DSO (average collection period) = average receivables / credit sales × 365; it measures how long it takes to collect cash from credit customers.","ai":true},{"id":"AI-BAR2-32","area":"BAR2","title":"Lockbox System","question":"A lockbox system is used primarily to:","choices":{"A":"Delay payments to suppliers","B":"Invest excess cash overnight","C":"Reduce income taxes","D":"Speed up the collection of customer payments (reduce float)"},"answer":"D","explanation":"A lockbox has customers mail payments to a bank-operated PO box so checks are deposited faster, reducing collection float and accelerating cash availability.","ai":true},{"id":"AI-BAR2-33","area":"BAR2","title":"Lease-vs-Buy Discount Rate","question":"In a lease-versus-buy analysis, the appropriate rate for discounting the relatively certain after-tax cash flows is the:","choices":{"A":"After-tax cost of debt","B":"WACC","C":"Cost of equity","D":"Internal rate of return"},"answer":"A","explanation":"Lease-versus-buy is essentially a financing decision with low-risk, contractual cash flows, so the after-tax cost of debt is the standard discount rate.","ai":true},{"id":"AI-BAR2-34","area":"BAR2","title":"Precautionary Cash Motive","question":"Holding cash or marketable securities as a buffer against unexpected needs reflects the:","choices":{"A":"Transaction motive","B":"Precautionary motive","C":"Speculative motive","D":"Tax motive"},"answer":"B","explanation":"The precautionary motive is holding liquidity as a safety cushion for unforeseen needs. The transaction motive covers routine payments; the speculative motive targets opportunities.","ai":true},{"id":"AI-BAR2-35","area":"BAR2","title":"Discounted Payback","question":"The discounted payback period differs from the regular payback period by:","choices":{"A":"Ignoring salvage value","B":"Using net income instead of cash flow","C":"Discounting the cash flows for the time value of money","D":"Adding interest to the outflow"},"answer":"C","explanation":"Discounted payback uses the present value of each cash flow, correcting the regular payback's flaw of ignoring the time value of money. Both still ignore flows after payback.","ai":true},{"id":"AI-BAR2-36","area":"BAR2","title":"Capital Rationing","question":"Capital rationing occurs when a firm:","choices":{"A":"Accepts every positive-NPV project","B":"Has unlimited capital","C":"Finances only with equity","D":"Limits the total funds available for investment and must choose among acceptable projects"},"answer":"D","explanation":"Under capital rationing, a budget constraint forces the firm to select the combination of acceptable projects that maximizes total NPV within the available funds.","ai":true},{"id":"AI-BAR3-25","area":"BAR3","title":"Materials Quantity Variance","question":"The direct materials quantity (usage) variance is computed as:","choices":{"A":"(Actual quantity used − standard quantity allowed) × standard price","B":"(Actual price − standard price) × actual quantity","C":"(Actual hours − standard hours) × standard rate","D":"(Actual quantity − standard quantity) × actual price"},"answer":"A","explanation":"Materials quantity variance = (AQ used − SQ allowed) × standard price. The price variance, by contrast, uses (AP − SP) × actual quantity purchased.","ai":true},{"id":"AI-BAR3-26","area":"BAR3","title":"Labor Rate Variance","question":"The direct labor rate variance equals:","choices":{"A":"(Actual hours − standard hours) × standard rate","B":"(Actual rate − standard rate) × actual hours","C":"(Actual rate − standard rate) × standard hours","D":"(Actual hours − standard hours) × actual rate"},"answer":"B","explanation":"Labor rate (price) variance = (AR − SR) × actual hours. The labor efficiency variance is (AH − SH) × standard rate.","ai":true},{"id":"AI-BAR3-27","area":"BAR3","title":"Sales Volume Variance","question":"The sales-volume variance is the difference between the flexible-budget amount and the:","choices":{"A":"Actual results","B":"Cash budget","C":"Static (master) budget amount","D":"Prior-year actual"},"answer":"C","explanation":"The sales-volume variance compares the flexible budget (at actual volume) with the static/master budget (at planned volume), isolating the effect of the volume difference.","ai":true},{"id":"AI-BAR3-28","area":"BAR3","title":"Constrained Resource","question":"When a productive resource is scarce, a firm should give priority to the products with the highest:","choices":{"A":"Total contribution margin","B":"Selling price","C":"Gross margin percentage","D":"Contribution margin per unit of the constrained resource"},"answer":"D","explanation":"With a binding constraint, ranking by contribution margin per unit of the scarce resource (e.g., per machine hour) maximizes total contribution, not CM per product unit.","ai":true},{"id":"AI-BAR3-29","area":"BAR3","title":"Sell or Process Further","question":"In a sell-or-process-further decision, which cost is IRRELEVANT?","choices":{"A":"Joint cost already incurred before split-off","B":"Incremental processing cost","C":"Incremental revenue from further processing","D":"Additional selling cost after processing"},"answer":"A","explanation":"Joint costs incurred before split-off are sunk and irrelevant. Only the incremental revenue versus the incremental cost of further processing matters.","ai":true},{"id":"AI-BAR3-30","area":"BAR3","title":"Abnormal Spoilage","question":"Abnormal spoilage is:","choices":{"A":"Included in the cost of good units","B":"Expensed as a loss of the period","C":"Capitalized as inventory","D":"Ignored entirely"},"answer":"B","explanation":"Abnormal spoilage (beyond what is normal/expected) is charged to a loss account in the period incurred, not absorbed into product cost. Normal spoilage is a product cost.","ai":true},{"id":"AI-BAR3-31","area":"BAR3","title":"Appraisal Cost of Quality","question":"Inspecting incoming raw materials and testing finished products are examples of which cost of quality?","choices":{"A":"Prevention cost","B":"Internal failure cost","C":"Appraisal cost","D":"External failure cost"},"answer":"C","explanation":"Appraisal (inspection) costs are incurred to detect defects. Prevention costs stop defects up front; internal/external failure costs arise after defects occur (before/after delivery).","ai":true},{"id":"AI-BAR3-32","area":"BAR3","title":"External Failure Cost","question":"Warranty repairs and product recalls after a product reaches the customer are examples of:","choices":{"A":"Prevention costs","B":"Appraisal costs","C":"Internal failure costs","D":"External failure costs"},"answer":"D","explanation":"External failure costs occur after delivery to the customer (warranty, recalls, lost goodwill). Internal failure costs (scrap, rework) are caught before delivery.","ai":true},{"id":"AI-BAR3-33","area":"BAR3","title":"FIFO Process Costing","question":"Compared with the weighted-average method, FIFO process costing:","choices":{"A":"Keeps current-period costs separate from beginning WIP costs","B":"Ignores beginning work-in-process entirely","C":"Is always simpler to apply","D":"Always yields a higher unit cost"},"answer":"A","explanation":"FIFO separates the cost to complete beginning WIP from current-period work, so its equivalent-unit cost reflects only current-period costs. Weighted-average blends them.","ai":true},{"id":"AI-BAR3-34","area":"BAR3","title":"Zero-Based Budgeting","question":"Under zero-based budgeting, each period's budget:","choices":{"A":"Starts from the prior year plus an increment","B":"Starts from zero, requiring every expenditure to be justified","C":"Is fixed and never changes","D":"Equals the prior period's actual results"},"answer":"B","explanation":"Zero-based budgeting builds the budget from a zero base each period; every cost must be justified anew, rather than carrying forward the prior budget as a baseline.","ai":true},{"id":"AI-BAR3-35","area":"BAR3","title":"Theory of Constraints","question":"Under the theory of constraints, throughput is maximized by managing the:","choices":{"A":"Largest department","B":"Total fixed costs","C":"Bottleneck (constraint) resource","D":"Ending inventory level"},"answer":"C","explanation":"The theory of constraints focuses on the bottleneck because system output (throughput) is limited by the constraint; relieving it raises overall throughput.","ai":true},{"id":"AI-BAR3-36","area":"BAR3","title":"Master Budget Starting Point","question":"The starting point and driver for preparing a master budget is usually the:","choices":{"A":"Production budget","B":"Cash budget","C":"Capital budget","D":"Sales budget (forecast)"},"answer":"D","explanation":"The sales budget/forecast drives the master budget — production, materials, labor, and cash budgets all flow from expected sales volume.","ai":true},{"id":"AI-BAR4-25","area":"BAR4","title":"Intercompany Receivable/Payable","question":"In consolidation, an intercompany receivable on the parent's books and the matching payable on the subsidiary's books are:","choices":{"A":"Eliminated in full","B":"Left on the consolidated balance sheet","C":"Eliminated only to the noncontrolling percentage","D":"Reclassified to equity"},"answer":"A","explanation":"Reciprocal intercompany balances are eliminated in full in consolidation, since the consolidated entity cannot owe money to itself.","ai":true},{"id":"AI-BAR4-26","area":"BAR4","title":"Step Acquisition","question":"When an investor achieves control in a step acquisition, any previously held equity interest is:","choices":{"A":"Left at its original cost","B":"Remeasured to fair value at the acquisition date, with the gain or loss in earnings","C":"Written off to retained earnings","D":"Added to goodwill at book value"},"answer":"B","explanation":"In a business combination achieved in stages, the acquirer remeasures its previously held interest to acquisition-date fair value and recognizes any resulting gain or loss in earnings.","ai":true},{"id":"AI-BAR4-27","area":"BAR4","title":"Net Investment Hedge","question":"Gains and losses on a hedge of a net investment in a foreign operation are reported in:","choices":{"A":"Net income","B":"Retained earnings","C":"Other comprehensive income (cumulative translation adjustment)","D":"Goodwill"},"answer":"C","explanation":"The effective portion of a net-investment hedge is recorded in OCI alongside the cumulative translation adjustment it is hedging, and released when the foreign operation is disposed of.","ai":true},{"id":"AI-BAR4-28","area":"BAR4","title":"Foreign Currency Transaction","question":"A gain or loss from settling a foreign-currency-denominated receivable (a foreign currency transaction) is reported in:","choices":{"A":"Other comprehensive income","B":"Equity directly","C":"A deferred account","D":"Net income"},"answer":"D","explanation":"Foreign currency TRANSACTION gains/losses (from rate changes on monetary items) go to net income. This contrasts with TRANSLATION adjustments under the current-rate method, which go to OCI.","ai":true},{"id":"AI-BAR4-29","area":"BAR4","title":"Failed Sale-Leaseback","question":"If a sale-leaseback transaction does NOT qualify as a sale, the seller-lessee accounts for it as:","choices":{"A":"A financing arrangement (no sale recognized)","B":"A sale and a separate lease","C":"An operating lease only","D":"A contribution to capital"},"answer":"A","explanation":"If control does not transfer (no qualifying sale), the transaction is a financing: the seller-lessee keeps the asset and records a financing liability for the proceeds.","ai":true},{"id":"AI-BAR4-30","area":"BAR4","title":"Sales-Type Lease (Lessor)","question":"A lessor classifies a lease as a sales-type lease when:","choices":{"A":"The lease term is under one year","B":"Control of the underlying asset transfers to the lessee","C":"The lessor retains the asset's risks and rewards","D":"Lease payments are entirely variable"},"answer":"B","explanation":"A sales-type lease arises when a finance-lease criterion is met so control effectively transfers to the lessee; the lessor derecognizes the asset and may recognize selling profit.","ai":true},{"id":"AI-BAR4-31","area":"BAR4","title":"Goodwill Impairment","question":"Under current U.S. GAAP, a goodwill impairment loss equals the amount by which a reporting unit's carrying amount exceeds its:","choices":{"A":"Book value of identifiable net assets","B":"Replacement cost","C":"Fair value (limited to the goodwill balance)","D":"Par value"},"answer":"C","explanation":"Under the one-step test (ASU 2017-04), impairment = carrying amount − fair value of the reporting unit, not to exceed the goodwill assigned to that unit.","ai":true},{"id":"AI-BAR4-32","area":"BAR4","title":"Discontinued Operations","question":"The results of a discontinued operation are reported in the income statement:","choices":{"A":"Within income from continuing operations","B":"In other comprehensive income","C":"Directly in equity","D":"Separately, net of tax, below income from continuing operations"},"answer":"D","explanation":"A discontinued operation (a disposed component representing a strategic shift) is reported separately, net of tax, after income from continuing operations.","ai":true},{"id":"AI-BAR4-33","area":"BAR4","title":"Fair Value Level 2","question":"Quoted prices for SIMILAR assets in active markets (or identical assets in inactive markets) are classified as:","choices":{"A":"Level 2 inputs","B":"Level 1 inputs","C":"Level 3 inputs","D":"Not part of the hierarchy"},"answer":"A","explanation":"Level 2 inputs are observable but not Level 1 — e.g., quoted prices for similar items, or quoted prices for identical items in markets that are not active. Level 3 inputs are unobservable.","ai":true},{"id":"AI-BAR4-34","area":"BAR4","title":"IFRS vs GAAP — Development Costs","question":"A key difference between IFRS and U.S. GAAP is that IFRS:","choices":{"A":"Expenses all research and development","B":"Capitalizes development costs that meet specified criteria","C":"Requires goodwill amortization","D":"Prohibits asset revaluation"},"answer":"B","explanation":"IFRS expenses research but CAPITALIZES development costs once technical/commercial feasibility criteria are met. U.S. GAAP generally expenses all R&D as incurred (with limited exceptions).","ai":true},{"id":"AI-BAR4-35","area":"BAR4","title":"NCI Presentation","question":"On consolidated financial statements, the noncontrolling interest is presented:","choices":{"A":"As a liability","B":"As mezzanine (temporary) equity","C":"Within equity, separately from the parent's equity","D":"Netted against goodwill"},"answer":"C","explanation":"The noncontrolling interest is reported within consolidated equity, shown separately from the controlling (parent) shareholders' equity.","ai":true},{"id":"AI-BAR4-36","area":"BAR4","title":"Push-Down Accounting","question":"Push-down accounting refers to:","choices":{"A":"Eliminating intercompany transactions","B":"Amortizing goodwill over 40 years","C":"Consolidating from the subsidiary upward","D":"Recording the acquirer's new fair-value basis directly on the acquired subsidiary's own books"},"answer":"D","explanation":"Push-down accounting records the acquisition-date fair-value adjustments (the new basis) on the acquired subsidiary's separate financial statements, 'pushing down' the acquirer's basis.","ai":true},{"id":"AI-BAR5-25","area":"BAR5","title":"General Fund","question":"Which fund accounts for all financial resources NOT required to be accounted for in another fund?","choices":{"A":"The general fund","B":"Special revenue fund","C":"Enterprise fund","D":"Permanent fund"},"answer":"A","explanation":"The general fund is the chief operating fund and accounts for any resources not assigned to a specific other fund. Every general-purpose government has exactly one general fund.","ai":true},{"id":"AI-BAR5-26","area":"BAR5","title":"Special Revenue Fund","question":"A special revenue fund accounts for revenues that are:","choices":{"A":"Unrestricted and general-purpose","B":"Restricted or committed to specified purposes (other than debt service or capital projects)","C":"Generated by business-type activities","D":"Held in trust for individuals"},"answer":"B","explanation":"Special revenue funds account for proceeds of specific revenue sources restricted/committed to specified purposes, excluding those for debt service or capital projects.","ai":true},{"id":"AI-BAR5-27","area":"BAR5","title":"Net Position Components","question":"On the government-wide statements, net position is displayed in three components: net investment in capital assets, restricted, and:","choices":{"A":"Committed","B":"Assigned","C":"Unrestricted","D":"Nonspendable"},"answer":"C","explanation":"Government-wide net position = net investment in capital assets + restricted + unrestricted. (Committed/assigned/nonspendable are governmental-FUND balance classifications, not net-position components.)","ai":true},{"id":"AI-BAR5-28","area":"BAR5","title":"Proprietary Cash Flow Categories","question":"A government's statement of cash flows (proprietary funds) classifies cash flows into how many categories?","choices":{"A":"Three","B":"Two","C":"Five","D":"Four"},"answer":"D","explanation":"GASB requires FOUR categories: operating; noncapital financing; capital and related financing; and investing activities. (FASB business statements use three.)","ai":true},{"id":"AI-BAR5-29","area":"BAR5","title":"Modified Accrual Expenditures","question":"Under modified accrual accounting, expenditures are generally recognized when:","choices":{"A":"The related fund liability is incurred","B":"Cash is paid","C":"A purchase order is issued","D":"The budget is adopted"},"answer":"A","explanation":"Governmental funds recognize expenditures when the related fund liability is incurred (with exceptions for items like long-term debt interest), not merely when cash is paid.","ai":true},{"id":"AI-BAR5-30","area":"BAR5","title":"Interfund Transfer","question":"A flow of resources from one fund to another with no expectation of repayment is a(n):","choices":{"A":"Interfund loan","B":"Interfund transfer","C":"Quasi-external transaction","D":"Reimbursement"},"answer":"B","explanation":"Interfund transfers move resources between funds without a requirement for repayment (unlike interfund loans). They are reported as other financing sources/uses in governmental funds.","ai":true},{"id":"AI-BAR5-31","area":"BAR5","title":"Blended Component Unit","question":"A component unit is BLENDED (rather than discretely presented) when it:","choices":{"A":"Serves the citizens directly","B":"Is organized as a nonprofit","C":"Is so intertwined that it functions as part of the primary government","D":"Has its own separate management"},"answer":"C","explanation":"Blending is used when the component unit is essentially part of the primary government (e.g., serves the government almost exclusively or shares a governing body). Otherwise it is discretely presented.","ai":true},{"id":"AI-BAR5-32","area":"BAR5","title":"Term Endowment","question":"A term endowment is one in which:","choices":{"A":"The principal must be maintained permanently","B":"There is no donor restriction","C":"Only the income is restricted forever","D":"The donor restriction expires with the passage of time or an event, after which the principal may be spent"},"answer":"D","explanation":"In a term endowment the principal restriction lapses after a stated time or event; thereafter the resources become available to spend. A permanent (true) endowment must be kept intact indefinitely.","ai":true},{"id":"AI-BAR5-33","area":"BAR5","title":"NFP Investment Return","question":"A not-for-profit reports investment return (net of related expenses) in the statement of activities as:","choices":{"A":"Increases in the appropriate net asset class (with or without donor restrictions)","B":"Revenue only without donor restrictions","C":"Other comprehensive income","D":"A liability"},"answer":"A","explanation":"Investment return is reported net of investment expenses and increases net assets in the class dictated by donor restrictions (e.g., restricted if the donor restricts the return).","ai":true},{"id":"AI-BAR5-34","area":"BAR5","title":"Budgetary Comparison Schedule","question":"A government presents a budgetary comparison schedule for the general fund and major special revenue funds (with legally adopted budgets) as:","choices":{"A":"A note disclosure only","B":"Required supplementary information (or, optionally, a basic statement)","C":"An entirely optional schedule","D":"A fiduciary fund statement"},"answer":"B","explanation":"The budgetary comparison (original budget, final budget, actual) is required supplementary information, though a government may instead present it as a basic governmental fund statement.","ai":true},{"id":"AI-BAR5-35","area":"BAR5","title":"Net Pension Liability","question":"Under GASB, a government's net pension liability equals the total pension liability minus the:","choices":{"A":"Annual required contribution","B":"Service cost","C":"Pension plan's fiduciary net position (plan assets)","D":"Discount rate"},"answer":"C","explanation":"Net pension liability = total pension liability − plan fiduciary net position (the plan's assets available for benefits), reported on the government-wide statement of net position.","ai":true},{"id":"AI-BAR5-36","area":"BAR5","title":"Program Revenues","question":"On the government-wide statement of activities, charges for services and operating/capital grants are reported as:","choices":{"A":"General revenues","B":"Other financing sources","C":"Fund balance","D":"Program revenues that offset the related function's expense"},"answer":"D","explanation":"Program revenues (charges for services, program-specific operating and capital grants/contributions) are netted against the related function's expenses to show net cost. Taxes are general revenues.","ai":true},{"id":"AI-FIN-CF-01","area":"FIN","sub":"CF","title":"FCFF vs FCFE","question":"Free cash flow to the FIRM (FCFF) differs from free cash flow to EQUITY (FCFE) in that FCFF is:","choices":{"A":"Before financing flows (available to all capital providers)","B":"After interest and debt repayment","C":"Always smaller than FCFE","D":"Equal to net income"},"answer":"A","explanation":"FCFF is the cash available to ALL capital providers (debt + equity) before financing flows, discounted at WACC. FCFE is after interest and net borrowing, discounted at the cost of equity.","ai":true},{"id":"AI-FIN-CF-02","area":"FIN","sub":"CF","title":"Unlevering Beta","question":"Removing the effect of financial leverage from a company's equity beta produces the:","choices":{"A":"Levered beta","B":"Asset (unlevered) beta","C":"Market beta","D":"Accounting beta"},"answer":"B","explanation":"Unlevering (Hamada) strips out capital-structure effects to get the asset/unlevered beta — the business risk only — which can then be re-levered for a target capital structure.","ai":true},{"id":"AI-FIN-CF-03","area":"FIN","sub":"CF","title":"WACC Weights","question":"In WACC, the weights on debt and equity should be based on:","choices":{"A":"Book values","B":"Historical cost","C":"Target/market values of capital","D":"Par values"},"answer":"C","explanation":"WACC uses market (or target) capital-structure weights because they reflect the current required returns of each capital source.","ai":true},{"id":"AI-FIN-CF-04","area":"FIN","sub":"CF","title":"Pecking Order Theory","question":"The pecking order theory of capital structure predicts that firms prefer to finance with:","choices":{"A":"New equity first","B":"Only debt","C":"A fixed 50/50 mix","D":"Internal funds first, then debt, then equity last"},"answer":"D","explanation":"Pecking order (information asymmetry) says firms prefer internal funds, then debt, and issue equity only as a last resort because equity issuance signals overvaluation.","ai":true},{"id":"AI-FIN-CF-05","area":"FIN","sub":"CF","title":"Trade-Off Theory","question":"The trade-off theory of capital structure balances the interest tax shield against:","choices":{"A":"Financial distress (bankruptcy) costs","B":"Dividend payments","C":"Flotation costs only","D":"Inflation"},"answer":"A","explanation":"The optimal leverage under trade-off theory equates the marginal tax-shield benefit of debt with the marginal expected cost of financial distress/bankruptcy.","ai":true},{"id":"AI-FIN-CF-06","area":"FIN","sub":"CF","title":"Cost of Equity (CAPM)","question":"Using CAPM, a company's cost of equity rises when:","choices":{"A":"The risk-free rate falls","B":"Its beta increases","C":"The market risk premium falls","D":"It pays higher dividends"},"answer":"B","explanation":"Re = Rf + β(Rm − Rf). A higher beta (more systematic risk) raises the required return on equity.","ai":true},{"id":"AI-FIN-CF-07","area":"FIN","sub":"CF","title":"Interest Tax Shield","question":"The after-tax cost of debt is lower than the pre-tax cost because:","choices":{"A":"Debt has no risk","B":"Lenders rebate part of the interest","C":"Interest is tax-deductible, creating a tax shield","D":"Principal is deductible"},"answer":"C","explanation":"After-tax cost of debt = Rd × (1 − T). Tax-deductible interest produces a shield, lowering the effective cost of debt versus equity (whose dividends are not deductible).","ai":true},{"id":"AI-FIN-CF-08","area":"FIN","sub":"CF","title":"Degree of Total Leverage","question":"The degree of total leverage (DTL) equals:","choices":{"A":"DOL + DFL","B":"DOL ÷ DFL","C":"DFL − DOL","D":"DOL × DFL"},"answer":"D","explanation":"DTL = DOL × DFL; it measures the combined sensitivity of EPS to a change in sales, capturing both operating and financial leverage.","ai":true},{"id":"AI-FIN-CF-09","area":"FIN","sub":"CF","title":"Economic Value Added","question":"A company creates economic value (positive EVA) when:","choices":{"A":"ROIC exceeds its WACC","B":"Net income is positive","C":"Revenue grows","D":"It pays a dividend"},"answer":"A","explanation":"EVA = (ROIC − WACC) × invested capital. Value is created only when the return on invested capital exceeds the cost of that capital, not merely when accounting profit is positive.","ai":true},{"id":"AI-FIN-CF-10","area":"FIN","sub":"CF","title":"Terminal Value (Gordon)","question":"In a DCF, the Gordon-growth terminal value equals the final-year free cash flow grown one period, divided by:","choices":{"A":"WACC","B":"WACC − g (the long-term growth rate)","C":"g − WACC","D":"The risk-free rate"},"answer":"B","explanation":"TV = FCF×(1+g) / (WACC − g). The terminal value captures cash flows beyond the explicit forecast assuming a constant perpetual growth rate g < WACC.","ai":true},{"id":"AI-FIN-VAL-01","area":"FIN","sub":"VAL","title":"DCF Enterprise Value","question":"In an unlevered DCF, enterprise value is the present value of free cash flow to the firm discounted at:","choices":{"A":"The cost of equity","B":"The risk-free rate","C":"WACC","D":"The cost of debt"},"answer":"C","explanation":"FCFF (available to all capital providers) is discounted at WACC to give enterprise value. FCFE is discounted at the cost of equity to give equity value directly.","ai":true},{"id":"AI-FIN-VAL-02","area":"FIN","sub":"VAL","title":"EV/EBITDA Multiple","question":"The EV/EBITDA multiple is popular for comparisons because EBITDA is:","choices":{"A":"Net of taxes","B":"The same as free cash flow","C":"Always equal to net income","D":"Capital-structure neutral and pre-D&A (comparable across firms)"},"answer":"D","explanation":"EBITDA is before interest, taxes, and depreciation/amortization, so EV/EBITDA is largely independent of capital structure and accounting depreciation, aiding cross-company comparison.","ai":true},{"id":"AI-FIN-VAL-03","area":"FIN","sub":"VAL","title":"Equity Value Bridge","question":"To move from enterprise value to equity value, you generally:","choices":{"A":"Subtract net debt (and other claims like minority interest, preferred)","B":"Add net debt","C":"Add cash only","D":"Multiply by the tax rate"},"answer":"A","explanation":"Equity value = enterprise value − net debt − preferred − noncontrolling interest + non-operating assets. Net debt and other claims senior to common equity are deducted.","ai":true},{"id":"AI-FIN-VAL-04","area":"FIN","sub":"VAL","title":"Precedent Transactions","question":"Compared with comparable-company (trading) multiples, precedent-transaction multiples typically:","choices":{"A":"Are lower","B":"Include a control premium (paid in acquisitions)","C":"Ignore synergies","D":"Equal book value"},"answer":"B","explanation":"Precedent (M&A) multiples reflect prices paid for control, embedding a control premium and often synergy expectations, so they usually exceed trading comparables.","ai":true},{"id":"AI-FIN-VAL-05","area":"FIN","sub":"VAL","title":"Terminal Value Weight","question":"In a typical 5-year DCF, the terminal value usually represents:","choices":{"A":"A small, negligible share of total value","B":"Exactly half","C":"A large share (often the majority) of total enterprise value","D":"Zero"},"answer":"C","explanation":"Because most cash flows lie beyond the explicit horizon, the terminal value commonly drives the majority of a DCF's value — making the terminal growth and WACC assumptions critical.","ai":true},{"id":"AI-FIN-VAL-06","area":"FIN","sub":"VAL","title":"P/E Ratio","question":"A higher price-to
