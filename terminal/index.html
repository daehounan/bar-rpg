己資本コストで割引くと株主価値が直接得られる。"},"ko":{"question":"언레버드 DCF에서 기업가치는 FCFF를 무엇으로 할인한 현재가치인가?","choices":{"A":"자기자본비용","B":"무위험이자율","C":"WACC","D":"부채비용"},"explanation":"FCFF(모든 자본제공자가 이용 가능)를 WACC로 할인하면 기업가치. FCFE를 자기자본비용으로 할인하면 주주가치가 직접 나온다."}},"AI-FIN-VAL-02":{"ja":{"question":"EV/EBITDA倍率が比較に好まれるのは、EBITDAが何だからか。","choices":{"A":"税引後","B":"FCFと同じ","C":"常に純利益に等しい","D":"資本構成中立・D&A前（企業間比較可）"},"explanation":"EBITDAは利息・税・減価償却前なので、EV/EBITDAは資本構成や会計上の減価償却にほぼ依存せず、企業間比較に有用。"},"ko":{"question":"EV/EBITDA 배수가 비교에 선호되는 것은 EBITDA가 무엇이기 때문인가?","choices":{"A":"세후","B":"FCF와 동일","C":"항상 순이익과 같음","D":"자본구조 중립·D&A 전(기업 간 비교 가능)"},"explanation":"EBITDA는 이자·세금·감가상각 전이므로 EV/EBITDA는 자본구조나 회계 감가상각에 거의 독립적이어서 기업 간 비교에 유용."}},"AI-FIN-VAL-03":{"ja":{"question":"企業価値（EV）から株主価値へ移るには一般にどうするか。","choices":{"A":"純有利子負債（および少数株主・優先株等）を差し引く","B":"純有利子負債を加える","C":"現金のみ加える","D":"税率を乗じる"},"explanation":"株主価値＝EV − 純有利子負債 − 優先株 − 非支配持分 + 非事業資産。普通株より上位の請求権を差し引く。"},"ko":{"question":"기업가치(EV)에서 주주가치로 이동하려면 일반적으로 어떻게 하는가?","choices":{"A":"순부채(및 소수지분·우선주 등)를 차감","B":"순부채를 더함","C":"현금만 더함","D":"세율을 곱함"},"explanation":"주주가치＝EV − 순부채 − 우선주 − 비지배지분 + 비영업자산. 보통주보다 선순위 청구권을 차감."}},"AI-FIN-VAL-04":{"ja":{"question":"類似会社（取引）倍率と比べ、先例取引倍率は一般にどうか。","choices":{"A":"より低い","B":"コントロールプレミアムを含む","C":"シナジーを無視","D":"簿価に等しい"},"explanation":"先例（M&A）倍率は支配権取得のために支払われた価格を反映し、コントロールプレミアムやシナジー期待を含むため、通常は取引倍率を上回る。"},"ko":{"question":"유사기업(거래) 배수와 비교해 선례거래 배수는 일반적으로 어떤가?","choices":{"A":"더 낮다","B":"경영권 프리미엄을 포함","C":"시너지를 무시","D":"장부가와 같음"},"explanation":"선례(M&A) 배수는 지배권 취득을 위해 지불된 가격을 반영해 경영권 프리미엄·시너지 기대를 포함하므로 보통 거래 배수를 상회한다."}},"AI-FIN-VAL-05":{"ja":{"question":"典型的な5年DCFで、ターミナルバリューは通常どの程度を占めるか。","choices":{"A":"ごく小さく無視できる割合","B":"ちょうど半分","C":"企業価値の大部分（しばしば過半）","D":"ゼロ"},"explanation":"明示予測期間を超えるCFが大半のため、ターミナルバリューがDCF価値の過半を占めることが多く、終末成長率とWACCの仮定が決定的になる。"},"ko":{"question":"전형적 5년 DCF에서 터미널밸류는 보통 어느 정도를 차지하는가?","choices":{"A":"아주 작고 무시할 만한 비중","B":"정확히 절반","C":"기업가치의 대부분(흔히 과반)","D":"영(0)"},"explanation":"명시적 예측기간을 넘는 현금흐름이 대부분이라 터미널밸류가 DCF 가치의 과반을 차지하는 경우가 많아, 종말성장률과 WACC 가정이 결정적이다."}},"AI-FIN-VAL-06":{"ja":{"question":"他の条件が同じで、PER（株価収益率）が高いほど市場が期待しているのは一般に何か。","choices":{"A":"将来成長の低下","B":"差し迫った倒産","C":"減配","D":"将来の利益成長↑（またはリスク↓）"},"explanation":"PERは利益1ドル当たりの株価を表す。高い倍率は通常、強い利益成長やより低いリスク（低い要求利回り）の期待を織り込む。"},"ko":{"question":"다른 조건이 같을 때, PER(주가수익비율)이 높을수록 시장이 기대하는 것은 일반적으로?","choices":{"A":"미래 성장 저하","B":"임박한 파산","C":"배당 삭감","D":"미래 이익성장↑(또는 위험↓)"},"explanation":"PER은 이익 1달러당 주가를 나타낸다. 높은 배수는 보통 강한 이익 성장이나 더 낮은 위험(낮은 요구수익률) 기대를 반영한다."}},"AI-FIN-VAL-07":{"ja":{"question":"ゴードン成長（定率DDM）は株価を翌年配当を何で割って評価するか。","choices":{"A":"要求利回り − 成長率","B":"要求利回り + 成長率","C":"成長率 − 要求利回り","D":"配当利回り"},"explanation":"P0 = D1 / (r − g)。配当が一定率g（要求利回りr未満）で成長する場合に有効。"},"ko":{"question":"고든성장(정률 DDM)은 주가를 내년 배당을 무엇으로 나눠 평가하는가?","choices":{"A":"요구수익률 − 성장률","B":"요구수익률 + 성장률","C":"성장률 − 요구수익률","D":"배당수익률"},"explanation":"P0 = D1 / (r − g). 배당이 일정률 g(요구수익률 r 미만)로 성장할 때 유효."}},"AI-FIN-VAL-08":{"ja":{"question":"DCF評価が最も敏感に反応するのは何か。","choices":{"A":"1年目の運転資本","B":"割引率（WACC）と終末成長率","C":"会社名","D":"監査報酬"},"explanation":"WACCや終末成長率の小さな変化が大きなターミナルバリューを大きく動かすため、DCFはこの2つに対する感応度レンジで提示される。"},"ko":{"question":"DCF 평가가 가장 민감하게 반응하는 것은?","choices":{"A":"1년차 운전자본","B":"할인율(WACC)과 종말성장률","C":"회사명","D":"감사보수"},"explanation":"WACC나 종말성장률의 작은 변화가 큰 터미널밸류를 크게 움직이므로, DCF는 이 둘에 대한 민감도 범위로 제시된다."}},"AI-FIN-VAL-09":{"ja":{"question":"類似会社分析（コンプス）はターゲットをどう評価するか。","choices":{"A":"ターゲット自身の歴史的原価","B":"売上に一律10倍","C":"類似上場企業の取引倍率をターゲット指標に適用","D":"再調達原価"},"explanation":"取引コンプスは、類似上場企業から導いた評価倍率（EV/EBITDA・PER等）をターゲットの財務指標に適用し市場価値を推定する。"},"ko":{"question":"유사기업분석(comps)은 대상을 어떻게 평가하는가?","choices":{"A":"대상 자신의 역사적원가","B":"매출에 일률 10배","C":"유사 상장사 거래배수를 대상 지표에 적용","D":"재조달원가"},"explanation":"거래 comps는 유사 상장기업에서 도출한 평가배수(EV/EBITDA·PER 등)를 대상의 재무지표에 적용해 시장가치를 추정한다."}},"AI-FIN-VAL-10":{"ja":{"question":"評価において、ターゲットの使用可能な繰越欠損金（NOL）は通常どう扱われるか。","choices":{"A":"負債","B":"無関連","C":"のれんの一部のみ","D":"別個の資産（将来節税の現在価値）として加算"},"explanation":"使用可能なNOLは将来課税所得を遮蔽するため、その節税の現在価値を別個の非事業資産として価値に加える（使用制限あり）。"},"ko":{"question":"평가에서 대상의 사용가능 이월결손금(NOL)은 보통 어떻게 다뤄지는가?","choices":{"A":"부채","B":"비관련","C":"영업권의 일부만","D":"별도 자산(미래 절세 현재가치)으로 가산"},"explanation":"사용가능 NOL은 미래 과세소득을 차폐하므로 그 절세의 현재가치를 별도의 비영업자산으로 가치에 더한다(사용 제한 있음)."}},"AI-FIN-DEAL-01":{"ja":{"question":"買収におけるコストシナジーは通常どこから生じるか。","choices":{"A":"重複機能の排除と規模の経済","B":"製品のクロスセル","C":"値上げ","D":"新市場参入"},"explanation":"コストシナジーは重複機能の排除と規模の経済から生じる。収益シナジー（実現はより難しい）はクロスセルや市場拡大から。"},"ko":{"question":"인수에서 비용 시너지는 보통 어디서 발생하는가?","choices":{"A":"중복 기능 제거와 규모의 경제","B":"제품 교차판매","C":"가격 인상","D":"신시장 진입"},"explanation":"비용 시너지는 중복 기능 제거와 규모의 경제에서 발생. 매출 시너지(실현은 더 어려움)는 교차판매·시장 확대에서."}},"AI-FIN-DEAL-02":{"ja":{"question":"買収が取得企業にとってEPS増加（accretive）になるのはどんなときか。","choices":{"A":"のれんが生じる","B":"プロフォーマEPSが単独より上昇","C":"ターゲットが大きい","D":"全株式対価"},"explanation":"増加/希薄化は結合後プロフォーマEPSを取得企業の単独EPSと比較する。EPSが増えれば増加（しばしば取得企業のPERが取得倍率を上回るとき）。"},"ko":{"question":"인수가 취득기업에 EPS 증가(accretive)가 되는 것은 언제인가?","choices":{"A":"영업권이 발생","B":"프로포마 EPS가 단독보다 상승","C":"대상이 더 큼","D":"전액 주식대가"},"explanation":"증가/희석은 결합 후 프로포마 EPS를 취득기업 단독 EPS와 비교. EPS가 늘면 증가(흔히 취득기업 PER이 취득배수를 상회할 때)."}},"AI-FIN-DEAL-03":{"ja":{"question":"M&Aの財務デューデリジェンスの主な目的は何か。","choices":{"A":"案件を一般に売り込む","B":"経営者賞与を決める","C":"報告数値の検証とリスク/利益の質の特定","D":"証券を登録"},"explanation":"デューデリジェンスは利益の質・持続性、運転資本、負債類似項目、偶発リスクを検証し、価格・条件を確定する前にリスクを把握する。"},"ko":{"question":"M&A 재무실사의 주된 목적은?","choices":{"A":"딜을 대중에 홍보","B":"경영진 보너스를 정함","C":"보고 실적 검증과 위험/이익의 질 식별","D":"증권을 등록"},"explanation":"실사는 이익의 질·지속성, 운전자본, 부채성 항목, 우발위험을 검증해 가격·조건 확정 전에 위험을 파악한다."}},"AI-FIN-DEAL-04":{"ja":{"question":"レバレッジド・バイアウト（LBO）のリターンは、債務返済・EBITDA成長と、何で主に決まるか。","choices":{"A":"配当リキャップのみ","B":"追加の株式発行","C":"税負担増","D":"出口でのマルチプル拡大"},"explanation":"LBOの株式リターンは①デレバレッジ（CFで債務返済）②営業EBITDA成長③エントリーより高い出口倍率（マルチプル拡大）から生じる。"},"ko":{"question":"차입매수(LBO) 수익은 부채상환·EBITDA 성장과 무엇으로 주로 결정되는가?","choices":{"A":"배당 리캡만","B":"추가 주식발행","C":"세부담 증가","D":"출구에서의 멀티플 확장"},"explanation":"LBO 주식수익은 ①디레버리징(현금흐름으로 부채상환) ②영업 EBITDA 성장 ③진입보다 높은 출구 배수(멀티플 확장)에서 발생."}},"AI-FIN-DEAL-05":{"ja":{"question":"IRRと比べ、投下資本倍率（MOIC）が考慮しないものは何か。","choices":{"A":"リターンを得るまでの期間","B":"投資額","C":"総回収額","D":"レバレッジ"},"explanation":"MOIC＝総価値/投下資本は時間を無視。IRRは時間加重。長期保有での高MOICでも控えめなIRRになりうるため、PEは両方を報告する。"},"ko":{"question":"IRR과 비교해 투하자본배수(MOIC)가 고려하지 않는 것은?","choices":{"A":"수익을 얻는 기간","B":"투자금액","C":"총 회수액","D":"레버리지"},"explanation":"MOIC＝총가치/투하자본은 시간을 무시. IRR은 시간가중. 장기보유의 높은 MOIC도 낮은 IRR이 될 수 있어 PE는 둘 다 보고한다."}},"AI-FIN-DEAL-06":{"ja":{"question":"買収におけるアーンアウトとは何か。","choices":{"A":"固定の前払現金","B":"将来業績達成時に支払う条件付対価","C":"負債コベナンツの一種","D":"売り手への課税"},"explanation":"アーンアウトは評価ギャップを埋めるため、ターゲットが合意した買収後の業績目標を達成した場合に追加対価を後日支払う仕組み。"},"ko":{"question":"인수에서 언아웃(earnout)이란 무엇인가?","choices":{"A":"고정 선지급 현금","B":"미래 성과 달성 시 지급하는 조건부 대가","C":"부채 약정의 일종","D":"판매자에 대한 과세"},"explanation":"언아웃은 평가 격차를 메우기 위해 대상이 합의된 인수 후 성과목표를 달성하면 추가 대가를 나중에 지급하는 장치."}},"AI-FIN-DEAL-07":{"ja":{"question":"プライベートエクイティ・ファンドにおけるキャリードインタレストとは何か。","choices":{"A":"コミット資本への管理報酬","B":"貸し手への利息","C":"ハードル超の利益のGP取分（通常約20%）","D":"LPの保証リターン"},"explanation":"キャリーはGPの成功報酬としての利益分配（通常20%）で、通常はLPが出資元本＋優先リターン（ハードル）を回収した後に得られる。"},"ko":{"question":"사모펀드(PE)에서 성과보수(carried interest)란 무엇인가?","choices":{"A":"약정자본에 대한 관리보수","B":"대출자에 대한 이자","C":"허들 초과 이익의 GP 몫(보통 약 20%)","D":"LP의 보장 수익"},"explanation":"캐리는 GP의 성과보수로서 이익 분배(보통 20%)이며, 보통 LP가 출자원금＋우선수익(허들)을 회수한 후에 받는다."}},"AI-FIN-DEAL-08":{"ja":{"question":"企業とその供給業者との合併は何の例か。","choices":{"A":"水平合併","B":"コングロマリット合併","C":"スピンオフ","D":"垂直合併"},"explanation":"垂直合併は同一サプライチェーンの異なる段階の企業を結合（例：メーカー＋供給業者）。水平合併は競合同士、コングロマリットは無関連事業。"},"ko":{"question":"기업과 그 공급업체 간의 합병은 무엇의 예인가?","choices":{"A":"수평합병","B":"컹글로머릿 합병","C":"스핀오프","D":"수직합병"},"explanation":"수직합병은 동일 공급망의 다른 단계 기업을 결합(예: 제조사＋공급업체). 수평합병은 경쟁사 간, 컹글로머릿은 무관련 사업."}},"AI-FIN-DEAL-09":{"ja":{"question":"「ポイズンピル」とはどんな防衛策か。","choices":{"A":"既存株主が割安購入し買収者を希薄化","B":"特別配当を支払う","C":"倒産申請","D":"全債務を買い戻す"},"explanation":"ポイズンピル（株主権利プラン）は、敵対的買収者が一定の保有比率を超えると非買収者株主が割安に株式を買えるようにし、買収者を希薄化してコストを上げる。"},"ko":{"question":"'포이즌 필'은 어떤 방어책인가?","choices":{"A":"기존 주주가 싸게 매입해 인수자를 희석","B":"특별배당을 지급","C":"파산 신청","D":"모든 부채를 상환"},"explanation":"포이즌 필(주주권리계획)은 적대적 인수자가 일정 보유비율을 넘으면 비인수 주주가 싸게 주식을 살 수 있게 해 인수자를 희석하고 비용을 올린다."}},"AI-FIN-DEAL-10":{"ja":{"question":"買収で計上されるのれんは、買収価格から何を差し引いたものか。","choices":{"A":"自己資本の簿価","B":"取得した識別可能純資産の公正価値","C":"ターゲットの売上","D":"取得企業の時価総額"},"explanation":"のれん＝移転対価（＋NCI/従前持分の公正価値）− 取得した識別可能純資産の公正価値。別個に認識されないシナジー・無形を捉える。"},"ko":{"question":"인수에서 계상되는 영업권은 인수가격에서 무엇을 차감한 것인가?","choices":{"A":"자기자본 장부가","B":"취득한 식별가능 순자산의 공정가치","C":"대상의 매출","D":"취득기업의 시가총액"},"explanation":"영업권＝이전대가(＋NCI/종전지분의 공정가치) − 취득한 식별가능 순자산의 공정가치. 별도로 인식되지 않는 시너지·무형을 포착."}},"AI-FIN-DERIV-01":{"ja":{"question":"コールオプションの保有者が利益を得るのは、原資産価格がどうなったときか。","choices":{"A":"行使価格を下回る","B":"ちょうど行使価格","C":"行使価格（＋プレミアム）を上回る","D":"動かない"},"explanation":"コールは行使価格で買う権利。原資産が行使価格を上回ると利益。純利益には支払プレミアムを超える上昇が必要。"},"ko":{"question":"콜옵션 보유자가 이익을 얻는 것은 기초자산 가격이 어떻게 될 때인가?","choices":{"A":"행사가 아래로 하락","B":"정확히 행사가","C":"행사가(＋프리미엄)를 상회","D":"움직이지 않음"},"explanation":"콜은 행사가에 살 권리. 기초자산이 행사가를 넘으면 이익. 순이익에는 지불 프리미엄을 초과하는 상승이 필요."}},"AI-FIN-DERIV-02":{"ja":{"question":"保有資産にプットオプションを買うことは何の役割をするか。","choices":{"A":"利益を増幅するレバレッジ","B":"配当を受け取る方法","C":"空売り","D":"下方損失を限定する保険"},"explanation":"プロテクティブプットは行使価格で売る権利を与え損失に下限を設ける＝保険。プレミアムがその保護のコスト。"},"ko":{"question":"보유 자산에 풋옵션을 매입하는 것은 무슨 역할을 하는가?","choices":{"A":"이익을 증폭하는 레버리지","B":"배당을 받는 방법","C":"공매도","D":"하방 손실을 제한하는 보험"},"explanation":"보호적 풋(protective put)은 행사가에 팔 권리를 줘 손실에 하한을 설정＝보험. 프리미엄이 그 보호의 비용."}},"AI-FIN-DERIV-03":{"ja":{"question":"オプションのプレミアムは本源的価値に何を加えたものか。","choices":{"A":"時間的価値","B":"行使価格","C":"想定元本","D":"配当"},"explanation":"オプションプレミアム＝本源的価値（ITM分、下限ゼロ）＋時間的価値（満期前の有利な変動の可能性）。時間的価値は満期でゼロに減衰。"},"ko":{"question":"옵션 프리미엄은 내재가치에 무엇을 더한 것인가?","choices":{"A":"시간가치","B":"행사가격","C":"명목금액","D":"배당"},"explanation":"옵션 프리미엄＝내재가치(ITM분, 하한 0)＋시간가치(만기 전 유리한 변동 가능성). 시간가치는 만기에 0으로 감소."}},"AI-FIN-DERIV-04":{"ja":{"question":"オプションのデルタは、オプション価格の何に対する感応度を測るか。","choices":{"A":"時間減衰","B":"原資産価格の変化","C":"ボラティリティの変化","D":"金利"},"explanation":"デルタは原資産価格1単位の変化に対するオプション価格の変化率。（セータは時間減衰、ベガはボラティリティ、ローは金利。）"},"ko":{"question":"옵션의 델타는 옵션 가격의 무엇에 대한 민감도를 측정하는가?","choices":{"A":"시간감쇠","B":"기초자산 가격의 변화","C":"변동성의 변화","D":"금리"},"explanation":"델타는 기초자산 가격 1단위 변화에 대한 옵션 가격 변화율. (세타는 시간감쇠, 베가는 변동성, 로는 금리.)"}},"AI-FIN-DERIV-05":{"ja":{"question":"プレーンバニラの金利スワップで、2当事者が交換するものは何か。","choices":{"A":"元本","B":"株式と負債","C":"想定元本の固定金利と変動金利","D":"通貨"},"explanation":"プレーンバニラ金利スワップは想定元本に対する固定金利と変動金利のキャッシュフローを交換（元本は交換しない）。固定/変動エクスポージャーの転換に使う。"},"ko":{"question":"플레인 바닐라 금리스왑에서 두 당사자가 교환하는 것은?","choices":{"A":"원금","B":"주식과 부채","C":"명목원금의 고정금리와 변동금리","D":"통화"},"explanation":"플레인 바닐라 금리스왑은 명목원금에 대한 고정금리와 변동금리 현금흐름을 교환(원금은 교환 안 함). 고정/변동 익스포저 전환에 사용."}},"AI-FIN-DERIV-06":{"ja":{"question":"1日・99%のVaRが100万ドルとは、何を意味するか。","choices":{"A":"ちょうど100万ドル損失する","B":"保証される最大損失が100万ドル","C":"日次利益が100万ドル","D":"100万ドル超の損失は約1%の日のみ"},"explanation":"VaRは統計的閾値：99%信頼水準で日次損失が100万ドルを超えるのは約100日に1日。損失を上限で抑えるものではない（テール損失はより大きくなりうる）。"},"ko":{"question":"1일·99% VaR가 100만 달러란 무엇을 의미하는가?","choices":{"A":"정확히 100만 달러 손실","B":"보장되는 최대 손실이 100만 달러","C":"일일 이익이 100만 달러","D":"100만 달러 초과 손실은 약 1%의 날만"},"explanation":"VaR는 통계적 임계값: 99% 신뢰수준에서 일일 손실이 100만 달러를 초과하는 것은 약 100일에 1일. 손실을 상한으로 막는 것이 아님(꼬리 손실은 더 클 수 있음)."}},"AI-FIN-DERIV-07":{"ja":{"question":"収穫前の価格下落を懸念する小麦農家のヘッジ方法は？","choices":{"A":"小麦先物を売る（ショートヘッジ）","B":"小麦先物を買う（ロングヘッジ）","C":"小麦のコール購入","D":"何もしない"},"explanation":"後で商品を売る生産者はショート（売り）先物ポジションを取る。ショートの利益が価格下落を相殺し売却価格を固定（ショートヘッジ）。"},"ko":{"question":"수확 전 가격 하락을 우려하는 밀 농부의 헤지 방법은?","choices":{"A":"밀 선물 매도(숏 헤지)","B":"밀 선물 매수(롱 헤지)","C":"밀 콜옵션 매수","D":"아무것도 안 함"},"explanation":"나중에 상품을 파는 생산자는 숏(매도) 선물 포지션을 취한다. 숏의 이익이 가격 하락을 상쇄해 판매가격을 고정(숏 헤지)."}},"AI-FIN-DERIV-08":{"ja":{"question":"クレジット・デフォルト・スワップ（CDS）が主に移転するものは何か。","choices":{"A":"金利リスク","B":"参照先の信用（デフォルト）リスク","C":"為替リスク","D":"株式リスク"},"explanation":"CDSはデフォルトに対する保険：プロテクション買い手が定期プレミアムを払い、参照先がクレジットイベントを起こすと売り手から補償を受ける。"},"ko":{"question":"신용부도스왑(CDS)이 주로 이전하는 것은?","choices":{"A":"금리위험","B":"참조기업의 신용(부도) 위험","C":"환위험","D":"주식위험"},"explanation":"CDS는 부도에 대한 보험: 보장 매입자가 정기 프리미엄을 내고, 참조기업이 신용사건을 일으키면 매도자로부터 보상을 받는다."}},"AI-FIN-DERIV-09":{"ja":{"question":"デリバティブの想定元本（notional）とは何か。","choices":{"A":"現在の公正（時価）価値","B":"支払プレミアム","C":"支払計算用の参照額（リスク額ではない）","D":"差し入れ証拠金"},"explanation":"想定元本はキャッシュフロー計算に用いる契約上の参照数量で、実際のエクスポージャー/時価は通常それよりはるかに小さい。"},"ko":{"question":"파생상품의 명목금액(notional)이란?","choices":{"A":"현재 공정(시장) 가치","B":"지불 프리미엄","C":"지급 계산용 참조액(위험액이 아님)","D":"예치 증거금"},"explanation":"명목금액은 현금흐름 계산에 쓰는 계약상 참조 수량으로, 실제 익스포저/시장가치는 보통 그보다 훨씬 작다."}},"AI-FIN-DERIV-10":{"ja":{"question":"プットコールパリティは、同一行使価格・満期の欧州型コールとプットの価格を、原資産と何に結びつけるか。","choices":{"A":"配当利回りのみ","B":"オプションのデルタ","C":"出来高","D":"行使価格の現在価値"},"explanation":"プットコールパリティ：Call − Put = Spot − PV(行使価格)。無裁定関係を強制し、ミスプライスはオプション・株式・債券間の無リスク裁定を意味する。"},"ko":{"question":"풋콜패리티는 동일 행사가·만기의 유럽형 콜과 풋의 가격을 기초자산과 무엇에 연결하는가?","choices":{"A":"배당수익률만","B":"옵션의 델타","C":"거래량","D":"행사가격의 현재가치"},"explanation":"풋콜패리티: Call − Put = Spot − PV(행사가). 무차익 관계를 강제하며, 가격 불일치는 옵션·주식·채권 간 무위험 차익을 의미한다."}},"AI-FIN-STRAT-01":{"ja":{"question":"ポーターのファイブフォースのうち、業界競争を形づくる1つはどれか。","choices":{"A":"新規参入の脅威","B":"従業員の士気","C":"税制","D":"ブランドカラー"},"explanation":"ポーターのファイブフォース：新規参入の脅威、供給業者の交渉力、買い手の交渉力、代替品の脅威、既存企業間の競合。"},"ko":{"question":"포터의 5 Forces 중 산업 경쟁을 형성하는 하나는?","choices":{"A":"신규 진입 위협","B":"직원 사기","C":"조세정책","D":"브랜드 색상"},"explanation":"포터의 5 Forces: 신규 진입 위협, 공급자 교섭력, 구매자 교섭력, 대체재 위협, 기존 기업 간 경쟁."}},"AI-FIN-STRAT-02":{"ja":{"question":"SWOT分析で「機会」と「脅威」は何を指すか。","choices":{"A":"内部要因","B":"外部（環境）要因","C":"財務比率","D":"過去実績のみ"},"explanation":"SWOTは内部要因（強み・弱み）と外部要因（市場/環境から生じる機会・脅威）を分ける。"},"ko":{"question":"SWOT 분석에서 '기회'와 '위협'은 무엇을 가리키는가?","choices":{"A":"내부요인","B":"외부(환경) 요인","C":"재무비율","D":"과거 실적만"},"explanation":"SWOT은 내부요인(강점·약점)과 외부요인(시장/환경에서 발생하는 기회·위협)을 구분한다."}},"AI-FIN-STRAT-03":{"ja":{"question":"BCG成長シェアマトリックスで、低成長市場の高シェア事業は何か。","choices":{"A":"スター","B":"問題児","C":"キャッシュカウ","D":"負け犬"},"explanation":"キャッシュカウ（高シェア・低成長）は再投資が少なく安定的に現金を生む。スターは高/高、問題児は低シェア/高成長、負け犬は低/低。"},"ko":{"question":"BCG 성장-점유율 매트릭스에서 저성장 시장의 고점유 사업은?","choices":{"A":"스타","B":"물음표","C":"캐시카우","D":"개"},"explanation":"캐시카우(고점유·저성장)는 재투자가 적고 안정적으로 현금을 창출. 스타는 고/고, 물음표는 저점유/고성장, 개는 저/저."}},"AI-FIN-STRAT-04":{"ja":{"question":"ポーターの競争優位の2つの基本源泉は、コストリーダーシップと何か。","choices":{"A":"多角化","B":"アウトソーシング","C":"垂直統合","D":"差別化"},"explanation":"ポーターの基本戦略はコストリーダーシップと差別化（各々を広範または集中/ニッチで追求）。一つに専念し「中途半端」を避けるべき。"},"ko":{"question":"포터의 경쟁우위 두 가지 기본 원천은 원가우위와 무엇인가?","choices":{"A":"다각화","B":"아웃소싱","C":"수직통합","D":"차별화"},"explanation":"포터의 본원적 전략은 원가우위와 차별화(각각 광범위 또는 집중/틈새로 추구). 하나에 전념해 '어중간함'을 피해야 한다."}},"AI-FIN-STRAT-05":{"ja":{"question":"ポーターのバリューチェーンは、主活動を何と区別するか。","choices":{"A":"支援活動（人事・技術・調達等）","B":"違法活動","C":"海外活動","D":"現金活動"},"explanation":"バリューチェーンは主活動（購買物流・製造・出荷物流・マーケ販売・サービス）を支援活動（全般管理・人事・技術・調達）と区別する。"},"ko":{"question":"포터의 가치사슬은 주활동을 무엇과 구분하는가?","choices":{"A":"지원활동(인사·기술·조달 등)","B":"불법활동","C":"해외활동","D":"현금활동"},"explanation":"가치사슬은 주활동(구매물류·제조·출하물류·마케팅판매·서비스)을 지원활동(전반관리·인사·기술·조달)과 구분한다."}},"AI-FIN-STRAT-06":{"ja":{"question":"規模の経済が生じるのはどんなときか。","choices":{"A":"総コストがゼロ","B":"生産増で単位当たり平均コストが下がる","C":"価格が常に上がる","D":"需要が非弾力的"},"explanation":"規模の経済は生産量増加とともに平均（単位当たり）コストが下がること。固定費の分散や運営効率による。コストリーダーシップの基盤。"},"ko":{"question":"규모의 경제가 발생하는 것은 언제인가?","choices":{"A":"총비용이 0","B":"생산 증가로 단위당 평균비용이 하락","C":"가격이 항상 상승","D":"수요가 비탄력적"},"explanation":"규모의 경제는 생산량 증가와 함께 평균(단위당) 비용이 하락하는 것. 고정비 분산·운영 효율에 의함. 원가우위의 기반."}},"AI-FIN-STRAT-07":{"ja":{"question":"（コンサルの問題解決で使う）MECEの原則とは、分解がどうあるべきという意味か。","choices":{"A":"最大限効率的","B":"完全にコンピュータで作成","C":"相互排他的かつ全体網羅的","D":"四半期ごとに測定"},"explanation":"MECEは課題を重複なく（相互排他的）かつ全体を網羅（漏れなく）するバケツに構造化し、二重計上と漏れを避ける。"},"ko":{"question":"(컨설팅 문제해결에 쓰는) MECE 원칙은 분해가 어때야 한다는 뜻인가?","choices":{"A":"최대한 효율적","B":"전적으로 컴퓨터로 작성","C":"상호배타적이고 전체 망라적","D":"분기마다 측정"},"explanation":"MECE는 과제를 중복 없이(상호배타적) 그리고 전체를 망라(누락 없이)하는 버킷으로 구조화해 중복 계산과 누락을 피한다."}},"AI-FIN-STRAT-08":{"ja":{"question":"ブルーオーシャン戦略が企業に勧めるのは何か。","choices":{"A":"価格で正面競争","B":"常に市場リーダーに追随","C":"革新を避ける","D":"混雑市場で戦わず未開拓の市場空間を創造"},"explanation":"ブルーオーシャン戦略は、混雑した市場（レッドオーシャン）で戦うより、新たな需要を生む未開拓の市場空間を創造し競争を無意味化することを目指す。"},"ko":{"question":"블루오션 전략이 기업에 권하는 것은?","choices":{"A":"가격으로 정면 경쟁","B":"항상 시장 리더를 추종","C":"혁신을 피함","D":"혼잡한 시장에서 싸우지 않고 미개척 시장공간을 창출"},"explanation":"블루오션 전략은 혼잡한 시장(레드오션)에서 싸우기보다 새로운 수요를 창출하는 미개척 시장공간을 만들어 경쟁을 무의미하게 만드는 것을 지향."}},"AI-FIN-STRAT-09":{"ja":{"question":"「コアコンピタンス」（プラハラード＆ハメル）とは、どんな能力か。","choices":{"A":"価値があり模倣困難で多市場アクセスを提供","B":"競合に容易に模倣される","C":"コストのみ","D":"単一製品"},"explanation":"コアコンピタンスは、模倣困難な技能/技術の束で、顧客価値を生み多様な市場へのアクセスを開く＝持続的な競争優位の源泉。"},"ko":{"question":"'핵심역량'(프라할라드＆하멜)은 어떤 역량인가?","choices":{"A":"가치 있고 모방 어려우며 다수 시장 접근 제공","B":"경쟁사가 쉽게 모방","C":"원가만","D":"단일 제품"},"explanation":"핵심역량은 모방하기 어려운 기술/기능의 묶음으로, 고객가치를 창출하고 다양한 시장 접근을 여는＝지속적 경쟁우위의 원천."}},"AI-FIN-STRAT-10":{"ja":{"question":"先行者（ファーストムーバー）の潜在的な「不利」点は何か。","choices":{"A":"ブランド認知","B":"後発が利用する市場教育コストの負担","C":"ネットワーク効果","D":"学習曲線の便益"},"explanation":"先行者はブランド・規模・学習の優位を得られるが、R&Dや市場教育のコスト・技術リスクを負い、後発（ファストフォロワー）がそれにただ乗りできる。"},"ko":{"question":"선발주자(first mover)의 잠재적 '불리'한 점은?","choices":{"A":"브랜드 인지","B":"후발이 이용하는 시장교육 비용 부담","C":"네트워크 효과","D":"학습곡선 효익"},"explanation":"선발주자는 브랜드·규모·학습 우위를 얻을 수 있으나 R&D·시장교육 비용·기술위험을 부담하고, 후발(패스트팔로워)이 그것에 무임승차할 수 있다."}},"AI-PAT-01":{"ko":{"question":"회사의 시장가치 자본구조는 주식자본 $4,000,000 (자기자본비용 12%)과 부채 $6,000,000 (세전 비용 8%, 세율 25%)으로 구성되어 있습니다. 가중평균자본비용(WACC)은?","choices":{"A":"8.4%","B":"9.6%","C":"10.0%","D":"6.0%"},"explanation":"**A**가 정답입니다. WACC는 시장가치 가중치와 세후 부채비용을 사용합니다: (0.4 x 12%) + (0.6 x 8% x (1 - 0.25)) = 4.8% + 3.6% = **8.4%**.\n- **B (9.6%)**는 함정입니다: 세전 8%를 사용하고 법인세 절감효과를 간과합니다.\n- **C**는 동등한(50/50) 가중치를 사용합니다; **D**는 자기자본을 완전히 무시합니다."},"ja":{"question":"企業の市場価値ベースの資本構成は、株式資本$4,000,000（株主資本コスト12%）と負債$6,000,000（税引前コスト8%、税率25%）です。加重平均資本コスト(WACC)はいくらですか？","choices":{"A":"8.4%","B":"9.6%","C":"10.0%","D":"6.0%"},"explanation":"**A**が正解です。WACCは市場価値ウェイトと税引後負債コストを使用します：(0.4 x 12%) + (0.6 x 8% x (1 - 0.25)) = 4.8% + 3.6% = **8.4%**。\n- **B (9.6%)**はトラップです：税引前8%を使用し、節税効果を忘れています。\n- **C**は同等の(50/50)ウェイトを使用します；**D**は株式資本を完全に無視します。"}},"AI-PAT-02":{"ko":{"question":"표준가격은 파운드당 $5.00입니다. 회기 중 회사는 파운드당 $5.50에 10,000파운드를 구매하였고, 9,000파운드를 사용하였습니다 (표준 수량은 8,500파운드였습니다). 직접재료 가격차이는?","choices":{"A":"$4,500 불리","B":"$5,000 불리","C":"$2,500 불리","D":"$5,000 유리"},"explanation":"**B**가 정답입니다. 재료 가격차이는 실제 구입수량을 사용합니다: (실제가격 - 표준가격) x 실제 구입수량 = ($5.50 - $5.00) x 10,000 = **$5,000 불리**.\n- **A**는 함정입니다: 사용수량(9,000)을 사용합니다 — 이 기수는 수량차이에 속하며, 가격차이가 아닙니다.\n- **D**는 부호가 잘못되었습니다 (실제가격이 표준을 초과 = 불리)."},"ja":{"question":"標準価格は1ポンドあたり$5.00です。当期中に企業は1ポンドあたり$5.50で10,000ポンドを購入し、9,000ポンドを使用しました（標準数量は8,500ポンドでした）。直接材料価格差異は？","choices":{"A":"$4,500 不利","B":"$5,000 不利","C":"$2,500 不利","D":"$5,000 有利"},"explanation":"**B**が正解です。材料価格差異は実際購入数量を使用します：(実際価格 - 標準価格) x 実際購入数量 = ($5.50 - $5.00) x 10,000 = **$5,000 不利**。\n- **A**はトラップです：使用数量(9,000)を使用します — このベースは数量差異に属し、価格差異ではありません。\n- **D**は符号が間違っています（実際価格が標準を超過 = 不利）。"}},"AI-PAT-03":{"ko":{"question":"親会社が子会社의 80%를 $500,000에 인수합니다. 비지배지분의 공정가치는 $120,000이고, 식별가능 순자산의 공정가치는 $560,000입니다. 전면(인수) 방법에 따르면 영업권은:","choices":{"A":"$0 (염가매수)","B":"$52,000","C":"$60,000","D":"$40,000"},"explanation":"**C**가 정답입니다. 전면 영업권 = (대가 $500,000 + 비지배지분의 공정가치 $120,000) - 식별가능 순자산의 공정가치 $560,000 = **$60,000**.\n- **B ($52,000)**는 함정입니다: 비례법을 사용합니다 ($500,000 - 80% x $560,000), 이는 미국 GAAP의 기본값이 아닙니다.\n- **A**는 대가만 전체 순자산으로 차감하는 것을 잘못 계산합니다."},"ja":{"question":"親会社が子会社の80%を$500,000で買収します。非支配持分の公正価値は$120,000、識別可能純資産の公正価値は$560,000です。完全(買収)法に基づき、のれんは：","choices":{"A":"$0（割安購入）","B":"$52,000","C":"$60,000","D":"$40,000"},"explanation":"**C**が正解です。完全のれん=（対価$500,000＋非支配持分の公正価値$120,000）－識別可能純資産の公正価値$560,000＝**$60,000**。\n- **B ($52,000)**はトラップです：比例法を使用します（$500,000－80% x $560,000）、これはUS GAAPのデフォルトではありません。\n- **A**は対価のみを全純資産から差し引くことを誤ります。"}},"AI-PAT-04":{"ko":{"question":"연말에 세무감가상각이 장부감가상각을 $80,000 초과했고, 이 차이는 향후 년도에 역전될 것입니다. 제정 미래 세율은 21%입니다. 이것은 다음을 발생시킵니다:","choices":{"A":"$16,800의 이연법인세자산","B":"$80,000의 이연법인세자산","C":"$80,000의 이연법인세부채","D":"$16,800의 이연법인세부채"},"explanation":"**D**가 정답입니다. 초과 세무감가상각은 가산할 일시적차이(향후 과세대상 금액) → 이연법인세부채 = $80,000 x 21% = **$16,800**, 제정세율로 측정됩니다.\n- **A**는 방향이 틀렸습니다 (부채이지, 자산이 아닙니다).\n- **C**는 차이에 세율을 적용하지 않습니다."},"ja":{"question":"年末時点で、税務減価償却が帳簿減価償却を$80,000超過しており、この差異は将来年度に逆転します。制定された将来の税率は21%です。これは以下を生じます：","choices":{"A":"$16,800の繰延税金資産","B":"$80,000の繰延税金資産","C":"$80,000の繰延税金負債","D":"$16,800の繰延税金負債"},"explanation":"**D**が正解です。超過税務減価償却は将来加算一時差異（将来の加算課税額）→ 繰延税金負債 = $80,000 x 21% = **$16,800**、法定税率で測定。\n- **A**は方向が間違っています（負債であり、資産ではありません）。\n- **C**は差異に税率を適用していません。"}},"AI-PAT-05":{"ko":{"question":"액면가 $1,000,000, 연간 표시이자율 6%인 채권이 할인발행되었으며, 연초 장부금액은 $940,000입니다. 시장(유효)이자율은 8%입니다. 유효이자율법에 따른 당기 이자비용은:","choices":{"A":"$75,200","B":"$60,000","C":"$80,000","D":"$56,400"},"explanation":"**A**가 정답입니다. 유효이자율법 이자비용 = 장부금액 x 시장이자율 = $940,000 x 8% = **$75,200**.\n- **B ($60,000)**는 함정입니다: 이것은 현금 표시이자입니다 (액면가 x 표시이자율) = 지급이자이지, 비용이 아닙니다.\n- **C**는 액면가 x 시장이자율을 사용합니다; **D**는 장부금액 x 표시이자율을 사용합니다."},"ja":{"question":"額面$1,000,000、年間表面利率6%の社債が割引発行され、当期首の帳簿価額は$940,000です。市場(実効)利率は8%です。実効金利法に基づく当期の支払利息は:","choices":{"A":"$75,200","B":"$60,000","C":"$80,000","D":"$56,400"},"explanation":"**A**が正解です。実効金利法の支払利息 = 帳簿価額 x 市場利率 = $940,000 x 8% = **$75,200**。\n- **B ($60,000)**はトラップです：これはクーポン支払い（額面 x 表面利率）= 支払利息であり、支払利息ではありません。\n- **C**は額面 x 市場利率を使用します；**D**は帳簿価額 x クーポンを使用します。"}},"AI-PAT-06":{"ko":{"question":"장비가 1월 1일에 구매되었고, 3월 1일에 설치되어 의도된 용도로 사용가능하게 되었으며, 4월 1일에 생산에 처음 사용되었습니다. 감가상각은 다음 날부터 시작되어야 합니다:","choices":{"A":"1월 1일 (구매일)","B":"3월 1일 (사용가능 시점)","C":"4월 1일 (처음 실제 사용일)","D":"다음 회계년도의 첫 날"},"explanation":"**B**가 정답입니다. 감가상각은 자산이 사용가능 시점 — 의도된 용도로 사용가능 시점(3월 1일) — 에 시작되며, 구매일이나 처음 실제 사용일과 상관없습니다.\n- **C**는 함정입니다: 실제 생산 사용(4월 1일)을 대기합니다.\n- **A**는 자산이 준비되기 전인 구매일부터 시작합니다."},"ja":{"question":"機器は1月1日に購入され、3月1日にインストールされて意図した用途に利用可能になり、4月1日に生産で最初に使用されました。減価償却は以下の日から開始されるべきです：","choices":{"A":"1月1日（購入日）","B":"3月1日（使用可能時）","C":"4月1日（最初の実際の使用日）","D":"次会計年度の最初の日"},"explanation":"**B**が正解です。減価償却は資産が使用可能時点 — 意図した用途に利用可能となる時点（3月1日） — で開始され、購入日または最初の実際の使用日とは関係なく開始されます。\n- **C**はトラップです：実際の生産使用（4月1日）を待ちます。\n- **A**は資産が準備される前の購入日から開始します。"}},"AI-PAT-07":{"ko":{"question":"매출채권의 연령분석은 필요한 대손충당금이 $20,000임을 나타냅니다. 조정 전에 대손충당금은 $6,000의 대변 잔액을 가집니다. 당기 대손상각비는:","choices":{"A":"$20,000","B":"$26,000","C":"$14,000","D":"$6,000"},"explanation":"**C**가 정답입니다. 연령분석법은 최종 대손충당금 잔액을 추정하므로, 대손상각비 = 필요 잔액 - 기존 대변 잔액 = $20,000 - $6,000 = **$14,000**.\n- **A ($20,000)**는 함정입니다: 전체 목표를 비용으로 기록하는 것은 매출액 비율법을 반영하며, 연령분석법이 아닙니다.\n- **B**는 잘못하여 기존 잔액을 더합니다."},"ja":{"question":"売掛金の年齢調べは、必要な貸倒引当金が$20,000であることを示します。調整前に、貸倒引当金は$6,000の貸方残高があります。当期の貸倒償却費は：","choices":{"A":"$20,000","B":"$26,000","C":"$14,000","D":"$6,000"},"explanation":"**C**が正解です。年齢調べ法は最終的な貸倒引当金残高を推定するため、貸倒償却費 = 必要残高 - 既存貸方残高 = $20,000 - $6,000 = **$14,000**。\n- **A ($20,000)**はトラップです：ターゲット全体を費用として記録することは、売上高比率法を反映しており、年齢調べ法ではありません。\n- **B**は誤って既存の残高を足します。"}},"AI-PAT-08":{"ko":{"question":"회사가 10,000단위를 생산하고 8,000단위를 판매했다. 고정제조간접원가는 $50,000이었다. 기간에 대해 전부원가계산과 변동원가계산을 비교할 때:","choices":{"A":"두 방법 모두에서 이익이 동일하다","B":"변동원가계산 이익이 $10,000 더 높다","C":"전부원가계산 이익이 $40,000 더 높다","D":"전부원가계산 이익이 $10,000 더 높다"},"explanation":"**D**가 정답이다. 생산(10,000)이 판매(8,000)를 초과할 때, 2,000단위의 고정간접원가($50,000 / 10,000 = $5/단위)가 전부원가계산 아래의 기말재고에 이연된다 -> 전부원가계산 이익이 2,000 x $5 = **$10,000 더 높다**.\n- **B**는 함정이다 (금액은 맞으나 방향이 반대).\n- **C**는 모든 고정간접원가를 적용하지만 재고의 단위만 적용해야 한다."},"ja":{"question":"会社が10,000単位を生産し、8,000単位を販売した。固定製造間接費は$50,000であった。期間について全部原価計算と直接原価計算を比較するとき:","choices":{"A":"両方法で利益は同じである","B":"直接原価計算利益が$10,000高い","C":"全部原価計算利益が$40,000高い","D":"全部原価計算利益が$10,000高い"},"explanation":"**D**が正解である。生産(10,000)が販売(8,000)を上回る場合、2,000単位の固定間接費($50,000 / 10,000 = $5/単位)は全部原価計算のもとで期末棚卸資産に繰り延べられる -> 全部原価計算利益は2,000 x $5 = **$10,000高い**。\n- **B**は罠である(金額は正しいが方向が逆)。\n- **C**はすべての固定間接費を適用するが、棚卸資産の単位だけ適用する必要がある。"}},"AI-PAT-09":{"ko":{"question":"정부기금의 총 기금잔액을 정부 전체 수준의 순자산 진술서와 조정할 때, 어떤 조정이 이루어지는가?","choices":{"A":"자본자산(순)을 더하고 장기부채를 뺀다","B":"자본자산을 빼고 장기부채를 더한다","C":"조정이 필요 없다","D":"자본자산과 장기부채를 모두 더한다"},"explanation":"**A**가 정답이다. 정부기금은 현재 재정자원에 중점을 두고(수정발생주의) 자본자산과 장기부채를 제외한다. 정부 전체 수준의 순자산에 도달하려면 감가상각 차감 후 자본자산을 더하고(자본+) 장기부채를 뺀다('CPAS RIDES' 방향).\n- **B**는 부호를 반대로 한다(전형적인 함정)."},"ja":{"question":"政府基金の総基金残高を政府全体の純資産ステートメントと調整するとき、どの調整が行われるか?","choices":{"A":"資本資産(純)を加え、長期負債を減ずる","B":"資本資産を減じ、長期負債を加える","C":"調整は不要である","D":"資本資産と長期負債の両方を加える"},"explanation":"**A**が正解である。政府基金は現在の財政リソースに焦点を当て(修正発生主義)、資本資産と長期負債を除外する。政府全体の純資産に到達するには、減価償却差引後の資本資産を加え(資本+)、長期負債を減じる('CPAS RIDES'方向)。\n- **B**は符号を逆にする(典型的な罠)。"}},"AI-PAT-10":{"ko":{"question":"財(Good) X와 財 Y 사이의 교차가격탄력성이 +1.8이다. 財 X와 財 Y는:","choices":{"A":"보완재이다","B":"대체재이다","C":"무관련 재화이다","D":"열등재이다"},"explanation":"**B**가 정답이다. 양의 교차가격탄력성은 한 재화의 가격이 오르면 다른 재화의 수요가 올라간다는 뜻이다 -> 재화들은 **대체재**이다.\n- **A**는 함정이다: 보완재는 음의 교차탄력성을 갖는다.\n- **D**는 교차탄력성을 소득탄력성과 혼동한다."},"ja":{"question":"財X と財Y間の交差弾力性が+1.8である。財Xと財Yは:","choices":{"A":"補完財である","B":"代替財である","C":"無関係財である","D":"劣等財である"},"explanation":"**B**が正解である。正の交差弾力性は、一方の財の価格上昇がもう一方の財の需要を増加させることを意味する -> 財は**代替財**である。\n- **A**は罠である:補完財は負の交差弾力性をもつ。\n- **D**は交差弾力性と所得弾力性を混同している。"}},"AI-PAT-11":{"ko":{"question":"제품의 소득탄력성이 -0.5이다. 제품은 다음과 같이 가장 잘 설명된다:","choices":{"A":"정상재","B":"사치재","C":"열등재","D":"완전 탄력적 재화"},"explanation":"**C**가 정답이다. 음의 소득탄력성은 소득이 올라가면 수요가 떨어진다는 뜻이다 -> **열등재**이다.\n- **A**는 함정이다: 정상재는 양의 소득탄력성을 갖는다 (사치재는 > 1)."},"ja":{"question":"製品の所得弾力性が-0.5である。製品は次のように最適に説明される:","choices":{"A":"正常財","B":"奢侈財","C":"劣等財","D":"完全弾力的財"},"explanation":"**C**が正解である。負の所得弾力性は、所得が増加すると需要が低下することを意味する -> **劣等財**である。\n- **A**は罠である:正常財は正の所得弾力性をもつ(奢侈財は> 1)。"}},"AI-PAT-12":{"ko":{"question":"고저점법을 사용하면: 10,000단위에서 총원가는 $50,000; 4,000단위에서 총원가는 $26,000이다. 단위당 변동원가는:","choices":{"A":"$5.00","B":"$6.50","C":"$3.00","D":"$4.00"},"explanation":"**D**가 정답이다. 단위당 변동원가 = (최고 조업도에서 원가 - 최저 조업도에서 원가) / (최고 단위 - 최저 단위) = ($50,000 - $26,000) / (10,000 - 4,000) = **$4.00**.\n- 함정은 원가로 고저점을 선택하는 것이 아니라 조업도 수준으로 선택하는 것이다."},"ja":{"question":"高低点法を使用する場合:10,000単位では総原価は$50,000;4,000単位では総原価は$26,000である。単位当たり変動費は:","choices":{"A":"$5.00","B":"$6.50","C":"$3.00","D":"$4.00"},"explanation":"**D**が正解である。単位当たり変動費 = (最高操業度での原価 - 最低操業度での原価) / (最高単位 - 最低単位) = ($50,000 - $26,000) / (10,000 - 4,000) = **$4.00**。\n- 罠は操業度レベルではなく原価で高低点を選ぶことである。"}},"AI-PAT-13":{"ko":{"question":"사업부문은 수익이 합계의 8%이고, 식별가능 자산이 합계의 12%이며, 이익이 합계의 5%이다. 보고부문인가?","choices":{"A":"예 — 10% 자산 테스트를 충족한다","B":"아니오 — 수익이 10% 미만이다","C":"아니오 — 사업부문은 3가지 10% 테스트를 모두 충족해야 한다","D":"예 — 하지만 이익 테스트 때문일 뿐이다"},"explanation":"**A**가 정답이다. 사업부문은 3가지 10% 임계값 중 **하나라도** 충족하면 보고부문이다 (수익, 절대이익 또는 손실, 또는 자산). 자산이 12% >= 10%이므로 적격이다.\n- **C**는 함정이다: 3가지 테스트를 모두 충족해야 한다는 것이 잘못된 해석이다.\n- **B**는 수익만 본다."},"ja":{"question":"営業セグメントは、収益が合計の8%、識別可能資産が合計の12%、利益が合計の5%に等しい。報告セグメントか?","choices":{"A":"はい — 10%資産テストを満たしている","B":"いいえ — その収益は10%未満である","C":"いいえ — セグメントは3つの10%テストをすべて満たす必要がある","D":"はい — ただし利益テストのためだけである"},"explanation":"**A**が正解である。セグメントは3つの10%閾値中**いずれか1つ**を満たす場合、報告セグメントである(収益、絶対利益または損失、または資産)。資産が12% >= 10%なので適格である。\n- **C**は罠である:3つのテストをすべて満たす必要があるという誤った解釈。\n- **B**は収益のみを見ている。"}},"AI-PAT-14":{"ko":{"question":"親会社が 10 月 1 日に子会社の 75% を取得した。子会社は年間を通じて均等に $200,000 の純利益を得た。当期의 비지배지분은:","choices":{"A":"$50,000","B":"$12,500","C":"$37,500","D":"$150,000"},"explanation":"**B**가 정답이다. 연결된 이익은 취득 후 이익만 포함된다. 비지배지분 = 25% x ($200,000 x 3/12) = 25% x $50,000 = **$12,500**.\n- **A ($50,000)**는 함정이다: 연중 취득 날짜를 무시하고 전체 연도에 25%를 적용한다.\n- **D**는 친회사의 75% 지분을 사용한다."},"ja":{"question":"親会社が10月1日に子会社の75%を取得した。子会社は年間を通じて均等に$200,000の純利益を得た。当期の非支配持分は:","choices":{"A":"$50,000","B":"$12,500","C":"$37,500","D":"$150,000"},"explanation":"**B**が正解である。連結された利益は取得後利益のみを含む。NCI = 25% x ($200,000 x 3/12) = 25% x $50,000 = **$12,500**。\n- **A ($50,000)**は罠である:年中取得日を無視して、通年に25%を適用している。\n- **D**は親会社の75%の持分を使用している。"}},"AI-PAT-15":{"ko":{"question":"리스제공자가 리스를 운용리스로 분류합니다. 리스제공자는 리스수익을 어떻게 인식하나요?","choices":{"A":"계약개시일에 판매이익을 인식하고 기간 중 이자수익을 인식","B":"유효이자법을 사용하여 이자수익만 인식","C":"리스기간 동안 정액 기준으로 리스수익을 인식","D":"리스기간 종료 시 모든 수익을 인식"},"explanation":"**C**가 정답입니다. 운용리스의 경우 리스제공자는 자산을 자신의 장부에 유지하고 기간 중 정액 기준으로 리스수익을 인식합니다.\n- **A**는 함정입니다: 계약개시일의 판매이익 플러스 이자는 판매형(금융)리스의 처리 방식입니다."},"ja":{"question":"貸手がリースをオペレーティングリースに分類します。貸手はリース収益をどのように認識していますか？","choices":{"A":"契約開始日に販売利益を認識し、期間中に利息収益を認識","B":"有効利息法を使用して、利息収益のみを認識","C":"リース期間を通じて定額ベースでリース収益を認識","D":"リース期間終了時にすべての収益を認識"},"explanation":"**C**が正解です。オペレーティングリースの場合、貸手は資産を自らの帳簿に保持し、期間を通じて定額ベースでリース収益を認識します。\n- **A**は罠です：契約開始日の販売利益プラス利息は販売型（金融）リースの処理方法です。"}},"AI-PAT-16":{"ko":{"question":"기업이 고객에게 판매할 목적으로 개발 중인 소프트웨어의 경우, 기술적 실현가능성이 확립된 후에 발생한 비용은:","choices":{"A":"연구개발(R&D)로 비용처리","B":"모든 경우에 발생할 때 비용처리","C":"프로젝트 시작부터 자본화","D":"자본화"},"explanation":"**D**가 정답입니다. 판매목적 소프트웨어의 경우, 기술적 실현가능성 확립 전 비용은 R&D로 비용처리되고, 실현가능성 확립 후 비용은 자본화됩니다(그 후 상각되며, 상각되지 않은 원가와 순실현가능가치 중 낮은 금액으로 계상).\n- **A**는 함정입니다: 기술적 실현가능성 후의 비용을 R&D로 비용처리합니다.\n- **C**는 프로젝트 시작부터 잘못되게 자본화합니다."},"ja":{"question":"顧客に販売する目的で開発している企業のソフトウェアについて、技術的実現可能性が確立された後に発生した費用は：","choices":{"A":"研究開発として支出計上","B":"すべての場合において発生時に支出計上","C":"プロジェクト開始から資産計上","D":"資産計上"},"explanation":"**D**が正解です。販売目的ソフトウェアについて、技術的実現可能性確立前の費用は研究開発として支出計上され、実現可能性確立後の費用は資産計上されます（その後償却され、償却後簿価と正味実現可能価額の低い方で表示）。\n- **A**は罠です：技術的実現可能性後の費用を研究開発として支出計上します。\n- **C**はプロジェクト開始から誤って資産計上します。"}},"AI-PAT-17":{"ko":{"question":"고정비는 $100,000이고 단위당 공헌이익은 $20입니다. 기업은 세후 목표이익 $30,000을 원하고, 세율은 25%입니다. 판매되어야 할 단위는:","choices":{"A":"7,000","B":"6,500","C":"5,000","D":"8,000"},"explanation":"**A**가 정답입니다. 세후 목표이익을 세전 목표로 환산합니다: $30,000 / (1 - 0.25) = $40,000. 단위 = (고정비 $100,000 + 세전 목표 $40,000) / $20 = **7,000**.\n- **B (6,500)**는 함정입니다: 세전 환산 없이 세후 $30,000을 직접 대입합니다."},"ja":{"question":"固定費は$100,000で、単位当たり貢献利益は$20です。企業は税引後目標利益$30,000を望み、税率は25%です。販売されるべき単位数は：","choices":{"A":"7,000","B":"6,500","C":"5,000","D":"8,000"},"explanation":"**A**が正解です。税引後目標利益を税引前目標に換算します：$30,000 / (1 - 0.25) = $40,000。単位数 = (固定費$100,000 + 税引前目標$40,000) / $20 = **7,000**。\n- **B (6,500)**は罠です：換算なしで税引後$30,000を直接代入します。"}},"AI-PAT-18":{"ko":{"question":"관리자의 이익을 최대화하기 위해 취해야 할 구체적인 조치를 권장하는 모델은 어떤 유형의 데이터 분석의 예입니까?","choices":{"A":"예측적 분석","B":"처방적 분석","C":"진단적 분석","D":"기술적 분석"},"explanation":"**B**가 정답입니다. 처방적 분석은 무엇을 할지(최적 조치)를 권장합니다.\n- **A**는 함정입니다: 예측적 분석은 무엇이 일어날지만 예측합니다. 기술적은 무엇이 일어났는지 보고하고, 진단적은 왜 일어났는지 설명합니다."},"ja":{"question":"マネージャーが利益を最大化するために取るべき具体的な行動を推奨するモデルは、どのタイプのデータ分析の例ですか？","choices":{"A":"予測的分析","B":"処方的分析","C":"診断的分析","D":"記述的分析"},"explanation":"**B**が正解です。処方的分析は何をするべきか（最適な行動）を推奨します。\n- **A**は罠です：予測的分析は何が起こるかだけを予測します。記述的は何が起こったかを報告し、診断的は なぜ起こったかを説明します。"}},"AI-PAT-19":{"ko":{"question":"적격 공정가치위험회피에서 헤징 파생상품의 정기적 공정가치 변화는 다음 항목에 보고됩니다:","choices":{"A":"기타포괄손익(OCI)","B":"결제까지 지분의 별도 구성요소","C":"당기손익(손익계산서)","D":"대차대조표의 이연 계정"},"explanation":"**C**가 정답입니다. 공정가치위험회피에서는 파생상품의 손익과 헤징된 항목의 상쇄 변화가 모두 당기손익으로 흐릅니다.\n- **A**는 함정입니다: OCI는 현금흐름위험회피의 유효 부분이 보고되는 곳입니다."},"ja":{"question":"適格公正価値ヘッジにおいて、ヘッジ派生商品の定期的な公正価値の変化は以下に報告されます：","choices":{"A":"その他の包括利益(OCI)","B":"決済まで資本の別の構成要素として","C":"当期損益（利益又は損失）","D":"貸借対照表の繰延勘定"},"explanation":"**C**が正解です。公正価値ヘッジでは、派生商品の利益または損失とヘッジされた項目の相殺変化の両方が当期損益に流入します。\n- **A**は罠です：OCIはキャッシュフローヘッジの有効部分が報告される場所です。"}},"AI-PAT-20":{"ko":{"question":"부모 회사가 자회사의 미결제 사채를 외부 투자자들로부터 부모 회사의 사채 장부금액과 다른 가격으로 매입합니다. 연결재무제표에서 그 차이는:","choices":{"A":"영업권에 추가","B":"만기까지 이연 및 상각","C":"사채가 만기될 때까지 무시","D":"실질적 상환에 대한 즉시 이익 또는 손실로 인식"},"explanation":"**D**가 정답입니다. 계열사 채무 획득은 실질적 상환이고, 매입 가격과 장부금액의 차이는 연결 손익에서 즉시 인식됩니다.\n- **B**는 함정입니다: 이연/상각은 미실현 내부거래 재고 이익의 처리이며, 내부거래 사채의 처리가 아닙니다."},"ja":{"question":"親会社が子会社の発行済み社債を外部投資家から社債の簿価と異なる価格で購入します。連結財務諸表では、その差は：","choices":{"A":"のれんに追加される","B":"満期まで繰延および償却される","C":"社債が満期になるまで無視される","D":"実質的償還に対する利益または損失として直ちに認識される"},"explanation":"**D**が正解です。関連会社債務の取得は実質的償還であり、購入価格と簿価の差は連結損益で直ちに認識されます。\n- **B**は罠です：繰延および償却は未実現連結会社間在庫利益の処理であり、連結会社間社債の処理ではありません。"}},"AI-PAT-21":{"ko":{"question":"GASB에 따라 '이연유출자원'은 어디에 보고되나요?","choices":{"A":"순자산표의 자산 후의 별도 섹션","B":"활동표의 비용으로","C":"순자산표의 부채로","D":"별도 라인 없이 순자산을 직접 감소"},"explanation":"**A**가 정답입니다. 이연유출자원은 순자산표(대차대조표)의 자신의 섹션, 즉 자산 바로 다음에 보고됩니다.\n- **B**는 함정입니다: 운영 계산서(활동표)에 배치합니다.\n- **C**는 이를 부채로 잘못 분류합니다."},"ja":{"question":"GASBに基づいて、「繰延流出資源」はどこに報告されますか？","choices":{"A":"純資産計算書（貸借対照表）の資産後の別セクション","B":"活動計算書の支出として","C":"純資産計算書の負債として","D":"別行がなく純資産を直接減少"},"explanation":"**A**が正解です。繰延流出資源は純資産計算書（貸借対照表）の独自セクション、つまり資産の直後に報告されます。\n- **B**は罠です：営業計算書（活動計算書）に配置します。\n- **C**はこれを負債として誤分類します。"}},"AI-PAT-22":{"ko":{"question":"정부의 경우, 재산세는 어떤 유형의 수익이며, 수정발생주의 하에서 언제 수익을 인식하는가?","choices":{"A":"교환수익, 현금이 수령될 때 인식","B":"부과형 비교환수익, 세금이 부과된 기간에 인식(측정가능하고 가용한 경우)","C":"파생형 세수익, 기초 판매가 발생할 때 인식","D":"자발적 비교환수익, 적격성 요건을 충족할 때 인식"},"explanation":"**B**가 정답이다. 재산세는 부과형 비교환수익이며, 수정발생주의 하에서는 세금이 부과된 기간에 인식되며, 측정가능하고 가용한 범위에서 인식한다.\n- **A**는 함정이다: 교환형식으로 취급하고 현금 수령과 연결시킨다.\n- **C**는 판매세(파생형 세수익)를 설명한다."},"ja":{"question":"政府の場合、財産税はどの種類の収益であり、修正発生主義の下でいつ収益を認識するか?","choices":{"A":"交換収益、現金が受け取られた時に認識","B":"賦課型非交換収益、税が賦課された期間に認識(測定可能かつ利用可能な範囲で)","C":"派生型税収益、基礎となる売却が発生した時に認識","D":"自発的非交換収益、適格性要件が満たされた時に認識"},"explanation":"**B**が正解である。財産税は賦課型非交換収益であり、修正発生主義の下では、税が賦課された期間に認識され、測定可能かつ利用可能な範囲で認識される。\n- **A**は罠である：交換型として扱い、現金受取と結びつけている。\n- **C**は販売税(派生型税収益)を説明している。"}},"AI-PAT-23":{"ko":{"question":"회사가 보험사자로부터 연금을 구매하여 연금 의무의 일부를 정산하고, 이 의무를 보험사로 돌이킬 수 없게 이전한다. 회계상 영향은?","choices":{"A":"손익을 인식하지 않는다","B":"차이는 종업원의 잔여근무기간에 걸쳐 상각한다","C":"미인식 순손익의 비례 지분을 즉시 인식한다","D":"금액을 기타포괄손익으로 재분류한다"},"explanation":"**C**가 정답이다. 연금 정산은 이전에 미인식이었던 순손익의 비례 부분을 즉시 인식하게 한다.\n- **B**는 함정이다: 향후 근무에 걸친 상각은 일상적인 처리이지, 정산 처리가 아니다."},"ja":{"question":"会社が保険会社から年金を購入して年金債務の一部を決済し、その債務を保険会社に取消不可能に移転する。会計的な影響は?","choices":{"A":"利益損失は認識されない","B":"差額は従業員の残余勤務期間にわたって償却される","C":"以前に認識されていない純損益の比例配分を直ちに認識する","D":"金額をその他包括利益に再分類する"},"explanation":"**C**が正解である。年金清算は、以前に未認識だった純損益の比例部分を直ちに認識させる。\n- **B**は罠である：将来の勤務にわたる償却は日常的な処理であり、決済処理ではない。"}},"AI-PAT-24":{"ko":{"question":"실제 직접노무는 시간당 $14.00에 5,200시간이었고, 표준임률은 시간당 $15.00이다. 직접노무 임률차이는?","choices":{"A":"$3,000 불리","B":"$5,200 불리","C":"$200 유리","D":"$5,200 유리"},"explanation":"**D**가 정답이다. 노무율차이 = (실제임률 - 표준임률) x 실제시간 = ($14.00 - $15.00) x 5,200 = -$5,200 → **$5,200 유리**(실제임률이 표준보다 낮았음).\n- **B**는 함정이다: 같은 금액이지만 부호가 반대이다.\n- **A ($3,000 불리)**는 별도의 능률차이이다."},"ja":{"question":"実際の直接労務は時間当たり$14.00で5,200時間であり、標準賃率は時間当たり$15.00である。直接労務賃率差異は?","choices":{"A":"$3,000 不利","B":"$5,200 不利","C":"$200 有利","D":"$5,200 有利"},"explanation":"**D**が正解である。労務賃率差異 = (実際賃率 - 標準賃率) × 実際時間 = ($14.00 - $15.00) × 5,200 = -$5,200 → **$5,200 有利**(実際賃率が標準より低かった)。\n- **B**は罠である：同じ金額だが符号が反対である。\n- **A ($3,000 不利)**は別個の能率差異である。"}},"AI-PAT-25":{"ko":{"question":"주 또는 지역정부의 재무보고서에서 경영진 논의분석(MD&A)은?","choices":{"A":"기본재무제표 이전에 제시되는 필수보충정보","B":"주석 이후에 제시되는 필수보충정보","C":"기본재무제표의 일부","D":"경영진의 재량에 따라 제시되는 선택적 정보"},"explanation":"**A**가 정답이다. MD&A는 필수보충정보(RSI)로서 기본재무제표보다 먼저 제시된다.\n- **B**는 함정이다: 대부분의 다른 RSI는 제표 이후에 제시되지만, MD&A는 특히 먼저 나온다.\n- **D**는 선택적인 것으로 잘못 취급한다."},"ja":{"question":"州または地方政府の財務報告書において、経営者による討議と分析(MD&A)は?","choices":{"A":"基本財務諸表の前に提示される必須補足情報","B":"注記の後に提示される必須補足情報","C":"基本財務諸表の一部","D":"経営者の裁量により提示される任意情報"},"explanation":"**A**が正解である。MD&Aは必須補足情報(RSI)として基本財務諸表に先立って提示される。\n- **B**は罠である：他の大部分のRSIは諸表の後に続くが、MD&Aは特に最初に来る。\n- **D**は選択的なものとして誤って扱っている。"}},"AI-PAT-26":{"ko":{"question":"논리적 접근과 프로그램 변경에 대한 통제로서 엔티티의 모든 응용에 전반적으로 적용되는 것은?","choices":{"A":"응용통제","B":"IT 전반통제","C":"수동 보상통제","D":"순수 적발통제"},"explanation":"**B**가 정답이다. IT 전반통제(ITGC)는 전체 IT 환경에 걸쳐 작동한다 — 접근 보안, 변경관리, 운영.\n- **A**는 함정이다: 응용통제는 특정 응용 내에 내장되어 개별 거래(입력, 처리, 출력)를 통제한다."},"ja":{"question":"論理的アクセスとプログラム変更に対する統制で、エンティティのすべての業務に広範に適用されるものは?","choices":{"A":"業務処理統制","B":"IT全般統制","C":"手動補償統制","D":"純粋の発見統制"},"explanation":"**B**が正解である。IT全般統制(ITGC)は全IT環境にわたって機能する — アクセス保安、変更管理、運用。\n- **A**は罠である：業務処理統制は特定の業務に組み込まれ、個別のトランザクション(入力、処理、出力)を統制する。"}},"AI-PAT-27":{"ko":{"question":"정부기금이 추정수익 $1,000,000과 세출예산 $950,000으로 연간 예산을 채택한다. 예산 회계분록은?","choices":{"A":"추정수익에 대한 대변과 세출예산에 대한 차변","B":"세출예산에 대한 차변과 예산기금잔액에 대한 대변","C":"추정수익에 대한 차변과 세출예산에 대한 대변","D":"기록하지 않음 — 예산은 비망록으로만 기록"},"explanation":"**C**가 정답이다. 예산 기록은 '정상' 잔액을 역순으로 한다: 추정수익 $1,000,000에 차변, 세출예산 $950,000에 대변, $50,000 잉여는 예산기금잔액에 대변.\n- **A**는 함정이다: 차변/대변 방향을 역순으로 한다.\n- **D**는 예산을 비망록 전용으로 잘못 취급한다."},"ja":{"question":"政府基金が歳入見積$1,000,000と歳出予算$950,000で年間予算を採択する。予算仕訳は?","choices":{"A":"歳入見積への貸方と歳出予算への借方","B":"歳出予算への借方と予算上の基金残高への貸方","C":"歳入見積への借方と歳出予算への貸方","D":"記帳しない — 予算は備考のみで記録"},"explanation":"**C**が正解である。予算の記帳は『通常』残高を反転させる：歳入見積$1,000,000に借方、歳出予算$950,000に貸方、$50,000の黒字は予算上の基金残高に貸方。\n- **A**は罠である：借方/貸方の方向を反転させている。\n- **D**は予算を備考のみとして誤って扱っている。"}}},"tbs":{"TBS 7.1":{"ja":{"title":"運転資本と資金調達の分析","body":"**シナリオ：** 各種の資金調達方法と、それらが運転資本残高に与える影響の分析。\n\n### タスク1：運転資本への影響\n\n| 資金調達方法 | 流動資産への影響 | 流動負債への影響 |\n|------------------|----------------------|---------------------------|\n| ターム・ローン（24か月、毎月元本返済） | +$240,000 | +$120,000 |\n| ターム・ローン（満期時バルーン返済） | +$240,000 | 変化なし |\n| 12か月のクレジットライン（50%引出） | +$120,000 | +$120,000 |\n| 売掛金のファクタリング（12%割引） | -$40,000 | 変化なし |\n| 固定資産を$100,000で売却 | +$100,000 | 変化なし |\n\n**説明：**\n- **行2：** 毎月元本返済の24か月ターム・ローンは、半分（$120,000）が12か月以内に返済期限を迎える（流動負債）。\n- **行3：** 満期時バルーン返済は、12か月以内に返済すべき元本がないため、流動負債は生じない。\n- **行4：** クレジットラインは12か月末に返済期限が到来するため、引出額全額が流動負債となる。\n- **行5：** ファクタリングは売掛金を減少させるが、割引分を差し引いた現金を増加させる（$333,333 × 12% = $40,000）。\n- **行6：** トラックの売却は長期資産を現金に転換する。"},"ko":{"title":"운전자본과 자금조달 분석","body":"**시나리오:** 다양한 자금조달 방법과 그것이 운전자본 잔액에 미치는 영향 분석.\n\n### 과제 1: 운전자본에 대한 영향\n\n| 자금조달 방법 | 유동자산 영향 | 유동부채 영향 |\n|------------------|----------------------|---------------------------|\n| 기간대출(24개월, 매월 원금상환) | +$240,000 | +$120,000 |\n| 기간대출(만기 일시상환) | +$240,000 | 변화 없음 |\n| 12개월 신용한도(50% 인출) | +$120,000 | +$120,000 |\n| 매출채권 팩토링(12% 할인) | -$40,000 | 변화 없음 |\n| 고정자산 $100,000에 매각 | +$100,000 | 변화 없음 |\n\n**설명:**\n- **2행:** 매월 원금상환하는 24개월 기간대출은 절반($120,000)이 12개월 이내 상환되므로 유동부채.\n- **3행:** 만기 일시상환은 12개월 이내 상환할 원금이 없어 유동부채가 없음.\n- **4행:** 신용한도는 12개월 말에 상환기일이 도래하므로 인출액 전액이 유동부채.\n- **5행:** 팩토링은 매출채권을 줄이지만 할인액을 차감한 현금을 증가시킴($333,333 × 12% = $40,000).\n- **6행:** 트럭 매각은 장기자산을 현금으로 전환."}},"TBS 7.2":{"ja":{"title":"製品ライン収益性分析（自製か購入か）","body":"### パートI：自製 vs 購入の分析\n\n**BRINK製品ライン—予想販売数 = 50,000台**\n\n| 原価項目 | 総原価 | 単位当たり原価 |\n|----------------|------------|---------------|\n| 直接材料費 | $35,000 | $0.70 |\n| 直接労務費 | $200,000 | $4.00 |\n| 固定間接費（回避可能） | $84,000 | $1.68 |\n| 変動間接費 | $180,000 | $3.60 |\n| **合計** | **$499,000** | **$9.98** |\n\n**分析：**\n- 現在の自製原価：1台$9.98\n- 購入オファー：1台$9.10\n- 損益分岐となる回避可能固定費：($9.98 - $9.10) × 50,000 = $44,000\n\n回避可能固定費を$40,000まで削減できれば、自製か購入かの意思決定は原価中立となる。"},"ko":{"title":"제품라인 수익성 분석(자가제조 vs 구매)","body":"### 파트 I: 자가제조 vs 구매 분석\n\n**BRINK 제품라인—예상 판매량 = 50,000대**\n\n| 원가 항목 | 총원가 | 단위당 원가 |\n|----------------|------------|---------------|\n| 직접재료비 | $35,000 | $0.70 |\n| 직접노무비 | $200,000 | $4.00 |\n| 고정간접비(회피가능) | $84,000 | $1.68 |\n| 변동간접비 | $180,000 | $3.60 |\n| **합계** | **$499,000** | **$9.98** |\n\n**분석:**\n- 현재 자가제조 원가: 대당 $9.98\n- 구매 제안: 대당 $9.10\n- 손익분기 회피가능 고정비: ($9.98 - $9.10) × 50,000 = $44,000\n\n회피가능 고정비를 $40,000까지 줄일 수 있으면 자가제조 vs 구매 결정은 원가중립이 된다."}},"TBS 7.3":{"ja":{"title":"ヘッジの仕訳","body":"### ヘッジの種類と報告\n\n| シナリオ | ヘッジの種類 | 損益への影響 | OCIへの影響 |\n|----------|------------|-------------------|---------------|\n| 変動金利負債 + 金利スワップ | キャッシュフロー・ヘッジ | $0 | ($15,000) |\n| 棚卸資産 + 先物契約 | 公正価値ヘッジ | ($50) | $0 |\n| 在外子会社への純投資 + 先渡契約 | 純投資ヘッジ | $0 | $600 |\n\n**説明：**\n- **キャッシュフロー・ヘッジ：** 未実現損失は、ヘッジ対象が損益に影響を与えるまでOCIに報告される。\n- **公正価値ヘッジ：** デリバティブの利得と、相殺される棚卸資産の損失の双方を損益で認識する。\n- **純投資ヘッジ：** 先渡契約の利得と累積換算調整勘定の双方をOCIに計上する。"},"ko":{"title":"위험회피 분개","body":"### 위험회피 유형과 보고\n\n| 시나리오 | 위험회피 유형 | 손익 영향 | OCI 영향 |\n|----------|------------|-------------------|---------------|\n| 변동금리 부채 + 금리스왑 | 현금흐름 위험회피 | $0 | ($15,000) |\n| 재고자산 + 선물계약 | 공정가치 위험회피 | ($50) | $0 |\n| 해외 자회사 순투자 + 선도계약 | 순투자 위험회피 | $0 | $600 |\n\n**설명:**\n- **현금흐름 위험회피:** 미실현손실은 위험회피대상이 손익에 영향을 줄 때까지 OCI에 보고.\n- **공정가치 위험회피:** 파생상품 이익과 이를 상쇄하는 재고자산 손실을 모두 손익으로 인식.\n- **순투자 위험회피:** 선도계약 이익과 누적환산조정을 모두 OCI에 계상."}},"TBS 7.4":{"ja":{"title":"工事契約の会計処理","body":"### 3年工事プロジェクトの仕訳\n\n**1年目の仕訳：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 未成工事支出金（CIP） | $3,375,000 | |\n| 工事未収金 | $350,000 | |\n| 工事原価 | $2,362,500 | |\n| 現金 | | $512,500 |\n| 工事進行請求 | | $2,200,000 |\n| 工事収益 | | $3,375,000 |\n\n**計算：**\n- 進捗率：$2,362,500 / $5,250,000 = 45%\n- 見込利益：$7,500,000 - $5,250,000 = $2,250,000\n- 認識利益：$2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000"},"ko":{"title":"공사계약 회계","body":"### 3년 공사 프로젝트 분개\n\n**1년차 분개:**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 미성공사(CIP) | $3,375,000 | |\n| 공사미수금 | $350,000 | |\n| 공사원가 | $2,362,500 | |\n| 현금 | | $512,500 |\n| 공사진행청구 | | $2,200,000 |\n| 공사수익 | | $3,375,000 |\n\n**계산:**\n- 진행률: $2,362,500 / $5,250,000 = 45%\n- 예상이익: $7,500,000 - $5,250,000 = $2,250,000\n- 인식이익: $2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000"}},"TBS 7.5":{"ja":{"title":"標準原価差異分析","body":"### 直接材料差異\n\n**最初の仕訳（購入）：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 原材料（45,000 × $15） | $675,000 | |\n| 直接材料購入価格差異 | $90,000 | |\n| 買掛金（45,000 × $17） | | $765,000 |\n\n**価格差異：** 45,000 × ($17 - $15) = $90,000 不利\n\n**2番目の仕訳（消費）：**\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 仕掛品（42,500 × $15） | $637,500 | |\n| 直接材料数量差異 | $67,500 | |\n| 原材料（47,000 × $15） | | $705,000 |\n\n**数量差異：** $15 × (47,000 - 42,500) = $67,500 不利"},"ko":{"title":"표준원가 차이분석","body":"### 직접재료 차이\n\n**첫 번째 분개(구입):**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 원재료(45,000 × $15) | $675,000 | |\n| 직접재료 구입가격차이 | $90,000 | |\n| 매입채무(45,000 × $17) | | $765,000 |\n\n**가격차이:** 45,000 × ($17 - $15) = $90,000 불리\n\n**두 번째 분개(사용):**\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 재공품(42,500 × $15) | $637,500 | |\n| 직접재료 사용차이 | $67,500 | |\n| 원재료(47,000 × $15) | | $705,000 |\n\n**사용차이:** $15 × (47,000 - 42,500) = $67,500 불리"}},"TBS 7.6":{"ja":{"title":"株式報酬","body":"### ストックオプションの仕訳\n\n**2年目・3年目 — 報酬費用の計上：**\n```\n（借）報酬費用    $15,000\n    （貸）払込資本剰余金—ストックオプション   $15,000\n```\n\n**4年目 — オプションの行使：**\n```\n（借）現金（$45 × 5,000）        $225,000\n（借）払込資本剰余金—ストックオプション    $30,000\n    （貸）普通株式（$20 × 5,000）         $100,000\n    （貸）払込資本剰余金—普通株式（差額）    $155,000\n```\n\n**株式評価益受領権（SARs）：**\n- 1年目の報酬費用 = 株式評価益 × SARs数 × 提供済役務\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- 2年目は公正価値の変動に基づき調整"},"ko":{"title":"주식기준보상","body":"### 주식선택권 분개\n\n**2년차·3년차 — 보상비용 계상:**\n```\n(차)보상비용    $15,000\n    (대)주식발행초과금—주식선택권   $15,000\n```\n\n**4년차 — 선택권 행사:**\n```\n(차)현금($45 × 5,000)        $225,000\n(차)주식발행초과금—주식선택권    $30,000\n    (대)보통주($20 × 5,000)         $100,000\n    (대)주식발행초과금—보통주(차액)    $155,000\n```\n\n**주가차액보상권(SARs):**\n- 1년차 보상비용 = 주가상승분 × SARs 수 × 제공된 용역\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- 2년차는 공정가치 변동에 따라 조정"}},"TBS 7.7":{"ja":{"title":"リース会計","body":"### ファイナンス・リースの認識\n\n**借手の当初仕訳：**\n```\n（借）使用権資産            $496,736\n    （貸）リース負債              $496,736\n```\n\n**計算：**\n- リース料の現在価値：$472,061\n- 保証残存価値の現在価値：$24,675\n- 合計：$496,736\n\n**償却スケジュール：**\n\n| 日付 | 支払額 | 利息（6%） | 元本 | 帳簿価額 |\n|------|---------|---------------|-----------|----------------|\n| 1年目 1/1 | | | | $496,736 |\n| 1年目 12/31 | $96,000 | $29,804 | $66,196 | $430,540 |\n| 2年目 12/31 | $96,000 | $25,832 | $70,168 | $360,373 |\n| 3年目 12/31 | $96,000 | $21,622 | $74,378 | $285,995 |\n| 4年目 12/31 | $96,000 | $17,160 | $78,840 | $207,155 |\n| 5年目 12/31 | $96,000 | $12,429 | $83,571 | $123,584 |\n| 6年目 12/31 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**利息収益合計：** $114,264"},"ko":{"title":"리스 회계","body":"### 금융리스 인식\n\n**리스이용자 최초 분개:**\n```\n(차)사용권자산            $496,736\n    (대)리스부채              $496,736\n```\n\n**계산:**\n- 리스료의 현재가치: $472,061\n- 보증잔존가치의 현재가치: $24,675\n- 합계: $496,736\n\n**상각 스케줄:**\n\n| 일자 | 지급액 | 이자(6%) | 원금 | 장부가액 |\n|------|---------|---------------|-----------|----------------|\n| 1년차 1/1 | | | | $496,736 |\n| 1년차 12/31 | $96,000 | $29,804 | $66,196 | $430,540 |\n| 2년차 12/31 | $96,000 | $25,832 | $70,168 | $360,373 |\n| 3년차 12/31 | $96,000 | $21,622 | $74,378 | $285,995 |\n| 4년차 12/31 | $96,000 | $17,160 | $78,840 | $207,155 |\n| 5년차 12/31 | $96,000 | $12,429 | $83,571 | $123,584 |\n| 6년차 12/31 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**이자수익 합계:** $114,264"}},"TBS 7.8":{"ja":{"title":"政府基金の仕訳","body":"### 一般的な政府基金の仕訳\n\n| 取引 | 仕訳 |\n|-------------|-------|\n| 一般財源保証債（GO債）の発行 | （借）現金 / （貸）その他財源 |\n| 発注書の発行 | （借）予算外債務統制 / （貸）予算統制 |\n| 注文した物品の受領 | （借）予算統制 / （貸）予算外債務統制；（借）支出統制 / （貸）未払バウチャー |\n| 給与・賃金の計上 | （借）支出統制 / （貸）未払バウチャー |\n| 補助金収益の稼得 | （借）繰延資源流入 / （貸）補助金収益 |\n| 固定資産税の前受 | （借）現金 / （貸）繰延資源流入 |\n| 予算の採択（黒字） | （借）見積収益 / （貸）歳出予算統制 / （貸）予算統制 |\n| 租税収入前借手形 | （借）現金 / （貸）租税収入前借手形（未払） |"},"ko":{"title":"정부기금 분개","body":"### 일반적인 정부기금 분개\n\n| 거래 | 분개 |\n|-------------|-------|\n| 일반보증채(GO채) 발행 | (차)현금 / (대)기타재원 |\n| 구매주문서 발행 | (차)약정지출통제 / (대)예산통제 |\n| 주문 물품 수령 | (차)예산통제 / (대)약정지출통제; (차)지출통제 / (대)지급전표(미지급) |\n| 급여·임금 계상 | (차)지출통제 / (대)지급전표(미지급) |\n| 보조금수익 가득 | (차)이연자원유입 / (대)보조금수익 |\n| 재산세 선수 | (차)현금 / (대)이연자원유입 |\n| 예산 채택(흑자) | (차)추정수익 / (대)세출예산통제 / (대)예산통제 |\n| 세수예상차입증권 | (차)현금 / (대)세수예상차입금 |"}},"TBS 7.9":{"ja":{"title":"外貨換算法 vs 再測定法","body":"### 方法の比較\n\n| 項目 | 再測定法 | 換算法 |\n|------|---------------------|-------------------|\n| **貸借対照表** | | |\n| 貨幣性項目 | 決算日レート | 決算日レート |\n| 非貨幣性項目 | 取得時レート | 決算日レート |\n| 棚卸資産（均等に購入） | 加重平均 | 決算日レート |\n| 普通株式・優先株式 | 取得時レート | 取得時レート |\n| **損益計算書** | | |\n| 収益・費用 | 加重平均 | 加重平均 |\n| 減価償却費 | 取得時レート | 加重平均 |\n| **差額（プラグ）** | 損益計算書上の損益 | OCIの累積換算調整勘定 |"},"ko":{"title":"외화 환산법 vs 재측정법","body":"### 방법 비교\n\n| 항목 | 재측정법 | 환산법 |\n|------|---------------------|-------------------|\n| **재무상태표** | | |\n| 화폐성 항목 | 현행환율 | 현행환율 |\n| 비화폐성 항목 | 역사적환율 | 현행환율 |\n| 재고자산(균등 매입) | 가중평균 | 현행환율 |\n| 보통주·우선주 | 역사적환율 | 역사적환율 |\n| **손익계산서** | | |\n| 수익·비용 | 가중평균 | 가중평균 |\n| 감가상각비 | 역사적환율 | 가중평균 |\n| **차액(plug)** | 손익계산서상 손익 | OCI의 누적환산조정 |"}},"TBS 7.10":{"ja":{"title":"経済学 — 需要と供給の分析","body":"### 市場均衡への影響\n\n| 事象 | 曲線のシフト | 価格への影響 | 数量への影響 |\n|-------|-------------|--------------|-----------------|\n| 消費者所得の増加 + 法人税の減少 | 需要 → 右、供給 → 右 | 不明 | 増加 |\n| 消費者が将来の値上がりを予想 | 需要 → 右 | 上昇 | 増加 |\n| 買い手の減少 + 生産費の低下 | 需要 → 左、供給 → 右 | 低下 | 不明 |\n| 消費者の富の増加 + 政府補助金 | 需要 → 右、供給 → 右 | 不明 | 増加 |\n| 生産技術の向上 | 供給 → 右 | 低下 | 増加 |\n| 補完財の価格上昇 + 選好の低下 | 需要 → 左 | 低下 | 減少 |\n| 代替財価格の低下 + 労務費の上昇 | 需要 → 左、供給 → 左 | 不明 | 減少 |"},"ko":{"title":"경제학 — 수요·공급 분석","body":"### 시장균형에 대한 영향\n\n| 사건 | 곡선 이동 | 가격 효과 | 수량 효과 |\n|-------|-------------|--------------|-----------------|\n| 소비자 소득 증가 + 법인세 감소 | 수요 → 우, 공급 → 우 | 불분명 | 증가 |\n| 소비자가 향후 가격상승을 예상 | 수요 → 우 | 상승 | 증가 |\n| 구매자 감소 + 생산비 하락 | 수요 → 좌, 공급 → 우 | 하락 | 불분명 |\n| 소비자 부 증가 + 정부 보조금 | 수요 → 우, 공급 → 우 | 불분명 | 증가 |\n| 생산기술 향상 | 공급 → 우 | 하락 | 증가 |\n| 보완재 가격 상승 + 선호 감소 | 수요 → 좌 | 하락 | 감소 |\n| 대체재 가격 하락 + 노무비 상승 | 수요 → 좌, 공급 → 좌 | 불분명 | 감소 |"}},"TBS 8.1":{"ja":{"title":"TBS 8.1: 連結 — 非支配持分(NCI)および連結会社間棚卸資産の消去仕訳","body":"**シナリオ:** Parker Co.はSutton Co.の**80%**を保有しています。1年度にParker(親会社)はSuttonに棚卸資産を**$100,000**で販売しました(Parkerの原価は**$70,000**)。12月31日現在、Suttonはその棚卸資産の**40%**をまだ未販売状態で保有しています。Suttonは別途純利益**$200,000**を報告しました。\n\n### Task 1: 連結消去仕訳\n\n| # | 仕訳 | 借方 | 貸方 |\n|---|-------|-------|--------|\n| 1 | 連結会社間販売の消去 (借方 売上 / 貸方 売上原価) | $100,000 | $100,000 |\n| 2 | 期末棚卸資産の未実現利益消去 (借方 売上原価 / 貸方 棚卸資産) | $12,000 | $12,000 |\n\n### Task 2: 子会社純利益に対する非支配持分\n\n| 項目 | 金額 |\n|------|--------|\n| Sutton報告純利益 | $200,000 |\n| 連結会社間利益の調整 (ダウンストリーム) | $0 |\n| 非支配持分シェア (20%) | **$40,000** |\n\n**説明:**\n- 売上総利益率 = ($100,000 − $70,000) / $100,000 = **30%**. 期末棚卸資産の未実現利益 = $100,000 × 40% × 30% = **$12,000**であり、Suttonが外部顧客に販売するまで繰り延べられます。\n- これは**ダウンストリーム販売**(親会社 → 子会社)であるため、全未実現利益が**支配持分**に対して消去されます; 非支配持分は**調整されません**。(**アップストリーム販売**の場合、未実現利益は支配持分と非支配持分の間で所有比率で配分されます。)\n- 非支配持分純利益 = 20% × $200,000 = **$40,000**.\n\n---"},"ko":{"title":"TBS 8.1: 연결 — 비지배지분(NCI) 및 내부거래 재고 제거분개","body":"**시나리오:** Parker Co.는 Sutton Co.의 **80%**를 소유합니다. 1년도에 Parker(모회사)는 Sutton에 재고를 **$100,000**에 판매했습니다(Parker의 원가는 **$70,000**). 12월 31일 현재 Sutton은 그 재고의 **40%**를 아직 미판매 상태로 보유하고 있습니다. Sutton은 별도 순이익 **$200,000**을 보고했습니다.\n\n### Task 1: 연결 제거분개\n\n| # | 분개 | 차변 | 대변 |\n|---|-------|-------|--------|\n| 1 | 내부거래 판매 제거 (차변 매출 / 대변 매출원가) | $100,000 | $100,000 |\n| 2 | 기말재고의 미실현이익 제거 (차변 매출원가 / 대변 재고) | $12,000 | $12,000 |\n\n### Task 2: 종속회사 순이익에 대한 비지배지분\n\n| 항목 | 금액 |\n|------|--------|\n| Sutton 보고 순이익 | $200,000 |\n| 내부거래 이익에 대한 조정 (하향판매) | $0 |\n| 비지배지분 몫 (20%) | **$40,000** |\n\n**설명:**\n- 매출총이익률 = ($100,000 − $70,000) / $100,000 = **30%**. 기말재고의 미실현이익 = $100,000 × 40% × 30% = **$12,000**이며, Sutton이 외부 고객에게 판매할 때까지 이연됩니다.\n- 이는 **하향판매**(모회사 → 종속회사)이므로, 전체 미실현이익이 **지배지분**에 대해 제거됩니다; 비지배지분은 **조정되지 않습니다**. (**상향판매**의 경우, 미실현이익은 지배지분과 비지배지분 간 소유비율로 배분됩니다.)\n- 비지배지분 순이익 = 20% × $200,000 = **$40,000**.\n\n---"}},"TBS 8.10":{"ja":{"title":"資本予算――正味現在価値、内部収益率及び回収期間","body":"**シナリオ:** Crestline Co.はプロジェクトを評価しています：初期投資**$500,000**、5年間の毎年同等の税後現金流入**$150,000**、資本コスト**10%**。(年金現価係数、10%、5年 = **3.7908**.)\n\n### タスク1: プロジェクトの評価\n\n| メトリック | 計算 | 結果 |\n|--------|-------------|--------|\n| 回収期間 | $500,000 / $150,000 | **3.33年** |\n| 正味現在価値 | ($150,000 × 3.7908) − $500,000 = $568,620 − $500,000 | **+ $68,620** |\n| 内部収益率 | 係数 = $500,000 / $150,000 = 3.333 → 15%と16%の間 | **≈ 15.2%** |\n| 意思決定 | 正味現在価値 > 0かつ内部収益率 > 10%ハードルレート | **受け入れる** |\n\n**説明:**\n- **回収期間** = 投資額 / 年間現金流入 = 3.33年（金銭の時間価値を無視――弱点）。\n- **正味現在価値** = 流入の現価 − 初期投資 = $568,620 − $500,000 = **+$68,620**。正の正味現在価値は、プロジェクトが必要な10%収益率より高い利益を得ることを意味します → **受け入れます**。\n- **内部収益率**は、正味現在価値を0にする割引率です。ここで年金係数3.333は15%係数(3.3522)と16%係数(3.2743)の間にあるため、内部収益率 ≈ **15.2%**。内部収益率(15.2%) > ハードルレート(10%)なので、内部収益率ルールも**受け入れます**を示しています。\n\n---"},"ko":{"title":"자본예산 — 순현재가치, 내부수익률 및 회수기간","body":"**시나리오:** Crestline Co.가 프로젝트를 평가하고 있습니다: 초기투자 **$500,000**, 5년간 연간 동일한 세후 현금유입 **$150,000**, 자본비용 **10%**. (연금현가계수, 10%, 5년 = **3.7908**.)\n\n### 과제 1: 프로젝트 평가\n\n| 지표 | 계산 | 결과 |\n|--------|-------------|--------|\n| 회수기간 | $500,000 / $150,000 | **3.33년** |\n| 순현재가치 | ($150,000 × 3.7908) − $500,000 = $568,620 − $500,000 | **+ $68,620** |\n| 내부수익률 | 계수 = $500,000 / $150,000 = 3.333 → 15%와 16% 사이 | **≈ 15.2%** |\n| 결정 | 순현재가치 > 0이고 내부수익률 > 10% 기준수익률 | **수락** |\n\n**설명:**\n- **회수기간** = 투자액 / 연간 현금흐름 = 3.33년 (화폐의 시간가치 무시 — 약점).\n- **순현재가치** = 유입의 현가 − 초기투자 = $568,620 − $500,000 = **+$68,620**. 양의 순현재가치는 프로젝트가 필요 수익률인 10%보다 높은 수익을 얻는다는 의미 → **수락**.\n- **내부수익률**은 순현재가치를 0으로 만드는 할인율입니다. 여기서 연금계수 3.333은 15% 계수(3.3522)와 16% 계수(3.2743) 사이에 있으므로 내부수익률 ≈ **15.2%**. 내부수익률(15.2%) > 기준수익률(10%)이므로 내부수익률 규칙도 **수락**을 나타냅니다.\n\n---"}},"TBS 8.2":{"ja":{"title":"TBS 8.2: 事業結合 — 取得法、のれんと割安購入益","body":"**シナリオ:** Apex Inc.はTara Co.の支配力のある持分を取得します。以下の2つの独立したケースです。US GAAPは**全額(100%)のれん**方法を使用します: のれんは非支配持分を含めて被取得企業全体に対して測定されます。\n\n### Task 1: のれんまたは利益の計算\n\n| 項目 | ケースA | ケースB |\n|------|--------|--------|\n| 移転対価 (75%) | $600,000 | $480,000 |\n| 非支配持分の公正価値 (25%) | $190,000 | $150,000 |\n| **被取得企業の総公正価値** | **$790,000** | **$630,000** |\n| 差引: 識別可能純資産の公正価値 (100%) | ($700,000) | ($700,000) |\n| **結果** | **のれん $90,000** | **割安購入益 $70,000** |\n\n**説明:**\n- のれん = (移転対価 + 非支配持分の公正価値 + 以前に保有した持分の公正価値) − **識別可能**純資産の公正価値.\n- **ケースA:** $790,000 − $700,000 = **$90,000のれん** (資産として計上; 償却されず、減損テスト対象).\n- **ケースB:** $630,000 − $700,000 = **($70,000)** → **割安購入**. すべての資産/負債が正しく識別および測定されていることを再検討した後、超過額は取得日に**利益として認識**されます。\n\n---"},"ko":{"title":"TBS 8.2: 사업결합 — 취득법, 영업권 대 염가매수차익","body":"**시나리오:** Apex Inc.는 Tara Co.의 지배력 있는 지분을 인수합니다. 아래의 두 가지 독립적인 사례입니다. US GAAP는 **전액(100%) 영업권** 방법을 사용합니다: 영업권은 비지배지분을 포함하여 전체 피인수자에 대해 측정됩니다.\n\n### Task 1: 영업권 또는 이익 계산\n\n| 항목 | 사례 A | 사례 B |\n|------|--------|--------|\n| 이전대가 (75%) | $600,000 | $480,000 |\n| 비지배지분의 공정가치 (25%) | $190,000 | $150,000 |\n| **피인수자의 총 공정가치** | **$790,000** | **$630,000** |\n| 차감: 식별가능 순자산의 공정가치 (100%) | ($700,000) | ($700,000) |\n| **결과** | **영업권 $90,000** | **염가매수차익 $70,000** |\n\n**설명:**\n- 영업권 = (이전대가 + 비지배지분의 공정가치 + 이전에 보유한 지분의 공정가치) − **식별가능** 순자산의 공정가치.\n- **사례 A:** $790,000 − $700,000 = **$90,000 영업권** (자산으로 계상; 상각하지 않으며, 손상검사 대상).\n- **사례 B:** $630,000 − $700,000 = **($70,000)** → **염가매수**. 모든 자산/부채가 올바르게 식별 및 측정되었음을 재검토한 후, 초과액은 인수일에 **이익으로 인식**됩니다.\n\n---"}},"TBS 8.3":{"ja":{"title":"TBS 8.3: 正味期間年金費用 — 構成要素","body":"**シナリオ:** Dalton Corp.の正味期間年金費用を以下の構成要素から計算してください (確定給付制度、US GAAP)。\n\n### Task 1: 正味期間年金費用\n\n| 構成要素 | 影響 | 金額 |\n|-----------|--------|--------|\n| 勤務費用 | + | $120,000 |\n| 利息費用 | + | $90,000 |\n| 制度資産の期待収益 | − | ($80,000) |\n| 過去勤務費用の償却 | + | $15,000 |\n| 純計算上の損益の償却 | + | $5,000 |\n| **正味期間年金費用** | | **$150,000** |\n\n**説明:**\n- 記憶法 **S I R - A G E**: **S**ervice cost(勤務費用), **I**nterest cost(利息費用), expected **R**eturn(収益、差引), **A**mortization of prior service cost(過去勤務費用の償却), **G**ains/losses amortization(損益の償却), **E**xisting(既存)義務の償却.\n- **勤務費用**と**利息費用**は費用を**増加**させ; 制度資産の**期待収益**はこれを**減少**させます。 (注: 実際の収益ではなく*期待*収益をP&L要素として使用します; 実際の収益との差異は計算上の損益です。)\n- $120,000 + $90,000 − $80,000 + $15,000 + $5,000 = **$150,000**.\n\n---"},"ko":{"title":"TBS 8.3: 순정기연금원가 — 구성 요소","body":"**시나리오:** Dalton Corp.의 순정기연금원가를 아래의 구성 요소로부터 계산하세요 (확정급여형 연금, US GAAP).\n\n### Task 1: 순정기연금원가\n\n| 구성 요소 | 영향 | 금액 |\n|-----------|--------|--------|\n| 근무원가 | + | $120,000 |\n| 이자원가 | + | $90,000 |\n| 사외적립자산 기대수익 | − | ($80,000) |\n| 과거근무원가 상각 | + | $15,000 |\n| 순정산손익 상각 | + | $5,000 |\n| **순정기연금원가** | | **$150,000** |\n\n**설명:**\n- 기억 **S I R - A G E**: **S**ervice cost(근무원가), **I**nterest cost(이자원가), expected **R**eturn(수익률 차감), **A**mortization of prior service cost(과거근무원가 상각), **G**ains/losses amortization(손익 상각), **E**xisting(기존) obligation amortization(이연원가 상각).\n- **근무원가**와 **이자원가**는 비용을 **증가**시키고; 사외적립자산의 **기대수익**은 이를 **감소**시킵니다. (참고: 실제 수익이 아닌 *기대* 수익을 P&L 요소로 사용합니다; 실제 수익과의 차이는 정산손익입니다.)\n- $120,000 + $90,000 − $80,000 + $15,000 + $5,000 = **$150,000**.\n\n---"}},"TBS 8.4":{"ja":{"title":"TBS 8.4: 1株当たり利益 — 基本および希薄化","body":"**シナリオ:** Vento Corp. 1年度: 純利益**$500,000**; 累積優先株配当**$50,000**; 加重平均普通株式**200,000**株. 潜在的希薄化有価証券: (a)**30,000**個のオプション、行使価格**$20**、平均市場価格**$25**; (b)**$1,000,000**の利率**8%**転換社債、**20,000**株に転換可能。税率**25%**.\n\n### Task 1: 基本および希薄化1株当たり利益\n\n| ステップ | 分子 | 分母 | 1株当たり利益 |\n|------|-----------|-------------|-----|\n| 基本 | $500,000 − $50,000 = $450,000 | 200,000 | **$2.25** |\n| + オプション (自己株式法) | $450,000 | 200,000 + 6,000 = 206,000 | $2.18 |\n| + 転換社債 (検定) | $450,000 + $60,000 | 206,000 + 20,000 = 226,000 | $2.26 → **希薄化防止** |\n| **希薄化 (最終)** | $450,000 | 206,000 | **$2.18** |\n\n**説明:**\n- **オプション (自己株式法):** 行使金額 = 30,000 × $20 = $600,000; 買い戻し株式 = $600,000 / $25 = 24,000; 増分株式 = 30,000 − 24,000 = **6,000**. 希薄化的(1株当たり利益低下) → 含める.\n- **転換社債:** 税後利息加算 = $1,000,000 × 8% × (1 − 0.25) = **$60,000**; 増分1株当たり利益 = $60,000 / 20,000 = **$3.00**, これは実行希薄化1株当たり利益($2.18)より**大きい** → **希薄化防止**, したがって社債は**除外**される.\n- 常に各証券を**最も希薄化的なものから最も希薄化防止的なものまで**検定し、増分1株当たり利益が実行合計を超えるものは除外してください。希薄化1株当たり利益 = $450,000 / 206,000 = **$2.18**.\n\n---"},"ko":{"title":"TBS 8.4: 주당이익 — 기본 및 희석","body":"**시나리오:** Vento Corp. 1년도: 순이익 **$500,000**; 누적 우선주 배당 **$50,000**; 가중평균 보통주식 **200,000**주. 잠재적 희석 증권: (a) **30,000**개 옵션, 행사가 **$20**, 평균 시장가격 **$25**; (b) **$1,000,000** 이율 **8%** 전환사채, **20,000**주로 전환 가능. 세율 **25%**.\n\n### Task 1: 기본 및 희석 주당이익\n\n| 단계 | 분자 | 분모 | 주당이익 |\n|------|-----------|-------------|-----|\n| 기본 | $500,000 − $50,000 = $450,000 | 200,000 | **$2.25** |\n| + 옵션 (자기주식법) | $450,000 | 200,000 + 6,000 = 206,000 | $2.18 |\n| + 전환사채 (검정) | $450,000 + $60,000 | 206,000 + 20,000 = 226,000 | $2.26 → **반희석** |\n| **희석 (최종)** | $450,000 | 206,000 | **$2.18** |\n\n**설명:**\n- **옵션 (자기주식법):** 행사금액 = 30,000 × $20 = $600,000; 재매입주식 = $600,000 / $25 = 24,000; 증분주식 = 30,000 − 24,000 = **6,000**. 희석적(주당이익 감소) → 포함됨.\n- **전환사채:** 세후이자 가산 = $1,000,000 × 8% × (1 − 0.25) = **$60,000**; 증분 주당이익 = $60,000 / 20,000 = **$3.00**, 이는 실행 희석 주당이익($2.18)보다 **큼** → **반희석**, 따라서 사채는 **제외됨**.\n- 항상 각 증권을 **가장 희석적인 것부터 가장 덜 희석적인 것까지** 검정하고, 증분 주당이익이 실행 합계를 초과하는 것은 제외하세요. 희석 주당이익 = $450,000 / 206,000 = **$2.18**.\n\n---"}},"TBS 8.5":{"ja":{"title":"TBS 8.5: 繰延税金 — 一時差異および税務費用","body":"**シナリオ:** マーサー社(Mercer Co.)の税引前会計利益は **$800,000** です。項目：(1) 地方債利息 **$20,000** (非課税); (2) 税務減価償却費が会計減価償却費を **$100,000** 超過; (3) 保証引当費用は会計上認識されていますが **$30,000** (まだ税務上控除不可)。適用税率 **25%**。\n\n### Task 1: 課税所得および税務費用\n\n| 項目 | 金額 |\n|------|--------|\n| 税引前会計利益 | $800,000 |\n| 控除：地方債利息 (永久差異) | ($20,000) |\n| 控除：超過税務減価償却費 (課税一時差異) | ($100,000) |\n| 加算：保証引当 (控除可能一時差異) | $30,000 |\n| **課税所得** | **$710,000** |\n| 当期法人税支払額 (25%) | **$177,500** |\n\n### Task 2: 仕訳\n\n| 勘定科目 | 借方 | 貸方 |\n|---------|-------|--------|\n| 法人税費用 | $195,000 | |\n| 繰延税金資産 (保証 $30,000 × 25%) | $7,500 | |\n| &nbsp;&nbsp;未払法人税 | | $177,500 |\n| &nbsp;&nbsp;繰延税金負債 (減価償却 $100,000 × 25%) | | $25,000 |\n\n**説明:**\n- **永久差異** (地方債利息)は決して逆転しないため、課税所得から除外されます — これらは繰延税金を生成 **しません**。\n- **課税一時差異** (超過税務減価償却費)は **繰延税金負債** $25,000 を生成します。**控除可能一時差異** (保証引当)は **繰延税金資産** $7,500 を生成します。\n- 全法人税費用 = 当期 $177,500 + 繰延負債 $25,000 − 繰延資産 $7,500 = **$195,000**。検証：($800,000 − $20,000 永久差異) × 25% = **$195,000**。✓\n\n---"},"ko":{"title":"TBS 8.5: 이연법인세 — 일시적차이 및 세금비용","body":"**시나리오:** 머서사(Mercer Co.)의 세전회계이익은 **$800,000**입니다. 항목: (1) 지방채 이자 **$20,000** (과세되지 않음); (2) 세금감가상각비가 회계감가상각비를 **$100,000** 초과; (3) 보증충당 비용은 회계상 인식되었으나 **$30,000** (아직 세금상 공제 불가). 적용세율 **25%**.\n\n### Task 1: 과세소득 및 세금비용\n\n| 항목 | 금액 |\n|------|--------|\n| 세전회계이익 | $800,000 |\n| 차감: 지방채 이자 (영구적차이) | ($20,000) |\n| 차감: 초과 세금감가상각비 (과세 일시적차이) | ($100,000) |\n| 가산: 보증충당 (공제가능 일시적차이) | $30,000 |\n| **과세소득** | **$710,000** |\n| 당기 법인세 납부액 (25%) | **$177,500** |\n\n### Task 2: 일반분개\n\n| 계정과목 | 차변 | 대변 |\n|---------|-------|--------|\n| 법인세비용 | $195,000 | |\n| 이연법인세자산 (보증 $30,000 × 25%) | $7,500 | |\n| &nbsp;&nbsp;미지급법인세 | | $177,500 |\n| &nbsp;&nbsp;이연법인세부채 (감가상각 $100,000 × 25%) | | $25,000 |\n\n**설명:**\n- **영구적차이** (지방채 이자)는 절대 되돌아가지 않으며 과세소득에서 제외됩니다 — 이들은 이연법인세를 생성하지 **않습니다**.\n- **과세 일시적차이** (초과 세금감가상각비)는 **이연법인세부채** $25,000을 생성합니다. **공제가능 일시적차이** (보증충당)는 **이연법인세자산** $7,500을 생성합니다.\n- 전체 법인세비용 = 당기 $177,500 + 이연부채 $25,000 − 이연자산 $7,500 = **$195,000**. 검증: ($800,000 − $20,000 영구적차이) × 25% = **$195,000**. ✓\n\n---\n[END]"}},"TBS 8.6":{"ja":{"title":"TBS 8.6: キャッシュフロー計算書 — 営業活動 (間接法)","body":"**シナリオ:** ハーバー社(Harbor Co.)の記録から、**間接法**を使用して営業活動から提供されるネットキャッシュを計算してください。\n\n### Task 1: 営業活動からのキャッシュフロー\n\n| 項目 | 調整 | 金額 |\n|------|-----------|--------|\n| 当期純利益 | 開始 | $250,000 |\n| 減価償却費 | + | $40,000 |\n| 機械装置売却益 | − | ($15,000) |\n| 売掛金増加 | − | ($20,000) |\n| 棚卸資産減少 | + | $10,000 |\n| 買掛金増加 | + | $8,000 |\n| 未払費用減少 | − | ($5,000) |\n| **営業活動から提供されるネットキャッシュ** | | **$268,000** |\n\n**説明:**\n- **非現金**費用を加え戻します (減価償却費)。資産売却による**利益/損失**を除去します — 全体の収益は**投資活動**に属するため、利益はここから控除します。\n- 運転資本：**流動資産の増加** (売掛金)はキャッシュを**使用**します (控除); **流動資産の減少** (棚卸資産)はキャッシュを**提供**します (加算)。**流動負債の増加** (買掛金)はキャッシュを**提供**します (加算); **流動負債の減少** (未払費用)はキャッシュを**使用**します (控除)。\n- $250,000 + $40,000 − $15,000 − $20,000 + $10,000 + $8,000 − $5,000 = **$268,000**。\n\n---"},"ko":{"title":"TBS 8.6: 현금흐름표 — 영업활동 (간접법)","body":"**시나리오:** 하버사(Harbor Co.)의 기록에서 **간접법**을 사용하여 영업활동으로부터의 순현금을 계산하세요.\n\n### Task 1: 영업활동으로부터의 현금흐름\n\n| 항목 | 조정 | 금액 |\n|------|-----------|--------|\n| 순이익 | 시작 | $250,000 |\n| 감가상각비 | + | $40,000 |\n| 장비 처분이익 | − | ($15,000) |\n| 매출채권 증가 | − | ($20,000) |\n| 재고자산 감소 | + | $10,000 |\n| 매입채무 증가 | + | $8,000 |\n| 미지급비용 감소 | − | ($5,000) |\n| **영업활동으로부터의 순현금** | | **$268,000** |\n\n**설명:**\n- **비현금** 비용을 다시 가산합니다 (감가상각비). 자산 판매로 인한 **이익/손실**을 제거합니다 — 전체 수익은 **투자활동**에 포함되므로 이익은 여기서 뺍니다.\n- 운전자본: **유동자산의 증가** (매출채권)는 현금을 **사용합니다** (빼기); **유동자산의 감소** (재고자산)는 현금을 **제공합니다** (더하기). **유동부채의 증가** (매입채무)는 현금을 **제공합니다** (더하기); **유동부채의 감소** (미지급비용)는 현금을 **사용합니다** (빼기).\n- $250,000 + $40,000 − $15,000 − $20,000 + $10,000 + $8,000 − $5,000 = **$268,000**.\n\n---\n[END]"}},"TBS 8.7":{"ja":{"title":"TBS 8.7: 収益認識 — ASC 606 5ステップモデルおよび配分","body":"**シナリオ:** ノバシステムズ(Nova Systems)は、**機械装置**および**2年間のサービス**をバンドル価格 **$120,000** で提供する契約に署名します。独立販売価格：機械装置 **$100,000**、サービス **$40,000**。機械装置は契約開始時に配送されます。サービスは2年間にわたり均等に提供されます。\n\n### Task 1: 取引価格の配分および第1年度の収益認識\n\n| 履行義務 | 独立販売価格 | 配分 | 第1年度収益 |\n|------------------------|------------------|-----------|----------------|\n| 機械装置 (一時点) | $100,000 | $120,000 × (100/140) = **$85,714** | $85,714 |\n| サービス (一定期間にわたり、2年) | $40,000 | $120,000 × (40/140) = **$34,286** | $17,143 |\n| **合計** | $140,000 | $120,000 | **$102,857** |\n\n**説明:**\n- **5ステップ**：(1) 契約を特定、(2) **履行義務** (識別可能な商品/サービス)を特定、(3) 取引価格を決定、(4) **相対的独立販売価格に基づき**価格を**配分**、(5) 各義務が充足された**時点/期間に**収益を認識。\n- 配分は相対的独立販売価格 (独立販売価格合計 $140,000) を使用：機械装置 $85,714、サービス $34,286。\n- 機械装置は**一時点で** (配送)支配を移転します → 第1年度に $85,714 を認識。サービスは**一定期間にわたり** (定額法)移転します → $34,286 / 2 = 年 $17,143。**第1年度収益 = $102,857。**\n\n---"},"ko":{"title":"TBS 8.7: 수익인식 — ASC 606 5단계 모델 및 배분","body":"**시나리오:** 노바 시스템즈(Nova Systems)는 **장비** 및 **2년간의 서비스**를 번들 가격 **$120,000**에 제공하기 위해 계약을 체결합니다. 개별판매가격: 장비 **$100,000**, 서비스 **$40,000**. 장비는 계약 개시 시 배송됩니다. 서비스는 2년간 균등하게 제공됩니다.\n\n### Task 1: 거래가격 배분 및 1년차 수익 인식\n\n| 수행의무 | 개별판매가격 | 배분 | 1년차 수익 |\n|------------------------|------------------|-----------|----------------|\n| 장비 (한 시점에) | $100,000 | $120,000 × (100/140) = **$85,714** | $85,714 |\n| 서비스 (기간에 걸쳐, 2년) | $40,000 | $120,000 × (40/140) = **$34,286** | $17,143 |\n| **합계** | $140,000 | $120,000 | **$102,857** |\n\n**설명:**\n- **5단계**: (1) 계약 파악, (2) **수행의무** (별개의 재화/용역) 파악, (3) 거래가격 결정, (4) **개별판매가격 기준 상대적 비율에 따라** 가격 **배분**, (5) 각 의무가 충족되는 **시점/기간**에 수익 인식.\n- 배분은 상대적 개별판매가격(전체 개별판매가격 $140,000) 사용: 장비 $85,714, 서비스 $34,286.\n- 장비는 **한 시점에** (배송) 통제를 이전합니다 → 1년차에 $85,714 인식. 서비스는 **기간에 걸쳐** (정액법) 이전합니다 → $34,286 / 2 = 연 $17,143. **1년차 수익 = $102,857.**\n\n---\n[END]"}},"TBS 8.8":{"ja":{"title":"政府基金残高分類（GASB 54）と調整","body":"**シナリオ:** Rivertonの一般基金は、総基金残高**$500,000**を報告しています。各項目を**GASB 54**に基づいて分類し、基金計算書が政府全体計算書に調整される必要がある理由を特定してください。\n\n### タスク1: 基金残高の分類（GASB 54）\n\n| 項目 | 金額 | 分類 |\n|------|--------|----------------|\n| 物品の在庫 | $30,000 | **非消費性** |\n| 道路修繕に制約された州助成金 | $200,000 | **制約** |\n| 議会条例により指定された積立金（資本） | $150,000 | **充当(コミット)** |\n| 拘束額/発注書（一般基金） | $40,000 | **割当** |\n| 残高 | $80,000 | **未割当** |\n\n### タスク2: 基金残高から政府全体純資産への調整\n\n| 調整項目 | 影響 |\n|------------------|--------|\n| 政府基金に報告されていない資本資産（純額） | **+ $5,000,000** |\n| 政府基金に報告されていない長期負債 | **− $3,000,000** |\n\n**説明:**\n- GASB 54の階級（制約が最も大きいものから少ないものへ）: **非消費性**（消費可能な形ではない、例えば在庫/前払金）、**制約**（外部/法的制約）、**充当(コミット)**（最高意思決定権者の公式措置）、**割当**（意図）、**未割当**（残差――一般基金のみ）。\n- 政府基金は**流動財務資源**測定焦点と**修正発生主義**基準を使用するため、資本資産と長期債務は除外されます。政府全体計算書は**経済的資源**焦点と**完全発生主義**基準を使用します。したがって、調整は資本資産を追加し、長期負債を差引きます。\n\n---"},"ko":{"title":"정부기금 잔액 분류 (GASB 54) 및 조정","body":"**시나리오:** Riverton의 일반기금이 총 기금잔액 **$500,000**을 보고합니다. 각 항목을 **GASB 54** 하에서 분류한 후, 기금계산서가 정부전체계산서로 조정되어야 하는 이유를 파악하세요.\n\n### 과제 1: 기금잔액 분류 (GASB 54)\n\n| 항목 | 금액 | 분류 |\n|------|--------|----------------|\n| 물품 재고 | $30,000 | **비소비성** |\n| 도로 수리로 제약된 주정부 보조금 | $200,000 | **제약** |\n| 이사회 조례로 지정된 적립금 (자본) | $150,000 | **지정** |\n| 약정/구매 발주 (일반기금) | $40,000 | **할당** |\n| 잔액 | $80,000 | **미할당** |\n\n### 과제 2: 기금잔액 → 정부전체 순포지션 조정\n\n| 조정 항목 | 영향 |\n|------------------|--------|\n| 정부기금에 보고되지 않은 자본자산 (순액) | **+ $5,000,000** |\n| 정부기금에 보고되지 않은 장기부채 | **− $3,000,000** |\n\n**설명:**\n- GASB 54 계층 (가장 제약이 많은 것에서 적은 것 순): **비소비성** (소비 가능한 형태가 아님, 예: 재고/선급금), **제약** (외부/법적 제약), **지정** (최고 의사결정권자의 공식 조치), **할당** (의도), **미할당** (잔액 — 일반기금만 해당).\n- 정부기금은 **유동재무자원** 측정 초점과 **수정발생주의** 기준을 사용하므로 자본자산과 장기부채를 제외합니다. 정부전체계산서는 **경제적자원** 초점과 **완전발생주의** 기준을 사용합니다. 따라서 조정은 자본자산을 더하고 장기부채를 뺍니다.\n\n---"}},"TBS 8.9":{"ja":{"title":"非営利――活動計算書及び純資産分類（ASU 2016-14）","body":"**シナリオ:** Helping Hands（非営利団体）は、年間を通じて以下の項目がありました。各項目を分類し、各純資産分類の変化を計算してください。営業費は**$400,000**でした（すべて寄付者制約のない純資産で報告されます）。\n\n### タスク1: 分類と計算\n\n| 項目 | 金額 | 純資産分類 |\n|------|--------|-----------------|\n| 制約のない寄付金 | $300,000 | 寄付者制約のない純資産 |\n| 建物建設に制約された寄付金 | $500,000 | 寄付者制約のある純資産 |\n| 使用時期に制約された寄付金（時間） | $100,000 | 寄付者制約のある純資産 |\n| 投資リターン、無制約 | $25,000 | 寄付者制約のない純資産 |\n| 制約から解放された純資産 | $150,000 | 再分類 |\n\n| 純資産分類 | 計算 | 変化 |\n|-----------------|-------------|--------|\n| **寄付者制約のない純資産** | $300,000 + $25,000 + $150,000解放 − $400,000費用 | **+ $75,000** |\n| **寄付者制約のある純資産** | $500,000 + $100,000 − $150,000解放 | **+ $450,000** |\n\n**説明:**\n- ASU 2016-14は、以前の3つのカテゴリを**2つ**に統合しました：**寄付者制約のない純資産**と**寄付者制約のある純資産**。\n- すべての**費用**は、**寄付者制約のない純資産**クラスで報告されます。寄付者の制約が満たされると、金額は**再分類**されます――制約のある純資産からの減少であり、制約のない純資産への増加です（「制約から解放された純資産」）。\n- 時間制約および目的制約の寄付は、時間が経過するか目的が満たされるまで**寄付者制約のある純資産**です。\n\n---"},"ko":{"title":"비영리 — 활동계산서 및 순자산 분류 (ASU 2016-14)","body":"**시나리오:** Helping Hands(비영리 단체)는 연중 다음 항목들이 있었습니다. 각 항목을 분류하고 각 순자산 분류의 변화를 계산하세요. 운영비는 **$400,000**이었습니다 (모두 기부자 제약 없는 순자산에 보고됨).\n\n### 과제 1: 분류 및 계산\n\n| 항목 | 금액 | 순자산 분류 |\n|------|--------|-----------------|\n| 제약 없는 기부금 | $300,000 | 기부자 제약 없는 순자산 |\n| 건물 건설 제약 기부금 | $500,000 | 기부자 제약 있는 순자산 |\n| 사용 시기 제약 기부금 (시간) | $100,000 | 기부자 제약 있는 순자산 |\n| 투자수익, 제약 없음 | $25,000 | 기부자 제약 없는 순자산 |\n| 제약이 해제된 순자산 | $150,000 | 재분류 |\n\n| 순자산 분류 | 계산 | 변화 |\n|-----------------|-------------|--------|\n| **기부자 제약 없는 순자산** | $300,000 + $25,000 + $150,000 해제 − $400,000 비용 | **+ $75,000** |\n| **기부자 제약 있는 순자산** | $500,000 + $100,000 − $150,000 해제 | **+ $450,000** |\n\n**설명:**\n- ASU 2016-14는 이전의 세 가지 분류를 **두 가지**로 통합했습니다: **기부자 제약 없는 순자산**과 **기부자 제약 있는 순자산**.\n- 모든 **비용**은 **기부자 제약 없는 순자산** 분류에서 보고됩니다. 기부자 제약이 충족되면, 금액은 **재분류**됩니다 — 제약 있는 순자산의 감소이면서 제약 없는 순자산의 증가입니다 (\"제약이 해제된 순자산\").\n- 시간 제약 및 목적 제약 기부금은 시간이 경과하거나 목적이 충족될 때까지 **기부자 제약 있는 순자산**입니다.\n\n---"}}},"traps":{"1":{"ja":{"name":"WACCのウェイト","correct":"時価","wrong":"簿価","mnemonic":"WACC = 時価（マーケット）"},"ko":{"name":"WACC 가중치","correct":"시장가치","wrong":"장부가치"}},"2":{"ja":{"name":"材料差異","correct":"価格→購入量、数量→使用量","wrong":"価格と数量を混同","mnemonic":"購入=価格、使用=数量"},"ko":{"name":"재료차이","correct":"가격→구입량, 수량→사용량","wrong":"가격·수량 혼동"}},"3":{"ja":{"name":"のれんの計算","correct":"子会社の100%","wrong":"取得割合","mnemonic":"全部 公正価値"},"ko":{"name":"영업권 계산","correct":"자회사의 100%","wrong":"취득지분율"}},"4":{"ja":{"name":"リスク対応","correct":"追求（積極的）","wrong":"受容（消極的）"},"ko":{"name":"위험대응","correct":"추구(적극적)","wrong":"수용(소극적)"}},"5":{"ja":{"name":"OWNESの論理","correct":"いずれか1つでファイナンス・リース","wrong":"全て必要"},"ko"
