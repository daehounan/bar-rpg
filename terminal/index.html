R&D","area":"BAR4","mnemonic":"상각→NRV순서","cluster":"B"},{"id":21,"name":"Target Profit Tax","correct":"Gross up: pretax = after-tax / (1 - t)","wrong":"Plug after-tax profit into CVP directly","area":"BAR3","mnemonic":"세후/(1-T)","cluster":"C"},{"id":22,"name":"Analytics Type","correct":"Prescriptive = recommends the action","wrong":"Predictive = recommends the action","area":"BAR1","mnemonic":"4가지 분석유형","cluster":"B"},{"id":23,"name":"FVH Direction","correct":"Fair-value hedge G/L -> current earnings","wrong":"Fair-value hedge G/L -> OCI","area":"BAR4","mnemonic":"FVH = 반대로","cluster":"A"},{"id":24,"name":"Intercompany Bond","correct":"Constructive retirement: immediate G/L","wrong":"Defer and amortize to maturity","area":"BAR4","mnemonic":"장부↔시장 차이","cluster":"A"},{"id":25,"name":"BS vs Op Statement","correct":"Deferred in/outflows -> Statement of NET POSITION","wrong":"Reported on the operating statement","area":"BAR5","mnemonic":"FB=Fund, NP=Proprietary","cluster":"D"},{"id":26,"name":"Exchange NonExchange","correct":"Property tax = IMPOSED nonexchange (when levied)","wrong":"Exchange revenue when cash received","area":"BAR5","mnemonic":"교환=등가, 비교환=정부권력","cluster":"D"},{"id":27,"name":"Settlement Type","correct":"Settlement: immediate pro-rata G/L recognition","wrong":"Amortize over remaining service period","area":"BAR4","mnemonic":"현금=부채, 주식=자본","cluster":"A"},{"id":28,"name":"Variance Signs","correct":"Actual < Standard (cost) = FAVORABLE","wrong":"Actual < Standard = Unfavorable","area":"BAR3","mnemonic":"U=초과, F=절감","cluster":"C"},{"id":29,"name":"MD&A Position","correct":"MD&A = RSI placed BEFORE the statements","wrong":"Placed after the notes / optional","area":"BAR5","mnemonic":"MD&A = 먼저 = 앞","cluster":"D"},{"id":30,"name":"IT Gov Scope","correct":"ITGC = pervasive (access, change mgmt)","wrong":"Transaction-level application controls","area":"BAR1","mnemonic":"IT Gov=전사, Mgmt=부서","cluster":"B"},{"id":31,"name":"Fund JE Direction","correct":"Budget: DR Estimated Revenues / CR Appropriations","wrong":"DR Appropriations / CR Estimated Revenues","area":"BAR5","mnemonic":"PO→Reverse→Actual","cluster":"D"}],"trapCodex":[],"mnemonics":[{"code":"PATRS","full":"Pursue, Accept, Transfer, Reduce, Self-insure","category":"Risk Response"},{"code":"DUNS","full":"Diversifiable, Undiversifiable, Nondiversifiable, Systematic","category":"Risk Types"},{"code":"WRITEN","full":"Wealth, Related goods, Income, Tastes, Expectations, Number","category":"Demand Shifts"},{"code":"ECOST","full":"Expectations, Costs, Other goods, Subsidies, Technology","category":"Supply Shifts"},{"code":"MIC","full":"Market, Income, Cost","category":"Asset Valuation"},{"code":"CAR IN BIG","full":"CAR eliminate, Investment, NCI, Balance sheet FV, Intangibles, Goodwill","category":"Consolidation"},{"code":"OWNES","full":"Ownership, Written option, Ninety percent, Economic life, Specialized","category":"Finance Lease"},{"code":"GRaSPP","full":"General, Revenue/Service, Project, Permanent","category":"Governmental Funds"},{"code":"CIPPOE","full":"Custodial, Investment, Private, Pension, Other Employee","category":"Fiduciary Funds"},{"code":"SELF","full":"Separately elected, Legal entity, Fiscally independent","category":"Primary Government"},{"code":"BAE-BAE","full":"Budget, Activity, Encumbrances","category":"Fund Accounting"},{"code":"CANS","full":"Capital assets, Accumulated depr, Non-current liab, Internal Service","category":"FB → NP"},{"code":"CPAS RIDES","full":"Capital, Principal, Asset disposal, Sources, Revenue, Interest, Depr, Service","category":"ΔFB → ΔNP"},{"code":"SOC","full":"Services, Operating grants, Capital grants","category":"Program Revenues"}],"formulas":[{"name":"WACC","f":"(E/V x Re) + (D/V x Rd x (1-T))","area":"BAR2"},{"name":"CAPM","f":"R = Rf + B[E(Rm) - Rf]","area":"BAR2"},{"name":"DDM (Gordon)","f":"P = D1 / (R - G)","area":"BAR2"},{"name":"NPV","f":"Sum(CFt / (1+r)^t) - Initial Investment","area":"BAR2"},{"name":"Profitability Index","f":"PV of Future CF / Initial Investment","area":"BAR2"},{"name":"After-tax Cost of Debt","f":"Rd x (1 - T)","area":"BAR2"},{"name":"EOQ","f":"sqrt(2DS / H)","area":"BAR2"},{"name":"Reorder Point","f":"Safety Stock + (Lead Time x Daily Usage)","area":"BAR2"},{"name":"Breakeven Units","f":"Fixed Costs / CM per unit","area":"BAR3"},{"name":"Target Units","f":"(Fixed Costs + Target Profit) / CM per unit","area":"BAR3"},{"name":"Target Units (after-tax)","f":"[FC + (After-tax Profit / (1 - T))] / CM per unit","area":"BAR3"},{"name":"Material Price Variance","f":"(AP - SP) x AQ Purchased","area":"BAR3"},{"name":"Material Qty Variance","f":"(AQ Used - SQ) x SP","area":"BAR3"},{"name":"Labor Rate Variance","f":"(AR - SR) x AH","area":"BAR3"},{"name":"Labor Efficiency Variance","f":"(AH - SH) x SR","area":"BAR3"},{"name":"OH Spending Variance","f":"Actual OH - Budgeted OH","area":"BAR3"},{"name":"OH Volume Variance","f":"Budgeted Fixed OH - Applied Fixed OH","area":"BAR3"},{"name":"Contribution Margin","f":"Sales - Variable Costs","area":"BAR3"},{"name":"Net Working Capital","f":"Current Assets - Current Liabilities","area":"BAR2"},{"name":"Current Ratio","f":"Current Assets / Current Liabilities","area":"BAR2"},{"name":"Quick Ratio","f":"(Cash + Mkt Sec + Receivables) / Current Liab","area":"BAR2"},{"name":"EVA","f":"NOPAT - (WACC x Invested Capital)","area":"BAR2"}],"tbs":[{"id":"TBS 7.1","title":"Working Capital and Financing Analysis","body":"**Scenario:** Analysis of various financing methods and their impact on working capital balances.\n\n### Task 1: Impact on Working Capital\n\n| Financing Method | Current Assets Impact | Current Liabilities Impact |\n|------------------|----------------------|---------------------------|\n| Term loan (24 mo, monthly principal) | +$240,000 | +$120,000 |\n| Term loan (balloon payment at maturity) | +$240,000 | No change |\n| 12-month line of credit (50% drawdown) | +$120,000 | +$120,000 |\n| Factoring receivables (12% discount) | -$40,000 | No change |\n| Sale of fixed assets for $100,000 | +$100,000 | No change |\n\n**Explanation:**\n- **Row 2:** 24-month term loan with monthly principal payments means half ($120,000) is due within 12 months (current liability).\n- **Row 3:** Balloon payment at maturity means no principal due within 12 months, so no current liability.\n- **Row 4:** Line of credit repayment due at end of 12 months makes entire drawdown a current liability.\n- **Row 5:** Factoring reduces receivables but increases cash less the discount ($333,333 × 12% = $40,000).\n- **Row 6:** Sale of trucks converts long-term assets to cash.\n\n---","interactive":{"prompt":"**Scenario:** A company is evaluating financing methods and their effect on **working capital** (current assets vs. current liabilities). For each method below, enter the change in **current assets** and **current liabilities**.\n\nMethods:\n- **Term loan** ($240,000, 24 months, monthly principal payments)\n- **Term loan** ($240,000, single balloon payment at maturity)\n- **12-month line of credit** ($240,000 limit, 50% drawn)\n- **Factoring** receivables of $333,333 at a 12% discount\n- **Sale of fixed assets** for $100,000 cash\n\n*Enter dollar amounts; use a negative number for a decrease, and 0 for no change.*","fields":[{"label":"Term loan (24mo monthly) — Δ Current Assets","type":"num","answer":240000,"tol":0,"explain":"Cash received +$240,000"},{"label":"Term loan (24mo monthly) — Δ Current Liabilities","type":"num","answer":120000,"tol":0,"explain":"Half ($120,000) of principal is due within 12 months → current"},{"label":"Term loan (balloon) — Δ Current Assets","type":"num","answer":240000,"tol":0,"explain":"Cash received +$240,000"},{"label":"Term loan (balloon) — Δ Current Liabilities","type":"num","answer":0,"tol":0,"explain":"Balloon at maturity → no principal due within 12 months"},{"label":"12-mo line of credit (50% drawn) — Δ Current Assets","type":"num","answer":120000,"tol":0,"explain":"50% × $240,000 drawn = $120,000 cash"},{"label":"12-mo line of credit (50% drawn) — Δ Current Liabilities","type":"num","answer":120000,"tol":0,"explain":"Due within 12 months → entire drawdown is current"},{"label":"Factoring (12% discount) — Δ Current Assets","type":"num","answer":-40000,"tol":0,"explain":"Receivables −$333,333, cash +$293,333 → net −$40,000 (the 12% discount)"},{"label":"Factoring (12% discount) — Δ Current Liabilities","type":"num","answer":0,"tol":0,"explain":"No liability created"},{"label":"Sale of fixed assets ($100,000) — Δ Current Assets","type":"num","answer":100000,"tol":0,"explain":"Long-term asset converted to $100,000 cash"},{"label":"Sale of fixed assets ($100,000) — Δ Current Liabilities","type":"num","answer":0,"tol":0,"explain":"No liability created"}]},"area":"BAR2"},{"id":"TBS 7.2","title":"Product Line Profitability Analysis (Make or Buy)","body":"### Part I: Make vs. Buy Analysis\n\n**BRINK PRODUCT LINE—Projected Sales = 50,000 units**\n\n| Cost Line Item | Total Cost | Cost per Unit |\n|----------------|------------|---------------|\n| Direct materials | $35,000 | $0.70 |\n| Direct labor | $200,000 | $4.00 |\n| Fixed overhead (avoidable) | $84,000 | $1.68 |\n| Variable overhead | $180,000 | $3.60 |\n| **Totals** | **$499,000** | **$9.98** |\n\n**Analysis:**\n- Current cost to make: $9.98 per unit\n- Offer to buy: $9.10 per unit\n- Breakeven avoidable fixed costs: ($9.98 - $9.10) × 50,000 = $44,000\n\nIf avoidable fixed costs can be reduced to $40,000, the make-or-buy decision becomes cost neutral.\n\n---","interactive":{"prompt":"**Scenario — Make or Buy (BRINK product line, 50,000 units):**\n\n| Cost item | Total | Per unit |\n|---|---|---|\n| Direct materials | $35,000 | $0.70 |\n| Direct labor | $200,000 | $4.00 |\n| Fixed overhead (avoidable) | $84,000 | $1.68 |\n| Variable overhead | $180,000 | $3.60 |\n\nAn outside supplier offers the part at **$9.10 per unit**.","fields":[{"label":"Current total cost to make, per unit ($)","type":"num","answer":9.98,"tol":0.01,"explain":"$499,000 / 50,000 = $9.98"},{"label":"Breakeven avoidable fixed cost ($)","type":"num","answer":44000,"tol":0,"explain":"($9.98 − $9.10) × 50,000 = $44,000"},{"label":"Decision (avoidable fixed cost is $84,000)","type":"select","options":["Make","Buy"],"answer":"Buy","explain":"Buy $455,000 < Make $499,000 → buy saves $44,000"}]},"area":"BAR3"},{"id":"TBS 7.3","title":"Hedging Journal Entries","body":"### Hedge Types and Reporting\n\n| Scenario | Hedge Type | Impact on Earnings | Impact on OCI |\n|----------|------------|-------------------|---------------|\n| Variable-rate debt + interest rate swap | Cash flow hedge | $0 | ($15,000) |\n| Inventory + futures contract | Fair value hedge | ($50) | $0 |\n| Net investment in foreign subsidiary + forward contract | Net investment hedge | $0 | $600 |\n\n**Explanation:**\n- **Cash flow hedge:** Unrealized losses reported in OCI until hedged item affects earnings.\n- **Fair value hedge:** Both gain on derivative and offsetting loss on inventory recognized in earnings.\n- **Net investment hedge:** Forward contract gain and cumulative translation adjustment both in OCI.\n\n---","interactive":{"prompt":"**Scenario — Hedge classification & reporting.** For each hedge, identify the **hedge type** and where the periodic gain/loss is reported (**Earnings** vs **OCI**).\n\n1. **Variable-rate debt** hedged with an **interest-rate swap** (swap fair-value change −$15,000).\n2. **Inventory** (recognized asset) hedged with a **futures contract**.\n3. **Net investment in a foreign subsidiary** hedged with a **forward contract** (gain $600).","fields":[{"label":"1. Variable-rate debt + swap — hedge type","type":"select","options":["Cash flow hedge","Fair value hedge","Net investment hedge"],"answer":"Cash flow hedge","explain":"Hedging variability of future cash flows"},{"label":"1. The $15,000 swap loss is reported in…","type":"select","options":["Earnings","OCI"],"answer":"OCI","explain":"Cash flow hedge → effective portion to OCI until hedged item hits earnings"},{"label":"2. Inventory + futures — hedge type","type":"select","options":["Cash flow hedge","Fair value hedge","Net investment hedge"],"answer":"Fair value hedge","explain":"Hedging fair value of a recognized asset"},{"label":"2. The derivative gain/loss is reported in…","type":"select","options":["Earnings","OCI"],"answer":"Earnings","explain":"Fair value hedge → both derivative and hedged item to earnings"},{"label":"3. Net investment + forward — hedge type","type":"select","options":["Cash flow hedge","Fair value hedge","Net investment hedge"],"answer":"Net investment hedge","explain":"Hedging a net investment in a foreign operation"},{"label":"3. The $600 forward gain is reported in…","type":"select","options":["Earnings","OCI"],"answer":"OCI","explain":"Net investment hedge → to OCI (with the CTA)"}]},"area":"BAR4"},{"id":"TBS 7.4","title":"Construction Contract Accounting","body":"### Three-Year Construction Project Journal Entries\n\n**Year 1 Entry:**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| CIP | $3,375,000 | |\n| Contracts Receivable | $350,000 | |\n| Construction Expense | $2,362,500 | |\n| Cash | | $512,500 |\n| Progress Billings | | $2,200,000 |\n| Construction Revenue | | $3,375,000 |\n\n**Calculations:**\n- Percentage complete: $2,362,500 / $5,250,000 = 45%\n- Expected profit: $7,500,000 - $5,250,000 = $2,250,000\n- Recognized profit: $2,250,000 × 45% = $1,012,500\n- CIP = $2,362,500 + $1,012,500 = $3,375,000\n\n---","interactive":{"prompt":"**Scenario — Long-term construction (over-time / percentage-of-completion).** Total contract price **$7,500,000**; total estimated cost **$5,250,000**; costs incurred to date (Year 1) **$2,362,500**.","fields":[{"label":"Percentage complete (%)","type":"num","answer":45,"tol":0,"explain":"$2,362,500 / $5,250,000 = 45%"},{"label":"Total expected profit ($)","type":"num","answer":2250000,"tol":0,"explain":"$7,500,000 − $5,250,000"},{"label":"Year 1 gross profit recognized ($)","type":"num","answer":1012500,"tol":0,"explain":"$2,250,000 × 45%"},{"label":"Year 1 revenue recognized ($)","type":"num","answer":3375000,"tol":0,"explain":"$7,500,000 × 45%"},{"label":"Year 1 CIP balance ($)","type":"num","answer":3375000,"tol":0,"explain":"Costs $2,362,500 + profit $1,012,500"}]},"area":"BAR4"},{"id":"TBS 7.5","title":"Standard Costing Variance Analysis","body":"### Direct Materials Variances\n\n**First Journal Entry (Purchase):**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| Raw materials inventory (45,000 × $15) | $675,000 | |\n| Direct materials purchase price variance | $90,000 | |\n| Accounts payable (45,000 × $17) | | $765,000 |\n\n**Price Variance:** 45,000 × ($17 - $15) = $90,000 Unfavorable\n\n**Second Journal Entry (Usage):**\n| Account | Debit | Credit |\n|---------|-------|--------|\n| Work-in-process inventory (42,500 × $15) | $637,500 | |\n| Direct materials usage variance | $67,500 | |\n| Raw materials inventory (47,000 × $15) | | $705,000 |\n\n**Usage Variance:** $15 × (47,000 - 42,500) = $67,500 Unfavorable\n\n---","interactive":{"prompt":"**Scenario — Direct materials variances (standard costing).** Standard price **$15**/unit. Purchased **45,000** units at **$17**. Used **47,000** units; standard quantity allowed **42,500** units.","fields":[{"label":"Materials price variance, amount ($)","type":"num","answer":90000,"tol":0,"explain":"($17 − $15) × 45,000 = $90,000"},{"label":"Price variance is…","type":"select","options":["Favorable","Unfavorable"],"answer":"Unfavorable","explain":"Actual price > standard → unfavorable"},{"label":"Materials usage (quantity) variance, amount ($)","type":"num","answer":67500,"tol":0,"explain":"(47,000 − 42,500) × $15 = $67,500"},{"label":"Usage variance is…","type":"select","options":["Favorable","Unfavorable"],"answer":"Unfavorable","explain":"Used more than allowed → unfavorable"}]},"area":"BAR3"},{"id":"TBS 7.6","title":"Stock-Based Compensation","body":"### Stock Options Journal Entries\n\n**Year 2 & Year 3 - Record Compensation Expense:**\n```\nDR Compensation expense    $15,000\n    CR APIC—Stock options         $15,000\n```\n\n**Year 4 - Exercise of Options:**\n```\nDR Cash ($45 × 5,000)           $225,000\nDR APIC—Stock options            $30,000\n    CR Common stock ($20 × 5,000)       $100,000\n    CR APIC—Common stock (plug)         $155,000\n```\n\n**Stock Appreciation Rights (SARs):**\n- Year 1 compensation expense = Stock appreciation × SARs × Service rendered\n- = ($97 - $76) × 32,000 × 1/2 = $336,000\n- Year 2 adjustment based on fair value changes\n\n---","interactive":{"prompt":"**Scenario — Stock-based compensation.** Options on **5,000** shares, exercise price **$45**, par **$20**. At exercise, accumulated **APIC—stock options = $30,000**.\n\nSeparately, **SARs**: 32,000 rights; share price rose from **$76 to $97**; **half** the service period has elapsed.","fields":[{"label":"Exercise: Cash received ($)","type":"num","answer":225000,"tol":0,"explain":"$45 × 5,000"},{"label":"Exercise: Common stock credited at par ($)","type":"num","answer":100000,"tol":0,"explain":"$20 × 5,000"},{"label":"Exercise: APIC—Common stock (plug) ($)","type":"num","answer":155000,"tol":0,"explain":"(Cash 225,000 + APIC-options 30,000) − par 100,000"},{"label":"SAR Year-1 compensation expense ($)","type":"num","answer":336000,"tol":0,"explain":"($97 − $76) × 32,000 × 1/2"}]},"area":"BAR4"},{"id":"TBS 7.7","title":"Lease Accounting","body":"### Finance Lease Recognition\n\n**Lessee Initial Entry:**\n```\nDR ROU Asset               $496,736\n    CR Lease Liability              $496,736\n```\n\n**Calculation:**\n- Present value of lease payments: $472,061\n- Present value of guaranteed residual: $24,675\n- Total: $496,736\n\n**Amortization Schedule:**\n\n| Date | Payment | Interest (6%) | Principal | Carrying Value |\n|------|---------|---------------|-----------|----------------|\n| Jan 1, Yr 1 | | | | $496,736 |\n| Dec 31, Yr 1 | $96,000 | $29,804 | $66,196 | $430,540 |\n| Dec 31, Yr 2 | $96,000 | $25,832 | $70,168 | $360,373 |\n| Dec 31, Yr 3 | $96,000 | $21,622 | $74,378 | $285,995 |\n| Dec 31, Yr 4 | $96,000 | $17,160 | $78,840 | $207,155 |\n| Dec 31, Yr 5 | $96,000 | $12,429 | $83,571 | $123,584 |\n| Dec 31, Yr 6 | $96,000 | $7,416 | $88,584 | $35,000 |\n\n**Total Interest Revenue:** $114,264\n\n---","interactive":{"prompt":"**Scenario — Finance lease (lessee).** PV of lease payments **$472,061**; PV of guaranteed residual **$24,675**. Annual payment **$96,000** at year-end; discount rate **6%**.","fields":[{"label":"Initial ROU asset / lease liability ($)","type":"num","answer":496736,"tol":1,"explain":"$472,061 + $24,675"},{"label":"Year 1 interest expense ($)","type":"num","answer":29804,"tol":2,"explain":"$496,736 × 6%"},{"label":"Year 1 principal reduction ($)","type":"num","answer":66196,"tol":2,"explain":"$96,000 − $29,804"},{"label":"Year 1 ending carrying value ($)","type":"num","answer":430540,"tol":2,"explain":"$496,736 − $66,196"}]},"area":"BAR4"},{"id":"TBS 7.8","title":"Government Fund Journal Entries","body":"### Common Governmental Fund Entries\n\n| Transaction | Entry |\n|-------------|-------|\n| Issuance of general obligation bonds | DR Cash / CR Other financing sources |\n| Issue purchase orders | DR Encumbrance control / CR Budgetary control |\n| Receipt of ordered supplies | DR Budgetary control / CR Encumbrance control; DR Expenditures control / CR Vouchers payable |\n| Record salaries and wages | DR Expenditures control / CR Vouchers payable |\n| Grant revenue earned | DR Deferred inflows of resources / CR Grant revenues |\n| Property taxes collected in advance | DR Cash / CR Deferred inflows of resources |\n| Budget adoption (surplus) | DR Estimated revenues / CR Appropriations control / CR Budgetary control |\n| Tax anticipation notes | DR Cash / CR Tax anticipation notes payable |\n\n---","interactive":{"prompt":"**Scenario — Governmental fund (modified accrual) journal entries.** For each transaction, choose the correct account.","fields":[{"label":"Issuance of general obligation bonds — credit account","type":"select","options":["Other financing sources","Bonds payable","Revenues","Other financing uses"],"answer":"Other financing sources","explain":"Governmental funds: bond proceeds = other financing source (no LT liability in the fund)"},{"label":"Issue purchase orders — credit account","type":"select","options":["Budgetary control","Vouchers payable","Expenditures control","Cash"],"answer":"Budgetary control","explain":"DR Encumbrance control / CR Budgetary control (fund balance—reserved)"},{"label":"Record salaries and wages — credit account","type":"select","options":["Vouchers payable","Cash","Encumbrance control","Appropriations"],"answer":"Vouchers payable","explain":"DR Expenditures control / CR Vouchers payable"},{"label":"Property taxes collected in advance — credit account","type":"select","options":["Deferred inflows of resources","Revenues","Other financing sources","Vouchers payable"],"answer":"Deferred inflows of resources","explain":"Not yet earned/available → deferred inflow"}]},"area":"BAR5"},{"id":"TBS 7.9","title":"Foreign Currency Translation vs. Remeasurement","body":"### Comparison of Methods\n\n| Item | Remeasurement Method | Translation Method |\n|------|---------------------|-------------------|\n| **Balance Sheet** | | |\n| Monetary items | Current rate | Current rate |\n| Nonmonetary items | Historical rate | Current rate |\n| Inventory (purchased evenly) | Weighted average | Current rate |\n| Common/Preferred stock | Historical rate | Historical rate |\n| **Income Statement** | | |\n| Revenue/Expenses | Weighted average | Weighted average |\n| Depreciation | Historical rate | Weighted average |\n| **Plug Figure** | Gain/Loss on I/S | Cumulative Translation Adjustment in OCI |\n\n---","interactive":{"prompt":"**Scenario — Foreign currency: Remeasurement (temporal) vs. Translation (current-rate).** Choose the exchange rate used for each item, and where the resulting plug is reported.","fields":[{"label":"Remeasurement — monetary items (rate)","type":"select","options":["Current rate","Historical rate","Weighted average"],"answer":"Current rate","explain":"Temporal: monetary items at current rate"},{"label":"Remeasurement — nonmonetary items (rate)","type":"select","options":["Current rate","Historical rate","Weighted average"],"answer":"Historical rate","explain":"Temporal: nonmonetary items at historical rate"},{"label":"Translation — nonmonetary items (rate)","type":"select","options":["Current rate","Historical rate","Weighted average"],"answer":"Current rate","explain":"Current-rate method: all balance-sheet items at current rate"},{"label":"Remeasurement — plug (gain/loss) reported in…","type":"select","options":["Income statement","OCI"],"answer":"Income statement","explain":"Remeasurement gain/loss → earnings"},{"label":"Translation — plug (CTA) reported in…","type":"select","options":["Income statement","OCI"],"answer":"OCI","explain":"Cumulative translation adjustment → OCI"}]},"area":"BAR4"},{"id":"TBS 7.10","title":"Economics - Supply and Demand Analysis","body":"### Market Equilibrium Effects\n\n| Event | Curve Shift | Price Effect | Quantity Effect |\n|-------|-------------|--------------|-----------------|\n| Increase in consumer income + decrease in corporate tax | Demand → right, Supply → right | Unknown | Increases |\n| Consumers expect future price increases | Demand → right | Increases | Increases |\n| Fewer buyers + decreased production costs | Demand → left, Supply → right | Decreases | Unknown |\n| Increased consumer wealth + government subsidies | Demand → right, Supply → right | Unknown | Increases |\n| Production technology improvements | Supply → right | Decreases | Increases |\n| Increase in complementary goods price + decline in preferences | Demand → left | Decreases | Decreases |\n| Decrease in substitute prices + rising labor costs | Demand → left, Supply → left | Unknown | Decreases |\n\n---","interactive":{"prompt":"**Scenario — Supply & demand: equilibrium effects.** For each event, choose the effect on **price** and **quantity**. (Choose *Unknown* when the two shifts push price or quantity in opposite directions.)","fields":[{"label":"Consumers expect future price increases (Demand → right) — Price","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Increases","explain":"Demand right → price up, quantity up"},{"label":"…same event — Quantity","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Increases","explain":"Demand right → quantity up"},{"label":"Production technology improves (Supply → right) — Price","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Decreases","explain":"Supply right → price down, quantity up"},{"label":"…same event — Quantity","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Increases","explain":"Supply right → quantity up"},{"label":"Higher income + lower corporate tax (Demand → right, Supply → right) — Quantity","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Increases","explain":"Both curves right → quantity up; price ambiguous"},{"label":"…same event — Price","type":"select","options":["Increases","Decreases","Unknown"],"answer":"Unknown","explain":"Demand-right pushes price up, supply-right pushes price down → indeterminate"}]},"area":"BAR1"},{"id":"TBS 8.1","title":"Consolidation — NCI and Intercompany Inventory Elimination","body":"**Scenario:** Parker Co. owns **80%** of Sutton Co. During Year 1, Parker (the parent) sold inventory to Sutton for **$100,000** (Parker's cost was **$70,000**). At December 31, Sutton still holds **40%** of that inventory unsold. Sutton reported separate net income of **$200,000**.\n\n### Task 1: Consolidation Eliminating Entries\n\n| # | Entry | Debit | Credit |\n|---|-------|-------|--------|\n| 1 | Eliminate intercompany sale (DR Sales / CR COGS) | $100,000 | $100,000 |\n| 2 | Eliminate unrealized profit in ending inventory (DR COGS / CR Inventory) | $12,000 | $12,000 |\n\n### Task 2: NCI in Subsidiary Net Income\n\n| Item | Amount |\n|------|--------|\n| Sutton reported net income | $200,000 |\n| Adjustment for intercompany profit (downstream) | $0 |\n| NCI share (20%) | **$40,000** |\n\n**Explanation:**\n- Gross profit rate = ($100,000 − $70,000) / $100,000 = **30%**. Unrealized profit in ending inventory = $100,000 × 40% × 30% = **$12,000**, deferred until Sutton sells to outsiders.\n- This is a **downstream** sale (parent → subsidiary), so the entire unrealized profit is eliminated against the **controlling interest**; NCI is **not** adjusted. (For an **upstream** sale, the unrealized profit would be allocated between controlling and noncontrolling interests by ownership %.)\n- NCI net income = 20% × $200,000 = **$40,000**.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Consolidation (NCI + intercompany inventory).** Parker owns **80%** of Sutton. During Year 1 Parker (parent) sold inventory to Sutton for **$100,000** (Parker's cost **$70,000**). At year-end Sutton still holds **40%** of that inventory. Sutton's separate net income **$200,000**. (Downstream sale.)","fields":[{"label":"Gross profit rate on the intercompany sale (%)","type":"num","answer":30,"tol":0,"explain":"($100,000 − $70,000) / $100,000"},{"label":"Unrealized profit deferred in ending inventory ($)","type":"num","answer":12000,"tol":0,"explain":"$100,000 × 40% × 30%"},{"label":"Amount to eliminate intercompany sales ($)","type":"num","answer":100000,"tol":0,"explain":"DR Sales / CR COGS for the full $100,000"},{"label":"NCI in subsidiary net income ($)","type":"num","answer":40000,"tol":0,"explain":"20% × $200,000 (downstream → no NCI adjustment)"},{"label":"Is the unrealized profit allocated to NCI?","type":"select","options":["No (downstream)","Yes (split by %)"],"answer":"No (downstream)","explain":"Downstream: 100% against controlling interest"}]},"area":"BAR4"},{"id":"TBS 8.2","title":"Business Combination — Acquisition Method, Goodwill vs. Bargain Purchase","body":"**Scenario:** Apex Inc. acquires a controlling interest in Tara Co. Two independent cases below. US GAAP uses the **full (100%) goodwill** method: goodwill is measured for the whole acquiree, including the NCI.\n\n### Task 1: Compute Goodwill or Gain\n\n| Item | Case A | Case B |\n|------|--------|--------|\n| Consideration transferred (75%) | $600,000 | $480,000 |\n| Fair value of noncontrolling interest (25%) | $190,000 | $150,000 |\n| **Total fair value of the acquiree** | **$790,000** | **$630,000** |\n| Less: fair value of identifiable net assets (100%) | ($700,000) | ($700,000) |\n| **Result** | **Goodwill $90,000** | **Bargain purchase gain $70,000** |\n\n**Explanation:**\n- Goodwill = (consideration transferred + fair value of NCI + fair value of any previously held equity interest) − fair value of **identifiable** net assets acquired.\n- **Case A:** $790,000 − $700,000 = **$90,000 goodwill** (capitalized; not amortized, tested for impairment).\n- **Case B:** $630,000 − $700,000 = **($70,000)** → a **bargain purchase**. After reassessing that all assets/liabilities were correctly identified and measured, the excess is recognized as a **gain in earnings** on the acquisition date.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Acquisition method (full goodwill).** Identifiable net assets at fair value (100%) = **$700,000** in both cases.\n- **Case A:** consideration $600,000 (75%); FV of NCI $190,000 (25%).\n- **Case B:** consideration $480,000 (75%); FV of NCI $150,000 (25%).","fields":[{"label":"Case A — total fair value of acquiree ($)","type":"num","answer":790000,"tol":0,"explain":"$600,000 + $190,000"},{"label":"Case A — goodwill ($)","type":"num","answer":90000,"tol":0,"explain":"$790,000 − $700,000"},{"label":"Case B — total fair value of acquiree ($)","type":"num","answer":630000,"tol":0,"explain":"$480,000 + $150,000"},{"label":"Case B — result","type":"select","options":["Goodwill","Bargain purchase gain"],"answer":"Bargain purchase gain","explain":"$630,000 < $700,000 → bargain purchase"},{"label":"Case B — gain recognized ($)","type":"num","answer":70000,"tol":0,"explain":"$700,000 − $630,000, recognized in earnings"}]},"area":"BAR4"},{"id":"TBS 8.3","title":"Net Periodic Pension Cost — Components","body":"**Scenario:** Compute Dalton Corp.'s net periodic pension cost for the year from the components below (defined benefit plan, US GAAP).\n\n### Task 1: Net Periodic Pension Cost\n\n| Component | Effect | Amount |\n|-----------|--------|--------|\n| Service cost | + | $120,000 |\n| Interest cost | + | $90,000 |\n| Expected return on plan assets | − | ($80,000) |\n| Amortization of prior service cost | + | $15,000 |\n| Amortization of net actuarial loss | + | $5,000 |\n| **Net periodic pension cost** | | **$150,000** |\n\n**Explanation:**\n- Mnemonic **S I R - A G E**: **S**ervice cost, **I**nterest cost, expected **R**eturn (subtract), **A**mortization of prior service cost, **G**ains/losses amortization, **E**xisting (transition) obligation amortization.\n- **Service** and **Interest** cost **increase** the expense; the **expected return** on plan assets **decreases** it. (Note: the *expected* return is used in the P&L component; the difference vs. the actual return is an actuarial gain/loss.)\n- $120,000 + $90,000 − $80,000 + $15,000 + $5,000 = **$150,000**.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Net periodic pension cost (defined benefit, US GAAP).** Service cost **$120,000**; interest cost **$90,000**; expected return on plan assets **$80,000**; amortization of prior service cost **$15,000**; amortization of net actuarial loss **$5,000**.","fields":[{"label":"Net periodic pension cost ($)","type":"num","answer":150000,"tol":0,"explain":"120,000 + 90,000 − 80,000 + 15,000 + 5,000"},{"label":"Expected return on plan assets…","type":"select","options":["Decreases pension cost","Increases pension cost"],"answer":"Decreases pension cost","explain":"Expected return is subtracted (S I R-A-G-E)"}]},"area":"BAR4"},{"id":"TBS 8.4","title":"Earnings Per Share — Basic and Diluted","body":"**Scenario:** Vento Corp. for Year 1: net income **$500,000**; cumulative preferred dividends **$50,000**; weighted-average common shares **200,000**. Potentially dilutive securities: (a) **30,000** options, exercise price **$20**, average market price **$25**; (b) **$1,000,000** of **8%** convertible bonds, convertible into **20,000** shares. Tax rate **25%**.\n\n### Task 1: Basic and Diluted EPS\n\n| Step | Numerator | Denominator | EPS |\n|------|-----------|-------------|-----|\n| Basic | $500,000 − $50,000 = $450,000 | 200,000 | **$2.25** |\n| + Options (treasury stock method) | $450,000 | 200,000 + 6,000 = 206,000 | $2.18 |\n| + Convertible bonds (test) | $450,000 + $60,000 | 206,000 + 20,000 = 226,000 | $2.26 → **antidilutive** |\n| **Diluted (final)** | $450,000 | 206,000 | **$2.18** |\n\n**Explanation:**\n- **Options (TSM):** proceeds = 30,000 × $20 = $600,000; shares repurchased = $600,000 / $25 = 24,000; incremental shares = 30,000 − 24,000 = **6,000**. Dilutive (lowers EPS) → included.\n- **Convertible bonds:** after-tax interest add-back = $1,000,000 × 8% × (1 − 0.25) = **$60,000**; incremental EPS = $60,000 / 20,000 = **$3.00**, which is **greater** than the running diluted EPS ($2.18) → **antidilutive**, so the bonds are **excluded**.\n- Always test each security from **most dilutive to least**, and exclude any whose incremental EPS exceeds the running total. Diluted EPS = $450,000 / 206,000 = **$2.18**.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Basic & diluted EPS.** Net income **$500,000**; cumulative preferred dividends **$50,000**; weighted-average common shares **200,000**. Options: 30,000 at $20 exercise, average market $25. Convertible bonds: $1,000,000 of 8%, convertible into 20,000 shares; tax rate 25%.","fields":[{"label":"Basic EPS ($)","type":"num","answer":2.25,"tol":0.01,"explain":"($500,000 − $50,000) / 200,000"},{"label":"Incremental shares from options (treasury stock method)","type":"num","answer":6000,"tol":0,"explain":"30,000 − (30,000×$20)/$25 = 30,000 − 24,000"},{"label":"The convertible bonds are…","type":"select","options":["Antidilutive (exclude)","Dilutive (include)"],"answer":"Antidilutive (exclude)","explain":"Incremental EPS $60,000/20,000 = $3.00 > running $2.18 → antidilutive"},{"label":"Diluted EPS ($)","type":"num","answer":2.18,"tol":0.01,"explain":"$450,000 / (200,000 + 6,000)"}]},"area":"BAR4"},{"id":"TBS 8.5","title":"Deferred Income Taxes — Temporary Differences and the Tax Provision","body":"**Scenario:** Mercer Co. has **pretax financial income** of **$800,000**. Items: (1) tax-exempt municipal bond interest **$20,000**; (2) tax depreciation exceeds book depreciation by **$100,000**; (3) warranty expense accrued for books **$30,000** but not yet deductible for tax. Enacted tax rate **25%**.\n\n### Task 1: Taxable Income and the Tax Provision\n\n| Item | Amount |\n|------|--------|\n| Pretax financial income | $800,000 |\n| Less: municipal interest (permanent) | ($20,000) |\n| Less: excess tax depreciation (taxable temporary) | ($100,000) |\n| Add: warranty accrual (deductible temporary) | $30,000 |\n| **Taxable income** | **$710,000** |\n| Current tax payable (25%) | **$177,500** |\n\n### Task 2: Journal Entry\n\n| Account | Debit | Credit |\n|---------|-------|--------|\n| Income tax expense | $195,000 | |\n| Deferred tax asset (warranty $30,000 × 25%) | $7,500 | |\n| &nbsp;&nbsp;Income tax payable | | $177,500 |\n| &nbsp;&nbsp;Deferred tax liability (depreciation $100,000 × 25%) | | $25,000 |\n\n**Explanation:**\n- **Permanent** differences (municipal interest) never reverse and are excluded from taxable income — they do **not** create deferred taxes.\n- The **taxable temporary** difference (excess tax depreciation) creates a **deferred tax liability** of $25,000; the **deductible temporary** difference (warranty) creates a **deferred tax asset** of $7,500.\n- Total income tax expense = current $177,500 + deferred liability $25,000 − deferred asset $7,500 = **$195,000**. Check: ($800,000 − $20,000 permanent) × 25% = **$195,000**. ✓\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Deferred income taxes.** Pretax financial income **$800,000**. (1) Tax-exempt municipal interest **$20,000**; (2) tax depreciation exceeds book by **$100,000**; (3) warranty expense accrued for books **$30,000**, not yet deductible. Enacted rate **25%**.","fields":[{"label":"Taxable income ($)","type":"num","answer":710000,"tol":0,"explain":"800,000 − 20,000 − 100,000 + 30,000"},{"label":"Current income tax payable ($)","type":"num","answer":177500,"tol":0,"explain":"$710,000 × 25%"},{"label":"Deferred tax liability ($)","type":"num","answer":25000,"tol":0,"explain":"$100,000 excess tax depreciation × 25%"},{"label":"Deferred tax asset ($)","type":"num","answer":7500,"tol":0,"explain":"$30,000 warranty × 25%"},{"label":"Total income tax expense ($)","type":"num","answer":195000,"tol":0,"explain":"177,500 + 25,000 − 7,500 (= (800,000−20,000)×25%)"}]},"area":"BAR4"},{"id":"TBS 8.6","title":"Statement of Cash Flows — Operating Activities (Indirect Method)","body":"**Scenario:** From Harbor Co.'s records, compute net cash provided by operating activities using the **indirect method**.\n\n### Task 1: Cash Flow from Operations\n\n| Item | Adjustment | Amount |\n|------|-----------|--------|\n| Net income | start | $250,000 |\n| Depreciation expense | + | $40,000 |\n| Gain on sale of equipment | − | ($15,000) |\n| Increase in accounts receivable | − | ($20,000) |\n| Decrease in inventory | + | $10,000 |\n| Increase in accounts payable | + | $8,000 |\n| Decrease in accrued liabilities | − | ($5,000) |\n| **Net cash from operating activities** | | **$268,000** |\n\n**Explanation:**\n- Add back **non-cash** expenses (depreciation). Remove **gains/losses** on asset sales — the full proceeds belong in **investing**, so the gain is subtracted here to avoid double counting.\n- Working capital: an **increase in a current asset** (A/R) **uses** cash (subtract); a **decrease in a current asset** (inventory) **provides** cash (add). An **increase in a current liability** (A/P) **provides** cash (add); a **decrease in a current liability** (accruals) **uses** cash (subtract).\n- $250,000 + $40,000 − $15,000 − $20,000 + $10,000 + $8,000 − $5,000 = **$268,000**.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Cash flow from operations (indirect method).** Net income **$250,000**; depreciation **$40,000**; gain on sale of equipment **$15,000**; A/R **increase** $20,000; inventory **decrease** $10,000; A/P **increase** $8,000; accrued liabilities **decrease** $5,000.","fields":[{"label":"Net cash provided by operating activities ($)","type":"num","answer":268000,"tol":0,"explain":"250,000 + 40,000 − 15,000 − 20,000 + 10,000 + 8,000 − 5,000"},{"label":"Gain on sale of equipment is…","type":"select","options":["Subtracted","Added"],"answer":"Subtracted","explain":"Gain removed from operating (full proceeds go to investing)"},{"label":"Increase in accounts receivable is…","type":"select","options":["Subtracted","Added"],"answer":"Subtracted","explain":"Increase in a current asset uses cash"}]},"area":"BAR4"},{"id":"TBS 8.7","title":"Revenue Recognition — ASC 606 Five-Step Model and Allocation","body":"**Scenario:** Nova Systems signs a contract to deliver **equipment** plus **2 years of service** for a bundled price of **$120,000**. Standalone selling prices: equipment **$100,000**, service **$40,000**. Equipment is delivered at contract inception; service is provided evenly over 2 years.\n\n### Task 1: Allocate the Transaction Price and Recognize Year 1 Revenue\n\n| Performance obligation | Standalone price | Allocation | Year 1 revenue |\n|------------------------|------------------|-----------|----------------|\n| Equipment (point in time) | $100,000 | $120,000 × (100/140) = **$85,714** | $85,714 |\n| Service (over time, 2 yrs) | $40,000 | $120,000 × (40/140) = **$34,286** | $17,143 |\n| **Total** | $140,000 | $120,000 | **$102,857** |\n\n**Explanation:**\n- The **five steps**: (1) identify the contract, (2) identify the **performance obligations** (distinct goods/services), (3) determine the transaction price, (4) **allocate** the price based on **relative standalone selling prices**, (5) recognize revenue **as/when** each obligation is satisfied.\n- Allocation uses relative SSP (total SSP $140,000): equipment $85,714, service $34,286.\n- Equipment transfers control at a **point in time** (delivery) → recognize $85,714 in Year 1. Service transfers **over time** (straight-line) → $34,286 / 2 = $17,143 per year. **Year 1 revenue = $102,857.**\n\n---","ai":true,"interactive":{"prompt":"**Scenario — ASC 606 allocation.** Bundle price **$120,000** for equipment + 2 years of service. Standalone selling prices: equipment **$100,000**, service **$40,000**. Equipment delivered at inception; service straight-line over 2 years.","fields":[{"label":"Price allocated to equipment ($)","type":"num","answer":85714,"tol":2,"explain":"$120,000 × (100/140)"},{"label":"Price allocated to service ($)","type":"num","answer":34286,"tol":2,"explain":"$120,000 × (40/140)"},{"label":"Total Year 1 revenue ($)","type":"num","answer":102857,"tol":3,"explain":"$85,714 equipment + $34,286/2 service"}]},"area":"BAR4"},{"id":"TBS 8.8","title":"Governmental — Fund Balance Classification (GASB 54) and Reconciliation","body":"**Scenario:** Riverton's General Fund reports total fund balance of **$500,000**. Classify each item under **GASB 54**, then identify why the fund statements must be reconciled to the government-wide statements.\n\n### Task 1: Classify Fund Balance (GASB 54)\n\n| Item | Amount | Classification |\n|------|--------|----------------|\n| Inventory of supplies | $30,000 | **Nonspendable** |\n| State grant restricted for road repairs | $200,000 | **Restricted** |\n| Reserve set aside by council ordinance (capital) | $150,000 | **Committed** |\n| Encumbrances / purchase orders (general fund) | $40,000 | **Assigned** |\n| Remainder | $80,000 | **Unassigned** |\n\n### Task 2: Fund Balance → Government-Wide Net Position Reconciliation\n\n| Reconciling item | Effect |\n|------------------|--------|\n| Capital assets (net) not reported in governmental funds | **+ $5,000,000** |\n| Long-term liabilities not reported in governmental funds | **− $3,000,000** |\n\n**Explanation:**\n- GASB 54 hierarchy, most to least constrained: **Nonspendable** (not in spendable form, e.g., inventory/prepaids), **Restricted** (external/legal constraints), **Committed** (formal action of the highest decision-making authority), **Assigned** (intent), **Unassigned** (residual — General Fund only).\n- Governmental funds use the **current financial resources** measurement focus and **modified accrual** basis, so they exclude capital assets and long-term debt. The government-wide statements use the **economic resources** focus and **full accrual** basis — hence the reconciliation adds capital assets and subtracts long-term liabilities.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — GASB 54 fund balance + reconciliation.** General Fund total fund balance **$500,000**. Classify each item, then give the reconciling effects to government-wide net position.\n\nItems: inventory of supplies $30,000; state grant restricted for roads $200,000; reserve committed by council ordinance $150,000; encumbrances/POs $40,000; remainder $80,000.","fields":[{"label":"Inventory of supplies — classification","type":"select","options":["Nonspendable","Restricted","Committed","Assigned","Unassigned"],"answer":"Nonspendable","explain":"Not in spendable form"},{"label":"State grant restricted for roads — classification","type":"select","options":["Nonspendable","Restricted","Committed","Assigned","Unassigned"],"answer":"Restricted","explain":"External/legal constraint"},{"label":"Council-ordinance reserve — classification","type":"select","options":["Nonspendable","Restricted","Committed","Assigned","Unassigned"],"answer":"Committed","explain":"Formal action of highest authority"},{"label":"Encumbrances / purchase orders — classification","type":"select","options":["Nonspendable","Restricted","Committed","Assigned","Unassigned"],"answer":"Assigned","explain":"Intent (general fund)"},{"label":"Remainder — classification","type":"select","options":["Nonspendable","Restricted","Committed","Assigned","Unassigned"],"answer":"Unassigned","explain":"Residual, General Fund only"},{"label":"Reconciliation: capital assets (net) effect ($)","type":"num","answer":5000000,"tol":0,"explain":"Add capital assets not reported in governmental funds"},{"label":"Reconciliation: long-term liabilities effect ($)","type":"num","answer":-3000000,"tol":0,"explain":"Subtract LT liabilities not reported in governmental funds"}]},"area":"BAR5"},{"id":"TBS 8.9","title":"Not-for-Profit — Statement of Activities and Net Asset Classes (ASU 2016-14)","body":"**Scenario:** Helping Hands (a NFP) had the following during the year. Classify each and compute the change in each net asset class. Operating expenses were **$400,000** (all reported in net assets without donor restrictions).\n\n### Task 1: Classify and Compute\n\n| Item | Amount | Net asset class |\n|------|--------|-----------------|\n| Unrestricted contributions | $300,000 | Without donor restrictions |\n| Contribution restricted to construct a building | $500,000 | With donor restrictions |\n| Contribution restricted for use next year (time) | $100,000 | With donor restrictions |\n| Investment return, unrestricted | $25,000 | Without donor restrictions |\n| Net assets released from restriction | $150,000 | Reclassification |\n\n| Net asset class | Computation | Change |\n|-----------------|-------------|--------|\n| **Without donor restrictions** | $300,000 + $25,000 + $150,000 released − $400,000 expenses | **+ $75,000** |\n| **With donor restrictions** | $500,000 + $100,000 − $150,000 released | **+ $450,000** |\n\n**Explanation:**\n- ASU 2016-14 collapsed the old three categories into **two**: **without donor restrictions** and **with donor restrictions**.\n- All **expenses** are reported in the **without donor restrictions** class. When a donor restriction is satisfied, the amount is **reclassified** — a decrease to *with* and an increase to *without* donor restrictions (\"net assets released from restrictions\").\n- Time- and purpose-restricted gifts are **with donor restrictions** until the time elapses or the purpose is met.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — NFP statement of activities (ASU 2016-14).** During the year: unrestricted contributions $300,000; contribution restricted to construct a building $500,000; contribution restricted for next year (time) $100,000; unrestricted investment return $25,000; net assets released from restriction $150,000. Operating expenses $400,000 (all in without-donor-restrictions).","fields":[{"label":"Change in net assets WITHOUT donor restrictions ($)","type":"num","answer":75000,"tol":0,"explain":"300,000 + 25,000 + 150,000 released − 400,000"},{"label":"Change in net assets WITH donor restrictions ($)","type":"num","answer":450000,"tol":0,"explain":"500,000 + 100,000 − 150,000 released"},{"label":"The building contribution is classified as…","type":"select","options":["With donor restrictions","Without donor restrictions"],"answer":"With donor restrictions","explain":"Purpose restriction until satisfied"}]},"area":"BAR5"},{"id":"TBS 8.10","title":"Capital Budgeting — NPV, IRR, and Payback","body":"**Scenario:** Crestline Co. is evaluating a project: initial investment **$500,000**, equal annual after-tax cash inflows of **$150,000** for **5 years**, cost of capital **10%**. (PV ordinary annuity factor, 10%, 5 yrs = **3.7908**.)\n\n### Task 1: Evaluate the Project\n\n| Metric | Computation | Result |\n|--------|-------------|--------|\n| Payback period | $500,000 / $150,000 | **3.33 years** |\n| Net present value | ($150,000 × 3.7908) − $500,000 = $568,620 − $500,000 | **+ $68,620** |\n| Internal rate of return | factor = $500,000 / $150,000 = 3.333 → between 15% and 16% | **≈ 15.2%** |\n| Decision | NPV > 0 and IRR > 10% hurdle | **Accept** |\n\n**Explanation:**\n- **Payback** = investment / annual cash flow = 3.33 years (ignores the time value of money — a weakness).\n- **NPV** = PV of inflows − initial investment = $568,620 − $500,000 = **+$68,620**. A positive NPV means the project earns more than the 10% required return → **accept**.\n- **IRR** is the discount rate that makes NPV = $0; here the annuity factor 3.333 falls between the 15% factor (3.3522) and 16% factor (3.2743), so IRR ≈ **15.2%**. Since IRR (15.2%) > hurdle rate (10%), the IRR rule also says **accept**.\n\n---","ai":true,"interactive":{"prompt":"**Scenario — Capital budgeting.** Initial investment **$500,000**; equal annual after-tax inflows **$150,000** for **5 years**; cost of capital **10%**. PV annuity factor (10%, 5y) = **3.7908**. (PV factors: 15% = 3.3522, 16% = 3.2743.)","fields":[{"label":"Payback period (years)","type":"num","answer":3.33,"tol":0.02,"explain":"$500,000 / $150,000"},{"label":"Net present value ($)","type":"num","answer":68620,"tol":50,"explain":"$150,000 × 3.7908 − $500,000"},{"label":"Internal rate of return (%)","type":"num","answer":15.2,"tol":0.5,"explain":"Annuity factor 3.333 ≈ between 15% and 16%"},{"label":"Decision","type":"select","options":["Accept","Reject"],"answer":"Accept","explain":"NPV > 0 and IRR > 10% hurdle"}]},"area":"BAR2"}],"sr":[{"id":"SR-1","trigger":"SAR settlement type?","target":"Liability = 매기 재측정"},{"id":"SR-2","trigger":"MD&A 위치?","target":"RSI지만 재무제표 앞"},{"id":"SR-3","trigger":"Phantom Stock 처리?","target":"현금정산 = 부채"},{"id":"SR-4","trigger":"RSI 뒤에 오는 것?","target":"Budgetary Comparison, Pension"},{"id":"SR-5","trigger":"RRUCA 순서?","target":"R-R-U-C-A = 비제한-제한-비지출-지출-할당"},{"id":"SR-6","trigger":"Encumbrance 영향?","target":"Unassigned↓ Assigned↑ (재분류)"},{"id":"SR-7","trigger":"Modified Accrual 기준?","target":"Available = 60일 이내"},{"id":"SR-8","trigger":"TPL-FNP=?","target":"NPL (Net Pension Liability)"}]};

ソフトウェアは社内利用目的で生産とは無関係であり、研究開発には該当しない。市場調査も、新製品・新サービスを開発するための新知識の発見を目的としないため、研究開発ではない。\n- 選択肢「B」「C」「D」は上記理由により誤り。"},"ko":{"question":"Brill사는 당기 중 다음 지출을 했다.\n\n- Brill의 일반 경영정보시스템에 사용할 컴퓨터 소프트웨어 개발비: $100,000\n- 시장조사 활동 비용: $75,000\n\nU.S. GAAP에 따라 당기 손익계산서에 연구개발비로 보고할 금액은?","explanation":"- 「A」가 정답. U.S. GAAP에서 연구개발비에는 판매·리스·시장 제공 목적으로 개발되는 소프트웨어가 기술적 실현가능성에 도달하기 전에 발생한 원가가 포함된다. 본 소프트웨어는 내부사용 목적이며 생산과 무관하므로 연구개발에 해당하지 않는다. 시장조사 역시 신제품·신서비스 개발을 위한 새로운 지식의 발견을 목적으로 하지 않으므로 연구개발이 아니다.\n- 「B」「C」「D」는 위 사유로 오답."}},"MCQ-00410":{"ja":{"question":"Wall社はFox社に対し、第1年度1月2日開始の5年契約でオフィスを賃貸した。オペレーティング・リースの条件では、1年目の賃料は$8,000、2〜5年目の賃料は年額$12,500である。ただしリース締結の誘因として、Wallは最初の6か月を賃料無料とした。第1年度12月31日の損益計算書で、Wallが賃貸収益として報告すべき金額はいくらか。","explanation":"賃貸収益は現金受領時ではなく、稼得時（発生主義）に計上する。したがって賃貸収益の総額を5年間にわたり均等に認識する。\n\n| 項目 | 金額 |\n|------|--------|\n| 1年目の賃料（$8,000の1/2） | $4,000 |\n| 2〜5年目の賃料（$12,500 × 4） | $50,000 |\n| **賃料合計** | **$54,000** |\n| 1年目の賃料（1/5 × $54,000） | **$10,800** |"},"ko":{"question":"Wall사는 Fox사에 1차연도 1월 2일부터 5년 계약으로 사무실을 임대했다. 운용리스 조건상 1년차 임대료는 $8,000, 2~5년차 임대료는 연 $12,500이다. 다만 리스 체결 유인으로 Wall은 처음 6개월을 무료로 했다. 1차연도 12월 31일 손익계산서에 Wall이 임대수익으로 보고할 금액은?","explanation":"임대수익은 현금 수령 시가 아니라 가득 시(발생주의)에 인식한다. 따라서 임대수익 총액을 5년에 걸쳐 균등하게 인식한다.\n\n| 항목 | 금액 |\n|------|--------|\n| 1년차 임대료($8,000의 1/2) | $4,000 |\n| 2~5년차 임대료($12,500 × 4) | $50,000 |\n| **임대료 합계** | **$54,000** |\n| 1년차 임대료(1/5 × $54,000) | **$10,800** |"}},"MCQ-07443":{"ja":{"question":"第1年度1月1日、Johnson Products社（Johnson）はFairmont Enterprise社（Fairmont）の持分40%を取得した。第2年度3月31日、Johnsonはさらに15%の持分を取得した。第2年度12月31日までにJohnsonがFairmontの新CEOを任命し、現在の取締役12名中9名を任命した場合、JohnsonがFairmontの第2年度の業績を報告するために用いる方法はどれか。","explanation":"- 選択肢「D」が正しい。Johnsonは55%を所有しFairmontを明確に支配しているため、第2年度はFairmontを連結すべきである。\n- 選択肢「A」は誤り。取得が成立した際に資産・負債の公正価値を考慮することはあるが、これは企業結合の会計処理の主たる方法ではない。\n- 選択肢「B」は誤り。原価法は、投資者が子会社に対して重要な影響力を持たず、かつ子会社株式に市場がない場合に用いる。\n- 選択肢「C」は誤り。Johnsonは第1年度（のみ）は持分法でFairmontを会計処理する。40%を取得し重要な影響力を有していたためである。","choices":{"A":"公正価値法","B":"原価法","C":"持分法","D":"連結"}},"ko":{"question":"1차연도 1월 1일, Johnson Products사(Johnson)는 Fairmont Enterprise사(Fairmont)의 지분 40%를 취득했다. 2차연도 3월 31일 추가로 15%를 취득했다. 2차연도 12월 31일까지 Johnson이 Fairmont의 새 CEO를 선임하고 현 이사 12명 중 9명을 임명했다면, Johnson이 Fairmont의 2차연도 실적을 보고하는 데 사용할 방법은?","explanation":"- 「D」가 정답. Johnson은 55%를 소유하여 Fairmont를 명백히 지배하므로 2차연도에는 Fairmont를 연결해야 한다.\n- 「A」는 오답. 취득 성립 시 자산·부채의 공정가치를 고려할 수 있으나, 이는 기업결합 회계처리의 주된 방법이 아니다.\n- 「B」는 오답. 원가법은 투자자가 자회사에 유의적 영향력이 없고 자회사 주식의 시장도 없을 때 사용한다.\n- 「C」는 오답. Johnson은 1차연도(만) 지분법으로 처리한다. 40%를 취득해 유의적 영향력을 가졌기 때문이다.","choices":{"A":"공정가치법","B":"원가법","C":"지분법","D":"연결"}}},"MCQ-10056":{"ja":{"question":"Potter社はSquire社の80%を$600,000で取得した。1月1日時点で、Squireの資産・負債の公正価値はそれぞれ帳簿価額$850,000・$205,000と等しかった。当年度中、Squireは純利益$75,000を計上し、配当$20,000を支払った。12月31日の連結財務諸表において、U.S. GAAPの下での非支配持分はいくらか。","explanation":"取得日におけるSquireの公正価値：\n- Squireの公正価値 × 80% = 取得対価\n- $750,000 × 80% = $600,000\n\n取得日の非支配持分：\n- NCI = Squireの公正価値 × NCI割合 = $750,000 × 20% = $150,000\n\n12月31日の非支配持分：\n| 項目 | 金額 |\n|------|--------|\n| 期首非支配持分 | $150,000 |\n| ＋ 20% × Squireの純利益 | $15,000（= 20% × $75,000） |\n| − 20% × Squireの配当 | ($4,000)（= 20% × $20,000） |\n| **期末非支配持分** | **$161,000** |"},"ko":{"question":"Potter사는 Squire사의 80%를 $600,000에 취득했다. 1월 1일 현재 Squire의 자산·부채 공정가치는 각각 장부가액 $850,000·$205,000과 같았다. 당기 중 Squire는 순이익 $75,000을 계상하고 배당 $20,000을 지급했다. 12월 31일 연결재무제표에서 U.S. GAAP상 비지배지분은?","explanation":"취득일의 Squire 공정가치:\n- Squire 공정가치 × 80% = 취득대가\n- $750,000 × 80% = $600,000\n\n취득일 비지배지분:\n- NCI = Squire 공정가치 × NCI 비율 = $750,000 × 20% = $150,000\n\n12월 31일 비지배지분:\n| 항목 | 금액 |\n|------|--------|\n| 기초 비지배지분 | $150,000 |\n| ＋ 20% × Squire 순이익 | $15,000(= 20% × $75,000) |\n| − 20% × Squire 배당 | ($4,000)(= 20% × $20,000) |\n| **기말 비지배지분** | **$161,000** |"}},"MCQ-05055":{"ja":{"question":"Ajax社は各構成単位（コンポーネント）から次の営業成績を報告した。\n\n| 構成単位 | 単体 | 消去 | 連結 |\n|-----------|-----|--------------|--------------|\n| Astor | $215,000 | ($120,000) | $95,000 |\n| Bejax | $30,000 | $0 | $30,000 |\n| Carter | ($180,000) | $50,000 | ($130,000) |\n| Davis | $80,000 | ($50,000) | $30,000 |\n| Elbow | ($20,000) | $20,000 | $0 |\n| **合計** | **$125,000** | **($100,000)** | **$25,000** |\n\n純粋に営業成績に基づくと、報告すべきセグメントに該当する構成単位はどれか。","explanation":"**ルール：** セグメントは、その報告利益または損失の絶対値が次のいずれか大きい方の10%以上であれば規模テストを満たす：(1) 損失を計上しなかった全営業セグメントの合計報告利益、または (2) 損失を計上した全営業セグメントの合計報告損失。\n\nAjaxは非連結（単体）の財務成績に基づいてセグメントを判定する。利益の絶対値（$325,000）は損失の絶対値（$200,000）より大きい。Ajaxは利益を計上したセグメントの利益合計の10%、すなわち$32,500を報告セグメント判定の基準として用いる。\n\n- Astor：$215,000 > $32,500 ✓\n- Bejax：$30,000 < $32,500 ✗\n- Carter：$180,000 > $32,500 ✓\n- Davis：$80,000 > $32,500 ✓\n- Elbow：$20,000 < $32,500 ✗","choices":{"A":"Astor、Carter、Davis。","B":"Astor、Bejax、Davis。","C":"Astor、Bejax、Carter、Davis、Elbow。","D":"Astor、Bejax、Carter、Davis。"}},"ko":{"question":"Ajax사는 각 구성단위로부터 다음 영업실적을 보고했다.\n\n| 구성단위 | 단독 | 제거 | 연결 |\n|-----------|-----|--------------|--------------|\n| Astor | $215,000 | ($120,000) | $95,000 |\n| Bejax | $30,000 | $0 | $30,000 |\n| Carter | ($180,000) | $50,000 | ($130,000) |\n| Davis | $80,000 | ($50,000) | $30,000 |\n| Elbow | ($20,000) | $20,000 | $0 |\n| **합계** | **$125,000** | **($100,000)** | **$25,000** |\n\n순수하게 영업실적에 근거할 때 보고대상 세그먼트에 해당하는 구성단위는?","explanation":"**규칙:** 세그먼트는 보고이익 또는 손실의 절대값이 다음 중 큰 금액의 10% 이상이면 규모기준을 충족한다: (1) 손실을 보고하지 않은 모든 영업세그먼트의 합산 보고이익, 또는 (2) 손실을 보고한 모든 영업세그먼트의 합산 보고손실.\n\nAjax는 비연결(단독) 재무실적에 근거해 세그먼트를 판단한다. 이익의 절대값($325,000)이 손실의 절대값($200,000)보다 크다. Ajax는 이익을 보고한 세그먼트 이익 합계의 10%, 즉 $32,500을 보고대상 세그먼트 판단 기준으로 사용한다.\n\n- Astor: $215,000 > $32,500 ✓\n- Bejax: $30,000 < $32,500 ✗\n- Carter: $180,000 > $32,500 ✓\n- Davis: $80,000 > $32,500 ✓\n- Elbow: $20,000 < $32,500 ✗","choices":{"A":"Astor, Carter, Davis.","B":"Astor, Bejax, Davis.","C":"Astor, Bejax, Carter, Davis, Elbow.","D":"Astor, Bejax, Carter, Davis."}}},"MCQ-07392":{"ja":{"question":"Benson Construction社は3年プロジェクトの2年目にある。1年目、同社はプロジェクトで売上総利益$1.2百万を報告した。2年目について、プロジェクト会計担当者は当年の収益が$10百万、原価が$10.5百万と計算した。Bensonの会計担当者は2年目の活動をどのように記録すべきか。","explanation":"- 選択肢「A」が正しい。2年合計のBensonの売上総利益は $1.2百万 + ($500,000) = $700,000。2年目に$500,000の損失を計上することで、プロジェクト累計の売上総利益は$700,000となる（1年目の利益$1.2百万から2年目に計上した損失$500,000を差し引く）。\n- 選択肢「B」は誤り。ある年度の損失は、プロジェクトの記録方法を別の方法へ変更することを要求しない。\n- 選択肢「C」は誤り。2年合計の売上総利益は$700,000であり、これは損失ではない。\n- 選択肢「D」は誤り。損失は繰り延べない。","choices":{"A":"2年目に$500,000の損失を計上する。","B":"2年目に会計原則の変更を記録する。","C":"2年目に$700,000の損失を計上する。","D":"2年目に$500,000の繰延損失を計上する。"}},"ko":{"question":"Benson Construction사는 3년 프로젝트의 2년차에 있다. 1년차에 회사는 프로젝트에서 매출총이익 $1.2백만을 보고했다. 2년차에 대해 프로젝트 회계담당자는 당해 수익이 $10백만, 원가가 $10.5백만이라고 계산했다. Benson의 회계담당자는 2년차 활동을 어떻게 기록해야 하는가?","explanation":"- 「A」가 정답. 2년 합산 Benson의 매출총이익은 $1.2백만 + ($500,000) = $700,000이다. 2년차에 $500,000 손실을 계상하면 프로젝트 누적 매출총이익은 $700,000이 된다(1년차 이익 $1.2백만에서 2년차 계상 손실 $500,000 차감).\n- 「B」는 오답. 특정 연도의 손실이 프로젝트 기록방법을 다른 방법으로 변경하도록 요구하지 않는다.\n- 「C」는 오답. 2년 합산 매출총이익은 $700,000이며 손실이 아니다.\n- 「D」는 오답. 손실은 이연하지 않는다.","choices":{"A":"2년차에 $500,000 손실을 계상한다.","B":"2년차에 회계원칙 변경을 기록한다.","C":"2년차에 $700,000 손실을 계상한다.","D":"2년차에 $500,000 이연손실을 계상한다."}}},"MCQ-08611":{"ja":{"question":"第1年度1月1日、ある会社が販売目的のソフトウェアについて$100,000の費用を資産化した。同社はソフトウェア費用を5年間にわたり定額法で償却する。第3年度1月1日のソフトウェア費用の帳簿価額は$60,000であった。第3年度12月31日時点で、ソフトウェアの販売から得られる将来総収益の見積りは$23,000、ソフトウェアの処分に要する将来費用の見積りは$8,000である。第3年度（12月31日終了）にソフトウェア費用に関連して費用計上すべき金額はいくらか。","explanation":"第3年度のソフトウェアに関連する費用には2つの構成要素がある：\n\n1. **償却費：** $20,000（当初原価$100,000を5年定額償却に基づく）\n2. **減損損失：** $25,000（第3年度末の帳簿価額$40,000に対し公正価値$15,000に基づく。公正価値は将来総収益見積り$23,000から処分費用$8,000を差し引いた額）\n\n償却費$20,000と減損損失$25,000の合計で、費用は**$45,000**となる。"},"ko":{"question":"1차연도 1월 1일, 어떤 회사가 판매 목적 소프트웨어에 대해 $100,000의 원가를 자본화했다. 회사는 소프트웨어 원가를 5년에 걸쳐 정액법으로 상각한다. 3차연도 1월 1일 소프트웨어 원가의 장부가액은 $60,000이었다. 3차연도 12월 31일 현재 소프트웨어 판매로 얻을 미래 총수익 추정치는 $23,000, 소프트웨어 처분에 드는 미래 원가 추정치는 $8,000이다. 3차연도(12월 31일 종료)에 소프트웨어 원가와 관련하여 비용으로 인식할 금액은?","explanation":"3차연도 소프트웨어 관련 비용에는 두 구성요소가 있다:\n\n1. **상각비:** $20,000(당초 원가 $100,000을 5년 정액상각)\n2. **손상차손:** $25,000(3차연도 말 장부가액 $40,000 대비 공정가치 $15,000 기준. 공정가치는 미래 총수익 추정치 $23,000에서 처분원가 $8,000을 차감한 금액)\n\n상각비 $20,000과 손상차손 $25,000을 합하여 비용은 **$45,000**이다."}},"MCQ-15705":{"ja":{"question":"Variety Chips社の主要市場は米国とメキシコである。両国間の為替変動を管理するため、同社は第1年度の期首に、第2年度に解消される外貨建キャッシュフロー・ヘッジ取引を締結した。このヘッジが1年目に$33,000の利益を生じたと仮定すると、同社は第1年度末の財務諸表でこのヘッジ活動をどのように報告するか。","explanation":"- 選択肢「B」が正しい。外貨建キャッシュフロー・ヘッジでは、ヘッジの利益（$33,000）は貸借対照表上、その他の包括利益（OCI）の構成要素として報告される。\n- 選択肢「A」「C」「D」は誤り。キャッシュフロー・ヘッジに係る利益・損失は、ヘッジ対象が損益に影響を与えるまで、その他の包括利益の構成要素として報告される。","choices":{"A":"第2年度まで財務諸表に影響なし。","B":"貸借対照表上、その他の包括利益（OCI）に$33,000の利益を報告。","C":"損益計算書に$33,000の利益を報告。","D":"$33,000の繰延利益を負債として計上する。"}},"ko":{"question":"Variety Chips사의 주요 시장은 미국과 멕시코다. 양국 간 환율변동을 관리하기 위해 회사는 1차연도 초에 2차연도에 청산되는 외화 현금흐름 위험회피 거래를 체결했다. 이 위험회피가 1년차에 $33,000 이익을 냈다고 가정하면, 회사는 1차연도 말 재무제표에 이 위험회피 활동을 어떻게 보고하는가?","explanation":"- 「B」가 정답. 외화 현금흐름 위험회피에서 위험회피 이익($33,000)은 재무상태표상 기타포괄손익(OCI)의 구성요소로 보고된다.\n- 「A」「C」「D」는 오답. 현금흐름 위험회피 관련 손익은 위험회피대상이 손익에 영향을 줄 때까지 기타포괄손익의 구성요소로 보고된다.","choices":{"A":"2차연도까지 재무제표에 영향 없음.","B":"재무상태표상 기타포괄손익(OCI)에 $33,000 이익을 보고.","C":"손익계산서에 $33,000 이익을 보고.","D":"$33,000 이연이익을 부채로 계상한다."}}},"MCQ-15710":{"ja":{"question":"ABC社はメキシコで完了した複数の取引によるペソ建てのエクスポージャーをヘッジするため、外貨建公正価値ヘッジを締結した。当年度、同社は外貨建公正価値ヘッジから$17,000の損失を、ヘッジ対象通貨から$12,000の利益を計上した。上記のデリバティブ取引活動はどのように記録されるか。","explanation":"- 選択肢「A」が正しい。外貨建公正価値ヘッジからの$17,000の損失は、ヘッジ対象通貨の$12,000の利益で相殺され、取引からの純損失$5,000がABC社の当期利益に認識される。\n- 外貨建公正価値ヘッジでは、デリバティブの損失と相殺される利益の双方が当期利益の一部として認識される。","choices":{"A":"当期利益に純損失$5,000を計上。","B":"当期利益に$17,000の損失と$12,000の利益。","C":"その他の包括利益に純損失$5,000。","D":"当期利益に$12,000の利益、その他の包括利益に$17,000の損失。"}},"ko":{"question":"ABC사는 멕시코에서 완료된 여러 거래로 인한 페소 익스포저를 회피하기 위해 외화 공정가치 위험회피를 체결했다. 당기에 회사는 외화 공정가치 위험회피에서 $17,000 손실을, 위험회피대상 통화에서 $12,000 이익을 계상했다. 위 파생상품 거래활동은 어떻게 기록되는가?","explanation":"- 「A」가 정답. 외화 공정가치 위험회피의 $17,000 손실은 위험회피대상 통화의 $12,000 이익으로 상쇄되며, 거래에서 발생한 순손실 $5,000이 ABC사의 당기손익에 인식된다.\n- 외화 공정가치 위험회피에서는 파생상품 손실과 이를 상쇄하는 이익이 모두 당기손익의 일부로 인식된다.","choices":{"A":"당기손익에 순손실 $5,000.","B":"당기손익에 $17,000 손실과 $12,000 이익.","C":"기타포괄손익에 순손실 $5,000.","D":"당기손익에 $12,000 이익, 기타포괄손익에 $17,000 손실."}}},"MCQ-10179":{"ja":{"question":"Water Control社はウォーターポンプを製造し、標準原価計算を採用している。ポンプ1台当たりの標準製造間接費は次のとおり：\n\n- 変動製造間接費（4時間 × $8/時間）：$32\n- 固定製造間接費（4時間 × $5/時間）：$20\n- 1台当たり総製造間接費：$52\n\n11月の追加情報：\n- 25,000台が予定されていたが、22,000台が生産された\n- 直接作業時間は94,000時間\n- 1台当たりの標準直接作業時間は4時間\n\n11月の変動製造間接費 能率差異は：","explanation":"| 計算 | 金額 |\n|-------------|--------|\n| 実際DL時間に基づく変動予算：94,000 × $8/時 | $752,000 |\n| 標準DL時間に基づく変動予算：22,000台 × 4時間/台 × $8/時 | $704,000 |\n| **不利差異** | **$48,000** |\n\n予定より多くの時間を要したため、差異は不利となる。","choices":{"A":"$48,000 不利。","B":"$60,000 有利。","C":"$96,000 有利。","D":"$32,000 有利。"}},"ko":{"question":"Water Control사는 워터펌프를 제조하며 표준원가계산을 사용한다. 펌프 1대당 표준제조간접비는 다음과 같다:\n\n- 변동제조간접비(4시간 × $8/시간): $32\n- 고정제조간접비(4시간 × $5/시간): $20\n- 1대당 총제조간접비: $52\n\n11월 추가정보:\n- 25,000대가 예정되었으나 22,000대가 생산됨\n- 직접노동시간 94,000시간 투입\n- 1대당 표준직접노동시간은 4시간\n\n11월 변동제조간접비 능률차이는:","explanation":"| 계산 | 금액 |\n|-------------|--------|\n| 실제 직접노동시간 기준 변동예산: 94,000 × $8/시 | $752,000 |\n| 표준 직접노동시간 기준 변동예산: 22,000대 × 4시간/대 × $8/시 | $704,000 |\n| **불리차이** | **$48,000** |\n\n예상보다 많은 시간을 사용했으므로 차이는 불리하다.","choices":{"A":"$48,000 불리.","B":"$60,000 유리.","C":"$96,000 유리.","D":"$32,000 유리."}}},"MCQ-10124":{"ja":{"question":"Delphi社は次の特性を持つ新製品を開発した：\n- 最大生産能力：年間25,000台\n- 固定費：年間$450,000（減価償却$60,000を含む）\n- 単位当たり変動費：$16\n- 税率：40%\n- 必要な税引後利益：$75,000\n\nこの目標利益を達成するための単位販売価格は、少なくとも：","explanation":"| ステップ | 計算 |\n|------|-------------|\n| 税引後利益 | $75,000 |\n| 税率の補数（100% − 40%） | ÷ 60% |\n| 税引前利益 | $125,000 |\n| 固定費 | $450,000 |\n| 必要な総貢献利益 | $575,000 |\n| 最大数量 | ÷ 25,000 |\n| 単位当たり必要貢献利益 | $23 |\n| 単位当たり変動費 | $16 |\n| **必要販売価格** | **$39** |"},"ko":{"question":"Delphi사는 다음 특성을 가진 신제품을 개발했다:\n- 최대 생산능력: 연간 25,000대\n- 고정비: 연간 $450,000(감가상각 $60,000 포함)\n- 단위당 변동비: $16\n- 세율: 40%\n- 필요한 세후이익: $75,000\n\n이 목표이익을 달성하기 위한 단위 판매가격은 최소:","explanation":"| 단계 | 계산 |\n|------|-------------|\n| 세후이익 | $75,000 |\n| 세율의 보수(100% − 40%) | ÷ 60% |\n| 세전이익 | $125,000 |\n| 고정비 | $450,000 |\n| 필요한 총공헌이익 | $575,000 |\n| 최대 수량 | ÷ 25,000 |\n| 단위당 필요 공헌이익 | $23 |\n| 단위당 변동비 | $16 |\n| **필요 판매가격** | **$39** |"}},"MCQ-10194":{"ja":{"question":"Almo社の前提：\n- 販売価格：1台$400\n- 変動費：1台当たり$200\n- 年間固定費：$100,000\n- 税引後目標利益：$240,000\n- 実効税率：40%\n\nAlmo社が税引後利益目標を達成するために販売すべき数量を求めよ。","explanation":"- 税引後目標利益$240,000 ÷ (1 − 税率) = $240,000 ÷ 0.6 = 税引前利益$400,000\n- (総固定費 + 税引前目標利益) ÷ 単位当たり貢献利益\n- = ($100,000 + $400,000) ÷ $200 = **2,500台**","choices":{"A":"1,700台。","B":"3,500台。","C":"4,500台。","D":"2,500台。"}},"ko":{"question":"Almo사의 가정:\n- 판매가격: 대당 $400\n- 변동비: 단위당 $200\n- 연간 고정비: $100,000\n- 세후 목표이익: $240,000\n- 실효세율: 40%\n\nAlmo사가 세후 이익목표를 달성하기 위해 판매해야 할 수량을 구하라.","explanation":"- 세후 목표이익 $240,000 ÷ (1 − 세율) = $240,000 ÷ 0.6 = 세전이익 $400,000\n- (총고정비 + 세전 목표이익) ÷ 단위당 공헌이익\n- = ($100,000 + $400,000) ÷ $200 = **2,500대**","choices":{"A":"1,700대.","B":"3,500대.","C":"4,500대.","D":"2,500대."}}},"MCQ-10332":{"ja":{"question":"Hardwood Manufacturing社は拡張した工場へ移転しなければならない。経営陣は施設をリースするか購入するかを評価している。次の費用はいずれもこの意思決定に関連するが、例外は：","explanation":"- **ルール：** 関連原価とは、意思決定の結果として変化する原価である。\n- 選択肢「A」が正しい。旧施設に係る処分収入は、リースか購入かの意思決定に関連しない。現施設は手狭になっており、Hardwoodはこの施設を使用しない。旧施設の保有・処分に係る収入や費用は、リースか購入かの意思決定にかかわらず発生する。\n- 選択肢「B」「C」「D」はいずれも意思決定により変化する費用であり、したがって関連原価である。","choices":{"A":"頭金に充てる現施設の売却による見込み収入。","B":"新施設に係る年間賃借料。","C":"購入オプションにおける新施設の見込み処分価額。","D":"リース施設に適用される共用部分の維持管理費。"}},"ko":{"question":"Hardwood Manufacturing사는 확장된 공장으로 이전해야 한다. 경영진은 시설을 리스할지 구매할지 평가하고 있다. 다음 비용은 모두 이 의사결정에 관련되지만, 예외는:","explanation":"- **규칙:** 관련원가란 의사결정의 결과로 변동하는 원가다.\n- 「A」가 정답. 구 시설 관련 처분수입은 리스 vs 구매 의사결정에 관련되지 않는다. 현 시설은 비좁아졌고 Hardwood는 이 시설을 사용하지 않는다. 구 시설의 보유·처분에 따른 수입·비용은 리스/구매 결정과 무관하게 발생한다.\n- 「B」「C」「D」는 모두 의사결정에 따라 변동하는 비용이므로 관련원가다.","choices":{"A":"계약금으로 사용할 현 시설 매각 예상 수입.","B":"신 시설 관련 연간 임차료.","C":"구매 옵션에서 신 시설의 예상 처분가치.","D":"리스 시설에 적용되는 공용부분 유지관리비."}}},"MCQ-10163":{"ja":{"question":"企業が各資産を、その資産の耐用期間とほぼ同じ満期の金融商品で調達する場合、それは何を適用しているか：","explanation":"- 選択肢「C」が正しい。適切な運転資本管理は、各資産の満期（耐用期間）と、その資産の調達に用いる金融商品の期間とを一致させる。\n- 選択肢「A」は誤り。オペレーティング・レバレッジは、生産プロセスで固定費が用いられる程度をいう。\n- 選択肢「B」は誤り。財務レバレッジは、資産の調達に用いる負債の額をいう。\n- 選択肢「D」は誤り。リターンの最大化は、資産の活用によって最適な収益率を得ようとするものである。","choices":{"A":"オペレーティング・レバレッジ。","B":"財務レバレッジ。","C":"運転資本管理。","D":"リターンの最大化。"}},"ko":{"question":"기업이 각 자산을 그 자산의 수명과 거의 같은 만기의 금융상품으로 조달할 때, 이는 무엇을 적용하는 것인가:","explanation":"- 「C」가 정답. 적절한 운전자본관리는 각 자산의 만기(수명)와 그 자산 조달에 사용하는 금융상품의 기간을 일치시킨다.\n- 「A」는 오답. 영업레버리지는 생산과정에서 고정비가 사용되는 정도를 말한다.\n- 「B」는 오답. 재무레버리지는 자산 조달에 사용되는 부채의 크기를 말한다.\n- 「D」는 오답. 수익 극대화는 자산 활용을 통해 최적의 수익률을 얻으려는 것이다.","choices":{"A":"영업레버리지.","B":"재무레버리지.","C":"운전자본관리.","D":"수익 극대화."}}},"MCQ-10199":{"ja":{"question":"ある会社が年利8%で$500,000の短期銀行借入を行った。借入の条件として、当座預金口座に$100,000の補償的預金残高を維持することが求められる。当座預金は年3%の利息を生む。通常、同社は取引目的で$50,000の残高を維持している。この借入の実効金利はいくらか。","explanation":"| ステップ | 計算 |\n|------|-------------|\n| ステップ1：実際の利息（元本 × 利率 × 期間） | $500,000 × 8% = $40,000 |\n| ステップ2：追加の補償的預金残高で得られる利息を控除 | $50,000 × 3% = $1,500 |\n| 正味の利息コスト | $40,000 − $1,500 = $38,500 |\n| ステップ3：会社が利用できる借入金で除す | $500,000 − $50,000（追加残高）= $450,000 |\n| **実効金利** | $38,500 ÷ $450,000 = **8.56%** |"},"ko":{"question":"어떤 회사가 연 8%로 $500,000의 단기 은행차입을 했다. 차입 조건으로 당좌예금 계좌에 $100,000의 보상예금잔액을 유지해야 한다. 당좌예금은 연 3% 이자가 붙는다. 평소 회사는 거래 목적으로 $50,000 잔액을 유지한다. 이 차입의 실효이자율은?","explanation":"| 단계 | 계산 |\n|------|-------------|\n| 1단계: 실제 이자(원금 × 이율 × 기간) | $500,000 × 8% = $40,000 |\n| 2단계: 추가 보상예금잔액에서 얻는 이자 차감 | $50,000 × 3% = $1,500 |\n| 순이자비용 | $40,000 − $1,500 = $38,500 |\n| 3단계: 회사가 실제 사용 가능한 차입금으로 나눔 | $500,000 − $50,000(추가잔액) = $450,000 |\n| **실효이자율** | $38,500 ÷ $450,000 = **8.56%** |"}},"MCQ-10639":{"ja":{"question":"COSOによれば、事業体のエンタープライズ・リスク・マネジメント（ERM）の監督を提供するのは次のうちどれか。","explanation":"- 選択肢「B」が正しい。ERMに関連するガバナンスと文化の主要な構成要素の一つが取締役会による監督であり、これは取締役会が組織全体のトーンを設定し、自らの権限を確立するとともに経営者の説明責任を促進することを求める。\n- 選択肢「A」「C」「D」は誤り。リスク責任者と財務担当役員は経営者の一員であり、経営者は取締役会に報告する。","choices":{"A":"リスク責任者","B":"取締役会","C":"経営者","D":"財務担当役員"}},"ko":{"question":"COSO에 따르면, 기업의 전사적 위험관리(ERM)에 대한 감독을 제공하는 것은?","explanation":"- 「B」가 정답. ERM 관련 거버넌스와 문화의 핵심 구성요소 중 하나가 이사회 감독이며, 이는 이사회가 조직 전체의 기조를 설정하여 자신의 권한을 확립하고 경영진의 책임성을 촉진하도록 요구한다.\n- 「A」「C」「D」는 오답. 위험관리책임자와 재무담당 임원은 경영진의 일원이며, 경영진은 이사회에 보고한다.","choices":{"A":"위험관리책임자","B":"이사회","C":"경영진","D":"재무담당 임원"}}},"MCQ-10397":{"ja":{"question":"COSOによれば、ERMの構成要素のうち、事業体の固有リスクと残余リスクの考慮を扱うのはどれか。","explanation":"- 選択肢「C」が正しい。ERMフレームワークのパフォーマンス構成要素には、固有リスクと残余リスクを含むリスク分析に関連する要素が含まれる。\n- 選択肢「A」は誤り。ガバナンスと文化には、望ましい文化の定義、コアバリューへのコミットメントの表明、従業員の獲得・維持、業務構造の確立が含まれる。\n- 選択肢「B」は誤り。戦略と目標設定は、戦略と事業目標を特定する。\n- 選択肢「D」は誤り。レビューと修正は、ERMの継続的改善を確保する方針・手続に関連する。","choices":{"A":"ガバナンスと文化","B":"戦略と目標設定","C":"パフォーマンス","D":"レビューと修正"}},"ko":{"question":"COSO에 따르면, ERM 구성요소 중 기업의 고유위험과 잔여위험 고려를 다루는 것은?","explanation":"- 「C」가 정답. ERM 프레임워크의 성과 구성요소에는 고유위험과 잔여위험을 포함한 위험분석 관련 요소가 포함된다.\n- 「A」는 오답. 거버넌스와 문화에는 바람직한 문화의 정의, 핵심가치에 대한 헌신 표명, 직원 확보·유지, 운영구조 확립이 포함된다.\n- 「B」는 오답. 전략과 목표설정은 전략과 사업목표를 식별한다.\n- 「D」는 오답. 검토와 수정은 ERM의 지속적 개선을 보장하는 정책·절차와 관련된다.","choices":{"A":"거버넌스와 문화","B":"전략과 목표설정","C":"성과","D":"검토와 수정"}}},"MCQ-10203":{"ja":{"question":"COSOによれば、ERMの構成要素のうち、事象の発生可能性と影響度を設定するプロセスを扱うのはどれか。","explanation":"- 選択肢「A」が正しい。ERMフレームワークのパフォーマンス構成要素には、事象の発生可能性と影響度の設定を含むリスク分析が含まれる。\n- 他の構成要素は、事象の影響度や発生可能性の決定を扱わない。","choices":{"A":"パフォーマンス","B":"レビューと修正","C":"ガバナンスと文化","D":"戦略と目標設定"}},"ko":{"question":"COSO에 따르면, ERM 구성요소 중 사건의 발생가능성과 영향도를 설정하는 절차를 다루는 것은?","explanation":"- 「A」가 정답. ERM 프레임워크의 성과 구성요소에는 사건의 발생가능성과 영향도 설정을 포함한 위험분석이 포함된다.\n- 다른 구성요소는 사건의 영향도나 발생가능성 결정을 다루지 않는다.","choices":{"A":"성과","B":"검토와 수정","C":"거버넌스와 문화","D":"전략과 목표설정"}}},"MCQ-10114":{"ja":{"question":"Dollar Bus社は、公表されたバス時刻表に完全に準拠するという目標を設定した。同社は現在83%の準拠率を達成しており、準拠率が100%へ改善しても収益に大きな変化は見込まないが、バスが20%超の頻度で遅延すると収益が大きく落ち込むとみている。同社の目標設定は論理的に次のように展開する：","explanation":"- 選択肢「D」が正しい。目標はリスク選好と整合し、それがリスク許容度の水準を決定する。\n- 選択肢「A」は誤り。リスク対応（バスの購入）は目標から導かれるものではない。\n- 選択肢「B」は誤り。許容限度を用いて逆算的に目標を定めることはしない。\n- 選択肢「C」は誤り。追加のバスの取得はリスクへの対応であり、目標設定の一部ではない。","choices":{"A":"80%の準拠率が目標となる。","B":"現実的な準拠目標を設定するために、許容される変動水準が定められる。","C":"目標達成のため追加のバスを取得する。","D":"バス時刻表への準拠は、80%超の許容準拠率の範囲内で、利用者喪失リスクとの関係でレビューされる。"}},"ko":{"question":"Dollar Bus사는 공표된 버스 시간표를 완전히 준수한다는 목표를 설정했다. 회사는 현재 83% 준수율을 달성하고 있으며, 준수율이 100%로 개선되어도 수익에 큰 변화는 예상하지 않으나, 버스가 20% 초과 빈도로 지연되면 수익이 크게 감소한다고 본다. 회사의 목표설정은 논리적으로 다음과 같이 전개된다:","explanation":"- 「D」가 정답. 목표는 위험선호와 정합하며, 이것이 위험허용수준을 결정한다.\n- 「A」는 오답. 위험대응(버스 구매)은 목표에서 도출되지 않는다.\n- 「B」는 오답. 허용한도를 사용해 역으로 목표를 정하지 않는다.\n- 「C」는 오답. 추가 버스 취득은 위험대응이며 목표설정의 일부가 아니다.","choices":{"A":"80% 준수율이 목표가 된다.","B":"현실적인 준수목표를 설정하기 위해 허용가능한 변동수준이 정해진다.","C":"목표 달성을 위해 추가 버스를 취득한다.","D":"버스 시간표 준수는 80% 초과의 허용 준수율 범위 내에서 이용객 상실 위험과 관련하여 검토된다."}}},"MCQ-08580":{"ja":{"question":"市の政府全体財務諸表に求められる会計基礎はどれか。","explanation":"- 選択肢「B」が正しい。政府全体財務諸表（純資産計算書および活動計算書）は、経済的資源測定焦点と完全発生主義により報告される。\n- 選択肢「C」は誤り。修正発生主義は政府基金の報告基礎として用いられる。政府全体財務諸表は完全発生主義を用いる。","choices":{"A":"現金主義。","B":"発生主義。","C":"修正発生主義。","D":"修正現金主義。"}},"ko":{"question":"시(市)의 정부전체 재무제표에 요구되는 회계기준은?","explanation":"- 「B」가 정답. 정부전체 재무제표(순자산명세서 및 활동명세서)는 경제적 자원 측정초점과 완전발생주의로 보고된다.\n- 「C」는 오답. 수정발생주의는 정부기금의 보고기준으로 사용된다. 정부전체 재무제표는 완전발생주의를 사용한다.","choices":{"A":"현금주의.","B":"발생주의.","C":"수정발생주의.","D":"수정현금주의."}}},"MCQ-00987":{"ja":{"question":"州の一般基金において、年度末に未消化の予算外債務（encumbrances）は、最も適切には何として報告されるか。","explanation":"- 選択肢「D」が正しい。予算外債務は、財・サービスの未履行契約額を表す基金残高の拘束または割当である。年度末の予算外債務は、支出（expenditures）でも負債でもない。年度末に、予算外債務は基金残高の拘束または割当として振り替えられる。\n- 選択肢「A」は誤り。予算外債務は負債ではない。\n- 選択肢「B」は誤り。予算外債務は基金残高を制限（restriction）の水準まで拘束しない。\n- 選択肢「C」は誤り。予算外債務は債務ではない。また、勘定グループはGASB 34で廃止された。","choices":{"A":"一般基金の負債。","B":"一般基金の基金残高の制限。","C":"一般長期債務勘定グループの負債。","D":"一般基金の基金残高の拘束（コミットメント）。"}},"ko":{"question":"주(州)의 일반기금에서 연도말 미소멸 약정지출(encumbrances)은 가장 적절하게는 무엇으로 보고되는가?","explanation":"- 「D」가 정답. 약정지출은 재화·용역의 미이행 계약액을 나타내는 기금잔액의 확약 또는 배정이다. 연도말 약정지출은 지출(expenditures)도 부채도 아니다. 연도말에 약정지출은 기금잔액의 확약 또는 배정으로 재분류된다.\n- 「A」는 오답. 약정지출은 부채가 아니다.\n- 「B」는 오답. 약정지출은 기금잔액을 제한(restriction) 수준까지 구속하지 않는다.\n- 「C」는 오답. 약정지출은 부채가 아니다. 또한 계정군은 GASB 34로 폐지되었다.","choices":{"A":"일반기금의 부채.","B":"일반기금 기금잔액의 제한.","C":"일반장기부채 계정군의 부채.","D":"일반기금 기금잔액의 확약(commitment)."}}},"MCQ-07944":{"ja":{"question":"次の基金と収益に基づき、主要基金（major fund）の分類について正しい記述はどれか。\n\n| 基金 | 収益 |\n|------|----------|\n| 一般基金 | $125百万 |\n| 資本事業基金 | $50百万 |\n| 永久基金 | $105百万 |\n| 政府基金合計 | $1,050百万 |\n| 空港事業基金 | $175百万 |\n| 公益事業基金 | $180百万 |\n| 事業基金合計 | $1,300百万 |","explanation":"- 選択肢「A」が正しい。資本事業基金は、自らの基金カテゴリー（政府基金合計）の収益の4.76%、関連する全基金（政府基金＋事業基金）の総収益の2.13%を構成する。資本事業基金は主要基金に分類すべきでない。\n- 選択肢「B」は誤り。永久基金は政府基金収益の10%を占めるものの、関連する全基金の総収益の4.5%にすぎない。\n- 選択肢「C」は誤り。一般基金は財務統計にかかわらず常に主要基金に分類される。\n- 選択肢「D」は誤り。空港事業基金は事業基金収益の13.5%、総収益の7.4%を占め、基準を満たす。","choices":{"A":"資本事業基金は主要基金に分類すべきでない。","B":"永久基金は主要基金に分類すべきである。","C":"一般基金は主要基金に分類すべきでない。","D":"空港事業基金は主要基金に分類すべきでない。"}},"ko":{"question":"다음 기금과 수익에 근거할 때, 주요기금(major fund) 분류에 대해 옳은 설명은?\n\n| 기금 | 수익 |\n|------|----------|\n| 일반기금 | $125백만 |\n| 자본사업기금 | $50백만 |\n| 영구기금 | $105백만 |\n| 정부기금 합계 | $1,050백만 |\n| 공항사업기금 | $175백만 |\n| 공익사업기금 | $180백만 |\n| 사업기금 합계 | $1,300백만 |","explanation":"- 「A」가 정답. 자본사업기금은 자기 기금범주(정부기금 합계) 수익의 4.76%, 관련 전체 기금(정부기금＋사업기금) 총수익의 2.13%를 구성한다. 자본사업기금은 주요기금으로 분류하면 안 된다.\n- 「B」는 오답. 영구기금은 정부기금 수익의 10%를 차지하지만, 관련 전체 기금 총수익의 4.5%에 불과하다.\n- 「C」는 오답. 일반기금은 재무통계와 무관하게 항상 주요기금으로 분류된다.\n- 「D」는 오답. 공항사업기금은 사업기금 수익의 13.5%, 총수익의 7.4%를 차지하여 기준을 충족한다.","choices":{"A":"자본사업기금은 주요기금으로 분류하면 안 된다.","B":"영구기금은 주요기금으로 분류해야 한다.","C":"일반기금은 주요기금으로 분류하면 안 된다.","D":"공항사업기금은 주요기금으로 분류하면 안 된다."}}},"MCQ-10496":{"ja":{"question":"Feline郡は、市の固形廃棄物埋立地を運営するため、Calico埋立地を独立した法的主体として設立した。埋立地の運営予算と資本改善事業は郡委員会の承認を要する。Calico埋立地の財務諸表はどう扱われるべきか。","explanation":"- **ルール：** 特別目的政府はSELF：個別に選出（Separately Elected）、法的に独立（Legally separate）、財務的に独立（Financially independent）。\n- 選択肢「C」が正しい。Calico埋立地はSELF基準を満たさず、したがって構成単位である。混合表示の基準（統治機関が実質的に同一、または専ら主たる政府に奉仕）も満たさないため、個別表示の構成単位として報告される。\n- 選択肢「A」は誤り。埋立地は郡に対して財務的に説明責任を負い、独立した特別目的政府ではない。\n- 選択肢「B」は誤り。埋立地は混合表示の基準を満たさない。","choices":{"A":"特別目的政府として表示する。","B":"混合構成単位として表示する。","C":"構成単位として個別表示する。","D":"注記でのみ開示する。"}},"ko":{"question":"Feline 카운티는 시의 고형폐기물 매립지를 운영하기 위해 Calico 매립지를 별도의 법적 실체로 설립했다. 매립지의 운영예산과 자본개선사업은 카운티 위원회의 승인을 요한다. Calico 매립지의 재무제표는 어떻게 처리되어야 하는가?","explanation":"- **규칙:** 특수목적정부는 SELF: 별도 선출(Separately Elected), 법적 독립(Legally separate), 재무적 독립(Financially independent).\n- 「C」가 정답. Calico 매립지는 SELF 기준을 충족하지 못하므로 구성단위다. 혼합표시 기준(지배기구가 실질적으로 동일하거나 오로지 주된 정부에만 봉사)도 충족하지 못하므로 별도 표시 구성단위로 보고된다.\n- 「A」는 오답. 매립지는 카운티에 재무적으로 책임을 지며 독립적인 특수목적정부가 아니다.\n- 「B」는 오답. 매립지는 혼합표시 기준을 충족하지 못한다.","choices":{"A":"특수목적정부로 표시한다.","B":"혼합 구성단위로 표시한다.","C":"구성단위로 별도 표시한다.","D":"주석에만 공시한다."}}},"MCQ-10497":{"ja":{"question":"Point Sparrow市は、政府基金の基金残高合計$1,200,000を報告しており、次の項目がある：\n- 固定資産：$4,000,000\n- 減価償却累計額：$2,750,000\n- 長期債務：$2,000,000\n\n加えて、政府は州が徴収する4%の売上税を課している。10月・11月・12月の売上はそれぞれ$3,000,000、$4,000,000、$5,000,000であった。12月31日時点で、市は政府活動の純資産（Net Position）としていくらを表示するか。","explanation":"政府全体の純資産はCANSの語呂で計算する：\n\n| 項目 | 金額 |\n|------|--------|\n| GRaSPP—基金残高 | $1,200,000 |\n| 資本的資産（非流動） | $4,000,000 |\n| 減価償却累計額 | ($2,750,000) |\n| 非流動負債 | ($2,000,000) |\n| 12月分売上税収益の発生計上（$5,000,000 × 4%） | $200,000 |\n| **政府全体の純資産** | **$650,000** |\n\n注：12月の収益は年度末から75日後に受領され、修正発生主義では発生計上されない（利用可能でない）が、完全発生主義では認識される。"},"ko":{"question":"Point Sparrow시는 정부기금의 기금잔액 합계 $1,200,000을 보고하며 다음 항목이 있다:\n- 고정자산: $4,000,000\n- 감가상각누계액: $2,750,000\n- 장기부채: $2,000,000\n\n추가로 정부는 주(州)가 징수하는 4% 매출세를 부과한다. 10월·11월·12월 매출은 각각 $3,000,000, $4,000,000, $5,000,000이었다. 12월 31일 현재 시는 정부활동 순자산(Net Position)으로 얼마를 표시하는가?","explanation":"정부전체 순자산은 CANS 두문자로 계산한다:\n\n| 항목 | 금액 |\n|------|--------|\n| GRaSPP—기금잔액 | $1,200,000 |\n| 자본자산(비유동) | $4,000,000 |\n| 감가상각누계액 | ($2,750,000) |\n| 비유동부채 | ($2,000,000) |\n| 12월분 매출세수익 발생계상($5,000,000 × 4%) | $200,000 |\n| **정부전체 순자산** | **$650,000** |\n\n주: 12월 수익은 연도말로부터 75일 후 수령되어 수정발생주의에서는 발생계상하지 않으나(가용 불가능), 완전발생주의에서는 인식된다."}},"MCQ-10468":{"ja":{"question":"Sharpton市は警察部門の資本設備購入に$230,000を予算計上した。市は1月1日に1台$40,000の警察車両5台の発注書を発行した。6月30日に4台が$180,000で納入された。6月30日の中間期一般基金財務諸表で、市は何を報告するか。","explanation":"- 選択肢「A」が正しい。Sharpton市は一般基金での資本取得を資本的支出として記録する。金額は$180,000。\n- 選択肢「B」は誤り。有形固定資産は政府基金には表示されない。\n- 選択肢「C」は誤り。予算外債務として残る歳出予算の予算統制は$40,000（残りの発注）に等しい。\n- 選択肢「D」は誤り。利用可能な歳出予算 = $230,000 − $180,000（支出）− $40,000（予算外債務）= $10,000。","choices":{"A":"資本的支出$180,000。","B":"有形固定資産の増加$180,000。","C":"予算統制$20,000。","D":"利用可能な歳出予算$30,000。"}},"ko":{"question":"Sharpton시는 경찰부서 자본설비 구매에 $230,000을 예산계상했다. 시는 1월 1일에 대당 $40,000인 경찰차량 5대의 구매주문서를 발행했다. 6월 30일에 4대가 $180,000에 납품되었다. 6월 30일 중간 일반기금 재무제표에서 시는 무엇을 보고하는가?","explanation":"- 「A」가 정답. Sharpton시는 일반기금에서의 자본취득을 자본적 지출로 기록한다. 금액은 $180,000.\n- 「B」는 오답. 유형자산은 정부기금에 표시되지 않는다.\n- 「C」는 오답. 약정지출로 남는 세출예산의 예산통제는 $40,000(남은 주문)이다.\n- 「D」는 오답. 사용가능 세출예산 = $230,000 − $180,000(지출) − $40,000(약정지출) = $10,000.","choices":{"A":"자본적 지출 $180,000.","B":"유형자산 증가 $180,000.","C":"예산통제 $20,000.","D":"사용가능 세출예산 $30,000."}}},"MCQ-10493":{"ja":{"question":"Alpha Omega社はメキシコに子会社を有し、連結プロセスで換算法（決算日レート法）を用いている。次の記述のうち正しいものはどれか。\n\nI. メキシコ・ペソ建ての売上は、期末為替レートで米ドルに換算される。\nII. 換算差損益はその他の包括利益に報告される。","explanation":"- 選択肢「B」が正しい。換算法を用いる場合、差損益はその他の包括利益に反映される。記述Iは誤りで、換算法ではすべての損益計算書項目は当期の加重平均為替レートで換算される。","choices":{"A":"IとIIの両方。","B":"IIのみ。","C":"Iのみ。","D":"いずれの記述も正しくない。"}},"ko":{"question":"Alpha Omega사는 멕시코에 자회사를 두고 연결과정에서 환산법(현행환율법)을 사용한다. 다음 설명 중 옳은 것은?\n\nI. 멕시코 페소 표시 매출은 기말환율로 미 달러로 환산된다.\nII. 환산손익은 기타포괄손익에 보고된다.","explanation":"- 「B」가 정답. 환산법을 사용할 경우 손익은 기타포괄손익에 반영된다. 설명 I은 틀렸으며, 환산법에서는 모든 손익계산서 항목이 당기 가중평균환율로 환산된다.","choices":{"A":"I과 II 모두.","B":"II만.","C":"I만.","D":"둘 다 옳지 않다."}}},"MCQ-10360":{"ja":{"question":"多国籍企業は外貨取引から様々なリスクにさらされる。為替変動がこれらの企業にもたらすリスクには次のすべてが含まれるが、例外は：","explanation":"- 選択肢「C」が正しい。為替変動は多国籍企業を取引・経済的・換算リスクにさらすが、**金利リスクにはさらさない**。金利リスクは、金利の変動に応じた金融商品の価値変動へのエクスポージャーを表す。\n- **換算リスク：** 為替レートの変動により、報告される資産・負債・資本・利益の金額が変動する可能性へのエクスポージャー。\n- **経済的リスク：** 為替レートの変動によりキャッシュフローの現在価値が減少する可能性。\n- **取引リスク：** 為替レートの変動により、個々の取引の決済時に経済的損失が生じる可能性。","choices":{"A":"換算リスク。","B":"経済的リスク。","C":"金利リスク。","D":"取引リスク。"}},"ko":{"question":"다국적 기업은 외환거래로 다양한 위험에 노출된다. 환율변동이 이들 기업에 노출시키는 위험에는 다음이 모두 포함되지만, 예외는:","explanation":"- 「C」가 정답. 환율변동은 다국적 기업을 거래·경제적·환산위험에 노출시키지만 **금리위험에는 노출시키지 않는다**. 금리위험은 금리변동에 따른 금융상품 가치변동에 대한 노출을 의미한다.\n- **환산위험:** 환율변동으로 보고되는 자산·부채·자본·이익 금액이 변동할 가능성에 대한 노출.\n- **경제적 위험:** 환율변동으로 현금흐름의 현재가치가 감소할 가능성.\n- **거래위험:** 환율변동으로 개별 거래 결제 시 경제적 손실이 발생할 가능성.","choices":{"A":"환산위험.","B":"경제적 위험.","C":"금리위험.","D":"거래위험."}}},"MCQ-10192":{"ja":{"question":"Nadaf Exports社は中東から出荷される高級ペルシャ絨毯を扱い、欧州・北米全域で販売している。同社はUSD・CAD・ユーロでの取引決済に係る取引リスクの軽減を図っている。Nadafが用いると考えられる手法には次が含まれるが、例外は：","explanation":"- 選択肢「A」が正しい。海外市場での販売を増減させることは、通常**経済的リスク**の軽減に関連する再構築手法であり、取引リスクの軽減ではない。\n- 選択肢「B」「C」「D」は、ヘッジを通じて取引リスクを軽減する適切な手法である。","choices":{"A":"為替レートに基づき、北米と欧州の販売構成を戦略的に調整する。","B":"先渡（フォワード）ヘッジ契約を締結する。","C":"先物（フューチャー）ヘッジ契約を締結する。","D":"通貨オプション・ヘッジ契約を締結する。"}},"ko":{"question":"Nadaf Exports사는 중동에서 출하되는 고급 페르시아 양탄자를 취급하며 유럽·북미 전역에서 판매한다. 회사는 USD·CAD·유로 거래결제에 따른 거래위험 완화를 도모한다. Nadaf가 사용할 만한 기법에는 다음이 포함되지만, 예외는:","explanation":"- 「A」가 정답. 해외시장 판매를 늘리거나 줄이는 것은 통상 **경제적 위험** 완화와 관련된 재구조화 기법이며, 거래위험 완화가 아니다.\n- 「B」「C」「D」는 위험회피를 통해 거래위험을 완화하는 적절한 기법이다.","choices":{"A":"환율에 근거해 북미와 유럽의 판매구성을 전략적으로 조정한다.","B":"선도(forward) 위험회피 계약을 체결한다.","C":"선물(futures) 위험회피 계약을 체결한다.","D":"통화옵션 위험회피 계약을 체결한다."}}},"AI-BAR1-01":{"ja":{"question":"COSO ERM（2017）フレームワークは、いくつの相互関連する構成要素で全社的リスク管理を構成しているか。","choices":{"A":"3つ","B":"5つ","C":"8つ","D":"17"},"explanation":"COSO ERMは5つの構成要素（ガバナンスと文化／戦略と目標設定／パフォーマンス／レビューと修正／情報・伝達・報告）で構成される。17は原則の数、8は旧来の内部統制の考え方。"},"ko":{"question":"COSO ERM(2017) 프레임워크는 전사적 위험관리를 몇 개의 상호 연관된 구성요소로 구성하는가?","choices":{"A":"3개","B":"5개","C":"8개","D":"17개"},"explanation":"COSO ERM은 5개 구성요소(거버넌스와 문화/전략과 목표설정/성과/검토와 수정/정보·소통·보고)로 구성된다. 17은 원칙 수, 8은 과거 내부통제 개념."}},"AI-BAR1-02":{"ja":{"question":"COSO ERMのどの構成要素が、事象の発生可能性と影響度を設定してリスクを分析・優先順位付けすることを含むか。","choices":{"A":"ガバナンスと文化","B":"戦略と目標設定","C":"パフォーマンス","D":"情報・伝達・報告"},"explanation":"パフォーマンス構成要素が、目標達成に影響しうるリスクを発生可能性・影響度を含めて分析し、優先順位を付ける。"},"ko":{"question":"COSO ERM의 어느 구성요소가 사건의 발생가능성과 영향도를 설정해 위험을 분석·우선순위화하는가?","choices":{"A":"거버넌스와
